<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Points Calculator · Cricket Experts</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /*
     * BUG FIX: Removed :root overrides block:
     *   --bg: var(--bg-dark);;       → double semicolon
     *   --accent: var(--accent);     → circular reference, resolves to nothing
     *   --danger: var(--red);;       → double semicolon
     *   --card: #161b22              → hardcoded, now uses var(--bg-card-alt)
     *   --border: rgba(...,0.08)     → overrides global token
     * All values come from tokens.css instead.
     */

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font);
      margin: 0;
      padding-bottom: 120px;
      overflow-x: hidden;
    }

    /* STICKY HEADER */
    .app-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      position: sticky;
      top: 0;
      background: rgba(12, 17, 23, 0.9);
      backdrop-filter: blur(12px);
      z-index: 1000;
      border-bottom: 1px solid var(--border-subtle);
    }

    .back-btn {
      background: var(--bg-card-alt);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 12px;
    }

    /* SCORE BOX */
    .score-box {
      background: linear-gradient(145deg, var(--bg-card), var(--bg-card-alt));
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid var(--accent);
      margin-bottom: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .score-box .label   { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
    .score-box .val     { font-size: 42px; font-weight: 900; margin: 5px 0; color: var(--text-primary); }
    .score-box .summary { font-size: 11px; color: var(--text-faint); }

    /* FLOATING BOTTOM SCORE */
    .floating-score {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 380px;
      background: var(--accent);
      color: #000;
      padding: 14px 24px;
      border-radius: 50px;
      display: none;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 25px var(--accent-glow);
      z-index: 2000;
      font-weight: 800;
    }

    /* SECTION TITLE */
    .section-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--cyan);
      margin: 20px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* CARD — uses token instead of hardcoded colour */
    .card {
      background: var(--bg-card-alt);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border-subtle);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .full { grid-column: span 2; }

    .input-group               { display: flex; flex-direction: column; gap: 4px; }
    .input-group label         { font-size: 10px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; }
    .input-group input,
    .input-group select {
      background: var(--bg-dark);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 12px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      width: 100%;
      outline: none;
    }
    .input-group input:focus   { border-color: var(--accent); }

    /* CHIPS */
    .chip-group { display: flex; gap: 8px; }
    .chip {
      flex: 1;
      padding: 10px 5px;
      background: var(--bg-dark);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-faint);
      font-family: var(--font);
    }
    .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* TOGGLE ROW */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
    }
    .toggle-row span { font-size: 13px; font-weight: 700; }

    /* DUCK ROW — uses var(--red) not --danger */
    .toggle-row.danger span { color: var(--red); }

    .pulse { animation: pulseAnim 0.3s ease-in-out; }
    @keyframes pulseAnim {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>
<header class="app-header">
  <a href="more.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
  <h1 style="margin:0; font-size:17px; font-weight:800;">Points Calculator</h1>
</header>

<div class="container">

  <div class="score-box" id="mainDisplay">
    <div class="label">Projected Fantasy Points</div>
    <div class="val" id="totalPoints">0</div>
    <div class="summary" id="breakdownText">Enter stats below to begin</div>
  </div>

  <!-- MULTIPLIERS -->
  <div class="section-title"><i class="fas fa-rocket"></i> Multipliers</div>
  <div class="card">
    <div class="input-group full">
      <label>Player Designation</label>
      <div class="chip-group">
        <div class="chip active" onclick="setRole('norm', this)">Standard</div>
        <div class="chip" onclick="setRole('c', this)">Captain (2×)</div>
        <div class="chip" onclick="setRole('vc', this)">VC (1.5×)</div>
      </div>
    </div>

    <div class="input-group full">
      <label>Match Booster</label>
      <select id="boosterSelect" onchange="calculate()">
        <option value="NONE">No Active Booster</option>
        <option value="TOTAL_2X">Total 2X</option>
        <option value="INDIAN_2X">Indian / Overseas 2X</option>
        <option value="UNCAPPED_2X">Uncapped 2X</option>
        <option value="CAPTAIN_3X">Captain 3X (Only if C)</option>
        <option value="MOM_2X">MOM 2X</option>
      </select>
    </div>

    <div class="full">
      <div class="toggle-row" style="border-color: var(--cyan);">
        <span>Player of the Match?</span>
        <input type="checkbox" id="isPOM" onchange="calculate()" style="width:20px;height:20px;">
      </div>
    </div>
  </div>

  <!-- BATTING -->
  <div class="section-title"><i class="fas fa-baseball-bat-ball"></i> Batting</div>
  <div class="card">
    <div class="input-group"><label>Runs</label>  <input type="number" id="runs"   placeholder="0" oninput="calculate()"></div>
    <div class="input-group"><label>Balls</label> <input type="number" id="balls"  placeholder="0" oninput="calculate()"></div>
    <div class="input-group"><label>Fours</label> <input type="number" id="fours"  placeholder="0" oninput="calculate()"></div>
    <div class="input-group"><label>Sixes</label> <input type="number" id="sixes"  placeholder="0" oninput="calculate()"></div>
    <div class="full">
      <div class="toggle-row danger">
        <span>Out for Duck?</span>
        <input type="checkbox" id="isDuck" onchange="calculate()" style="width:20px;height:20px;">
      </div>
    </div>
  </div>

  <!-- BOWLING -->
  <div class="section-title"><i class="fas fa-circle-dot"></i> Bowling</div>
  <div class="card">
    <div class="input-group"><label>Wickets</label>    <input type="number" id="wickets"      placeholder="0"   oninput="calculate()"></div>
    <div class="input-group"><label>Maidens</label>    <input type="number" id="maidens"      placeholder="0"   oninput="calculate()"></div>
    <div class="input-group"><label>Overs</label>      <input type="number" id="overs"        placeholder="0.0" step="0.1" oninput="calculate()"></div>
    <div class="input-group"><label>Runs Conc.</label> <input type="number" id="runsConceded" placeholder="0"   oninput="calculate()"></div>
  </div>

  <!-- FIELDING -->
  <div class="section-title"><i class="fas fa-hands"></i> Fielding</div>
  <div class="card">
    <div class="input-group"><label>Catches</label>      <input type="number" id="catches"   placeholder="0" oninput="calculate()"></div>
    <div class="input-group"><label>Stumpings</label>    <input type="number" id="stumpings" placeholder="0" oninput="calculate()"></div>
    <div class="input-group full"><label>Run Outs (Total)</label> <input type="number" id="runouts" placeholder="0" oninput="calculate()"></div>
  </div>

</div>

<div class="floating-score" id="floatBar">
  <span>TOTAL POINTS</span>
  <span id="floatPoints">0 PTS</span>
</div>

<script>
  let currentRole = "norm";

  window.onscroll = function() {
    const floatBar    = document.getElementById("floatBar");
    const mainDisplay = document.getElementById("mainDisplay");
    floatBar.style.display =
      window.pageYOffset > mainDisplay.offsetTop + mainDisplay.offsetHeight ? "flex" : "none";
  };

  function setRole(role, el) {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    currentRole = role;
    calculate();
    triggerHaptic();
  }

  function triggerHaptic() {
    if (navigator.vibrate) navigator.vibrate(40);
    const disp = document.getElementById("mainDisplay");
    disp.classList.remove("pulse");
    void disp.offsetWidth;
    disp.classList.add("pulse");
  }

  function calculate() {
    const runs     = Number(document.getElementById("runs").value)         || 0;
    const balls    = Number(document.getElementById("balls").value)        || 0;
    const fours    = Number(document.getElementById("fours").value)        || 0;
    const sixes    = Number(document.getElementById("sixes").value)        || 0;
    const wickets  = Number(document.getElementById("wickets").value)      || 0;
    const maidens  = Number(document.getElementById("maidens").value)      || 0;
    const overs    = Number(document.getElementById("overs").value)        || 0;
    const conceded = Number(document.getElementById("runsConceded").value) || 0;
    const catches  = Number(document.getElementById("catches").value)      || 0;
    const stump    = Number(document.getElementById("stumpings").value)    || 0;
    const runouts  = Number(document.getElementById("runouts").value)      || 0;
    const isPOM    = document.getElementById("isPOM").checked;
    const isDuck   = document.getElementById("isDuck").checked;
    const booster  = document.getElementById("boosterSelect").value;

    let pts = 0;

    // Batting
    pts += runs;
    pts += (fours * 1) + (sixes * 2);
    if      (runs >= 100) pts += 20;
    else if (runs >= 75)  pts += 15;
    else if (runs >= 50)  pts += 10;
    else if (runs >= 30)  pts += 5;
    pts += (runs - balls); // Strike Rate
    if (runs === 0 && isDuck) pts -= 2;

    // Bowling
    if (wickets > 0) pts += 20 + ((wickets - 1) * 25);
    pts += (maidens * 10);
    if (overs >= 2) {
      const whole = Math.floor(overs);
      const extra = Math.round((overs - whole) * 10);
      const trueOvers = whole + (extra / 6);
      const er = conceded / trueOvers;
      if      (er <= 6) pts += 8;
      else if (er <= 9) pts += 4;
      else              pts -= 4;
    }

    // Fielding
    pts += (catches * 8) + (stump * 8) + (runouts * 8);

    // Involvement + POM
    if (runs > 0 || wickets > 0 || catches > 0 || stump > 0 || runouts > 0) pts += 4;
    if (isPOM) pts += 20;

    // Multiplier
    let multiplier = 1;
    if (currentRole === "c")  multiplier = 2;
    if (currentRole === "vc") multiplier = 1.5;

    let finalScore = pts * multiplier;

    // Boosters
    if (["TOTAL_2X","INDIAN_2X","UNCAPPED_2X"].includes(booster)) finalScore *= 2;
    if (booster === "MOM_2X"     && isPOM)                         finalScore += (20 * multiplier);
    if (booster === "CAPTAIN_3X" && currentRole === "c")           finalScore = (finalScore / 2) * 3;

    const result = Math.round(finalScore);
    document.getElementById("totalPoints").textContent  = result;
    document.getElementById("floatPoints").textContent  = `${result} PTS`;
    document.getElementById("breakdownText").textContent = `Base: ${pts} · Multiplier: ${multiplier}×`;
  }
</script>
</body>
</html>
