<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 | View Team</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/team-view.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script type="module" src="auth-guard.js"></script>

  <style>
    .xi-toggle { display: flex; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 4px; gap: 4px; margin: 12px 16px; }
    .xi-tab { flex: 1; display: flex; align-items: center; justify-content: center; padding: 9px 14px; border-radius: 9px; border: none; background: transparent; color: rgba(255, 255, 255, 0.38); font-family: var(--font-display); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: var(--transition); }
    .xi-tab.active { background: var(--accent); color: #000; box-shadow: 0 2px 10px var(--accent-glow); }
  </style>
</head>

<body class="loading-state">

<!-- SKELETON SCREEN -->
<div id="skeletonScreen">
  <div class="sk-header">
    <div class="sk-block" style="width:32px;height:32px;border-radius:8px"></div>
    <div class="sk-block" style="width:100px;height:18px;border-radius:6px"></div>
    <div class="sk-block" style="width:32px;height:32px;border-radius:8px"></div>
  </div>
  <div class="sk-block" style="height:44px;border-radius:10px;margin-bottom:12px"></div>
  <div class="sk-block" style="height:420px;border-radius:16px;margin-bottom:12px"></div>
</div>

<div class="team-view-app">

  <!-- HEADER -->
  <header class="premium-header">
    <a href="ppl-home.html" class="icon-back" aria-label="Go Back">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-center">
      <h1 class="main-title" id="viewTitle">View Team</h1>
    </div>
    <div class="header-spacer" aria-hidden="true"></div>
  </header>

  <!-- PHASE XI TOGGLE -->
  <div class="xi-toggle" id="phaseToggleRow">
    <!-- Rendered via JS -->
  </div>

  <!-- TEAM FIELD -->
  <main class="team-field" id="teamContainer"></main>

</div>

<script type="module" src="ppl-team-view.js"></script>

</body>
</html>
