<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 — Live</title>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Canvas Confetti for Fireworks -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --accent:        #9AE000;
      --accent-dim:    rgba(154,224,0,0.09);
      --accent-glow:   rgba(154,224,0,0.28);
      --accent-mid:    rgba(154,224,0,0.18);
      --bg-page:       #020617;
      --bg-card:       #0d1625;
      --bg-card-alt:   #111e30;
      --bg-elevated:   #0d1a2d;
      --border-card:   rgba(255,255,255,0.10);
      --border:        rgba(255,255,255,0.07);
      --border-subtle: rgba(255,255,255,0.04);
      --border-accent: rgba(154,224,0,0.20);
      --text-primary:  #f0f4f8;
      --text-dim:      #94a3b8;
      --text-faint:    #64748b;
      --red:           #ef4444;
      --orange:        #fb923c;
      --gold:          #f59e0b;
      --rank-color:    #7cc4ff;
      --font-display:  'Barlow Condensed', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --card-radius:   18px;
      --btn-radius:    12px;
      --nav-height:    65px;
      --transition:    all 250ms cubic-bezier(0.4,0,0.2,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app-wrap {
      width: 100%;
      max-width: 480px;
      padding: 0 0 calc(var(--nav-height) + 24px);
    }

    /* ── HEADER ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px rgba(239,68,68,0.5);
      animation: livePulse 1.5s ease-in-out infinite;
    }
    .header-dot.idle { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 8px var(--accent-glow)} 50%{box-shadow:0 0 18px var(--accent-glow)} }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .header-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .header-badge {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .badge-live { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .badge-idle { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border-accent); }

    /* ── LIVE HERO ── */
    .live-hero {
      margin: 14px 16px 0;
      background: linear-gradient(145deg, #1a0808, #0d1625);
      border: 1.5px solid rgba(239,68,68,0.35);
      border-radius: var(--card-radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .live-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--red), transparent);
    }
    .live-hero.idle {
      background: linear-gradient(145deg, var(--bg-card-alt), var(--bg-card));
      border-color: var(--border-accent);
    }
    .live-hero.idle::before { background: linear-gradient(90deg, var(--accent), transparent); }
    .live-eyebrow {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-faint);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-eyebrow .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
      animation: livePulse 1s infinite;
      flex-shrink: 0;
    }
    .matchup {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.3px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .match-meta {
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--text-faint);
      margin-bottom: 18px;
    }

    /* ── SCORE BLOCK ── */
    .score-block {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .innings-score {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
      padding: 12px 14px;
    }
    .innings-score.batting { border-color: rgba(239,68,68,0.3); }
    .innings-score.batting-complete { border-color: var(--border-accent); }
    .inn-team {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-faint);
      margin-bottom: 4px;
    }
    .inn-score-val {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      color: var(--text-primary);
    }
    .inn-score-val.current { color: var(--red); }
    .inn-overs {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 3px;
    }

    /* ── RATE BAR ── */
    .rate-bar {
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .rate-item {
      flex: 1;
      padding: 8px 6px;
      text-align: center;
      border-right: 1px solid var(--border-subtle);
    }
    .rate-item:last-child { border-right: none; }
    .rate-val {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }
    .rate-val.danger { color: var(--red); }
    .rate-val.safe   { color: var(--accent); }
    .rate-lbl {
      font-family: var(--font-body);
      font-size: 9px;
      font-weight: 600;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ── CURRENT OVER / BALL CHIPS ── */
    .section-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-faint);
      margin: 20px 16px 10px;
    }
    .current-over-wrap { margin: 0 16px; }
    .balls-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ball-chip {
      min-width: 34px; height: 34px;
      padding: 0 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 900;
      border: 1.5px solid transparent;
      transition: var(--transition);
    }
    .ball-chip.b-dot   { background: rgba(255,255,255,0.04); color: var(--text-faint); border-color: var(--border); }
    .ball-chip.b-runs  { background: rgba(255,255,255,0.08); color: var(--text-primary); border-color: var(--border-card); }
    .ball-chip.b-four  { background: rgba(34,197,94,0.15); color: #22c55e; border-color: rgba(34,197,94,0.3); }
    .ball-chip.b-six   { background: rgba(56,189,248,0.15); color: #38bdf8; border-color: rgba(56,189,248,0.3); }
    .ball-chip.b-wkt   { background: rgba(239,68,68,0.25); color: var(--red); border-color: rgba(239,68,68,0.45); }
    .ball-chip.b-wide  { background: rgba(251,146,60,0.12); color: var(--orange); border-color: rgba(251,146,60,0.25); font-size: 11px; }
    .ball-chip.b-nb    { background: rgba(245,158,11,0.12); color: var(--gold); border-color: rgba(245,158,11,0.25); font-size: 11px; }
    .ball-chip.b-m2    { background: rgba(168,85,247,0.15); color: #a78bfa; border-color: rgba(168,85,247,0.3); font-size: 12px; }
    .ball-chip.b-empty { background: rgba(255,255,255,0.02); border-color: var(--border-subtle); }

    /* ── WICKET OVERLAY ANIMATION ── */
    #wicketOverlay {
      position: fixed;
      inset: 0;
      background: rgba(220, 38, 38, 0.9);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #wicketOverlay.active {
      opacity: 1;
      animation: bgFlash 0.5s infinite alternate;
    }
    .wkt-title {
      font-family: var(--font-display);
      font-size: 70px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: scale(0.5);
      opacity: 0;
    }
    #wicketOverlay.active .wkt-title {
      animation: stampIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, shakeText 0.4s 0.4s infinite;
    }
    .wkt-sub {
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-top: -10px;
      opacity: 0;
    }
    #wicketOverlay.active .wkt-sub {
      animation: fadeIn 0.4s 0.3s forwards;
    }
    
    @keyframes stampIn {
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes bgFlash {
      100% { background: rgba(185, 28, 28, 0.95); }
    }
    @keyframes shakeText {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      100% { opacity: 1; }
    }

    /* ── AT THE CREASE ── */
    .crease-card {
      margin: 0 16px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius);
      overflow: hidden;
    }
    .crease-header {
      padding: 10px 14px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .crease-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .crease-row:last-child { border-bottom: none; }
    .crease-indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 10px;
      flex-shrink: 0;
    }
    .crease-indicator.non-striker { background: var(--text-faint); }
    .crease-indicator.bowler { background: var(--red); }
    .crease-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      flex: 1;
    }
    .crease-stats {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dim);
      text-align: right;
    }
    .crease-stats span { color: var(--text-faint); font-size: 11px; font-weight: 500; }
    .crease-role {
      font-family: var(--font-body);
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 1px;
    }

    /* ── TARGET BANNER ── */
    .target-banner {
      margin: 0 16px 0;
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(251,146,60,0.08));
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .target-left {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
    }
    .target-left .big { font-size: 24px; font-weight: 900; display: block; line-height: 1; }
    .target-right { text-align: right; }
    .target-right .rrr {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
    }
    .target-right .rrr.hot { color: var(--red); }
    .target-right .rrr.cool { color: var(--accent); }
    .target-right .rrr-lbl {
      font-family: var(--font-body);
      font-size: 10px;
      color: var(--text-faint);
    }

    /* ── SCORECARD LINK ── */
    .scorecard-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      border-radius: var(--btn-radius);
      padding: 14px 16px;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
    }
    .scorecard-btn:active { transform: scale(0.98); }
    .scorecard-btn-left {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .scorecard-btn-sub {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 2px;
    }

    /* ── NO LIVE STATE ── */
    .no-live { margin: 40px 16px; text-align: center; }
    .no-live-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.4; }
    .no-live-title { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--text-primary); margin-bottom: 6px; }
    .no-live-sub { font-family: var(--font-body); font-size: 13px; color: var(--text-faint); margin-bottom: 20px; }
    .ghost-btn {
      display: inline-flex; align-items: center; gap: 8px; background: var(--accent-dim);
      border: 1px solid var(--border-accent); color: var(--accent); font-family: var(--font-display);
      font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      padding: 10px 20px; border-radius: var(--btn-radius); text-decoration: none; transition: var(--transition);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; background: rgba(13,22,37,0.97);
      backdrop-filter: blur(20px); border-top: 1px solid var(--border-card);
      display: flex; align-items: center; height: var(--nav-height); z-index: 200; padding: 0 8px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 6px; text-decoration: none; color: var(--text-faint); font-family: var(--font-display);
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; transition: var(--transition);
    }
    .nav-item i { font-size: 18px; }
    .nav-item.active { color: var(--red); }
    .nav-item.active i { filter: drop-shadow(0 0 6px rgba(239,68,68,0.5)); }

    /* ── LOADING ── */
    .loading { text-align: center; color: var(--text-faint); padding: 40px 0; font-size: 13px; }
    .refresh-note { text-align: center; font-size: 10px; color: var(--text-faint); margin: 12px 0 6px; opacity: 0.7; }
  </style>
</head>

<script>
const SB_URL = 'https://tuvqgcosbweljslbfgqc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';
const sb = supabase.createClient(SB_URL, SB_KEY);

const urlMatchId = new URLSearchParams(location.search).get('match');
let matchData = null, allDeliveries = [], allPlayers = [];
let realtimeChannel = null;

// State flags for animation logic
let isFirstLoad = true;
let lastProcessedDeliveryId = null;

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  await loadData();
  setupRealtime();
}

// ── ANIMATION TRIGGERS ────────────────────────────────────────

// Now makes 6 do the Cannons (with a Blue theme)
function triggerSix() {
  const end = Date.now() + (1.5 * 1000);
  const colors = ['#38bdf8', '#ffffff', '#60a5fa']; 
  
  (function frame() {
    // Fire from left bottom corner
    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 1 }, colors: colors, zIndex: 9999 });
    // Fire from right bottom corner
    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 1 }, colors: colors, zIndex: 9999 });
    
    if (Date.now() < end) requestAnimationFrame(frame);
  }());
}

// Now makes 4 do the Fireworks (with a Green theme)
function triggerFour() {
  const duration = 2.5 * 1000;
  const animationEnd = Date.now() + duration;
  const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999, colors: ['#4ade80', '#22c55e', '#ffffff'] };

  function randomInRange(min, max) { return Math.random() * (max - min) + min; }

  const interval = setInterval(function() {
    const timeLeft = animationEnd - Date.now();
    if (timeLeft <= 0) return clearInterval(interval);
    const particleCount = 40 * (timeLeft / duration);
    // Shoot fireworks from random points
    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 } }));
  }, 250);
}

function triggerWicket() {
  const overlay = document.getElementById('wicketOverlay');
  overlay.classList.add('active');
  setTimeout(() => {
    overlay.classList.remove('active');
  }, 2500); // Overlay disappears after 2.5 seconds
}


// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData() {
  let matchQ = sb.from('ppl_matches')
    .select(`*, team_a:team_a_id(id,name,short_name), team_b:team_b_id(id,name,short_name),
             winner:winner_id(name), mom:mom_player_id(name,id),
             innings:ppl_innings(*)`)
    .eq('is_super_over', false);

  if (urlMatchId) {
    matchQ = matchQ.eq('id', urlMatchId).single();
    const { data } = await matchQ;
    matchData = data;
  } else {
    const { data: all } = await matchQ.order('match_number');
    if (!all) return renderNoMatch();
    matchData = all.find(m => m.status === 'in_progress') || all.filter(m => m.status === 'completed').pop();
  }

  if (!matchData) return renderNoMatch(urlMatchId ? null : true);

  const { data: del } = await sb.from('ppl_deliveries')
    .select('*')
    .eq('match_id', matchData.id)
    .order('innings_id').order('over_number').order('ball_number');
  allDeliveries = del || [];

  const { data: pl } = await sb.from('ppl_players')
    .select('id,name,team_id')
    .in('team_id', [matchData.team_a_id, matchData.team_b_id].filter(Boolean));
  allPlayers = pl || [];

  const { data: innsState } = await sb.from('ppl_innings')
    .select('*')
    .eq('match_id', matchData.id)
    .order('innings_number');
  if (innsState) matchData.innings = innsState;

  render();
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const m = matchData;
  const isLive = m.status === 'in_progress';
  const inns = (m.innings || []).sort((a,b) => a.innings_number - b.innings_number);

  const dot = document.getElementById('headerDot');
  const badge = document.getElementById('headerBadge');
  if (isLive) {
    dot.classList.remove('idle');
    badge.className = 'header-badge badge-live';
    badge.textContent = '● LIVE';
  } else {
    dot.classList.add('idle');
    badge.className = 'header-badge badge-idle';
    badge.textContent = 'RECENT';
  }

  const currentInn = isLive
    ? inns.find(i => !i.is_complete) || inns[inns.length - 1]
    : inns[inns.length - 1];
  const firstInn = inns[0];
  const secondInn = inns[1];
  const isSecondInnings = inns.length >= 2 && currentInn?.innings_number === 2;

  const currDels = currentInn ? allDeliveries.filter(d => d.innings_id === currentInn.id) : [];

  // --- ANIMATION CHECK LOGIC ---
  if (currDels.length > 0) {
    const latestDelivery = currDels[currDels.length - 1];
    
    // Only animate if this isn't the first load AND the delivery ID is genuinely new
    if (!isFirstLoad && lastProcessedDeliveryId !== latestDelivery.id) {
      if (latestDelivery.is_wicket) {
        triggerWicket();
      } else if (latestDelivery.is_six) {
        triggerSix();
      } else if (latestDelivery.is_four) {
        triggerFour();
      }
    }
    lastProcessedDeliveryId = latestDelivery.id; // Remember this delivery so we don't animate it again
  }
  isFirstLoad = false; // Turn off the safety flag after the very first render


  const lastOverNum = currDels.length > 0 ? currDels[currDels.length - 1].over_number : 0;
  const currentOverBalls = currDels.filter(d => d.over_number === lastOverNum);
  const overRunsThisOver = currentOverBalls.reduce((s,d) => s + (d.runs_off_bat||0) + (d.extras||0), 0);
  const currentOverNum = currentInn ? Math.floor(parseFloat(currentInn.total_overs || 0)) : 0;

  const strikerId = currentInn?.current_striker_id;
  const nonStrikerId = currentInn?.current_non_striker_id;
  const bowlerId = currentInn?.current_bowler_id;

  function pName(id) { return allPlayers.find(p => p.id === id)?.name || '—'; }

  function getBatterStats(batterId) {
    const dels = currDels.filter(d => d.batter_id === batterId);
    return {
      runs: dels.reduce((s,d) => s + (d.runs_off_bat||0), 0),
      balls: dels.filter(d => d.is_legal_delivery || d.extra_type === 'no_ball').length,
      fours: dels.filter(d => d.is_four).length,
      sixes: dels.filter(d => d.is_six).length,
    };
  }
  
  function getBowlerStats(bowlerId) {
    const bowlDels = currDels.filter(d => d.bowler_id === bowlerId);
    const legalBalls = bowlDels.filter(d => d.is_legal_delivery).length;
    return {
      overs: `${Math.floor(legalBalls/6)}.${legalBalls%6}`,
      runs: bowlDels.reduce((s,d) => s + (d.runs_off_bat||0) + (d.extras||0), 0),
      wickets: bowlDels.filter(d => d.is_wicket && !['run_out','retired_out'].includes(d.dismissal_type)).length,
    };
  }

  const overs = parseFloat(currentInn?.total_overs || 0);
  const runs = currentInn?.total_runs || 0;
  const wickets = currentInn?.total_wickets || 0;
  
  const totalBallsBowled = Math.floor(overs) * 6 + Math.round((overs % 1) * 10);
  const crr = totalBallsBowled > 0 ? (runs / (totalBallsBowled / 6)).toFixed(2) : '0.00';
  const maxOvers = m.overs_per_side || 8;

  let targetHtml = '';
  if (isSecondInnings && firstInn) {
    const target = (firstInn.total_runs || 0) + 1;
    const needed = target - runs;
    const ballsLeft = (maxOvers * 6) - totalBallsBowled;
    const oversLeft = ballsLeft / 6;
    const rrr = oversLeft > 0 ? (needed / oversLeft).toFixed(2) : '∞';
    const rrrClass = parseFloat(rrr) > parseFloat(crr) + 2 ? 'hot' : 'cool';
    if (needed > 0) {
      targetHtml = `
        <div class="target-banner" style="margin:14px 16px 0">
          <div class="target-left">
            <span>Need</span>
            <span class="big">${needed}</span>
            <span>from ${ballsLeft} balls</span>
          </div>
          <div class="target-right">
            <div class="rrr ${rrrClass}">${rrr}</div>
            <div class="rrr-lbl">Req. Run Rate</div>
          </div>
        </div>`;
    } else {
      targetHtml = `<div class="target-banner" style="margin:14px 16px 0;border-color:rgba(154,224,0,0.3)">
        <div style="font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--accent)">
          Target Reached!
        </div></div>`;
    }
  }

  const emptySlots = Math.max(0, 6 - currentOverBalls.length);
  const ballChips = currentOverBalls.map(d => {
    let label = '';
    let chipClass = 'b-runs';
    const batRuns = d.bat_runs ?? d.runs_off_bat ?? 0;

    if (d.extra_type === 'penalty') {
      label = '-2';
      chipClass = 'b-m2';
    } else if (d.extra_type === 'wide') {
      label = 'Wd';
      chipClass = 'b-wide';
      if (batRuns > 0) label += `+${batRuns}`;
    } else if (d.extra_type === 'no_ball') {
      label = 'Nb';
      chipClass = 'b-nb';
      if (batRuns > 0) label += `+${batRuns}`;
    } else {
      label = batRuns === 0 ? '·' : batRuns;
      if (batRuns === 0) chipClass = 'b-dot';
      else if (d.is_six) chipClass = 'b-six';
      else if (d.is_four) chipClass = 'b-four';
    }

    if (d.is_wicket) {
      label += 'W';
      chipClass = 'b-wkt';
    }

    return `<div class="ball-chip ${chipClass}">${label}</div>`;
  }).join('');
  const emptyChips = Array(emptySlots).fill('<div class="ball-chip b-empty"></div>').join('');

  let scoreBlock = '';
  if (isSecondInnings && firstInn && secondInn) {
    const firstTeam = firstInn.batting_team_id === m.team_a_id ? m.team_a : m.team_b;
    const secondTeam = secondInn.batting_team_id === m.team_a_id ? m.team_a : m.team_b;
    scoreBlock = `
      <div class="score-block">
        <div class="innings-score batting-complete">
          <div class="inn-team">${firstTeam?.short_name}</div>
          <div class="inn-score-val">${firstInn.total_runs}/${firstInn.total_wickets}</div>
          <div class="inn-overs">${firstInn.total_overs} overs</div>
        </div>
        <div class="innings-score batting">
          <div class="inn-team">${secondTeam?.short_name} <span style="color:var(--red);font-size:9px">BATTING</span></div>
          <div class="inn-score-val current">${secondInn.total_runs}/${secondInn.total_wickets}</div>
          <div class="inn-overs">${secondInn.total_overs} / ${maxOvers} overs</div>
        </div>
      </div>`;
  } else if (currentInn) {
    const battingTeam = currentInn.batting_team_id === m.team_a_id ? m.team_a : m.team_b;
    scoreBlock = `
      <div class="score-block">
        <div class="innings-score batting" style="flex:1">
          <div class="inn-team">${battingTeam?.short_name} <span style="color:var(--red);font-size:9px">BATTING</span></div>
          <div class="inn-score-val current">${currentInn.total_runs}/${currentInn.total_wickets}</div>
          <div class="inn-overs">${currentInn.total_overs} / ${maxOvers} overs</div>
        </div>
      </div>`;
  }

  let creaseHtml = '';
  if (isLive && (strikerId || bowlerId)) {
    const strikerStats = strikerId ? getBatterStats(strikerId) : null;
    const nonStrikerStats = nonStrikerId ? getBatterStats(nonStrikerId) : null;
    const bowlerStats = bowlerId ? getBowlerStats(bowlerId) : null;
    creaseHtml = `
      <div class="section-label">At The Crease</div>
      <div class="crease-card">
        <div class="crease-header">Batting</div>
        ${strikerId ? `
        <div class="crease-row">
          <div class="crease-indicator"></div>
          <div>
            <div class="crease-name">${pName(strikerId)} *</div>
            <div class="crease-role">Striker</div>
          </div>
          <div class="crease-stats">${strikerStats.runs} <span>(${strikerStats.balls}b)</span><br><span>${strikerStats.fours}×4 ${strikerStats.sixes}×6</span></div>
        </div>` : ''}
        ${nonStrikerId ? `
        <div class="crease-row">
          <div class="crease-indicator non-striker"></div>
          <div>
            <div class="crease-name" style="color:var(--text-dim)">${pName(nonStrikerId)}</div>
            <div class="crease-role">Non-striker</div>
          </div>
          <div class="crease-stats" style="color:var(--text-faint)">${nonStrikerStats.runs} <span>(${nonStrikerStats.balls}b)</span></div>
        </div>` : ''}
      </div>
      ${bowlerId ? `
      <div class="crease-card" style="margin-top:0">
        <div class="crease-header">Bowling</div>
        <div class="crease-row">
          <div class="crease-indicator bowler"></div>
          <div>
            <div class="crease-name" style="color:var(--red)">${pName(bowlerId)}</div>
            <div class="crease-role">Current bowler</div>
          </div>
          <div class="crease-stats">${bowlerStats.overs} ov · ${bowlerStats.runs} r · <span style="color:var(--red)">${bowlerStats.wickets}w</span></div>
        </div>
      </div>` : ''}`;
  }

  const scorecardLink = `
    <a class="scorecard-btn" href="ppl-scorecard.html?match=${m.id}">
      <div>
        <div class="scorecard-btn-left"><i class="fas fa-list-ul"></i> Full Scorecard</div>
        <div class="scorecard-btn-sub">Ball-by-ball · Batting · Bowling</div>
      </div>
      <i class="fas fa-chevron-right" style="color:var(--text-faint)"></i>
    </a>`;

  let completedInfo = '';
  if (!isLive && m.result_description) {
    completedInfo = `
      <div style="margin:14px 16px 0;background:var(--bg-card);border:1px solid var(--border-accent);border-radius:12px;padding:14px 16px">
        <div style="font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px">Result</div>
        <div style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--accent)">${m.result_description}</div>
        ${m.mom ? `<div style="font-size:12px;color:var(--gold);margin-top:6px">⭐ Player of the Match: ${pName(m.mom.id)}</div>` : ''}
      </div>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="live-hero ${isLive ? '' : 'idle'}">
      <div class="live-eyebrow">
        ${isLive ? '<div class="live-dot"></div> Live Now' : 'Most Recent Match'}
      </div>
      <div class="matchup">${m.team_a?.name} vs ${m.team_b?.name}</div>
      <div class="match-meta">Day ${m.day} · Match ${m.match_number} · ${maxOvers} overs</div>
      ${scoreBlock}
      <div class="rate-bar">
        <div class="rate-item">
          <div class="rate-val">${crr}</div>
          <div class="rate-lbl">CRR</div>
        </div>
        <div class="rate-item">
          <div class="rate-val">${wickets}</div>
          <div class="rate-lbl">Wickets</div>
        </div>
        <div class="rate-item">
          <div class="rate-val">${overs}</div>
          <div class="rate-lbl">Overs</div>
        </div>
        <div class="rate-item">
          <div class="rate-val">${maxOvers - Math.floor(overs)}</div>
          <div class="rate-lbl">Rem.</div>
        </div>
      </div>
    </div>

    ${targetHtml}
    ${completedInfo}

    ${isLive ? `
    <div class="section-label">Over ${currentOverNum + 1} — This Over: ${overRunsThisOver} runs</div>
    <div class="current-over-wrap">
      <div class="balls-row">
        ${ballChips}
        ${emptyChips}
      </div>
    </div>
    ` : ''}

    ${creaseHtml}

    <div class="section-label" style="margin-top:20px">Scorecard</div>
    ${scorecardLink}

    ${isLive ? '<div class="refresh-note"><i class="fas fa-circle-notch fa-spin" id="spinIcon" style="display:none"></i> Updates in real-time</div>' : ''}
  `;
}

// ── NO MATCH STATE ─────────────────────────────────────────────
function renderNoMatch(showAll) {
  document.getElementById('headerDot').classList.add('idle');
  document.getElementById('headerBadge').className = 'header-badge badge-idle';
  document.getElementById('headerBadge').textContent = 'NO LIVE';

  document.getElementById('mainContent').innerHTML = `
    <div class="no-live">
      <div class="no-live-icon"><i class="fas fa-cricket-bat-ball"></i></div>
      <div class="no-live-title">No Live Match</div>
      <div class="no-live-sub">Check back when the next match starts</div>
      <a class="ghost-btn" href="ppl-fixtures.html">
        <i class="fas fa-calendar-days"></i> View Fixtures
      </a>
    </div>`;
}

// ── SUPABASE REALTIME ──────────────────────────────────────────
function setupRealtime() {
  if (!matchData || matchData.status !== 'in_progress') return;

  realtimeChannel = sb.channel('ppl-live-' + matchData.id)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'ppl_innings',
      filter: `match_id=eq.${matchData.id}`
    }, () => loadData())
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'ppl_deliveries',
      filter: `match_id=eq.${matchData.id}`
    }, () => loadData())
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'ppl_matches',
      filter: `id=eq.${matchData.id}`
    }, () => loadData())
    .subscribe();
}

// ── START ──────────────────────────────────────────────────────
init();
</script>
</body>
</html>
