<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Cricket Experts · Account</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/bottom-nav.css">
  <link rel="stylesheet" href="css/profile.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="favicon.png">
  <script type="module" src="auth-guard.js"></script>
</head>

<body>
  <div class="prof-wrap">

    <!-- HEADER -->
    <header class="prof-header">
      <a href="/home" class="icon-back" aria-label="Back to home">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h1 class="prof-title">Account</h1>
      <span aria-hidden="true"></span>
    </header>

    <!-- LOADING STATE -->
    <div id="profLoading" class="prof-loading">
      <div class="prof-spinner"></div>
    </div>

    <!-- CONTENT — hidden until profile data loads -->
    <main id="profContent" class="prof-content hidden">

      <!-- AVATAR + NAME CARD -->
      <section class="prof-card">
        <div class="prof-avatar-section">
          <div class="prof-avatar" id="profAvatar"></div>
          <div class="prof-avatar-info">
            <div class="prof-name" id="profName">—</div>
            <div class="prof-team" id="profTeam">—</div>
          </div>
        </div>

        <input type="file" id="profAvatarInput" accept="image/*" class="hidden">
        <button class="prof-photo-btn" id="profChangePhotoBtn">
          📷 Change Profile Photo
        </button>
        <div id="profPhotoStatus" class="prof-status hidden"></div>
      </section>

<!-- IDENTITY CARD -->
<section class="prof-card">

    <!-- Shown when Match 1 locked -->
    <div id="profLockNotice" class="prof-lock-notice hidden">
        <span class="prof-lock-icon">🔒</span>
        <div>
            <div class="prof-lock-title">Team Name Locked</div>
            <div class="prof-lock-sub">Team name is locked after Match 1 starts.</div>
        </div>
    </div>

    <!-- Shown before Match 1 locked -->
    <div id="profEditNotice" class="prof-lock-notice hidden">
        <span class="prof-lock-icon">✏️</span>
        <div>
            <div class="prof-lock-title">Team Name Editable</div>
            <div class="prof-lock-sub">You can change your team name until Match 1 starts.</div>
        </div>
    </div>

    <div class="prof-field">
        <label class="prof-label">Display Name</label>
        <div class="prof-value" id="profNameVal">—</div>
    </div>

    <div class="prof-field">
        <label class="prof-label">Team Name</label>
        <div class="prof-value" id="profTeamVal">—</div>
        <input type="text"
               id="profTeamInput"
               class="prof-input hidden"
               placeholder="Enter team name"
               maxlength="30">
        <button id="profTeamSaveBtn" class="prof-save-btn hidden">
            Save Team Name
        </button>
    </div>

    <div class="prof-field">
        <label class="prof-label">Member Since</label>
        <div class="prof-value" id="profJoined">—</div>
    </div>

</section>

      <!-- SIGN OUT CARD -->
      <section class="prof-card">
        <button class="prof-signout-btn" id="profSignOutBtn">
          <i class="fas fa-sign-out-alt"></i> Sign Out
        </button>
      </section>

    </main>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="/home"><i class="fas fa-house"></i><span>Home</span></a>
    <a href="fixtures.html"><i class="fas fa-calendar-check"></i><span>Fixtures</span></a>
    <a href="prediction.html"><i class="fas fa-bolt"></i><span>Fun</span></a>
    <a href="more.html" class="active"><i class="fas fa-bars"></i><span>More</span></a>
  </nav>

  <script type="module" src="profile.js"></script>
</body>
</html>
