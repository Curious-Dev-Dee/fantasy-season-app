<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  <title>Cricket Experts · Account</title>
  <link rel="stylesheet" href="css/profile.css" />
  <script type="module" src="auth-guard.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <button class="back-btn" onclick="history.back()">←</button>
      <h1 class="tournament-name">Account</h1>
      <span></span>
    </header>

    <main class="content">
      <section class="card profile-card">
        <div class="profile-avatar">
          <div class="team-avatar large" id="avatarDisplay"></div>
          <button class="link-btn" id="changePhotoBtn">Change photo</button>
          <input type="file" id="avatarInput" accept="image/*" style="display:none" />
          <p id="saveStatus" class="save-status hidden">Changes saved ✅</p>
        </div>

        <div class="field">
          <label>Display name</label>
          <input type="text" id="fullNameInput" placeholder="Your name" />
        </div>

        <div class="field">
          <label>Team name</label>
          <input type="text" id="teamNameInput" placeholder="Your team identity" />
          <p class="hint-text">You can change your team name once during the season.</p>
        </div>

        <div class="field">
          <label>Contact number</label>
          <input type="tel" id="contactInput" placeholder="+91…" />
        </div>

        <div class="field">
          <label>State</label>
          <input type="text" id="stateInput" placeholder="Your state" />
        </div>

        <button id="saveProfileBtn" class="save-main-btn">SAVE CHANGES</button>
        
        <button id="logoutBtn" class="link-btn subtle" style="margin-top: 20px; width: 100%; color: #ef4444;">Sign Out</button>
      </section>
    </main>
  </div>
  
  <script type="module" src="profile.js"></script>
</body>
</html>
