<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cricket Experts | Matches</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/bottom-nav.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --accent: #9AE000;
      --accent-dim: rgba(154,224,0,0.09);
      --accent-mid: rgba(154,224,0,0.18);
      --accent-glow: rgba(154,224,0,0.28);
      --bg-page: #020617;
      --bg-card: #0d1625;
      --bg-card-alt: #111e30;
      --bg-elevated: #0d1a2d;
      --bg-input: #020617;
      --border-card: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.07);
      --border-subtle: rgba(255,255,255,0.04);
      --border-accent: rgba(154,224,0,0.20);
      --text-primary: #f0f4f8;
      --text-dim: #94a3b8;
      --text-faint: #64748b;
      --text-ghost: #334155;
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.10);
      --orange: #fb923c;
      --orange-dim: rgba(251,146,60,0.10);
      --gold: #f59e0b;
      --gold-dim: rgba(245,158,11,0.10);
      --rank-color: #7cc4ff;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --card-radius: 18px;
      --card-radius-sm: 12px;
      --btn-radius: 12px;
      --pill-radius: 20px;
      --transition: all 250ms cubic-bezier(0.4,0,0.2,1);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --app-max-width: 480px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-page);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      animation: pageFadeIn 0.18s ease forwards;
    }

    @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }

    .app-container {
      width: 100%;
      max-width: var(--app-max-width);
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }

    /* ── HEADER ── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 10px;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 500;
      min-height: 56px;
    }

    .header-logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      flex-shrink: 0;
      animation: pulseGlow 2.5s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 8px var(--accent-glow); }
      50%      { box-shadow: 0 0 20px var(--accent-glow); }
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-primary);
      flex: 1;
    }

    .ipl-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, rgba(0,102,255,0.15), rgba(255,165,0,0.15));
      border: 1px solid rgba(255,165,0,0.25);
      padding: 3px 10px;
      border-radius: var(--pill-radius);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.5px;
      color: var(--gold);
    }

    /* ── PAGE TABS ── */
    .page-tabs-wrap {
      position: sticky;
      top: 56px;
      z-index: 400;
      background: rgba(2,6,23,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .page-tabs-wrap::-webkit-scrollbar { display: none; }

    .page-tabs {
      display: flex;
      gap: 0;
      width: max-content;
      min-width: 100%;
    }

    .page-tab {
      flex-shrink: 0;
      padding: 12px 14px;
      background: none;
      border: none;
      color: var(--text-faint);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      white-space: nowrap;
    }

    .page-tab.active { color: var(--accent); }
    .page-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--bg-card);
      border-radius: var(--card-radius);
      border: 1px solid var(--border-card);
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
    }

    .section-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-faint);
      margin: 0 0 10px 2px;
    }

    /* ── MATCH CARD ── */
    .match-card {
      padding: 14px 16px;
      cursor: pointer;
      transition: var(--transition);
    }

    .match-card:active { transform: scale(0.98); }

    .match-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .match-number-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .match-status-badge {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: var(--pill-radius);
    }

    .badge-live {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      color: var(--red);
      animation: badgePulse 1.5s ease-in-out infinite;
    }

    @keyframes badgePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    .badge-upcoming {
      background: rgba(154,224,0,0.09);
      border: 1px solid rgba(154,224,0,0.2);
      color: var(--accent);
    }

    .badge-result {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-subtle);
      color: var(--text-faint);
    }

    .badge-abandoned {
      background: rgba(251,146,60,0.1);
      border: 1px solid rgba(251,146,60,0.25);
      color: var(--orange);
    }

    .teams-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .team-block.right { align-items: flex-end; }
    .team-block.left  { align-items: flex-start; }

    .team-logo-sm {
      width: 40px; height: 40px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.08));
      flex-shrink: 0;
    }

    .team-name-sm {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.3px;
      color: var(--text-primary);
      line-height: 1;
    }

    .team-score-sm {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--text-dim);
      line-height: 1;
    }

    .vs-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .vs-text {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 800;
      color: var(--text-ghost);
      letter-spacing: 1px;
    }

    .match-time-sm {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
    }

    .match-venue-sm {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .match-result-text {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 8px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .card.live-match {
      border-color: rgba(239,68,68,0.3);
    }
    .card.live-match::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), rgba(239,68,68,0.3));
      border-radius: var(--card-radius) var(--card-radius) 0 0;
    }

    /* ── POINTS TABLE ── */
    .points-table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .pt-table { width: 100%; border-collapse: collapse; font-size: 13px; }

    .pt-table thead tr {
      background: var(--bg-card-alt);
      border-bottom: 1px solid var(--border-card);
    }

    .pt-table th {
      padding: 10px 8px;
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-faint);
      text-align: center;
      white-space: nowrap;
    }

    .pt-table th:first-child { text-align: left; padding-left: 14px; }

    .pt-table td {
      padding: 11px 8px;
      border-bottom: 1px solid var(--border-subtle);
      text-align: center;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-dim);
      vertical-align: middle;
    }

    .pt-table td:first-child { text-align: left; padding-left: 14px; }
    .pt-table tbody tr:last-child td { border-bottom: none; }
    .pt-table tbody tr:hover { background: rgba(255,255,255,0.02); }

    .pt-rank {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      color: var(--text-faint);
      width: 20px;
      text-align: center;
    }

    .pt-team-cell { display: flex; align-items: center; gap: 10px; }

    .pt-logo {
      width: 28px; height: 28px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      flex-shrink: 0;
    }

    .pt-team-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }

    .pt-pts { font-family: var(--font-display); font-size: 16px; font-weight: 900; color: var(--accent); }
    .pt-nrr-pos { color: var(--accent); }
    .pt-nrr-neg { color: var(--red); }

    .qualifier-row td:first-child { border-left: 2px solid var(--accent); }

    .pt-label-row {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 10px 14px 6px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-card-alt);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pt-qualifier-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 2px; }

    /* ── STATS ── */
    .stats-section { margin-bottom: 10px; }

    .stats-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .stats-icon {
      width: 32px; height: 32px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .stats-icon.orange { background: rgba(251,146,60,0.1); color: var(--orange); border: 1px solid rgba(251,146,60,0.2); }
    .stats-icon.green  { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border-accent); }
    .stats-icon.blue   { background: rgba(124,196,255,0.1); color: var(--rank-color); border: 1px solid rgba(124,196,255,0.2); }
    .stats-icon.gold   { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }

    .stats-card-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }

    .stats-row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border-subtle);
      gap: 10px;
    }

    .stats-row-item:last-child { border-bottom: none; }

    .stats-row-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .stats-pos { font-family: var(--font-display); font-size: 14px; font-weight: 800; color: var(--text-ghost); width: 18px; flex-shrink: 0; }
    .stats-pos.gold-pos   { color: var(--gold); }
    .stats-pos.silver-pos { color: var(--rank-color); }
    .stats-pos.bronze-pos { color: var(--orange); }

    .stats-player-info { min-width: 0; }

    .stats-player-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats-player-team { font-family: var(--font-body); font-size: 11px; color: var(--text-faint); margin-top: 1px; }

    .stats-value { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--accent); flex-shrink: 0; }

    /* ── LOADING / EMPTY ── */
    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 20px; gap: 14px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border-card);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-faint); font-family: var(--font-body); font-size: 13px; }
    .empty-emoji { font-size: 32px; display: block; margin-bottom: 10px; }

    .coming-soon-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
      color: var(--gold); font-family: var(--font-display);
      font-size: 10px; font-weight: 900; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 3px 10px; border-radius: var(--pill-radius);
    }

    /* ── TOAST ── */
    .toast-container {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10000; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; width: 90%; max-width: 340px;
    }

    .toast {
      background: var(--bg-card-alt); color: var(--text-primary);
      padding: 13px 18px; border-radius: var(--btn-radius);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      border-left: 4px solid var(--accent); box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-12px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .toast.fade-out { transition: opacity 0.3s ease; opacity: 0 !important; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: var(--app-max-width);
      background: rgba(13,22,37,0.97); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-card);
      display: flex; justify-content: space-around; align-items: center;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px)); z-index: 800;
    }

    .bottom-nav a {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      text-decoration: none; color: var(--text-faint); font-family: var(--font-display);
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 10px; transition: var(--transition);
    }

    .bottom-nav a i { font-size: 18px; }
    .bottom-nav a.active { color: var(--accent); }
    .bottom-nav a.active i { filter: drop-shadow(0 0 6px var(--accent-glow)); }

    /* ── FIXTURE MONTH ── */
    .fixture-month-label {
      font-family: var(--font-display); font-size: 11px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint);
      padding: 14px 2px 6px;
    }

    /* ════════════════════════════════════
       SCOREBOARD MODAL
    ════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(2,6,23,0.92);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 250ms ease;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-sheet {
      width: 100%; max-width: var(--app-max-width);
      background: var(--bg-page);
      border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border-card);
      max-height: 92vh;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 350ms cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
    }

    .modal-overlay.open .modal-sheet { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border-card);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .modal-header {
      padding: 14px 16px 0;
      flex-shrink: 0;
    }

    .modal-match-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .modal-match-num {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-faint);
    }

    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .modal-close:hover { background: var(--bg-card-alt); color: var(--text-primary); }

    /* Score hero inside modal */
    .modal-score-hero {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .modal-score-hero::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .modal-teams-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .modal-team {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .modal-team.right { align-items: flex-end; }
    .modal-team.left  { align-items: flex-start; }

    .modal-team-logo {
      width: 44px; height: 44px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.1));
    }

    .modal-team-code {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 900;
      color: var(--text-primary);
      line-height: 1;
    }

    .modal-team-score {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .modal-team-score-sub {
      font-size: 13px;
      color: var(--text-faint);
      font-weight: 600;
    }

    .modal-vs {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 800;
      color: var(--text-ghost);
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .modal-winner-banner {
      margin-top: 12px;
      padding: 8px 12px;
      background: var(--accent-dim);
      border: 1px solid var(--border-accent);
      border-radius: var(--card-radius-sm);
      font-family: var(--font-display);
      font-size: 14px; font-weight: 900;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.5px;
    }

    .modal-venue-row {
      margin-top: 10px;
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-body); font-size: 11px; color: var(--text-faint);
    }

    /* Innings tab switcher */
    .innings-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .innings-tab {
      flex: 1;
      padding: 9px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius-sm);
      color: var(--text-faint);
      font-family: var(--font-display);
      font-size: 12px; font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }

    .innings-tab.active {
      background: var(--accent-dim);
      border-color: var(--border-accent);
      color: var(--accent);
    }

    /* Scorecard tables */
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 24px;
      -webkit-overflow-scrolling: touch;
    }

    .scorecard-section { margin-bottom: 16px; }

    .scorecard-section-title {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 6px;
      padding-left: 2px;
    }

    .scorecard-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius);
      overflow: hidden;
    }

    .sc-table { width: 100%; border-collapse: collapse; }

    .sc-table thead tr {
      background: var(--bg-card-alt);
      border-bottom: 1px solid var(--border-card);
    }

    .sc-table th {
      padding: 8px 6px;
      font-family: var(--font-display);
      font-size: 9px; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-faint);
      text-align: right;
      white-space: nowrap;
    }

    .sc-table th:first-child { text-align: left; padding-left: 12px; }

    .sc-table td {
      padding: 9px 6px;
      border-bottom: 1px solid var(--border-subtle);
      text-align: right;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--text-dim);
      vertical-align: top;
    }

    .sc-table td:first-child { text-align: left; padding-left: 12px; }
    .sc-table tbody tr:last-child td { border-bottom: none; }

    .sc-player-name {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 800;
      color: var(--text-primary);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }

    .sc-dismissal {
      font-family: var(--font-body);
      font-size: 10px;
      color: var(--text-faint);
      display: block;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }

    .sc-highlight { color: var(--accent); font-weight: 700; }

    /* SR / ECO color coding */
    .sr-good  { color: var(--accent); }
    .sr-avg   { color: var(--orange); }
    .sr-slow  { color: var(--red); }

    .eco-good { color: var(--accent); }
    .eco-avg  { color: var(--orange); }
    .eco-exp  { color: var(--red); }

    .sc-extras-row td { color: var(--text-faint); font-size: 11px; background: rgba(255,255,255,0.01); }

    .sc-total-row td {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 900;
      color: var(--text-primary);
      background: var(--bg-card-alt);
      border-top: 1px solid var(--border-card) !important;
    }

    /* DNB row */
    .sc-dnb { padding: 8px 12px; font-family: var(--font-body); font-size: 11px; color: var(--text-faint); border-top: 1px solid var(--border-subtle); }

    /* Loading inside modal */
    .modal-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 14px;
    }

    @keyframes skShimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .live-dot-inline {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      animation: livePulse 1.2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>

<script type="module">
  const SUPABASE_URL  = 'https://tuvqgcosbweljslbfgqc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Toast ──
  window.showToast = (msg) => {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('fade-out'); t.addEventListener('transitionend', () => t.remove(), { once: true }); }, 3000);
  };

  // ── Tabs ──
  const panels = document.querySelectorAll('.tab-panel');
  const tabs   = document.querySelectorAll('.page-tab');
  const loadedTabs = new Set();

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const id = tab.dataset.tab;
      document.getElementById(`tab-${id}`)?.classList.add('active');
      if (!loadedTabs.has(id)) { loadedTabs.add(id); loadTabData(id); }
    });
  });

  loadedTabs.add('live'); loadTabData('live');

  function loadTabData(tab) {
    if (tab === 'live')     loadLive();
    if (tab === 'results')  loadResults();
    if (tab === 'upcoming') loadUpcoming();
    if (tab === 'fixtures') loadFixtures();
    if (tab === 'points')   loadPointsTable();
    if (tab === 'stats')    loadStats();
  }

  // ════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════
  function getLogoUrl(path) {
    if (!path) return null;
    const { data } = sb.storage.from('team-logos').getPublicUrl(path);
    return data?.publicUrl || null;
  }

  function formatMatchTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString('en-IN', {
      weekday: 'short', day: 'numeric', month: 'short',
      hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Asia/Kolkata'
    }) + ' IST';
  }

  function formatShortDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', timeZone: 'Asia/Kolkata' });
  }

  function formatShortTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' });
  }

  function formatDateGroup(iso) {
    if (!iso) return 'TBD';
    return new Date(iso).toLocaleDateString('en-IN', { month: 'long', year: 'numeric', timeZone: 'Asia/Kolkata' });
  }

  // Fetch matches with team info joined
  // Uses: matches + real_teams (aliased as team_a and team_b)
  async function fetchMatches(filters = {}) {
    let q = sb.from('matches').select(`
      id, match_number, status, points_processed, actual_start_time,
      original_start_time, venue, api_match_id,
      team_a:real_teams!matches_team_a_id_fkey(id, name, short_code, photo_name),
      team_b:real_teams!matches_team_b_id_fkey(id, name, short_code, photo_name),
      winner:real_teams!matches_winner_id_fkey(id, name, short_code),
      live_scores(team1_name, team1_score, team1_wickets, team1_overs,
                  team2_name, team2_score, team2_wickets, team2_overs, winner, match_status)
    `);

    if (filters.status)            q = q.eq('status', filters.status);
    if (filters.points_processed !== undefined) q = q.eq('points_processed', filters.points_processed);
    if (filters.order)             q = q.order(filters.order.col, { ascending: filters.order.asc });
    if (filters.limit)             q = q.limit(filters.limit);

    const { data, error } = await q;
    return { data, error };
  }

  function buildMatchCard(m, badge) {
    const logoA = getLogoUrl(m.team_a?.photo_name);
    const logoB = getLogoUrl(m.team_b?.photo_name);
    const codeA = m.team_a?.short_code || '—';
    const codeB = m.team_b?.short_code || '—';
    const isLive = m.status === 'locked' && !m.points_processed;
    const isResult = m.status === 'locked' && m.points_processed;

    // Score lines
    const ls = m.live_scores;
    let scoreA = '', scoreB = '', resultLine = '';

    if (ls) {
      if (ls.team1_score != null) scoreA = `<div class="team-score-sm">${ls.team1_score}/${ls.team1_wickets ?? 0} <span style="font-size:12px;color:var(--text-faint)">(${ls.team1_overs ?? 0})</span></div>`;
      if (ls.team2_score != null) scoreB = `<div class="team-score-sm">${ls.team2_score}/${ls.team2_wickets ?? 0} <span style="font-size:12px;color:var(--text-faint)">(${ls.team2_overs ?? 0})</span></div>`;
      if (ls.winner) resultLine = `<div class="match-result-text">🏆 ${ls.winner} won</div>`;
    }

    let badgeHtml = '';
    if (badge === 'live')   badgeHtml = `<span class="match-status-badge badge-live"><span class="live-dot-inline"></span>LIVE</span>`;
    if (badge === 'result') badgeHtml = `<span class="match-status-badge badge-result">RESULT</span>`;
    if (badge === 'upcoming') badgeHtml = `<span class="match-status-badge badge-upcoming">UPCOMING</span>`;
    if (badge === 'abandoned') badgeHtml = `<span class="match-status-badge badge-abandoned">NO RESULT</span>`;

    const venueRow = isLive
      ? `<div class="match-venue-sm"><i class="fas fa-location-dot" style="color:var(--accent);font-size:10px"></i> ${m.venue || 'TBD'}</div>`
      : `<div class="match-venue-sm"><i class="fas fa-clock" style="font-size:10px"></i> ${formatShortDate(m.actual_start_time)} · ${formatShortTime(m.actual_start_time)} IST</div>
         <div class="match-venue-sm" style="margin-top:2px"><i class="fas fa-location-dot" style="font-size:10px"></i> ${m.venue || 'TBD'}</div>`;

    const clickable = (isLive || isResult) ? `data-match-id="${m.id}"` : '';

    return `
      <div class="card match-card ${isLive ? 'live-match' : ''}" ${clickable} onclick="openScoreboard('${m.id}')">
        <div class="match-card-top">
          <span class="match-number-label">Match ${m.match_number ?? '—'}</span>
          ${badgeHtml}
        </div>
        <div class="teams-row">
          <div class="team-block left">
            ${logoA ? `<div class="team-logo-sm" style="background-image:url('${logoA}')"></div>` : ''}
            <div class="team-name-sm">${codeA}</div>
            ${scoreA}
          </div>
          <div class="vs-center"><span class="vs-text">VS</span></div>
          <div class="team-block right">
            ${logoB ? `<div class="team-logo-sm" style="background-image:url('${logoB}')"></div>` : ''}
            <div class="team-name-sm">${codeB}</div>
            ${scoreB}
          </div>
        </div>
        ${resultLine}
        ${venueRow}
      </div>`;
  }

  // ════════════════════════════════════
  //  LIVE TAB — locked + points_processed=false
  // ════════════════════════════════════
  async function loadLive() {
    const el = document.getElementById('liveContent');

    const { data, error } = await fetchMatches({
      status: 'locked',
      points_processed: false,
      order: { col: 'match_number', asc: true }
    });

    if (error) { el.innerHTML = `<div class="empty-msg"><span class="empty-emoji">⚠️</span>Could not load live matches.</div>`; return; }

    if (!data?.length) {
      el.innerHTML = `
        <div class="empty-msg" style="padding:32px 20px 16px">
          <span class="empty-emoji">🏏</span>
          <strong style="font-family:var(--font-display);font-size:18px;font-weight:900;text-transform:uppercase;display:block;margin-bottom:6px;color:var(--text-dim)">No Live Matches</strong>
          <span style="font-size:12px">Check Results or Upcoming tab</span>
        </div>`;
      return;
    }

    el.innerHTML = `<p class="section-label">${data.length} Match${data.length > 1 ? 'es' : ''} Live Now</p>
      ${data.map(m => buildMatchCard(m, 'live')).join('')}`;

    // Realtime
    sb.channel('live-score-updates')
      .on('postgres_changes', { event: '*', table: 'live_scores' }, () => loadLive())
      .subscribe();
  }

  // ════════════════════════════════════
  //  RESULTS TAB — locked + points_processed=true, most recent first
  // ════════════════════════════════════
  async function loadResults() {
    const el = document.getElementById('resultsContent');

    const { data, error } = await sb.from('matches').select(`
      id, match_number, status, points_processed, actual_start_time, venue,
      team_a:real_teams!matches_team_a_id_fkey(id, name, short_code, photo_name),
      team_b:real_teams!matches_team_b_id_fkey(id, name, short_code, photo_name),
      winner:real_teams!matches_winner_id_fkey(id, name, short_code),
      live_scores(team1_name, team1_score, team1_wickets, team1_overs,
                  team2_name, team2_score, team2_wickets, team2_overs, winner)
    `)
    .eq('status', 'locked')
    .eq('points_processed', true)
    .order('match_number', { ascending: false });

    if (error) { el.innerHTML = `<div class="empty-msg"><span class="empty-emoji">⚠️</span>Could not load results.</div>`; return; }

    if (!data?.length) {
      el.innerHTML = `<div class="empty-msg"><span class="empty-emoji">🏏</span>No results yet. Check back after the first match!</div>`;
      return;
    }

    el.innerHTML = `<p class="section-label">${data.length} Result${data.length > 1 ? 's' : ''}</p>
      ${data.map(m => buildMatchCard(m, 'result')).join('')}`;
  }

  // ════════════════════════════════════
  //  UPCOMING TAB
  // ════════════════════════════════════
  async function loadUpcoming() {
    const el = document.getElementById('upcomingContent');

    const { data, error } = await sb.from('matches').select(`
      id, match_number, status, actual_start_time, venue,
      team_a:real_teams!matches_team_a_id_fkey(id, name, short_code, photo_name),
      team_b:real_teams!matches_team_b_id_fkey(id, name, short_code, photo_name)
    `)
    .eq('status', 'upcoming')
    .order('match_number', { ascending: true })
    .limit(15);

    if (error || !data?.length) {
      el.innerHTML = `<div class="empty-msg"><span class="empty-emoji">📅</span>No upcoming matches scheduled yet.</div>`;
      return;
    }

    const next = data[0];
    const rest = data.slice(1);
    const logoA = getLogoUrl(next.team_a?.photo_name);
    const logoB = getLogoUrl(next.team_b?.photo_name);

    el.innerHTML = `
      <p class="section-label">Next Match</p>
      <div class="card" style="padding:14px 16px;border-color:rgba(154,224,0,0.25);margin-bottom:14px;position:relative;overflow:hidden">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),rgba(154,224,0,0.3))"></div>
        <div class="match-card-top">
          <span class="match-number-label">Match ${next.match_number ?? '—'}</span>
          <span class="match-status-badge badge-upcoming">UPCOMING</span>
        </div>
        <div class="teams-row">
          <div class="team-block left">
            ${logoA ? `<div class="team-logo-sm" style="background-image:url('${logoA}');width:48px;height:48px"></div>` : ''}
            <div class="team-name-sm" style="font-size:26px">${next.team_a?.short_code || '—'}</div>
          </div>
          <div class="vs-center">
            <span class="vs-text">VS</span>
            <span class="match-time-sm" id="nextMatchCountdown"></span>
          </div>
          <div class="team-block right">
            ${logoB ? `<div class="team-logo-sm" style="background-image:url('${logoB}');width:48px;height:48px"></div>` : ''}
            <div class="team-name-sm" style="font-size:26px">${next.team_b?.short_code || '—'}</div>
          </div>
        </div>
        <div class="match-venue-sm" style="margin-top:10px"><i class="fas fa-clock" style="color:var(--accent);font-size:10px"></i> ${formatMatchTime(next.actual_start_time)}</div>
        <div class="match-venue-sm" style="margin-top:4px"><i class="fas fa-location-dot" style="font-size:10px"></i> ${next.venue || 'TBD'}</div>
      </div>
      ${rest.length ? `<p class="section-label">Coming Up</p>${rest.map(m => buildMatchCard(m, 'upcoming')).join('')}` : ''}`;

    // Countdown
    if (next.actual_start_time) {
      const cdEl = document.getElementById('nextMatchCountdown');
      const tick = () => {
        const dist = new Date(next.actual_start_time).getTime() - Date.now();
        if (!cdEl) return;
        if (dist <= 0) { cdEl.textContent = 'Starting soon'; return; }
        const d = Math.floor(dist / 86400000);
        const h = Math.floor((dist % 86400000) / 3600000);
        const mn = Math.floor((dist % 3600000) / 60000);
        const s = Math.floor((dist % 60000) / 1000);
        cdEl.textContent = d > 0 ? `${d}d ${h}h ${mn}m` : `${h}h ${mn}m ${s}s`;
      };
      tick(); setInterval(tick, 1000);
    }
  }

  // ════════════════════════════════════
  //  FIXTURES TAB
  // ════════════════════════════════════
  async function loadFixtures() {
    const el = document.getElementById('fixturesContent');

    const { data, error } = await sb.from('matches').select(`
      id, match_number, status, points_processed, actual_start_time, venue,
      team_a:real_teams!matches_team_a_id_fkey(id, name, short_code, photo_name),
      team_b:real_teams!matches_team_b_id_fkey(id, name, short_code, photo_name),
      winner:real_teams!matches_winner_id_fkey(id, name, short_code),
      live_scores(team1_score, team1_wickets, team1_overs, team2_score, team2_wickets, team2_overs, winner)
    `).order('match_number', { ascending: true });

    if (error || !data?.length) {
      el.innerHTML = `<div class="empty-msg"><span class="empty-emoji">📋</span>Fixtures not loaded yet.</div>`;
      return;
    }

    const groups = {};
    data.forEach(m => {
      const key = formatDateGroup(m.actual_start_time) || 'TBD';
      if (!groups[key]) groups[key] = [];
      groups[key].push(m);
    });

    let html = '';
    Object.entries(groups).forEach(([month, ms]) => {
      html += `<p class="fixture-month-label">${month}</p>`;
      ms.forEach(m => {
        const isResult = m.status === 'locked' && m.points_processed;
        const isLive   = m.status === 'locked' && !m.points_processed;
        const badge    = isLive ? 'live' : isResult ? 'result' : m.status === 'abandoned' ? 'abandoned' : 'upcoming';
        html += buildMatchCard(m, badge);
      });
    });

    el.innerHTML = html;
  }

  // ════════════════════════════════════
  //  POINTS TABLE
  // ════════════════════════════════════
  async function loadPointsTable() {
    const el = document.getElementById('pointsContent');

    const { data: rows, error } = await sb.from('ipl_points_table').select('*').order('position', { ascending: true });

    if (error || !rows?.length) {
      el.innerHTML = `
        <div class="points-table-wrap">
          <div class="pt-label-row"><div class="pt-qualifier-dot"></div>Top 4 qualify for playoffs</div>
          <div class="loading-state" style="padding:40px 20px">
            <span style="font-size:36px;display:block;margin-bottom:12px">🏆</span>
            <div style="font-family:var(--font-display);font-size:18px;font-weight:900;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Points Table Coming</div>
            <div style="font-family:var(--font-body);font-size:13px;color:var(--text-faint);text-align:center;line-height:1.5">Updates automatically as match results come in.</div>
          </div>
        </div>`;
      return;
    }

    el.innerHTML = `
      <div class="points-table-wrap">
        <div class="pt-label-row"><div class="pt-qualifier-dot"></div>Top 4 qualify for playoffs</div>
        <table class="pt-table">
          <thead><tr>
            <th>#</th><th style="text-align:left">Team</th>
            <th>P</th><th>W</th><th>L</th><th>NR</th><th>NRR</th><th>PTS</th>
          </tr></thead>
          <tbody id="ptBody"></tbody>
        </table>
      </div>`;

    const tbody = document.getElementById('ptBody');
    rows.forEach((row, i) => {
      const nrrVal = parseFloat(row.nrr ?? row.net_run_rate ?? 0) || 0;
      const nrrSign = nrrVal >= 0 ? '+' : '';
      const nrrClass = nrrVal >= 0 ? 'pt-nrr-pos' : 'pt-nrr-neg';
      const tr = document.createElement('tr');
      if (i < 4) tr.className = 'qualifier-row';
      const logoUrl = getLogoUrl(row.team_logo);
      tr.innerHTML = `
        <td><span class="pt-rank">${row.position || i+1}</span></td>
        <td><div class="pt-team-cell">
          ${logoUrl ? `<div class="pt-logo" style="background-image:url('${logoUrl}')"></div>` : ''}
          <span class="pt-team-name">${row.team_code || row.team_name}</span>
        </div></td>
        <td>${row.played||0}</td><td>${row.won||0}</td><td>${row.lost||0}</td>
        <td>${row.no_result||0}</td>
        <td class="${nrrClass}">${nrrSign}${nrrVal.toFixed(3)}</td>
        <td class="pt-pts">${row.points||0}</td>`;
      tbody.appendChild(tr);
    });
  }

  // ════════════════════════════════════
  //  STATS TAB
  // ════════════════════════════════════
  async function loadStats() {
    const el = document.getElementById('statsContent');

    const { data: stats, error } = await sb.from('ipl_player_stats').select('*').limit(100);

    if (error || !stats?.length) {
      el.innerHTML = `
        ${buildStatsPlaceholder('orange','fa-baseball-bat-ball','Most Runs')}
        ${buildStatsPlaceholder('green','fa-circle-dot','Most Wickets')}
        ${buildStatsPlaceholder('blue','fa-hands-catching','Most Fielding')}
        ${buildStatsPlaceholder('gold','fa-star','Player of Match')}`;
      return;
    }

    const byRuns     = [...stats].sort((a,b)=>(b.runs||0)-(a.runs||0)).slice(0,5);
    const byWickets  = [...stats].sort((a,b)=>(b.wickets||0)-(a.wickets||0)).slice(0,5);
    const byFielding = [...stats].sort((a,b)=>((b.catches||0)+(b.runouts||0))-((a.catches||0)+(a.runouts||0))).slice(0,5);
    const byMom      = [...stats].sort((a,b)=>(b.mom_count||0)-(a.mom_count||0)).slice(0,5);

    el.innerHTML = `
      ${buildStatsSection('orange','fa-baseball-bat-ball','Most Runs',      byRuns,    r=>r.runs,   r=>`${r.innings||0} inns · SR ${r.strike_rate||'—'}`)}
      ${buildStatsSection('green', 'fa-circle-dot',       'Most Wickets',   byWickets, r=>r.wickets,r=>`Eco ${r.economy||'—'}`)}
      ${buildStatsSection('blue',  'fa-hands-catching',   'Most Fielding',  byFielding,r=>(r.catches||0)+(r.runouts||0),r=>`${r.catches||0} catches · ${r.runouts||0} run outs`)}
      ${buildStatsSection('gold',  'fa-star',             'Player of Match', byMom,    r=>r.mom_count,r=>r.team_code||'')}`;
  }

  function buildStatsSection(iconClass, icon, title, rows, valFn, subFn) {
    const items = rows.map((r,i) => {
      const posClass = i===0?'gold-pos':i===1?'silver-pos':i===2?'bronze-pos':'';
      return `<div class="stats-row-item">
        <div class="stats-row-left">
          <span class="stats-pos ${posClass}">${i+1}</span>
          <div class="stats-player-info">
            <div class="stats-player-name">${r.player_name||'—'}</div>
            <div class="stats-player-team">${subFn(r)}</div>
          </div>
        </div>
        <div class="stats-value">${valFn(r)??'—'}</div>
      </div>`;
    }).join('');

    return `<div class="card stats-section">
      <div class="stats-card-header">
        <div class="stats-icon ${iconClass}"><i class="fas ${icon}"></i></div>
        <span class="stats-card-title">${title}</span>
      </div>
      ${items || '<div class="empty-msg" style="padding:20px">No data yet</div>'}
    </div>`;
  }

  function buildStatsPlaceholder(iconClass, icon, title) {
    const shimmer = `linear-gradient(90deg,var(--border-card) 25%,var(--border) 50%,var(--border-card) 75%)`;
    const rows = [1,2,3,4,5].map(i => `
      <div class="stats-row-item">
        <div class="stats-row-left">
          <span class="stats-pos" style="color:var(--text-ghost)">${i}</span>
          <div class="stats-player-info">
            <div style="height:14px;width:${90+i*12}px;background:${shimmer};background-size:200% 100%;animation:skShimmer 1.4s infinite;border-radius:4px"></div>
            <div style="height:10px;width:70px;background:${shimmer};background-size:200% 100%;animation:skShimmer 1.4s infinite;border-radius:4px;margin-top:4px"></div>
          </div>
        </div>
        <div style="height:24px;width:36px;background:${shimmer};background-size:200% 100%;animation:skShimmer 1.4s infinite;border-radius:4px"></div>
      </div>`).join('');

    return `<div class="card stats-section">
      <div class="stats-card-header">
        <div class="stats-icon ${iconClass}"><i class="fas ${icon}"></i></div>
        <span class="stats-card-title">${title}</span>
        <span class="coming-soon-chip" style="margin-left:auto"><i class="fas fa-clock"></i> Soon</span>
      </div>${rows}
    </div>`;
  }

  const style = document.createElement('style');
  style.textContent = `@keyframes skShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}`;
  document.head.appendChild(style);

  // ════════════════════════════════════
  //  SCOREBOARD MODAL
  // ════════════════════════════════════
  const modal   = document.getElementById('scoreModal');
  const sheet   = document.getElementById('scoreModalSheet');
  const closeBtn = document.getElementById('modalClose');
  let currentMatchData = null;
  let currentInningsIdx = 0;

  // Close handlers
  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  // Swipe down to close
  let touchStartY = 0;
  sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 80) closeModal();
  }, { passive: true });

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }

  window.openScoreboard = async function(matchId) {
    if (!matchId || matchId === 'undefined') return;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    currentInningsIdx = 0;

    // Reset
    document.getElementById('modalMatchNum').textContent = 'Loading...';
    document.getElementById('modalScoreHero').innerHTML = `<div class="modal-loading"><div class="spinner"></div></div>`;
    document.getElementById('inningsTabs').innerHTML = '';
    document.getElementById('modalBody').innerHTML = `<div class="modal-loading"><div class="spinner"></div><div class="loading-text">Loading Scorecard...</div></div>`;

    // Fetch match data + live_scores
    const { data: match, error } = await sb.from('matches').select(`
      id, match_number, status, points_processed, actual_start_time, venue,
      team_a:real_teams!matches_team_a_id_fkey(id, name, short_code, photo_name),
      team_b:real_teams!matches_team_b_id_fkey(id, name, short_code, photo_name),
      winner:real_teams!matches_winner_id_fkey(id, name, short_code),
      live_scores(team1_name, team1_score, team1_wickets, team1_overs,
                  team2_name, team2_score, team2_wickets, team2_overs,
                  winner, batting, bowling, match_status)
    `).eq('id', matchId).single();

    if (error || !match) {
      document.getElementById('modalScoreHero').innerHTML = `<div class="modal-loading" style="padding:24px"><span style="color:var(--text-faint)">Could not load match data</span></div>`;
      return;
    }

    currentMatchData = match;
    document.getElementById('modalMatchNum').textContent = `Match ${match.match_number ?? '—'}`;

    renderModalHero(match);
    renderInningsScorecard(match, 0);
  };

  function renderModalHero(match) {
    const ls = match.live_scores;
    const logoA = getLogoUrl(match.team_a?.photo_name);
    const logoB = getLogoUrl(match.team_b?.photo_name);
    const codeA = match.team_a?.short_code || '—';
    const codeB = match.team_b?.short_code || '—';

    let scoreA = '—', scoreB = '—';
    if (ls) {
      if (ls.team1_score != null) scoreA = `${ls.team1_score}/${ls.team1_wickets??0} <span class="modal-team-score-sub">(${ls.team1_overs??0} ov)</span>`;
      if (ls.team2_score != null) scoreB = `${ls.team2_score}/${ls.team2_wickets??0} <span class="modal-team-score-sub">(${ls.team2_overs??0} ov)</span>`;
    }

    const winnerBanner = ls?.winner
      ? `<div class="modal-winner-banner">🏆 ${ls.winner} won</div>` : '';

    const isLive = match.status === 'locked' && !match.points_processed;

    document.getElementById('modalScoreHero').innerHTML = `
      ${isLive ? `<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent)"></div>` : ''}
      <div class="modal-teams-row">
        <div class="modal-team left">
          ${logoA ? `<div class="modal-team-logo" style="background-image:url('${logoA}')"></div>` : ''}
          <div class="modal-team-code">${codeA}</div>
          ${ls?.team1_score != null ? `<div class="modal-team-score">${scoreA}</div>` : ''}
        </div>
        <div class="modal-vs">VS</div>
        <div class="modal-team right">
          ${logoB ? `<div class="modal-team-logo" style="background-image:url('${logoB}')"></div>` : ''}
          <div class="modal-team-code">${codeB}</div>
          ${ls?.team2_score != null ? `<div class="modal-team-score">${scoreB}</div>` : ''}
        </div>
      </div>
      ${winnerBanner}
      <div class="modal-venue-row"><i class="fas fa-location-dot" style="font-size:10px;color:var(--accent)"></i> ${match.venue || 'TBD'}</div>
    `;

    // Build innings tabs
    const ls2 = match.live_scores;
    if (!ls2?.batting) {
      document.getElementById('inningsTabs').innerHTML = '';
      return;
    }

    const innings = Array.isArray(ls2.batting) ? ls2.batting : [];
    const tabsEl = document.getElementById('inningsTabs');

    // Derive innings label from batting[i][0].team — most reliable source.
    // team1_name reflects CricAPI registration order, NOT batting order.
    function getInnTeamLabel(battingArr, fallback) {
      if (Array.isArray(battingArr) && battingArr.length > 0 && battingArr[0]?.team) {
        return battingArr[0].team;
      }
      return fallback;
    }
    const inningTeamNames = [
      getInnTeamLabel(innings[0], ls2.team1_name || match.team_a?.short_code || 'Innings 1'),
      getInnTeamLabel(innings[1], ls2.team2_name || match.team_b?.short_code || 'Innings 2')
    ];

    tabsEl.innerHTML = innings.map((_, i) => `
      <button class="innings-tab ${i === 0 ? 'active' : ''}"
        onclick="switchInnings(${i})">${inningTeamNames[i]}</button>
    `).join('');
  }

  window.switchInnings = function(idx) {
    currentInningsIdx = idx;
    document.querySelectorAll('.innings-tab').forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });
    renderInningsScorecard(currentMatchData, idx);
  };

  function renderInningsScorecard(match, inningsIdx) {
    const bodyEl = document.getElementById('modalBody');
    const ls = match.live_scores;

    if (!ls?.batting) {
      bodyEl.innerHTML = `<div class="empty-msg" style="padding:40px 20px"><span class="empty-emoji">📋</span>Scorecard not available yet.<br><span style="font-size:11px">Data appears once the match is underway.</span></div>`;
      return;
    }

    const battingInnings = Array.isArray(ls.batting) ? ls.batting : [];
    const bowlingInnings = Array.isArray(ls.bowling) ? ls.bowling : [];

    if (!battingInnings[inningsIdx]) {
      bodyEl.innerHTML = `<div class="empty-msg" style="padding:40px 20px"><span class="empty-emoji">⏳</span>This innings hasn't started yet.</div>`;
      return;
    }

    // Derive from batting data — not team1_name/team2_name (registration order ≠ batting order).
    function getInnTeamLabelR(battingArr, fallback) {
      if (Array.isArray(battingArr) && battingArr.length > 0 && battingArr[0]?.team) {
        return battingArr[0].team;
      }
      return fallback;
    }
    const inn0Team = getInnTeamLabelR(battingInnings[0], ls.team1_name || match.team_a?.short_code || 'Team 1');
    const inn1Team = getInnTeamLabelR(battingInnings[1], ls.team2_name || match.team_b?.short_code || 'Team 2');
    const battingTeam = inningsIdx === 0 ? inn0Team : inn1Team;
    const bowlingTeam = inningsIdx === 0 ? inn1Team : inn0Team;

    const batters = battingInnings[inningsIdx] || [];
    const bowlers = bowlingInnings[inningsIdx] || [];

    // Batting table
    const battingRows = batters
      .filter(b => b && b.batsman)
      .map(b => {
        const sr = b.b > 0 ? ((b.r / b.b) * 100).toFixed(1) : '—';
        const srClass = b.b === 0 ? '' : parseFloat(sr) >= 150 ? 'sr-good' : parseFloat(sr) >= 100 ? 'sr-avg' : 'sr-slow';
        return `<tr>
          <td>
            <span class="sc-player-name">${b.batsman?.name || '—'}</span>
            <span class="sc-dismissal">${b['dismissal-text'] || (b.r !== undefined && !b['dismissal-text'] ? 'not out' : '—')}</span>
          </td>
          <td class="${b.r >= 50 ? 'sc-highlight' : ''}">${b.r ?? '—'}</td>
          <td>${b.b ?? '—'}</td>
          <td>${b['4s'] ?? '—'}</td>
          <td>${b['6s'] ?? '—'}</td>
          <td class="${srClass}">${sr}</td>
        </tr>`;
      }).join('');

    // Bowling table
    const bowlingRows = bowlers
      .filter(b => b && b.bowler)
      .map(b => {
        // Convert overs to true overs (e.g. 3.5 means 3 overs 5 balls)
        const ecoNum = b.r && b.o ? (b.r / b.o).toFixed(2) : null;
        const ecoClass = !ecoNum ? '' : parseFloat(ecoNum) <= 7 ? 'eco-good' : parseFloat(ecoNum) <= 9 ? 'eco-avg' : 'eco-exp';
        return `<tr>
          <td><span class="sc-player-name">${b.bowler?.name || '—'}</span></td>
          <td>${b.o ?? '—'}</td>
          <td>${b.m ?? '—'}</td>
          <td>${b.r ?? '—'}</td>
          <td class="${b.w >= 3 ? 'sc-highlight' : ''}">${b.w ?? '—'}</td>
          <td class="${ecoClass}">${ecoNum ?? '—'}</td>
        </tr>`;
      }).join('');

    bodyEl.innerHTML = `
      <!-- BATTING -->
      <div class="scorecard-section">
        <div class="scorecard-section-title">${battingTeam} — Batting</div>
        <div class="scorecard-wrap">
          <table class="sc-table">
            <thead><tr>
              <th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th>
            </tr></thead>
            <tbody>
              ${battingRows || '<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--text-faint)">No batting data</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>

      <!-- BOWLING -->
      <div class="scorecard-section">
        <div class="scorecard-section-title">${bowlingTeam} — Bowling</div>
        <div class="scorecard-wrap">
          <table class="sc-table">
            <thead><tr>
              <th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Eco</th>
            </tr></thead>
            <tbody>
              ${bowlingRows || '<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--text-faint)">No bowling data</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
