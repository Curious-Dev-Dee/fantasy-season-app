<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Matches | Cricket Experts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="matches.css">
</head>
<body>

<!-- ═══════════════════ APP SHELL ═══════════════════ -->
<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <div class="header-dot"></div>
    <h1 class="header-title">IPL 2026</h1>
    <div class="ipl-badge">🏏 T20</div>
  </header>

  <!-- Tab Strip -->
  <div class="tab-strip-wrap">
    <div class="tab-strip">
      <button class="tab-btn" data-tab="live">
        <span class="live-dot"></span>Live
      </button>
      <button class="tab-btn" data-tab="results">Results</button>
      <button class="tab-btn" data-tab="upcoming">Upcoming</button>
      <button class="tab-btn" data-tab="fixtures">Fixtures</button>
      <button class="tab-btn" data-tab="points">Points Table</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
    </div>
  </div>

  <!-- Tab Panels -->
  <div class="tab-panel" id="tab-live">
    <div id="liveContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Checking Live Matches…</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-results">
    <div id="resultsContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Loading Results…</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-upcoming">
    <div id="upcomingContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Loading Upcoming…</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-fixtures">
    <div id="fixturesContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Loading Fixtures…</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-points">
    <div id="pointsContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Loading Points Table…</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-stats">
    <div id="statsContent">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Loading Stats…</div>
      </div>
    </div>
  </div>

</div><!-- /.app-container -->


<!-- ═══════════════════ SCORECARD MODAL ═══════════════════ -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal-sheet" id="scoreModalSheet">

    <div class="modal-handle"></div>

    <div class="modal-header">
      <div class="modal-header-row">
        <span class="modal-match-label" id="modalMatchLabel">Match —</span>
        <button class="modal-close" id="modalClose">
          <i class="fas fa-xmark"></i>
        </button>
      </div>

      <!-- Score hero (teams + score + result banner) -->
      <div class="score-hero" id="scoreHero">
        <div class="loading-state" style="padding:20px">
          <div class="spinner spinner-sm"></div>
        </div>
      </div>

      <!-- Innings toggle tabs -->
      <div class="innings-tabs" id="inningsTabs"></div>
    </div><!-- /.modal-header -->

    <!-- Scrollable scorecard body -->
    <div class="modal-body" id="modalBody">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Loading Scorecard…</div>
      </div>
    </div>

  </div><!-- /.modal-sheet -->
</div><!-- /.modal-overlay -->


<!-- ═══════════════════ TOAST ═══════════════════ -->
<div class="toast-container" id="toastContainer"></div>


<!-- ═══════════════════ BOTTOM NAV ═══════════════════ -->
<nav class="bottom-nav">
  <a href="/home">
    <i class="fas fa-house"></i>
    <span>Home</span>
  </a>
  <a href="experts-dugout.html">
    <i class="fas fa-magnifying-glass-chart"></i>
    <span>Dugout</span>
  </a>
  <a href="matches.html" class="active">
    <i class="fas fa-cricket-bat-ball"></i>
    <span>Matches</span>
  </a>
  <a href="prediction.html">
    <i class="fas fa-bolt"></i>
    <span>Fun</span>
  </a>
  <a href="stats.html">
    <i class="fas fa-chart-bar"></i>
    <span>Stats</span>
  </a>
</nav>


<!-- ═══════════════════ SCRIPTS ═══════════════════ -->
 <script src="push-banner.js"></script>
<script type="module" src="matches.js"></script>

</body>
</html>
