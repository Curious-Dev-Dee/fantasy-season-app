<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Match Centre · Cricket Experts</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bottom-nav.css">
  <link rel="stylesheet" href="css/fixtures.css">

  <link rel="icon"             type="image/png" href="favicon.png">
  <link rel="apple-touch-icon"                  href="favicon.png">
  <link rel="manifest"                          href="manifest.json">

  <script type="module" src="auth-guard.js"></script>
</head>

<body>
<div class="fixtures-page page-with-nav">

  <!-- HEADER -->
  <header class="fixtures-header">
    <a href="/home" class="icon-back" aria-label="Back to home">
      <i class="fas fa-chevron-left"></i>
    </a>
    <div class="header-titles">
      <h1 class="fixtures-title">Match Centre</h1>
      <p id="matchCountSummaryText" class="fixtures-sub">Loading…</p>
    </div>
  </header>

  <!-- STICKY FILTER SECTION -->
  <section class="filters-section" aria-label="Match filters">

    <!-- Status pills -->
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <div id="statusFilters" class="pill-row" role="group" aria-label="Filter by status"></div>
    </div>

    <!-- Team pills — scrollable row -->
    <div class="filter-group">
      <span class="filter-label">Teams</span>
      <div id="teamFilters" class="pill-row pill-row-scroll" role="group" aria-label="Filter by team"></div>
    </div>

  </section>

  <!-- MATCHES -->
  <main id="matchesContainer" class="matches-list">
    <div class="loading-state">
      <i class="fas fa-circle-notch fa-spin"></i>
      <p>Syncing match data…</p>
    </div>
  </main>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="/home"><i class="fas fa-house"></i><span>Home</span></a>
  <a href="fixtures.html" class="active"><i class="fas fa-calendar-check"></i><span>Fixtures</span></a>
  <a href="prediction.html"><i class="fas fa-bolt"></i><span>Fun</span></a>
  <a href="more.html"><i class="fas fa-bars"></i><span>More</span></a>
</nav>

<!-- TOAST -->
<div id="toastContainer" class="toast-container"></div>

<script type="module" src="fixtures.js"></script>
</body>
</html>
