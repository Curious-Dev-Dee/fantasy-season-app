<!DOCTYPE html>
<html>
<head>
    <title>Cricket Experts | Loading...</title>
    <script type="module">
        import { supabase } from "./supabase.js";

        async function route() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // User is logged in, send to Home
                window.location.replace("/home.html");
            } else {
                // User is logged out, send to Login
                window.location.replace("/login.html");
            }
        }
        route();
    </script>
    <style>
        body { background: #0c1117; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(154, 224, 0, 0.1); border-left-color: #9AE000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
