<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>CricExp – Fantasy & Official Scoring</title>
  <meta
    name="description"
    content="CricExp – Fantasy leagues and official live scoring partner for cricket tournaments."
  />
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Fonts + Icons (same as main app) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <!-- Minimal auth styles -->
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <!-- Replace with your logo image if you have one -->
        <div class="auth-logo-mark">🏏</div>
        <div class="auth-logo-text">
          <span class="auth-brand-main">Cric<span class="brand-ce">Exp</span></span>
          <span class="auth-brand-sub">Fantasy & Official Scoring</span>
        </div>
      </div>

      <p class="auth-tagline">
        Season-long fantasy leagues and live scoring partner for your cricket tournaments.
      </p>

      <button class="google-btn" id="googleLoginBtn">
        <span class="g-badge">G</span>
        <span class="btn-text">Continue with Google</span>
        <span class="spin-ico" id="spinIco"></span>
      </button>

      <p class="auth-footnote">
        By continuing you agree to receive updates about your leagues and tournaments.
      </p>

      <div id="authError" role="alert" aria-live="polite" class="auth-error"></div>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
