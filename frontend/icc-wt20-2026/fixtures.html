<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fixtures – ICC Women's T20 WC 2026 – CricExp</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root{--accent:#9AE000;--accent-dim:rgba(154,224,0,0.09);--accent-glow:rgba(154,224,0,0.28);--bg-page:#020617;--bg-card:#0d1625;--bg-card-alt:#111e30;--border:rgba(255,255,255,0.07);--border-card:rgba(255,255,255,0.10);--border-accent:rgba(154,224,0,0.22);--text-primary:#f0f4f8;--text-dim:#94a3b8;--text-faint:#64748b;--red:#ef4444;--orange:#fb923c;--gold:#f59e0b;--font-display:'Barlow Condensed',sans-serif;--font-body:'DM Sans',sans-serif;--card-radius:18px;--card-radius-sm:12px;--btn-radius:12px;--pill-radius:20px;--ease-out:cubic-bezier(0.4,0,0.2,1);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg-page);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;-webkit-tap-highlight-color:transparent;background-image:radial-gradient(ellipse at top left,rgba(154,224,0,0.06) 0%,transparent 55%);background-attachment:fixed;}
    @keyframes pageFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 6px var(--accent-glow)}50%{box-shadow:0 0 18px var(--accent-glow)}}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.35}}
    .fade-in{animation:pageFadeIn .35s var(--ease-out) both;}
    .fade-in-1{animation:pageFadeIn .35s var(--ease-out) .08s both;}
    .fade-in-2{animation:pageFadeIn .35s var(--ease-out) .16s both;}
    .page-wrap{max-width:480px;margin:0 auto;padding:0 0 48px;}
    .site-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;position:sticky;top:0;z-index:200;background:rgba(2,6,23,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulseGlow 2.5s ease-in-out infinite;}
    .logo-text{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--text-primary);letter-spacing:1px;text-transform:uppercase;}
    .logo-text .ce{color:var(--accent);}
    .back-btn{background:var(--accent-dim);color:var(--accent);border:1px solid var(--border-accent);padding:7px 14px;border-radius:var(--btn-radius);font-family:var(--font-display);font-size:13px;font-weight:800;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
    .page-title-bar{padding:18px 14px 0;}
    .page-title{font-family:var(--font-display);font-size:24px;font-weight:900;text-transform:uppercase;color:var(--text-primary);letter-spacing:.3px;line-height:1.1;}
    .page-sub{font-size:12px;color:var(--text-faint);margin-top:4px;}
    /* GROUP FILTER */
    .filter-tabs{display:flex;gap:8px;padding:14px 14px 0;overflow-x:auto;scrollbar-width:none;}
    .filter-tabs::-webkit-scrollbar{display:none;}
    .tab{padding:6px 16px;border-radius:var(--pill-radius);font-family:var(--font-display);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border:1px solid var(--border-card);background:transparent;color:var(--text-faint);cursor:pointer;white-space:nowrap;transition:background .2s,border-color .2s,color .2s;}
    .tab.active{background:var(--accent-dim);border-color:var(--border-accent);color:var(--accent);}
    .section{padding:0 14px;margin-top:16px;}
    /* DATE GROUP HEADER */
    .date-header{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
    .date-header::after{content:'';flex:1;height:1px;background:var(--border);}
    /* MATCH CARD */
    .match-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius-sm);padding:14px;margin-bottom:10px;transition:border-color .2s;}
    .match-card:hover{border-color:var(--border-accent);}
    .match-card.upcoming{border-left:3px solid rgba(245,158,11,.4);}
    .match-card.live{border-left:3px solid rgba(239,68,68,.5);}
    .match-card.completed{opacity:.8;}
    .match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .match-num{font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;}
    .match-time{font-size:11px;color:var(--text-faint);}
    .match-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .match-team{flex:1;text-align:center;}
    .match-team-name{font-family:var(--font-display);font-size:17px;font-weight:900;color:var(--text-primary);text-transform:uppercase;letter-spacing:.2px;}
    .match-team-full{font-size:10px;color:var(--text-faint);margin-top:2px;}
    .match-score{font-size:12px;color:var(--accent);font-weight:600;margin-top:3px;}
    .match-vs{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text-faint);flex-shrink:0;padding:0 4px;}
    .match-footer{margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
    .match-venue{font-size:10px;color:var(--text-faint);}
    .match-result{font-size:11px;color:var(--accent);font-weight:600;}
    .badge-live{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25);border-radius:var(--pill-radius);padding:2px 8px;font-family:var(--font-display);font-size:9px;font-weight:700;text-transform:uppercase;}
    .badge-live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:livePulse 1.4s ease-in-out infinite;}
    .badge-upcoming{display:inline-flex;align-items:center;background:rgba(245,158,11,.1);color:var(--gold);border:1px solid rgba(245,158,11,.2);border-radius:var(--pill-radius);padding:2px 8px;font-family:var(--font-display);font-size:9px;font-weight:700;text-transform:uppercase;}
    .skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:400px 100%;animation:shimmer 1.6s ease-in-out infinite;border-radius:8px;}
    .empty-msg{color:var(--text-faint);font-size:13px;padding:30px 0;text-align:center;}
    .site-footer{margin-top:36px;padding:20px 18px 28px;border-top:1px solid var(--border);text-align:center;}
    .footer-copy{font-size:11px;color:var(--text-faint);}

    /* NOTE BANNER — shown when no real fixtures in DB yet */
    .notice-banner{margin:14px 14px 0;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:var(--card-radius-sm);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
    .notice-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
    .notice-text{font-size:12px;color:var(--text-dim);line-height:1.5;}
  </style>
</head>
<body>
<div class="page-wrap">

  <header class="site-header fade-in">
    <a href="/" class="logo"><div class="logo-dot"></div><div class="logo-text">Cric<span class="ce">Exp</span></div></a>
    <a href="/icc-wt20-2026" class="back-btn"><i class="fa-solid fa-arrow-left" style="font-size:11px"></i> Back</a>
  </header>

  <div class="page-title-bar fade-in-1">
    <div class="page-title">ICC WT20 WC 2026<br>Fixtures</div>
    <div class="page-sub">18 matches · Jun 15 – Jul 15, 2026</div>
  </div>

  <div class="filter-tabs fade-in-1">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="upcoming">Upcoming</button>
    <button class="tab" data-filter="live">Live</button>
    <button class="tab" data-filter="completed">Completed</button>
    <button class="tab" data-filter="group_a">Group A</button>
    <button class="tab" data-filter="group_b">Group B</button>
    <button class="tab" data-filter="knockout">Knockouts</button>
  </div>

  <div class="notice-banner fade-in-1">
    <span class="notice-icon">📅</span>
    <span class="notice-text">Full fixtures will be available once the tournament schedule is confirmed. Check back closer to Jun 15.</span>
  </div>

  <section class="section fade-in-2">
    <div id="fixturesList">
      <!-- Skeleton placeholders -->
      <div class="date-header">Jun 15</div>
      <div class="skel" style="height:110px;border-radius:var(--card-radius-sm);margin-bottom:10px"></div>
      <div class="skel" style="height:110px;border-radius:var(--card-radius-sm);margin-bottom:10px"></div>
      <div class="date-header">Jun 16</div>
      <div class="skel" style="height:110px;border-radius:var(--card-radius-sm);margin-bottom:10px"></div>
    </div>
  </section>

  <footer class="site-footer">
    <p class="footer-copy">CricExp · ICC WT20 WC 2026 · Fixtures</p>
  </footer>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/+esm";

const sb = createClient(
  "https://tuvqgcosbweljslbfgqc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo"
);

let allMatches = [];

// Filter tabs
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    renderFixtures(tab.dataset.filter);
  });
});

// Load from matches table (when ICC WT20 matches are added)
// For now shows a friendly empty state if no data
const { data } = await sb.from("matches")
  .select("*")
  .order("match_date", { ascending: true });

allMatches = data || [];

if (allMatches.length > 0) {
  document.querySelector(".notice-banner").style.display = "none";
  renderFixtures("all");
} else {
  showEmptyState();
}

function showEmptyState() {
  document.getElementById("fixturesList").innerHTML = `
    <div class="empty-msg">
      <div style="font-size:36px;margin-bottom:12px">📅</div>
      <div style="font-family:var(--font-display);font-size:18px;font-weight:900;text-transform:uppercase;color:var(--text-primary);margin-bottom:6px">Fixtures Coming Soon</div>
      <div style="font-size:12px;color:var(--text-faint);max-width:240px;margin:0 auto;line-height:1.6">The ICC Women's T20 WC 2026 schedule will be published here once confirmed.</div>
    </div>`;
}

function renderFixtures(filter) {
  let filtered = allMatches;
  if (filter !== "all") {
    filtered = allMatches.filter(m => {
      if (filter === "upcoming")  return m.status === "upcoming" || !m.status;
      if (filter === "live")      return m.status === "live";
      if (filter === "completed") return m.status === "completed";
      if (filter === "group_a")   return m.stage === "group_a";
      if (filter === "group_b")   return m.stage === "group_b";
      if (filter === "knockout")  return ["sf1","sf2","final","3rd_place"].includes(m.stage);
      return true;
    });
  }

  const list = document.getElementById("fixturesList");
  if (!filtered.length) { list.innerHTML = `<div class="empty-msg">No matches for this filter.</div>`; return; }

  // Group by date
  const grouped = {};
  filtered.forEach(m => {
    const key = new Date(m.match_date).toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(m);
  });

  list.innerHTML = Object.entries(grouped).map(([date, matches]) => {
    const cards = matches.map(m => {
      const time = new Date(m.match_date).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
      const statusClass = m.status === "live" ? "live" : m.status === "completed" ? "completed" : "upcoming";
      const badge = m.status === "live"
        ? `<span class="badge-live"><span class="badge-live-dot"></span>Live</span>`
        : m.status === "completed" ? "" : `<span class="badge-upcoming">Upcoming</span>`;
      return `<div class="match-card ${statusClass}">
        <div class="match-top">
          <span class="match-num">Match ${m.match_number} · ${m.stage||"Group"}</span>
          <span class="match-time">${time} IST ${badge}</span>
        </div>
        <div class="match-teams">
          <div class="match-team">
            <div class="match-team-name">${m.home_team||"TBC"}</div>
            ${m.home_score ? `<div class="match-score">${m.home_score}</div>` : ""}
          </div>
          <div class="match-vs">VS</div>
          <div class="match-team">
            <div class="match-team-name">${m.away_team||"TBC"}</div>
            ${m.away_score ? `<div class="match-score">${m.away_score}</div>` : ""}
          </div>
        </div>
        <div class="match-footer">
          <span class="match-venue"><i class="fa-solid fa-location-dot" style="font-size:9px;margin-right:3px"></i>${m.venue||"Venue TBC"}</span>
          ${m.result ? `<span class="match-result">🏆 ${m.result}</span>` : ""}
        </div>
      </div>`;
    }).join("");
    return `<div class="date-header">${date}</div>${cards}`;
  }).join("");
}
</script>
</body>
</html>
