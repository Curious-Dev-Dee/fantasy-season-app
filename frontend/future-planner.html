<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Future Planner · Cricket Experts</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/team-builder.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script type="module" src="auth-guard.js"></script>

  <style>
    /* ══════════════════════════════════════════════
       FUTURE PLANNER — MOBILE-FIRST COMPACT REWRITE
    ══════════════════════════════════════════════ */

    :root {
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.15);
      --amber-border: rgba(245,158,11,0.25);
      --amber-glow: rgba(245,158,11,0.08);
      --accent: #9ae000;
      --red: #ef4444;
      --bg-page: #0d0a01;
      --bg-card: rgba(255,255,255,0.04);
      --bg-elevated: #191208;
      --border: rgba(255,255,255,0.07);
      --border-card: rgba(255,255,255,0.08);
      --text-dim: rgba(255,255,255,0.75);
      --text-faint: rgba(255,255,255,0.35);
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --card-r: 10px;
      --bar-h: 68px; /* bottom bar height */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-page);
      color: #fff;
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── HEADER ─────────────────────────────────── */
    .fp-header {
      height: 48px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(13,10,1,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--amber-border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .fp-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fp-back {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      color: var(--amber);
      font-size: 14px;
      border-radius: 6px;
      text-decoration: none;
    }

    .fp-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 1;
    }

    .fp-sandbox-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      border-radius: 5px;
      padding: 3px 7px;
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 900;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .fp-sandbox-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── STICKY TOP ZONE ────────────────────────── */
    .fp-sticky {
      position: sticky;
      top: 48px;
      z-index: 900;
      background: var(--bg-page);
      border-bottom: 1px solid var(--border);
    }

    /* ── MATCH CHIPS ────────────────────────────── */
    .fp-match-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .fp-match-strip::-webkit-scrollbar { display: none; }

    .fp-chip {
      flex: 0 0 auto;
      height: 26px;
      padding: 0 9px;
      border-radius: 6px;
      border: 1px solid var(--border-card);
      background: var(--bg-card);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 900;
      color: var(--text-faint);
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      transition: all 0.15s;
    }
    .fp-chip.active {
      background: var(--amber-dim);
      border-color: var(--amber-border);
      color: var(--amber);
    }
    .fp-chip.base { border-style: dashed; }
    .fp-chip.changed::after {
      content: '';
      position: absolute;
      top: -2px; right: -2px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      border: 1.5px solid var(--bg-page);
    }

    /* ── MINI STATS BAR ─────────────────────────── */
    .fp-stats-bar {
      display: flex;
      align-items: center;
      padding: 0 12px 7px;
      gap: 0;
    }

    .fp-stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .fp-stat-val {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 900;
      color: var(--amber);
      line-height: 1;
    }
    .fp-stat-val.ok { color: var(--accent); }
    .fp-stat-val.bad { color: var(--red); }

    .fp-stat-lbl {
      font-size: 8px;
      font-weight: 600;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .fp-stat-sep {
      width: 1px; height: 22px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── VIEW TOGGLE (compact pill) ─────────────── */
    .fp-view-toggle {
      display: flex;
      margin: 0 12px 7px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .fp-view-btn {
      flex: 1;
      height: 30px;
      background: none;
      border: none;
      color: var(--text-faint);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .fp-view-btn.active {
      background: var(--amber-dim);
      color: var(--amber);
    }

    /* Role count badge inside view btn */
    .fp-view-btn .vb-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      border-radius: 4px;
      background: var(--amber);
      color: #000;
      font-size: 9px;
      font-weight: 900;
      margin-left: 3px;
      vertical-align: middle;
    }

    /* ── ROLE TABS ───────────────────────────────── */
    .fp-role-bar {
      display: flex;
      padding: 0 12px 7px;
      gap: 5px;
    }

    .fp-role-tab {
      flex: 1;
      height: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 900;
      color: var(--text-faint);
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .fp-role-tab .rt-count {
      font-size: 9px;
      opacity: 0.7;
    }

    .fp-role-tab.active {
      background: var(--amber-dim);
      border-color: var(--amber-border);
      color: var(--amber);
    }
    .fp-role-tab.req-met { color: var(--accent); border-color: rgba(154,224,0,0.2); background: rgba(154,224,0,0.06); }
    .fp-role-tab.req-met.active { color: var(--amber); border-color: var(--amber-border); background: var(--amber-dim); }

    /* ── SEARCH ROW ─────────────────────────────── */
    .fp-search-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px 8px;
    }

    .fp-search-input {
      flex: 1;
      height: 30px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 12px;
      padding: 0 10px;
      outline: none;
    }
    .fp-search-input::placeholder { color: var(--text-faint); }
    .fp-search-input:focus { border-color: var(--amber-border); }

    .fp-filter-pill {
      height: 30px;
      padding: 0 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-faint);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .fp-filter-pill.active-filter {
      background: var(--amber-dim);
      border-color: var(--amber-border);
      color: var(--amber);
    }

    /* ── TEAM DOTS (tiny) ───────────────────────── */
    .fp-dots-row {
      display: flex;
      gap: 3px;
      padding: 0 12px 7px;
      align-items: center;
    }

    .fp-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .fp-dot.filled { border-color: var(--amber-border); }
    .fp-dot.empty { opacity: 0.3; }

    .fp-dot-credits {
      margin-left: auto;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 900;
      color: var(--amber);
    }
    .fp-dot-credits.tight { color: var(--red); }
    .fp-dot-overseas {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      color: var(--text-faint);
      margin-left: 4px;
    }

    /* ── CONTENT ─────────────────────────────────── */
    .fp-content {
      padding-bottom: calc(var(--bar-h) + env(safe-area-inset-bottom, 0px) + 4px);
    }

    /* ── CHANGE LOG (compact) ───────────────────── */
    .fp-changelog {
      margin: 0 12px 6px;
      padding: 7px 10px;
      background: var(--amber-glow);
      border: 1px solid var(--amber-border);
      border-radius: var(--card-r);
    }

    .fp-changelog-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .fp-cl-label {
      font-family: var(--font-display);
      font-size: 8px;
      font-weight: 900;
      color: rgba(245,158,11,0.45);
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%;
      margin-bottom: 2px;
    }

    .fp-cl-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 5px;
    }
    .fp-cl-pill.in { background: rgba(154,224,0,0.08); border: 1px solid rgba(154,224,0,0.2); color: var(--accent); }
    .fp-cl-pill.out { background: var(--amber-dim); border: 1px solid var(--amber-border); color: var(--amber); }

    .fp-cl-empty {
      font-size: 11px;
      color: var(--text-faint);
      font-style: italic;
    }

    /* ── PLAYER CARD (compact mobile) ──────────── */
    .fp-player-list { padding: 0 12px; }

    .fp-player-card {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      margin-bottom: 5px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-r);
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .fp-player-card.selected {
      border-color: rgba(245,158,11,0.3);
      background: var(--amber-glow);
    }

    .fp-player-card.faded { opacity: 0.38; pointer-events: none; }

    /* Swipe OUT flash */
    .fp-player-card.flash-out { animation: flashOut 0.3s ease; }
    @keyframes flashOut { 0%{background:rgba(245,158,11,0.15)} 100%{background:var(--amber-glow)} }

    /* Avatar */
    .fp-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      background: #222;
    }
    .fp-player-card.selected .fp-avatar { border-color: var(--amber-border); }

    /* Info */
    .fp-pinfo { flex: 1; min-width: 0; }

    .fp-pname {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .fp-pmeta {
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .fp-cat-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 0 4px;
      border-radius: 3px;
    }
    .fp-cat-badge.os { background: rgba(99,179,237,0.12); color: #63b3ed; }
    .fp-cat-badge.uc { background: rgba(154,224,0,0.10); color: var(--accent); }

    .fp-pin-badge {
      font-size: 8px;
      font-weight: 900;
      font-family: var(--font-display);
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .fp-pin-badge.new-in { background: rgba(154,224,0,0.1); color: var(--accent); border: 1px solid rgba(154,224,0,0.2); }
    .fp-pin-badge.out { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }

    /* Controls (right side) */
    .fp-pcontrols {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    /* C / VC buttons */
    .fp-role-btn {
      width: 26px; height: 26px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      color: var(--text-faint);
      cursor: pointer;
      transition: all 0.15s;
    }
    .fp-role-btn.active-c { background: var(--amber); border-color: var(--amber); color: #000; }
    .fp-role-btn.active-vc { background: rgba(245,158,11,0.35); border-color: var(--amber); color: var(--amber); }

    /* +/- toggle — the star of the show */
    .fp-toggle-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1.5px solid rgba(154,224,0,0.35);
      background: rgba(154,224,0,0.06);
      color: var(--accent);
      font-size: 18px;
      font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .fp-toggle-btn:active { transform: scale(0.9); }
    .fp-toggle-btn.selected {
      border-color: var(--amber-border);
      background: var(--amber-dim);
      color: var(--amber);
    }
    .fp-toggle-btn:disabled {
      border-color: var(--border);
      background: none;
      color: var(--text-faint);
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Booster section — minimal strip */
    .fp-booster-strip {
      margin: 0 12px 8px;
    }

    .fp-booster-label {
      font-family: var(--font-display);
      font-size: 8px;
      font-weight: 900;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fp-booster-left-badge {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--amber-dim);
      color: var(--amber);
      font-weight: 900;
    }

    .fp-booster-scroll {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .fp-booster-scroll::-webkit-scrollbar { display: none; }

    .fp-booster-card {
      flex: 0 0 auto;
      height: 38px;
      padding: 0 9px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 900;
      color: var(--text-faint);
      text-transform: uppercase;
      white-space: nowrap;
      position: relative;
    }
    .fp-booster-card .bic { font-size: 14px; }
    .fp-booster-card.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
    .fp-booster-card.used { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    .fp-booster-card.locked { opacity: 0.25; cursor: not-allowed; pointer-events: none; }

    /* ── BOTTOM BAR ─────────────────────────────── */
    .fp-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bar-h);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      background: rgba(13,10,1,0.97);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--amber-border);
      z-index: 1100;
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .fp-btn-reset {
      width: 38px; height: 42px;
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--amber-border);
      border-radius: 9px;
      color: var(--amber);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .fp-btn-reset:active { background: var(--amber-dim); }

    .fp-btn-next {
      flex: 1;
      height: 42px;
      background: var(--amber-dim);
      border: 1.5px solid var(--amber-border);
      border-radius: 9px;
      color: var(--amber);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fp-btn-next:not(:disabled):active { background: rgba(245,158,11,0.25); }
    .fp-btn-next:disabled { opacity: 0.38; cursor: not-allowed; }

    .fp-btn-summary {
      width: 38px; height: 42px;
      flex-shrink: 0;
      background: transparent;
      border: 1px solid rgba(154,224,0,0.2);
      border-radius: 9px;
      color: var(--accent);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── SUMMARY SHEET ───────────────────────────── */
    .fp-summary-sheet {
      position: fixed;
      bottom: -100%; left: 0; right: 0;
      max-height: 80vh;
      background: var(--bg-elevated);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--amber-border);
      z-index: 3000;
      transition: bottom 0.35s cubic-bezier(0.34,1.1,0.64,1);
      padding: 16px 14px calc(20px + env(safe-area-inset-bottom, 0px));
      overflow-y: auto;
    }
    .fp-summary-sheet.show { bottom: 0; }

    .fp-summary-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .fp-summary-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      color: var(--amber);
      text-transform: uppercase;
    }

    .fp-summary-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-faint);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .fp-summary-pills {
      display: flex; gap: 6px; margin-bottom: 12px;
    }

    .fp-summary-pill {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
    }

    .fp-summary-pill .spv {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 900;
      color: var(--amber);
      display: block;
    }
    .fp-summary-pill .spl {
      font-size: 8px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .fp-smatch-row {
      padding: 9px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-r);
      margin-bottom: 6px;
    }

    .fp-smatch-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .fp-smatch-num {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 900;
      color: var(--amber);
    }

    .fp-smatch-subs {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 900;
    }
    .fp-smatch-subs.ok { color: var(--accent); }
    .fp-smatch-subs.warn { color: var(--amber); }
    .fp-smatch-subs.none { color: var(--text-faint); }

    .fp-smatch-changes { display: flex; flex-wrap: wrap; gap: 3px; }

    /* ── BACKDROP ────────────────────────────────── */
    .fp-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2900;
      display: none;
    }
    .fp-backdrop.show { display: block; }

    /* ── FILTER SHEETS (reused) ──────────────────── */
    .fp-filter-sheet {
      position: fixed;

      transition: bottom 0.3s ease;

    /* ── CONFIRM DIALOG ───────────────────────────── */
    .fp-confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 5000;

    .fp-confirm-text {

      margin-bottom: 16px;

    .fp-confirm-btns { display: flex; gap: 8px; }

    /* ── PLAYER PROFILE OVERLAY ──────────────────── */
    .fp-profile-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);

    /* ── INTRO TOAST ─────────────────────────────── */
    .fp-intro-toast {
      position: fixed;
      top: 54px; left: 12px; right: 12px;
      background: rgba(13,10,1,0.97);

      padding: 9px 12px;

    .fp-intro-text { font-size: 11px; color: var(--text-dim); line-height: 1.4; flex:1; }
    .fp-intro-text strong { color: var(--amber); }
    .fp-intro-close { background: none; border: none; color: var(--text-faint); font-size: 14px; cursor: pointer; padding: 0 2px; }

    /* ── TOAST ────────────────────────────────────── */
    .fp-toast-container {
      position: fixed;
      bottom: calc(var(--bar-h) + 8px);
      left: 12px; right: 12px;

    .fp-toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }

  <!-- ── CONFIRM DIALOG ────────────────────────────── -->

  <!-- ── INTRO TOAST ───────────────────────────────── -->
  <div class="fp-intro-toast" id="fpIntroToast">
    <div class="fp-intro-text">
      🧪 <strong>Sandbox.</strong> Plan transfers match by match — your real team is untouched.
    </div>
    <button class="fp-intro-close" onclick="document.getElementById('fpIntroToast').remove()">✕</button>
  </div>

  <!-- ── TOASTS ────────────────────────────────────── -->
  <div class="fp-toast-container" id="fpToastContainer"></div>

  <script type="module">
    import { supabase } from "./supabase.js";
    import { authReady } from "./auth-state.js";

    /* ═══════════════════════════════════════════════
       CONSTANTS
    ═══════════════════════════════════════════════ */
    const PLAYOFF_START  = 71;
    const BOOSTER_START  = 2;
    const BOOSTER_END    = 70;
    const ROLE_ORDER     = { WK:1, BAT:2, AR:3, BOWL:4 };
    const BOOSTER_META   = {
      TOTAL_2X:    { name:"Total 2X",    icon:"🚀" },
      INDIAN_2X:   { name:"Indian 2X",   icon:"🇮🇳" },
      OVERSEAS_2X: { name:"Overseas 2X", icon:"✈️" },
      UNCAPPED_2X: { name:"Uncapped 2X", icon:"🧢" },
      CAPTAIN_3X:  { name:"Captain 3X",  icon:"👑" },
      MOM_2X:      { name:"MOM 2X",      icon:"🏆" },
      FREE_11:     { name:"Free 11",     icon:"🆓" },
    };

    /* ═══════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════ */
    let allPlayers    = [];
    let allMatches    = [];
    let realTeamsMap  = {};
    let base          = {};
    let plan          = [];
    let planIdx       = 0;
    let activeTid     = null;
    let filters       = { role:"WK", search:"", teams:[], matches:[] };
    let activeView    = "pool"; // "myxi" | "pool"

    /* ═══════════════════════════════════════════════
       BOOT
    ═══════════════════════════════════════════════ */
    (async () => {
      try {
        const user = await authReady;
        if (!user) return;
        await init(user);
      } catch(e) { console.warn(e); }
    })();

    async function init(user) {
      try {
        const { data: tournament } = await supabase.from("active_tournament").select("*").maybeSingle();
        if (!tournament) { showEmpty("No active tournament."); return; }
        activeTid = tournament.id;

        const { data: matches } = await supabase
          .from("matches")
          .select("*, team_a:real_teams!team_a_id(short_code,photo_name), team_b:real_teams!team_b_id(short_code,photo_name)")
          .eq("tournament_id", activeTid)
          .eq("status", "upcoming")
          .gt("actual_start_time", new Date().toISOString())
          .order("actual_start_time", { ascending:true });

        allMatches = matches || [];
        if (!allMatches.length) { showEmpty("No upcoming matches."); return; }

        const [
          { data: players },
          { data: dash },
          { data: boostData },
          { data: lastLock },
          { data: currentTeam },
          { data: teamsData },
        ] = await Promise.all([
          supabase.from("player_pool_view").select("*").eq("is_active",true).eq("tournament_id",activeTid),
          supabase.from("home_dashboard_view").select("subs_remaining").eq("user_id",user.id).maybeSingle(),
          supabase.from("user_tournament_points").select("used_boosters").eq("user_id",user.id).eq("tournament_id",activeTid).maybeSingle(),
          supabase.from("user_match_teams")
            .select("id, matches!inner(match_number), user_match_team_players(player_id)")
            .eq("user_id",user.id).eq("tournament_id",activeTid)
            .neq("match_id", allMatches[0].id)
            .order("locked_at",{ascending:false}).limit(1).maybeSingle(),
          supabase.from("user_fantasy_teams")
            .select("*, user_fantasy_team_players(player_id)")
            .eq("user_id",user.id).eq("tournament_id",activeTid).maybeSingle(),
          supabase.from("real_teams").select("id,name,short_code,photo_name"),
        ]);

        realTeamsMap = Object.fromEntries((teamsData||[]).map(t=>[t.id,t]));

        const { data: seasonRows } = await supabase
          .from("player_match_stats")
          .select("player_id, fantasy_points, matches!inner(tournament_id)")
          .eq("matches.tournament_id", activeTid);

        const seasonPts = {};
        for (const r of seasonRows||[]) seasonPts[r.player_id] = (seasonPts[r.player_id]||0) + (r.fantasy_points||0);

        allPlayers = (players||[]).map(p => ({ ...p, season_points: seasonPts[p.id]||0 }));

        const usedBoosters = boostData?.used_boosters || [];
        const savedBooster = currentTeam?.active_booster || "NONE";

        base = {
          playerIds:     (currentTeam?.user_fantasy_team_players||[]).map(r=>r.player_id),
          captainId:     currentTeam?.captain_id || null,
          viceCaptainId: currentTeam?.vice_captain_id || null,
          subsRemaining: dash?.subs_remaining ?? 130,
          usedBoosters,
          activeBooster: usedBoosters.includes(savedBooster) ? "NONE" : savedBooster,
          lockedIds:     lastLock?.user_match_team_players?.map(p=>p.player_id) || [],
        };

        seedPlan();
        initEvents();
        render();

        setTimeout(() => {
          const t = document.getElementById("fpIntroToast");
          if (t) { t.style.transition="opacity 0.5s"; t.style.opacity="0"; setTimeout(()=>t.remove(),500); }
        }, 5000);

      } catch(err) { console.error(err); showEmpty("Failed to load. Please try again."); }
    }

    /* ═══════════════════════════════════════════════
       PLAN MANAGEMENT
    ═══════════════════════════════════════════════ */
    function seedPlan() {
      plan = [];
      const m = allMatches[0];
      const isReset = m.match_number === 1 || m.match_number === PLAYOFF_START;
      const slot = {
        matchId: m.id, matchNumber: m.match_number,
        playerIds: [...base.playerIds],
        captainId: base.captainId, viceCaptainId: base.viceCaptainId,
        activeBooster: base.activeBooster, usedBoosters: [...base.usedBoosters],
        subsAtStart: base.subsRemaining, subsRemaining: base.subsRemaining,
        isReset, lockedIds: base.lockedIds,
      };
      recalcSubs(slot);
      plan.push(slot);
      planIdx = 0;
    }

    function recalcSubs(slot) {
      if (slot.isReset || slot.activeBooster === "FREE_11" || !slot.lockedIds?.length) {
        slot.subsRemaining = slot.subsAtStart;
        slot.subsUsed = 0;
        return;
      }
      const newIds = slot.playerIds.filter(id => !slot.lockedIds.includes(id));
      const hasUncapped = newIds.some(id => allPlayers.find(p=>p.id===id)?.category==="uncapped");
      const used = (hasUncapped && newIds.length > 0) ? newIds.length - 1 : newIds.length;
      slot.subsUsed = used;
      slot.subsRemaining = slot.subsAtStart - used;
    }

    function slot() { return plan[planIdx]; }

    function lockAndAdvance() {
      const s = slot();
      const stats = calcStats();
      const errors = validateSlot(s, stats);
      if (errors) { toast(errors, "error"); return; }

      const curIdx = allMatches.findIndex(m => m.id === s.matchId);
      const next   = allMatches[curIdx + 1];
      if (!next) { toast("No more matches to plan!", "error"); return; }

      const usedNext = s.activeBooster !== "NONE" ? [...s.usedBoosters, s.activeBooster] : [...s.usedBoosters];
      const nextSlot = {
        matchId: next.id, matchNumber: next.match_number,
        playerIds: [...s.playerIds],
        captainId: s.captainId, viceCaptainId: s.viceCaptainId,
        activeBooster: "NONE", usedBoosters: usedNext,
        subsAtStart: s.subsRemaining, subsRemaining: s.subsRemaining,
        isReset: next.match_number === PLAYOFF_START,
        lockedIds: s.playerIds,
      };
      recalcSubs(nextSlot);

      const existIdx = plan.findIndex(p => p.matchId === next.id);
      if (existIdx > -1) { plan[existIdx] = nextSlot; plan = plan.slice(0, existIdx+1); }
      else plan.push(nextSlot);

      planIdx = plan.length - 1;
      toast(`M${s.matchNumber} locked! Planning M${next.match_number}`, "success");

      // auto-switch to pool
      activeView = "pool";
      render();
      scrollChipIntoView(next.id);
    }

    function validateSlot(s, stats) {
      if (stats.count < 11) return `Add ${11-stats.count} more player${11-stats.count>1?"s":""}`;
      if (!s.captainId || !s.viceCaptainId) return "Set Captain & Vice-Captain";
      if (stats.roles.WK   < 1) return "Need ≥1 WK";
      if (stats.roles.BAT  < 3) return "Need ≥3 BAT";
      if (stats.roles.AR   < 1) return "Need ≥1 AR";
      if (stats.roles.BOWL < 3) return "Need ≥3 BOWL";
      if (stats.overseas   > 4) return "Max 4 overseas";
      if (stats.credits    > 100.05) return "Credits exceeded";
      if (stats.isOverLimit) return "Not enough subs remaining";
      return null;
    }

    function resetMatch() {
      const s = slot();
      if (planIdx === 0) {
        s.playerIds = [...base.playerIds];
        s.captainId = base.captainId;
        s.viceCaptainId = base.viceCaptainId;
        s.activeBooster = base.activeBooster;
        s.usedBoosters  = [...base.usedBoosters];
      } else {
        const prev = plan[planIdx - 1];
        s.playerIds    = [...prev.playerIds];
        s.captainId    = prev.captainId;
        s.viceCaptainId = prev.viceCaptainId;
        s.activeBooster = "NONE";
        s.usedBoosters  = prev.activeBooster !== "NONE" ? [...prev.usedBoosters, prev.activeBooster] : [...prev.usedBoosters];
        s.subsAtStart   = prev.subsRemaining;
      }
      recalcSubs(s);
      render();
      toast("Match reset", "info");
    }

    /* ═══════════════════════════════════════════════
       PLAYER ACTIONS
    ═══════════════════════════════════════════════ */
    function togglePlayer(id) {
      const s   = slot();
      const idx = s.playerIds.indexOf(id);
      if (idx > -1) {
        s.playerIds.splice(idx, 1);
        if (s.captainId === id)    s.captainId = null;
        if (s.viceCaptainId === id) s.viceCaptainId = null;
      } else {
        if (s.playerIds.length >= 11) return;
        s.playerIds.push(id);
      }
      recalcSubs(s);
      render();

      // Auto switch to My XI when full
      if (s.playerIds.length === 11 && (!s.captainId || !s.viceCaptainId)) {
        activeView = "myxi";
        updateViewUI();
        toast("11 players! Now set C & VC 👑", "success");
      }
    }

    function setRole(id, type) {
      const s = slot();
      if (type === "C") {
        s.captainId = s.captainId === id ? null : id;
        if (s.captainId === s.viceCaptainId) s.viceCaptainId = null;
      } else {
        s.viceCaptainId = s.viceCaptainId === id ? null : id;
        if (s.viceCaptainId === s.captainId) s.captainId = null;
      }
      render();
    }

    window.handleBoosterChange = val => {
      const s = slot();
      if (val === "NONE") { s.activeBooster = "NONE"; recalcSubs(s); render(); return; }
      showConfirm(`Apply ${BOOSTER_META[val].name}?`, "Simulation only — real booster unchanged.").then(ok => {
        if (ok) { s.activeBooster = val; recalcSubs(s); render(); toast(`${BOOSTER_META[val].name} applied!`, "info"); }
      });
    };

    /* ═══════════════════════════════════════════════
       CALC STATS
    ═══════════════════════════════════════════════ */
    function calcStats() {
      const s        = slot();
      const selected = s.playerIds.map(id => allPlayers.find(p=>p.id===id)).filter(Boolean);
      const roles    = { WK:0, BAT:0, AR:0, BOWL:0 };
      let overseas = 0, credits = 0;
      for (const p of selected) {
        roles[p.role] = (roles[p.role]||0)+1;
        if (p.category==="overseas") overseas++;
        credits += Number(p.credit);
      }
      const isReset    = s.isReset || s.activeBooster === "FREE_11";
      const liveSubs   = isReset ? "FREE" : s.subsRemaining;
      const isOverLimit = !isReset && s.subsRemaining < 0;
      return { count:selected.length, overseas, credits, roles, liveSubs, isOverLimit, isReset, selected };
    }

    /* ═══════════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════════ */
    function render() {
      const stats = calcStats();
      renderMatchStrip();
      renderMiniStats();
      renderDots(stats);
      updateRoleTabs(stats);
      updateNextBtn(stats);
      renderChangelog();
      renderBoosterStrip();
      if (activeView === "myxi") renderMyXI(stats);
      else renderPool(stats);
    }

    function renderMatchStrip() {
      const strip = document.getElementById("fpMatchStrip");
      if (!strip) return;
      strip.innerHTML = "";

      // Base chip
      const base_c = el("div","fp-chip base","Current");
      base_c.title = "Your real current team";
      strip.appendChild(base_c);

      for (let i = 0; i < plan.length; i++) {
        const s   = plan[i];
        const m   = allMatches.find(x=>x.id===s.matchId);
        const c   = el("div", `fp-chip ${i===planIdx?"active":""}`, `M${s.matchNumber}`);
        c.dataset.planIdx = i;
        c.title = m ? `${m.team_a?.short_code} vs ${m.team_b?.short_code}` : "";

        const prevIds = i===0 ? base.lockedIds : plan[i-1].playerIds;
        if (prevIds?.length && s.playerIds.some(id=>!prevIds.includes(id))) c.classList.add("changed");

        c.onclick = () => { planIdx = i; render(); };
        strip.appendChild(c);
      }

      // Peek next
      const lastMIdx = allMatches.findIndex(m=>m.id===plan[plan.length-1].matchId);
      if (lastMIdx < allMatches.length-1) {
        const peek = el("div","fp-chip","M"+allMatches[lastMIdx+1].match_number+" →");
        peek.style.cssText = "opacity:.4;border-style:dashed;pointer-events:none";
        strip.appendChild(peek);
      }
    }

    function scrollChipIntoView(matchId) {
      setTimeout(() => {
        const s = document.querySelector(`.fp-chip[data-match-id="${matchId}"]`);
        s?.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
      }, 80);
    }

    function renderMiniStats() {
      let totalUsed = 0;
      const usedBoosters = new Set(base.usedBoosters);
      for (const s of plan) {
        totalUsed += (s.subsUsed||0);
        if (s.activeBooster !== "NONE") usedBoosters.add(s.activeBooster);
      }
      const lastSlot  = plan[plan.length-1];
      const subsLeft  = lastSlot.subsRemaining;
      const boostLeft = 7 - usedBoosters.size;

      setTxt("fsSubsLeft",  subsLeft,  subsLeft < 0 ? "bad" : subsLeft < 20 ? "" : "ok");
      setTxt("fsSubsUsed",  totalUsed);
      setTxt("fsMatches",   plan.length);
      setTxt("fsBoosters",  boostLeft, boostLeft <= 1 ? "bad" : "");
    }

    function renderDots(stats) {
      const row = document.getElementById("fpDotsRow");
      if (!row) return;
      const s      = slot();
      const bucket = supabase.storage.from("team-logos");
      row.innerHTML = "";

      for (let i = 0; i < 11; i++) {
        const p    = s.playerIds[i] ? allPlayers.find(x=>x.id===s.playerIds[i]) : null;
        const dot  = document.createElement("div");
        dot.className = "fp-dot";
        if (p) {
          const team = realTeamsMap[p.real_team_id];
          if (team?.photo_name) {
            const url = bucket.getPublicUrl(team.photo_name).data.publicUrl;
            dot.style.backgroundImage = `url('${url}')`;
          }
          dot.classList.add("filled");
        } else {
          dot.classList.add("empty");
        }
        row.appendChild(dot);
      }

      const credEl = document.createElement("span");
      const rem = (100 - stats.credits).toFixed(1);
      credEl.className = `fp-dot-credits${rem < 5 ? " tight" : ""}`;
      credEl.textContent = rem + "cr";
      row.appendChild(credEl);

      const osEl = document.createElement("span");
      osEl.className = "fp-dot-overseas";
      osEl.textContent = `✈${stats.overseas}/4`;
      row.appendChild(osEl);
    }

    function updateRoleTabs(stats) {
      const req = { WK:1, BAT:3, AR:1, BOWL:3 };
      document.querySelectorAll(".fp-role-tab[data-role]").forEach(tab => {
        const r     = tab.dataset.role;
        const count = stats.roles[r]||0;
        const min   = req[r]||0;
        const span  = tab.querySelector(".rt-count");
        if (span) span.textContent = count;
        tab.classList.remove("req-met");
        if (count >= min) tab.classList.add("req-met");
      });

      const badge = document.getElementById("fpCountBadge");
      if (badge) badge.textContent = stats.count;
    }

    function updateNextBtn(stats) {
      const btn     = document.getElementById("fpNextBtn");
      if (!btn) return;
      const s       = slot();
      const lastMI  = allMatches.findIndex(m=>m.id===plan[plan.length-1].matchId);
      const noMore  = lastMI >= allMatches.length-1 && planIdx === plan.length-1;

      if (noMore) { btn.disabled=true; btn.textContent="End of Schedule"; return; }
      if (planIdx < plan.length-1) { btn.disabled=true; btn.textContent="Viewing Past Plan"; return; }

      const err = validateSlot(s, stats);
      if (err) { btn.disabled=true; btn.textContent="Lock & Next →"; return; }
      btn.disabled=false; btn.textContent="Lock & Next Match →";
    }

    /* ═══════════════════════════════════════════════
       CHANGELOG
    ═══════════════════════════════════════════════ */
    function renderChangelog() {
      const inner = document.getElementById("fpChangelogInner");
      if (!inner) return;
      const s       = slot();
      const prevIds = planIdx===0 ? base.lockedIds : plan[planIdx-1].playerIds;

      if (!prevIds?.length) { inner.innerHTML=`<span class="fp-cl-empty">Base match.</span>`; return; }

      const inIds  = s.playerIds.filter(id=>!prevIds.includes(id));
      const outIds = prevIds.filter(id=>!s.playerIds.includes(id));

      if (!inIds.length && !outIds.length) { inner.innerHTML=`<span class="fp-cl-empty">Same team as previous.</span>`; return; }

      inner.innerHTML = [
        ...outIds.map(id=>{ const p=allPlayers.find(x=>x.id===id); return p?`<span class="fp-cl-pill out">▼ ${p.name}</span>`:""; }),
        ...inIds.map(id=>{ const p=allPlayers.find(x=>x.id===id); return p?`<span class="fp-cl-pill in">▲ ${p.name}</span>`:""; }),
      ].join("");
    }

    /* ═══════════════════════════════════════════════
       BOOSTER STRIP
    ═══════════════════════════════════════════════ */
    function renderBoosterStrip() {
      const strip = document.getElementById("fpBoosterStrip");
      if (!strip) return;
      const s = slot();
      if (s.matchNumber > BOOSTER_END) { strip.innerHTML=""; return; }

      const isLocked  = s.matchNumber < BOOSTER_START;
      const usedCount = (s.usedBoosters||[]).length + (s.activeBooster!=="NONE"?1:0);
      const leftCount = 7 - usedCount;

      strip.innerHTML = `
        <div class="fp-booster-label">
          Boosters
          ${isLocked
            ? '<span class="fp-booster-left-badge">from M2</span>'
            : `<span class="fp-booster-left-badge">${leftCount} left</span>`}
        </div>
        <div class="fp-booster-scroll">
          ${Object.entries(BOOSTER_META).map(([key,cfg]) => {
            const isUsed   = s.usedBoosters?.includes(key);
            const isActive = s.activeBooster === key;
            const dis      = isUsed || isLocked;
            return `<div class="fp-booster-card ${isActive?"active":""} ${isUsed?"used":""} ${isLocked&&!isUsed?"locked":""}"
              ${dis?"":"onclick=\"handleBoosterChange('"+(isActive?"NONE":key)+"')\""}>
              <span class="bic">${cfg.icon}</span>${cfg.name}
              ${isActive?'<span style="font-size:8px;background:var(--amber);color:#000;padding:1px 4px;border-radius:3px;margin-left:2px;">ON</span>':""}
            </div>`;
          }).join("")}
        </div>`;
    }

    /* ═══════════════════════════════════════════════
       MY XI RENDER
    ═══════════════════════════════════════════════ */
    function renderMyXI(stats) {
      const s      = slot();
      const list   = document.getElementById("fpMyXIList");
      if (!list) return;
      const sorted = s.playerIds
        .map(id=>allPlayers.find(p=>p.id===id)).filter(Boolean)
        .sort((a,b) => ROLE_ORDER[a.role]-ROLE_ORDER[b.role] || b.credit-a.credit);

      renderList(list, sorted, true, stats, s);
    }

    /* ═══════════════════════════════════════════════
       POOL RENDER
    ═══════════════════════════════════════════════ */
    function renderPool(stats) {
      const s    = slot();
      const cur  = allMatches.find(m=>m.id===s.matchId);
      const term = filters.search;
      const req  = { WK:1, BAT:3, AR:1, BOWL:3 };
      const cur_roles = { WK:0, BAT:0, AR:0, BOWL:0 };
      for (const id of s.playerIds) {
        const p = allPlayers.find(x=>x.id===id);
        if (p) cur_roles[p.role]++;
      }
      const needed = Object.keys(req).reduce((a,r)=>a+Math.max(0,req[r]-cur_roles[r]),0);

      const filtered = allPlayers.filter(p => {
        const cat = (p.category||"").toLowerCase();
        if (term && !p.name.toLowerCase().includes(term) && !(p.team_short_code||"").toLowerCase().includes(term)) return false;
        if (!term && p.role !== filters.role) return false;
        if (filters.teams.length && !filters.teams.includes(p.real_team_id)) return false;
        if (filters.matches.length) {
          const inM = allMatches.some(m => filters.matches.includes(m.id) &&
            (p.real_team_id===m.team_a_id||p.real_team_id===m.team_b_id));
          if (!inM) return false;
        }
        return true;
      }).sort((a,b) => {
        const pri = id => id===cur?.team_a_id?1:id===cur?.team_b_id?2:3;
        return pri(a.real_team_id)-pri(b.real_team_id) || ROLE_ORDER[a.role]-ROLE_ORDER[b.role] || b.credit-a.credit;
      });

      const list = document.getElementById("fpPoolList");
      if (!list) return;
      renderList(list, filtered, false, stats, s, needed, cur_roles, req);
    }

    function renderList(container, players, isMyXI, stats, s, needed=0, curRoles={}, req={WK:1,BAT:3,AR:1,BOWL:3}) {
      const bucket  = supabase.storage.from("player-photos");
      const prevIds = planIdx===0 ? base.lockedIds : plan[planIdx-1].playerIds;
      const frag    = document.createDocumentFragment();

      if (!players.length) {
        const e = document.createElement("p");
        e.className = "fp-empty";
        e.textContent = isMyXI ? "Select players from Edit Squad." : "No players match filters.";
        frag.appendChild(e);
        container.innerHTML = "";
        container.appendChild(frag);
        return;
      }

      for (const p of players) {
        const isSelected = s.playerIds.includes(p.id);
        const selCredits = s.playerIds.map(id=>allPlayers.find(x=>x.id===id)).filter(Boolean).reduce((a,x)=>a+Number(x.credit),0);
        const tooPricey  = p.credit > (100 - selCredits + (isSelected?p.credit:0));
        const osBlocked  = stats.overseas>=4 && p.category==="overseas" && !isSelected;
        const roleBlock  = !isSelected && (11-stats.count)<=needed && (req[p.role]-curRoles[p.role])<=0;
        const disabled   = !isMyXI && !isSelected && (stats.count>=11 || tooPricey || osBlocked || roleBlock);

        const photoUrl = p.photo_url ? bucket.getPublicUrl(p.photo_url).data.publicUrl : "images/default-avatar.png";
        const cat      = (p.category||"").toLowerCase();
        const catBadge = cat==="overseas"
          ? '<span class="fp-cat-badge os">✈</span>'
          : cat==="uncapped"
          ? '<span class="fp-cat-badge uc">U</span>'
          : "";

        const isNew  = isSelected && prevIds?.length && !prevIds.includes(p.id);
        const isOut  = !isSelected && prevIds?.includes(p.id);
        const pinBadge = isNew
          ? '<span class="fp-pin-badge new-in">▲ IN</span>'
          : isOut
          ? '<span class="fp-pin-badge out">▼ OUT</span>'
          : "";

        const card = document.createElement("div");
        card.className = `fp-player-card ${isSelected?"selected":""} ${disabled?"faded":""}`;
        card.dataset.id = p.id;

        card.innerHTML = `
          <img class="fp-avatar" src="${photoUrl}" loading="lazy" alt="${p.name}"
            onerror="this.src='images/default-avatar.png'"
            onclick="openProfile('${p.id}')" style="cursor:pointer">
          <div class="fp-pinfo">
            <div class="fp-pname">${p.name}</div>
            <div class="fp-pmeta">
              <span>${p.team_short_code}</span>
              ${catBadge}
              <span>${p.credit}cr</span>
              <span>${p.season_points??0}pts</span>
              ${pinBadge}
            </div>
          </div>
          <div class="fp-pcontrols">
            ${isMyXI ? `
              <button class="fp-role-btn ${s.captainId===p.id?"active-c":""}"
                data-action="C" data-id="${p.id}">C</button>
              <button class="fp-role-btn ${s.viceCaptainId===p.id?"active-vc":""}"
                data-action="VC" data-id="${p.id}">VC</button>
            ` : ""}
            <button class="fp-toggle-btn ${isSelected?"selected":""}"
              data-action="toggle" data-id="${p.id}"
              ${disabled?"disabled":""}
              aria-label="${isSelected?"Remove":"Add"}">
              ${isSelected?"−":"+"}
            </button>
          </div>`;

        frag.appendChild(card);
      }

      container.innerHTML = "";
      container.appendChild(frag);
    }

    /* ═══════════════════════════════════════════════
       SUMMARY SHEET
    ═══════════════════════════════════════════════ */
    window.closeSummary = () => {
      document.getElementById("fpSummarySheet")?.classList.remove("show");
      document.getElementById("fpSummaryBackdrop")?.classList.remove("show");
    };

    function openSummary() {
      let totalUsed = 0;
      const rows = plan.map((s,i) => {
        const prevIds = i===0 ? base.lockedIds : plan[i-1].playerIds;
        const inIds   = s.playerIds.filter(id=>!prevIds?.includes(id));
        const outIds  = (prevIds||[]).filter(id=>!s.playerIds.includes(id));
        const used    = s.subsUsed||0;
        totalUsed += used;

        const pills = [
          ...outIds.map(id=>{ const p=allPlayers.find(x=>x.id===id); return p?`<span class="fp-cl-pill out">▼ ${p.name}</span>`:""; }),
          ...inIds.map(id=>{ const p=allPlayers.find(x=>x.id===id); return p?`<span class="fp-cl-pill in">▲ ${p.name}</span>`:""; }),
        ].join("");

        const subsCls = used>0?"warn":"none";
        return `
          <div class="fp-smatch-row">
            <div class="fp-smatch-hdr">
              <span class="fp-smatch-num">Match ${s.matchNumber}</span>
              <span class="fp-smatch-subs ${s.isReset?"ok":subsCls}">
                ${s.isReset?"FREE":used>0?`${used} subs · ${s.subsRemaining} left`:"No changes"}
              </span>
            </div>
            ${s.activeBooster!=="NONE"?`<div style="margin-bottom:5px;font-size:11px;color:var(--amber)">${BOOSTER_META[s.activeBooster].icon} ${BOOSTER_META[s.activeBooster].name}</div>`:""}
            <div class="fp-smatch-changes">${pills||'<span style="font-size:11px;color:var(--text-faint);font-style:italic;">No changes</span>'}</div>
          </div>`;
      }).join("");

      const last = plan[plan.length-1];
      document.getElementById("fpSummaryContent").innerHTML = `
        <div class="fp-summary-pills">
          <div class="fp-summary-pill"><span class="spv">${totalUsed}</span><span class="spl">Subs Used</span></div>
          <div class="fp-summary-pill"><span class="spv ${last.subsRemaining<0?"bad":""}">${last.subsRemaining}</span><span class="spl">Subs Left</span></div>
          <div class="fp-summary-pill"><span class="spv">${plan.length}</span><span class="spl">Planned</span></div>
        </div>
        ${rows}`;

      document.getElementById("fpSummaryBackdrop").classList.add("show");
      document.getElementById("fpSummarySheet").classList.add("show");
    }

    /* ═══════════════════════════════════════════════
       PROFILE
    ═══════════════════════════════════════════════ */
    window.openProfile = async (playerId) => {
      const overlay = document.getElementById("fpProfileOverlay");
      const content = document.getElementById("fpProfileContent");
      if (!overlay||!content) return;
      content.innerHTML = '<div class="fp-loading"><div class="fp-spinner"></div></div>';
      overlay.classList.remove("hidden");

      try {
        const [{ data: p }, { data: statsData }] = await Promise.all([
          supabase.from("player_pool_view").select("*").eq("id",playerId).maybeSingle(),
          supabase.from("player_match_stats").select("*, match:matches!inner(match_number)")
            .eq("player_id",playerId).order("match_id",{ascending:true}),
        ]);
        if (!p) { content.innerHTML='<p class="fp-empty">Not found.</p>'; return; }

        const bucket   = supabase.storage.from("player-photos");
        const photoUrl = p.photo_url ? bucket.getPublicUrl(p.photo_url).data.publicUrl : "images/default-avatar.png";
        const totalPts = (statsData||[]).reduce((a,m)=>a+(m.fantasy_points||0),0);
        const s        = slot();
        const isSelected = s.playerIds.includes(p.id);
        const stats    = calcStats();
        const cat      = (p.category||"").toLowerCase();
        const canAdd   = !isSelected && stats.count < 11 && !(stats.overseas>=4&&cat==="overseas");

        const history = (statsData||[]).map(m => {
          const big = m.fantasy_points >= 100;
          return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;">
            <span style="color:var(--text-faint)">M${m.match?.match_number||"#"}</span>
            <span style="color:${big?"var(--amber)":"#fff"};font-weight:600">${big?"🌟 ":""}${m.fantasy_points}pts</span>
          </div>`;
        }).join("") || '<p class="fp-empty">No match data.</p>';

        content.innerHTML = `
          <div style="text-align:center;padding:14px 0 10px">
            <img src="${photoUrl}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--amber-border);margin-bottom:8px" onerror="this.src='images/default-avatar.png'">
            <div style="font-weight:700;font-size:15px">${p.name}</div>
            <div style="font-size:11px;color:var(--text-faint);margin-top:3px">${p.role} · ${p.team_short_code} · ${p.credit}cr</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
            ${[["Season Pts",totalPts],["Selected",`${p.selected_by_percent??"-"}%`],["Matches",statsData?.length||0]].map(([l,v])=>`
              <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center">
                <div style="font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--amber)">${v}</div>
                <div style="font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.3px">${l}</div>
              </div>`).join("")}
          </div>
          <div style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Match History</div>
          ${history}
          <button onclick="profileToggle('${p.id}')"
            style="width:100%;height:42px;margin-top:12px;border-radius:9px;font-family:var(--font-display);font-size:13px;font-weight:900;text-transform:uppercase;cursor:pointer;background:${isSelected?"var(--amber-dim)":"rgba(154,224,0,0.08)"};border:1.5px solid ${isSelected?"var(--amber-border)":"rgba(154,224,0,0.25)"};color:${isSelected?"var(--amber)":"var(--accent)"}" ${!isSelected&&!canAdd?"disabled":""}>
            ${isSelected?"− Remove from XI":"+ Add to XI"}
          </button>`;
      } catch(e) { content.innerHTML='<p class="fp-empty">Failed to load.</p>'; }
    };

    window.closeProfile = e => {
      if (e && e.target !== document.getElementById("fpProfileOverlay")) return;
      document.getElementById("fpProfileOverlay")?.classList.add("hidden");
    };

    window.profileToggle = id => {
      document.getElementById("fpProfileOverlay")?.classList.add("hidden");
      setTimeout(() => togglePlayer(id), 150);
    };

    /* ═══════════════════════════════════════════════
       VIEW MANAGEMENT
    ═══════════════════════════════════════════════ */
    function updateViewUI() {
      const myxi = document.getElementById("fpMyXIView");
      const pool = document.getElementById("fpPoolView");
      const btnM = document.getElementById("fpBtnMyXI");
      const btnP = document.getElementById("fpBtnPool");
      const roleBar = document.getElementById("fpRoleBar");
      const searchRow = document.getElementById("fpSearchRow");

      if (activeView === "myxi") {
        myxi.style.display = "block";
        pool.style.display = "none";
        btnM.classList.add("active");
        btnP.classList.remove("active");
        roleBar.style.display = "none";
        searchRow.style.display = "none";
        renderMyXI(calcStats());
      } else {
        myxi.style.display = "none";
        pool.style.display = "block";
        btnM.classList.remove("active");
        btnP.classList.add("active");
        roleBar.style.display = "flex";
        searchRow.style.display = "flex";
        renderPool(calcStats());
      }
    }

    /* ═══════════════════════════════════════════════
       FILTER SHEETS
    ═══════════════════════════════════════════════ */
    function openFilterSheet(type) {
      closeFilterSheet();
      if (type === "teams") {
        renderTeamGrid();
        document.getElementById("fpTeamSheet").classList.add("show");
      } else {
        renderMatchFilter();
        document.getElementById("fpMatchSheet").classList.add("show");
      }
      document.getElementById("fpFilterBackdrop").classList.add("show");
    }

    window.closeFilterSheet = () => {
      ["fpTeamSheet","fpMatchSheet"].forEach(id => document.getElementById(id)?.classList.remove("show"));
      document.getElementById("fpFilterBackdrop")?.classList.remove("show");
      render();
    };

    function renderTeamGrid() {
      const grid = document.getElementById("fpTeamGrid");
      if (!grid) return;
      const bucket = supabase.storage.from("team-logos");
      const ids = [...new Set(allPlayers.map(p=>p.real_team_id))];
      grid.innerHTML = ids.map(tid => {
        const t = realTeamsMap[tid]||{name:"Unknown",short_code:"?"};
        const logo = t.photo_name ? bucket.getPublicUrl(t.photo_name).data.publicUrl : "";
        const sel  = filters.teams.includes(tid);
        return `<div class="fp-team-card ${sel?"selected":""}" onclick="toggleTeamFilter('${tid}', this)">
          <div class="fp-team-logo" style="background-image:url('${logo}')"></div>
          <span class="fp-team-name">${t.short_code}</span>
        </div>`;
      }).join("");
    }

    function renderMatchFilter() {
      const list = document.getElementById("fpMatchFilterList");
      if (!list) return;
      const bucket = supabase.storage.from("team-logos");
      list.innerHTML = allMatches.map(m => {
        const sel  = filters.matches.includes(m.id);
        const logoA = m.team_a?.photo_name ? bucket.getPublicUrl(m.team_a.photo_name).data.publicUrl : "";
        const logoB = m.team_b?.photo_name ? bucket.getPublicUrl(m.team_b.photo_name).data.publicUrl : "";
        const d = new Date(m.actual_start_time);
        const dt = d.toLocaleDateString("en-GB",{day:"numeric",month:"short"}) + " " + d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
        return `<div class="fp-match-card ${sel?"selected":""}" onclick="toggleMatchFilter('${m.id}', this)">
          <div class="fp-match-card-top"><span>Match ${m.match_number}</span><span style="color:var(--text-faint);font-size:9px">${dt}</span></div>
          <div class="fp-match-card-teams">
            <div class="fp-mct-logo" style="background-image:url('${logoA}')"></div>
            <span>${m.team_a?.short_code}</span>
            <span class="fp-mct-vs">vs</span>
            <span>${m.team_b?.short_code}</span>
            <div class="fp-mct-logo" style="background-image:url('${logoB}')"></div>
          </div>
        </div>`;
      }).join("");
    }

    window.toggleTeamFilter = (id, el) => {
      if (filters.teams.includes(id)) { filters.teams = filters.teams.filter(x=>x!==id); el.classList.remove("selected"); }
      else { filters.teams.push(id); el.classList.add("selected"); }
      document.getElementById("fpFilterTeam")?.classList.toggle("active-filter", filters.teams.length>0);
    };

    window.toggleMatchFilter = (id, el) => {
      if (filters.matches.includes(id)) { filters.matches = filters.matches.filter(x=>x!==id); el.classList.remove("selected"); }
      else { filters.matches.push(id); el.classList.add("selected"); }
      document.getElementById("fpFilterMatch")?.classList.toggle("active-filter", filters.matches.length>0);
    };

    window.clearFilter = key => {
      filters[key] = [];
      if (key==="teams") { renderTeamGrid(); document.getElementById("fpFilterTeam")?.classList.remove("active-filter"); }
      else { renderMatchFilter(); document.getElementById("fpFilterMatch")?.classList.remove("active-filter"); }
    };

    /* ═══════════════════════════════════════════════
       EVENTS INIT
    ═══════════════════════════════════════════════ */
    function initEvents() {
      // Pool list events
      document.getElementById("fpPoolList")?.addEventListener("click", e => {
        const btn = e.target.closest("button[data-action]");
        if (!btn || btn.disabled) return;
        if (btn.dataset.action === "toggle") togglePlayer(btn.dataset.id);
      });

      // My XI list events
      document.getElementById("fpMyXIList")?.addEventListener("click", e => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;
        if (btn.dataset.action==="toggle") togglePlayer(btn.dataset.id);
        else if (btn.dataset.action==="C")  setRole(btn.dataset.id,"C");
        else if (btn.dataset.action==="VC") setRole(btn.dataset.id,"VC");
      });

      // View toggle
      document.getElementById("fpBtnMyXI")?.addEventListener("click", () => { activeView="myxi"; updateViewUI(); });
      document.getElementById("fpBtnPool")?.addEventListener("click", () => { activeView="pool"; updateViewUI(); });

      // Role tabs
      document.querySelectorAll(".fp-role-tab[data-role]").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".fp-role-tab").forEach(t=>t.classList.remove("active"));
          tab.classList.add("active");
          filters.role = tab.dataset.role;
          filters.search = "";
          const si = document.getElementById("fpSearch");
          if (si) si.value = "";
          renderPool(calcStats());
        });
      });

      // Search
      let searchTimer;
      document.getElementById("fpSearch")?.addEventListener("input", e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          filters.search = e.target.value.toLowerCase().trim();
          renderPool(calcStats());
        }, 200);
      });

      // Filter buttons
      document.getElementById("fpFilterTeam")?.addEventListener("click", () => openFilterSheet("teams"));
      document.getElementById("fpFilterMatch")?.addEventListener("click", () => openFilterSheet("matches"));
      document.getElementById("fpFilterBackdrop")?.addEventListener("click", closeFilterSheet);

      // Bottom bar
      document.getElementById("fpNextBtn")?.addEventListener("click", lockAndAdvance);
      document.getElementById("fpResetBtn")?.addEventListener("click", resetMatch);
      document.getElementById("fpSummaryBtn")?.addEventListener("click", openSummary);
      document.getElementById("fpSummaryBackdrop")?.addEventListener("click", closeSummary);
    }

    /* ═══════════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════════ */
    function el(tag, cls, text) {
      const e = document.createElement(tag);
      e.className = cls;
      if (text) e.textContent = text;
      return e;
    }

    function setTxt(id, val, cls) {
      const e = document.getElementById(id);
      if (!e) return;
      e.textContent = val;
      if (cls !== undefined) e.className = `fp-stat-val ${cls}`;
    }

    function showEmpty(msg) {
      document.getElementById("fpContent").innerHTML = `<p class="fp-empty">${msg}</p>`;
    }

    function toast(msg, type="success") {
      const c = document.getElementById("fpToastContainer");
      if (!c) return;
      const t = document.createElement("div");
      t.className = `fp-toast ${type}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity="0"; t.style.transform="translateY(6px)"; setTimeout(()=>t.remove(),350); }, 3000);
    }

    function showConfirm(title, text) {
      return new Promise(resolve => {
        const overlay = document.getElementById("fpConfirmOverlay");
        document.getElementById("fpConfirmTitle").textContent = title;
        document.getElementById("fpConfirmText").textContent  = text;
        overlay.classList.remove("hidden");
        const done = val => {
          overlay.classList.add("hidden");
          document.getElementById("fpConfirmCancelBtn").onclick = null;
          document.getElementById("fpConfirmApplyBtn").onclick  = null;
          resolve(val);
        };
        document.getElementById("fpConfirmCancelBtn").onclick = () => done(false);
        document.getElementById("fpConfirmApplyBtn").onclick  = () => done(true);
      });
    }

  </script>
</body>
</html>
