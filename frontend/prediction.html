<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cricket Expert · Fun Zone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/prediction.css" />
    <link rel="stylesheet" href="css/bottom-nav.css" />
</head>
<body>
<div class="prediction-page">
    <div class="scroll-content">
        
        <header class="fun-header">
            <div class="header-left">
                <h1 class="theme-title">Fun Zone 🎯</h1>
            </div>
            <div class="score-pill"><span id="userStarCount">0 ⭐</span></div>
        </header>

        <section class="prediction-container card">
            <div id="predictionArea">
                <p style="text-align:center; color:#888;">Loading Match...</p>
            </div>
            <div id="postMatchSummary"></div>
        </section>

        <div id="podiumSection" class="podium-stack">
            
            <div class="podium-box">
                <div class="mini-label">MATCH HEROES</div>
                <div id="playerPodium" class="podium-grid"></div>
                <button class="comment-btn" onclick="openPodiumComments('players')">💬 View Comments</button>
            </div>
            
            <div class="podium-box">
                <div class="mini-label">MATCH EXPERTS</div>
                <div id="userPodium" class="podium-grid"></div>
                <button class="comment-btn" onclick="openPodiumComments('users')">💬 View Comments</button>
            </div>

            
            
        </div>
        
    </div>

    <nav class="bottom-nav">
        <a href="home.html"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="fixtures.html"><i class="fas fa-calendar-check"></i><span>Fixtures</span></a>
        <a href="prediction.html" class="active"><i class="fas fa-bolt"></i><span>Fun</span></a>
        <a href="more.html"><i class="fas fa-bars"></i><span>More</span></a>
    </nav>
</div>

<script type="module" src="prediction.js"></script>
</body>
</html>
