<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PPL 2026 – CricExp</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root{--accent:#9AE000;--accent-dim:rgba(154,224,0,0.09);--accent-glow:rgba(154,224,0,0.28);--accent-2:#00f2ff;--accent-2-dim:rgba(0,242,255,0.07);--bg-page:#020617;--bg-card:#0d1625;--bg-card-alt:#111e30;--bg-elevated:#0d1a2d;--border:rgba(255,255,255,0.07);--border-card:rgba(255,255,255,0.10);--border-accent:rgba(154,224,0,0.22);--text-primary:#f0f4f8;--text-dim:#94a3b8;--text-faint:#64748b;--red:#ef4444;--orange:#fb923c;--gold:#f59e0b;--font-display:'Barlow Condensed',sans-serif;--font-body:'DM Sans',sans-serif;--card-radius:18px;--card-radius-sm:12px;--btn-radius:12px;--pill-radius:20px;--ease-out:cubic-bezier(0.4,0,0.2,1);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg-page);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;-webkit-tap-highlight-color:transparent;background-image:radial-gradient(ellipse at top left,rgba(0,242,255,0.05) 0%,transparent 55%),radial-gradient(ellipse at bottom right,rgba(154,224,0,0.04) 0%,transparent 55%);background-attachment:fixed;}
    @keyframes pageFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 6px var(--accent-glow)}50%{box-shadow:0 0 18px var(--accent-glow)}}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.35}}
    .fade-in{animation:pageFadeIn .35s var(--ease-out) both;}
    .fade-in-1{animation:pageFadeIn .35s var(--ease-out) .08s both;}
    .fade-in-2{animation:pageFadeIn .35s var(--ease-out) .16s both;}
    .page-wrap{max-width:480px;margin:0 auto;padding:0 0 48px;}
    .site-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;position:sticky;top:0;z-index:200;background:rgba(2,6,23,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulseGlow 2.5s ease-in-out infinite;}
    .logo-text{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--text-primary);letter-spacing:1px;text-transform:uppercase;}
    .logo-text .ce{color:var(--accent);}
    .back-btn{background:var(--accent-dim);color:var(--accent);border:1px solid var(--border-accent);padding:7px 14px;border-radius:var(--btn-radius);font-family:var(--font-display);font-size:13px;font-weight:800;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
    .t-hero{margin:14px 14px 0;background:var(--bg-card);border:1px solid rgba(0,242,255,.22);border-radius:var(--card-radius);padding:20px 18px 18px;position:relative;overflow:hidden;}
    .t-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-2);border-radius:var(--card-radius) var(--card-radius) 0 0;}
    .t-hero-flag{font-size:36px;margin-bottom:10px;}
    .t-hero-name{font-family:var(--font-display);font-size:30px;font-weight:900;text-transform:uppercase;color:var(--text-primary);letter-spacing:.3px;}
    .t-hero-sub{font-size:12px;color:var(--text-faint);margin-top:4px;}
    .ended-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(100,116,139,.1);color:var(--text-faint);border:1px solid rgba(100,116,139,.2);border-radius:var(--pill-radius);padding:4px 12px;font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-top:12px;}
    .nav-tabs{display:flex;gap:0;margin:14px 14px 0;background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius-sm);padding:4px;overflow-x:auto;scrollbar-width:none;}
    .nav-tabs::-webkit-scrollbar{display:none;}
    .nav-tab{flex:1;padding:9px 10px;border-radius:9px;font-family:var(--font-display);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;border:none;background:transparent;color:var(--text-faint);cursor:pointer;white-space:nowrap;text-align:center;transition:background .2s,color .2s;}
    .nav-tab.active{background:var(--bg-card-alt);color:var(--text-primary);}
    .panel{display:none;padding:0 14px;margin-top:18px;}
    .panel.active{display:block;}
    .section-title{font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;}
    /* POINTS TABLE */
    .pts-table{width:100%;border-collapse:collapse;}
    .pts-table thead tr{border-bottom:1px solid var(--border);}
    .pts-table th{font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;padding:0 8px 10px;text-align:center;}
    .pts-table th:first-child{text-align:left;}
    .pts-row{border-bottom:1px solid var(--border);}
    .pts-row:last-child{border-bottom:none;}
    .pts-row td{padding:10px 8px;font-size:12px;color:var(--text-primary);text-align:center;}
    .pts-row td:first-child{text-align:left;}
    .pts-team{font-family:var(--font-display);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.2px;}
    .pts-nrr{font-size:11px;color:var(--text-faint);}
    .pts-wrap{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius-sm);overflow:hidden;}
    /* MATCH CARDS */
    .match-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius-sm);padding:13px 14px;margin-bottom:10px;}
    .match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .match-num{font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;}
    .match-date{font-size:11px;color:var(--text-faint);}
    .match-teams{display:flex;align-items:center;justify-content:space-between;}
    .match-team{flex:1;text-align:center;}
    .match-team-name{font-family:var(--font-display);font-size:15px;font-weight:900;color:var(--text-primary);text-transform:uppercase;}
    .match-score{font-size:11px;color:var(--text-dim);margin-top:2px;}
    .match-vs{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-faint);}
    .match-result{margin-top:8px;font-size:11px;color:var(--accent-2);font-weight:600;}
    /* PLAYERS */
    .player-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg-card);border-bottom:1px solid var(--border);}
    .player-row:last-child{border-bottom:none;}
    .player-rank{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--text-faint);width:24px;flex-shrink:0;}
    .player-rank.gold{color:var(--gold);}
    .player-rank.silver{color:#94a3b8;}
    .player-rank.bronze{color:#b45309;}
    .player-info{flex:1;}
    .player-name{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--text-primary);text-transform:uppercase;}
    .player-team{font-size:11px;color:var(--text-faint);margin-top:1px;}
    .player-stat{font-family:var(--font-display);font-size:15px;font-weight:900;color:var(--accent);flex-shrink:0;}
    .players-wrap{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius-sm);overflow:hidden;}
    .stat-filter{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
    .stat-filter::-webkit-scrollbar{display:none;}
    .sf-btn{padding:5px 14px;border-radius:var(--pill-radius);font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border:1px solid var(--border-card);background:transparent;color:var(--text-faint);cursor:pointer;white-space:nowrap;transition:background .2s,border-color .2s,color .2s;}
    .sf-btn.active{background:var(--accent-2-dim);border-color:rgba(0,242,255,.25);color:var(--accent-2);}
    .skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:400px 100%;animation:shimmer 1.6s ease-in-out infinite;border-radius:8px;}
    .empty-msg{color:var(--text-faint);font-size:13px;padding:20px 0;text-align:center;}
    .site-footer{margin-top:36px;padding:20px 18px 28px;border-top:1px solid var(--border);text-align:center;}
    .footer-copy{font-size:11px;color:var(--text-faint);}
  </style>
</head>
<body>
<div class="page-wrap">

  <header class="site-header fade-in">
    <a href="/" class="logo"><div class="logo-dot"></div><div class="logo-text">Cric<span class="ce">Exp</span></div></a>
    <div><a href="/" class="back-btn"><i class="fa-solid fa-arrow-left" style="font-size:11px"></i> Home</a></div>
  </header>

  <div class="t-hero fade-in-1">
    <div class="t-hero-flag">🏆</div>
    <div class="t-hero-name" id="heroName">PPL 2026</div>
    <div class="t-hero-sub" id="heroSub">Local tournament · Live scoring · Fantasy</div>
    <div class="ended-badge" id="heroBadge"><i class="fa-solid fa-flag-checkered" style="font-size:10px"></i> Season Ended</div>
  </div>

  <div class="nav-tabs fade-in-1">
    <button class="nav-tab active" data-tab="points">Points Table</button>
    <button class="nav-tab" data-tab="matches">Matches</button>
    <button class="nav-tab" data-tab="players">Players</button>
    <button class="nav-tab" data-tab="fantasy">Fantasy</button>
  </div>

  <!-- POINTS TABLE -->
  <div class="panel active" id="tab-points">
    <div id="pointsContent">
      <div style="padding:20px 0;display:flex;flex-direction:column;gap:8px;">
        <div class="skel" style="height:44px;border-radius:var(--card-radius-sm)"></div>
        <div class="skel" style="height:44px;border-radius:var(--card-radius-sm)"></div>
        <div class="skel" style="height:44px;border-radius:var(--card-radius-sm)"></div>
      </div>
    </div>
  </div>

  <!-- MATCHES -->
  <div class="panel" id="tab-matches">
    <div id="matchesContent">
      <div style="padding:20px 0;display:flex;flex-direction:column;gap:10px;">
        <div class="skel" style="height:90px;border-radius:var(--card-radius-sm)"></div>
        <div class="skel" style="height:90px;border-radius:var(--card-radius-sm)"></div>
      </div>
    </div>
  </div>

  <!-- PLAYERS -->
  <div class="panel" id="tab-players">
    <div class="stat-filter">
      <button class="sf-btn active" data-stat="runs">Runs</button>
      <button class="sf-btn" data-stat="wickets">Wickets</button>
      <button class="sf-btn" data-stat="sr">Strike Rate</button>
    </div>
    <div id="playersContent">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="skel" style="height:50px;border-radius:var(--card-radius-sm)"></div>
        <div class="skel" style="height:50px;border-radius:var(--card-radius-sm)"></div>
        <div class="skel" style="height:50px;border-radius:var(--card-radius-sm)"></div>
      </div>
    </div>
  </div>

  <!-- FANTASY -->
  <div class="panel" id="tab-fantasy">
    <div id="fantasyContent">
      <div class="empty-msg">Loading fantasy leaderboard…</div>
    </div>
  </div>

  <footer class="site-footer">
    <p class="footer-copy">CricExp · PPL 2026 · Local Tournament</p>
  </footer>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/+esm";

const sb = createClient(
  "https://tuvqgcosbweljslbfgqc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo"
);

// Tab switching
document.querySelectorAll(".nav-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
  });
});

// Stat filter
document.querySelectorAll(".sf-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sf-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadPlayers(btn.dataset.stat);
  });
});

// Load tournament info
const { data: localT } = await sb.from("local_tournaments").select("*").eq("slug","ppl-2026").single();
if (localT) {
  document.getElementById("heroName").textContent = localT.name || "PPL 2026";
  document.getElementById("heroSub").textContent = `${localT.format || "T6"} · ${localT.total_teams || 8} teams · Local tournament`;
  if (localT.status !== "completed") {
    document.getElementById("heroBadge").innerHTML = localT.status === "ongoing"
      ? `<span style="width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;animation:livePulse 1.4s infinite"></span> Live`
      : "Upcoming";
  }
}

await Promise.all([loadPointsTable(), loadMatches(), loadPlayers("runs"), loadFantasy()]);

async function loadPointsTable() {
  const { data } = await sb.from("ppl_points_table")
    .select("*, ppl_teams(name, short_name)")
    .order("points", { ascending: false });

  const el = document.getElementById("pointsContent");
  if (!data?.length) { el.innerHTML = `<div class="empty-msg">No points table data yet.</div>`; return; }

  const rows = data.map((t, i) => {
    const q = i < 4 ? `style="border-left:3px solid var(--accent)"` : "";
    return `<tr class="pts-row" ${q}>
      <td><div class="pts-team">${t.ppl_teams?.short_name || t.team_id}</div></td>
      <td>${t.played||0}</td><td>${t.won||0}</td><td>${t.lost||0}</td>
      <td><strong>${t.points||0}</strong></td>
      <td class="pts-nrr">${t.nrr>=0?'+':''}${(t.nrr||0).toFixed(3)}</td>
    </tr>`;
  }).join("");

  el.innerHTML = `<div class="pts-wrap">
    <table class="pts-table">
      <thead><tr><th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th><th>NRR</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <p style="font-size:10px;color:var(--text-faint);margin-top:8px">Top 4 qualify for knockouts</p>`;
}

async function loadMatches() {
  const { data } = await sb.from("ppl_matches")
    .select("*, team1:ppl_teams!team1_id(name,short_name), team2:ppl_teams!team2_id(name,short_name)")
    .order("match_number", { ascending: true });

  const el = document.getElementById("matchesContent");
  if (!data?.length) { el.innerHTML = `<div class="empty-msg">No matches found.</div>`; return; }

  el.innerHTML = data.map(m => {
    const date = new Date(m.match_date).toLocaleDateString("en-IN",{day:"numeric",month:"short"});
    const t1score = m.team1_score ? `${m.team1_score}/${m.team1_wickets||0} (${m.team1_overs||0} ov)` : "—";
    const t2score = m.team2_score ? `${m.team2_score}/${m.team2_wickets||0} (${m.team2_overs||0} ov)` : "—";
    return `<div class="match-card">
      <div class="match-top">
        <span class="match-num">${m.stage||'Group'} · Match ${m.match_number}</span>
        <span class="match-date">${date} · ${m.venue||''}</span>
      </div>
      <div class="match-teams">
        <div class="match-team">
          <div class="match-team-name">${m.team1?.short_name||'—'}</div>
          <div class="match-score">${t1score}</div>
        </div>
        <div class="match-vs">VS</div>
        <div class="match-team">
          <div class="match-team-name">${m.team2?.short_name||'—'}</div>
          <div class="match-score">${t2score}</div>
        </div>
      </div>
      ${m.result ? `<div class="match-result">🏆 ${m.result}</div>` : ''}
    </div>`;
  }).join("");
}

async function loadPlayers(stat) {
  let query = sb.from("ppl_player_stats")
    .select("*, ppl_players(name, ppl_teams(short_name))");

  if (stat === "runs")    query = query.order("total_runs", { ascending:false });
  if (stat === "wickets") query = query.order("total_wickets", { ascending:false });
  if (stat === "sr")      query = query.order("strike_rate", { ascending:false });

  const { data } = await query.limit(20);
    const el = document.getElementById("playersContent");
  if (!data?.length) { el.innerHTML = `<div class="empty-msg">No player stats yet.</div>`; return; }

  const rankColors = ['gold','silver','bronze'];
  const statVal = r => {
    if (stat === "runs")    return `${r.total_runs||0} runs`;
    if (stat === "wickets") return `${r.total_wickets||0} wkts`;
    if (stat === "sr")      return `${(r.strike_rate||0).toFixed(1)} SR`;
    return "—";
  };

  el.innerHTML = `<div class="players-wrap">` + data.map((r, i) => {
    const rc = i < 3 ? rankColors[i] : '';
    return `<div class="player-row">
      <div class="player-rank ${rc}">${i+1}</div>
      <div class="player-info">
        <div class="player-name">${r.ppl_players?.name || "Player"}</div>
        <div class="player-team">${r.ppl_players?.ppl_teams?.short_name || ""}</div>
      </div>
      <div class="player-stat">${statVal(r)}</div>
    </div>`;
  }).join("") + `</div>`;
}

async function loadFantasy() {
  const { data: { session } } = await sb.auth.getSession();
  const el = document.getElementById("fantasyContent");

  const { data } = await sb.from("ppl_fantasy_scores")
    .select("user_id, total_points, rank, user_profiles(full_name)")
    .order("rank", { ascending: true })
    .limit(30);

  if (!data?.length) { el.innerHTML = `<div class="empty-msg">No fantasy data yet.</div>`; return; }

  const userId = session?.user?.id;
  let myCard = "";
  if (userId) {
    const mine = data.find(r => r.user_id === userId);
    if (mine) {
      myCard = `<div style="background:linear-gradient(135deg,var(--bg-card),rgba(0,242,255,.03));border:1px solid rgba(0,242,255,.2);border-radius:var(--card-radius-sm);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;">
        <div style="font-size:28px">🏆</div>
        <div>
          <div style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px">Your Rank</div>
          <div style="font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--accent-2)">#${mine.rank}</div>
          <div style="font-size:11px;color:var(--text-dim)">${mine.total_points} points</div>
        </div>
      </div>`;
    }
  }

  const rankColors = ['gold','silver','bronze'];
  const rows = data.map((r, i) => {
    const rc = i < 3 ? rankColors[i] : '';
    return `<tr class="lb-row" style="background:var(--bg-card);border-bottom:1px solid var(--border)">
      <td style="padding:11px 12px;font-family:var(--font-display);font-size:13px;font-weight:800;color:${rc==='gold'?'var(--gold)':rc==='silver'?'#94a3b8':rc==='bronze'?'#b45309':'var(--text-faint)'}">${r.rank||i+1}</td>
      <td style="padding:11px 12px;font-size:13px;color:var(--text-primary);font-weight:600">${r.user_profiles?.full_name || "Player"}</td>
      <td style="padding:11px 12px;text-align:right;font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--accent-2)">${r.total_points??0}</td>
    </tr>`;
  }).join("");

  el.innerHTML = `${myCard}
    <div style="background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius-sm);overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.6px;padding:0 12px 10px;text-align:left">#</th>
          <th style="font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.6px;padding:0 12px 10px;text-align:left">Player</th>
          <th style="font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.6px;padding:0 12px 10px;text-align:right">Pts</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
