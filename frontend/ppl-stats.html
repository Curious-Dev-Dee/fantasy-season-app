<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 | Player Stats</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/bottom-nav.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script type="module" src="auth-guard.js"></script>

  <style>
    /* ── TABS ── */
    .xi-toggle { display: flex; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 4px; gap: 4px; margin: 12px 16px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
    .xi-toggle::-webkit-scrollbar { display: none; }
    .xi-tab { flex: 1; min-width: max-content; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 12px; border-radius: 9px; border: none; background: transparent; color: rgba(255, 255, 255, 0.38); font-family: var(--font-display); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: var(--transition); }
    .xi-tab.active { background: var(--accent); color: #000; box-shadow: 0 2px 10px var(--accent-glow); }

    /* ── SEARCH ── */
    .search-wrapper { padding: 0 16px 12px; }
    .stats-search-input { width: 100%; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text-primary); border-radius: 12px; padding: 12px 16px; font-family: var(--font-body); font-size: 14px; transition: var(--transition); outline: none; }
    .stats-search-input:focus { border-color: var(--border-accent); background: var(--bg-card); }
    .stats-search-input::placeholder { color: var(--text-faint); }

    /* ── STATS CARDS ── */
    .stats-list-container { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
    
    .stat-row { display: flex; align-items: center; background: var(--bg-card); padding: 14px 16px; border-radius: var(--card-radius-sm); border: 1px solid var(--border); transition: var(--transition); gap: 12px; cursor: pointer; }
    .stat-row:active { transform: scale(0.98); }
    .stat-row:hover { background: var(--bg-card-alt); }
    
    .sr-rank { font-family: var(--font-display); font-weight: 900; color: var(--text-faint); width: 24px; font-size: 15px; text-align: center; flex-shrink: 0; }
    
    .sr-top1 { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.03); }
    .sr-top1 .sr-rank { color: var(--gold); }
    .sr-top2 .sr-rank { color: var(--text-dim); }
    .sr-top3 .sr-rank { color: #b45309; }

    .sr-player { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .sr-name { font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-team { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .sr-stats { display: flex; gap: 16px; align-items: center; flex-shrink: 0; }
    .sr-stat-item { display: flex; flex-direction: column; align-items: center; min-width: 26px; }
    .sr-stat-val { font-family: var(--font-display); font-weight: 800; font-size: 16px; color: var(--text-primary); }
    .sr-stat-val.highlight { color: var(--accent); font-size: 19px; font-weight: 900; text-shadow: 0 0 8px var(--accent-glow); }
    .sr-stat-lbl { font-family: var(--font-body); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .empty { text-align: center; color: var(--text-faint); padding: 40px 20px; font-size: 13px; line-height: 1.6; }
    .loading { text-align: center; color: var(--text-faint); padding: 50px 0; font-size: 13px; }

    /* ── SKELETON ── */
    #skeletonScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-page); z-index: 999; padding: 16px; transition: opacity 0.2s ease, visibility 0s 0.2s; visibility: visible; }
    #skeletonScreen.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    .sk-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 2px 16px; }
    .sk-block { background: linear-gradient(90deg, var(--border-card) 25%, var(--border) 50%, var(--border-card) 75%); background-size: 200% 100%; animation: skShimmer 1.4s infinite; display: block; border-radius: 8px; }
    @keyframes skShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="loading-state">

<div id="skeletonScreen">
  <div class="sk-header">
    <div class="sk-block" style="width:32px;height:32px;"></div>
    <div class="sk-block" style="width:120px;height:20px;"></div>
    <div class="sk-block" style="width:32px;height:32px;"></div>
  </div>
  <div class="sk-block" style="height:44px;margin:12px 0;"></div>
  <div class="sk-block" style="height:44px;margin-bottom:16px;"></div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="sk-block" style="height:64px;"></div>
    <div class="sk-block" style="height:64px;"></div>
    <div class="sk-block" style="height:64px;"></div>
    <div class="sk-block" style="height:64px;"></div>
  </div>
</div>

<div class="app-container page-with-nav">

  <header class="app-header">
    <a href="ppl-home.html" class="icon-back" aria-label="Go Back">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-center" style="flex:1;text-align:center;">
      <h1 class="page-title" style="margin:0;font-family:var(--font-display);font-size:20px;font-weight:900;text-transform:uppercase;color:var(--text-primary);">📊 Player Stats</h1>
    </div>
    <div style="width:36px"></div>
  </header>

  <div class="xi-toggle">
    <button class="xi-tab active" data-tab="batting">🏏 Batting</button>
    <button class="xi-tab" data-tab="bowling">🎳 Bowling</button>
    <button class="xi-tab" data-tab="fielding">🧤 Fielding</button>
    <button class="xi-tab" data-tab="fantasy">⚡ Fantasy</button>
  </div>

  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search player or team..." autocomplete="off" spellcheck="false" class="stats-search-input">
  </div>

  <main id="statsContent" class="stats-list-container">
    <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading stats...</div>
  </main>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="ppl-home.html"><i class="fas fa-house"></i><span>Home</span></a>
  <a class="nav-item" href="ppl-fixtures.html"><i class="fas fa-calendar-days"></i><span>Fixtures</span></a>
  <a class="nav-item" href="ppl-live.html" class="nav-match-center" id="navMatchesBtn">
    <div class="nav-icon-stack">
      <i class="fas fa-cricket-bat-ball" id="navMatchIcon"></i>
      <span class="nav-live-dot hidden" id="navLiveDot"></span>
    </div>
    <span class="nav-label" id="navMatchLabel">Scores</span>
  </a>
  <a class="nav-item active" href="ppl-stats.html"><i class="fas fa-chart-bar"></i><span>Stats</span></a>
  <a class="nav-item" href="ppl-team-view.html"><i class="fas fa-bolt"></i><span>Fantasy</span></a>
</nav>

<script type="module" src="ppl-stats.js"></script>

</body>
</html>
