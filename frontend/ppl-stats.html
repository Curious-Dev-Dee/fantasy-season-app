<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 | Player Stats</title>

  <!-- Core Platform Theme & Tokens -->
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/bottom-nav.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script type="module" src="auth-guard.js"></script>

  <style>
    /* ── BASE STRUCTURE ── */
    body { margin: 0; font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); }
    .app-container { max-width: 480px; margin: 0 auto; padding-bottom: 100px; min-height: 100vh; position: relative; }
    
    /* ── HEADER ── */
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .icon-back { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid var(--border-card); color: var(--text-primary); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 14px; flex-shrink: 0; transition: var(--transition); }
    .page-title { margin: 0; font-family: var(--font-display); font-size: 20px; font-weight: 900; text-transform: uppercase; color: var(--text-primary); }

    /* ── TABS ── */
    .xi-toggle { display: flex; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 4px; gap: 4px; margin: 12px 16px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
    .xi-toggle::-webkit-scrollbar { display: none; }
    .xi-tab { flex: 1; min-width: max-content; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 12px; border-radius: 9px; border: none; background: transparent; color: rgba(255, 255, 255, 0.38); font-family: var(--font-display); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: var(--transition); }
    .xi-tab.active { background: var(--accent); color: #000; box-shadow: 0 2px 10px var(--accent-glow); }
    .xi-tab i { font-size: 14px; }

    /* ── SEARCH & NOTES ── */
    .search-wrapper { padding: 0 16px 12px; }
    .stats-search-input { width: 100%; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text-primary); border-radius: 12px; padding: 12px 16px; font-family: var(--font-body); font-size: 14px; transition: var(--transition); outline: none; }
    .stats-search-input:focus { border-color: var(--border-accent); background: var(--bg-card); }
    
    .info-note { background: rgba(56, 189, 248, 0.08); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 10px; padding: 12px; margin: 0 16px 16px; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
    .info-note i { color: #38bdf8; margin-right: 6px; }
    .info-note b { color: var(--text-primary); }

    /* ── PODIUM LAYOUT ── */
    .podium-wrapper { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin: 10px 16px 30px; height: 170px; }
    .podium-step { display: flex; flex-direction: column; align-items: center; width: 32%; position: relative; }
    .podium-avatar { 
      width: 50px; height: 50px; border-radius: 50%; background-color: var(--bg-card-alt); 
      border: 2px solid var(--border); z-index: 2; margin-bottom: -10px;
      /* Default Silhouette */
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2364748b"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'); 
      background-size: cover; background-position: center; 
    }
    .step-1 .podium-avatar { width: 64px; height: 64px; border-color: var(--gold); border-width: 3px; margin-bottom: -12px; }
    .step-2 .podium-avatar { border-color: #cbd5e1; }
    .step-3 .podium-avatar { border-color: #b45309; }
    
    .podium-box { 
      width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-bottom: none; 
      border-radius: 12px 12px 0 0; display: flex; flex-direction: column; align-items: center; 
      padding: 16px 4px 8px; position: relative; 
    }
    .step-1 .podium-box { height: 110px; background: linear-gradient(to top, rgba(245,158,11,0.1), var(--bg-card)); border-color: rgba(245,158,11,0.3); }
    .step-2 .podium-box { height: 90px; background: linear-gradient(to top, rgba(255,255,255,0.05), var(--bg-card)); }
    .step-3 .podium-box { height: 75px; background: linear-gradient(to top, rgba(180,83,9,0.1), var(--bg-card)); border-color: rgba(180,83,9,0.2); }
    
    .podium-rank-badge { 
      position: absolute; top: -10px; width: 20px; height: 20px; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; font-family: var(--font-display); 
      font-size: 11px; font-weight: 900; background: var(--bg-page); border: 2px solid var(--border); 
    }
    .step-1 .podium-rank-badge { background: var(--gold); color: #000; border-color: var(--gold); width: 24px; height: 24px; font-size: 13px; top: -12px; }
    .step-2 .podium-rank-badge { background: #cbd5e1; color: #000; border-color: #cbd5e1; }
    .step-3 .podium-rank-badge { background: #b45309; color: #fff; border-color: #b45309; }
    
    .podium-name { font-size: 11px; font-weight: 700; text-align: center; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; margin-bottom: 2px; }
    .podium-stat { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--accent); line-height: 1; }
    .step-1 .podium-stat { font-size: 24px; }
    .podium-lbl { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* ── STATS CARDS (List) ── */
    .stats-list-container { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
    .stat-row { display: flex; align-items: center; background: var(--bg-card); padding: 14px 16px; border-radius: var(--card-radius-sm); border: 1px solid var(--border); transition: var(--transition); gap: 12px; cursor: pointer; }
    .stat-row:active { transform: scale(0.98); }
    .stat-row:hover { background: var(--bg-card-alt); }
    
    .sr-rank { font-family: var(--font-display); font-weight: 900; color: var(--text-faint); width: 24px; font-size: 15px; text-align: center; flex-shrink: 0; }
    .sr-player { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .sr-name { font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-team { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .sr-stats { display: flex; gap: 16px; align-items: center; flex-shrink: 0; }
    .sr-stat-item { display: flex; flex-direction: column; align-items: center; min-width: 26px; }
    .sr-stat-val { font-family: var(--font-display); font-weight: 800; font-size: 16px; color: var(--text-primary); }
    .sr-stat-val.highlight { color: var(--accent); font-size: 19px; font-weight: 900; text-shadow: 0 0 8px var(--accent-glow); }
    .sr-stat-lbl { font-family: var(--font-body); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .empty { text-align: center; color: var(--text-faint); padding: 40px 20px; font-size: 13px; line-height: 1.6; }
    .loading { text-align: center; color: var(--text-faint); padding: 50px 0; font-size: 13px; }

    /* ── SKELETON ── */
    #skeletonScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-page); z-index: 999; padding: 16px; transition: opacity 0.2s ease, visibility 0s 0.2s; visibility: visible; }
    #skeletonScreen.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    .sk-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 2px 16px; }
    .sk-block { background: linear-gradient(90deg, var(--border-card) 25%, var(--border) 50%, var(--border-card) 75%); background-size: 200% 100%; animation: skShimmer 1.4s infinite; display: block; border-radius: 8px; }
    @keyframes skShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="loading-state">

<!-- SKELETON SCREEN -->
<div id="skeletonScreen">
  <div class="sk-header">
    <div class="sk-block" style="width:32px;height:32px;"></div>
    <div class="sk-block" style="width:120px;height:20px;"></div>
    <div class="sk-block" style="width:32px;height:32px;"></div>
  </div>
  <div class="sk-block" style="height:44px;margin:12px 0;"></div>
  <div class="sk-block" style="height:44px;margin-bottom:16px;"></div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="sk-block" style="height:64px;"></div>
    <div class="sk-block" style="height:64px;"></div>
    <div class="sk-block" style="height:64px;"></div>
  </div>
</div>

<div class="app-container page-with-nav">

  <!-- HEADER -->
  <header class="app-header">
    <a href="ppl-home.html" class="icon-back" aria-label="Go Back">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div style="flex:1;text-align:center;">
      <h1 class="page-title">📊 Leaderboards</h1>
    </div>
    <div style="width:36px"></div>
  </header>

  <!-- TABS -->
  <div class="xi-toggle">
    <button class="xi-tab active" data-tab="batting"><i class="fas fa-cricket-bat-ball"></i> Batting</button>
    <button class="xi-tab" data-tab="bowling"><i class="fas fa-baseball"></i> Bowling</button>
    <button class="xi-tab" data-tab="mos"><i class="fas fa-trophy"></i> Series</button>
    <button class="xi-tab" data-tab="mom"><i class="fas fa-medal"></i> Matches</button>
    <button class="xi-tab" data-tab="fielding"><i class="fas fa-hands"></i> Fielding</button>
  </div>

  <!-- SEARCH & NOTES CONTAINER -->
  <div id="notesContainer"></div>
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search player or team..." autocomplete="off" spellcheck="false" class="stats-search-input">
  </div>

  <!-- LIST CONTAINER -->
  <main id="statsContent">
    <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading stats...</div>
  </main>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">

</nav>

<script type="module" src="ppl-stats.js"></script>

</body>
</html>
