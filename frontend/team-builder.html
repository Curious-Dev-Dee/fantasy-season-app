<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Team · Cricket Experts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/team-builder.css">
    <link rel="stylesheet" href="css/bottom-nav.css">
    <script type="module" src="auth-guard.js"></script>
</head>

<body class="loading-state">

<div id="loadingOverlay">
    <div class="cricket-loader-wrap">
        <div class="pitch-line"></div>
        <div class="cricket-ball"></div>
        <div class="bowler-pos">🏏</div>
    </div>
    <div class="loading-text">PREPARING DRAFT...</div>
</div>

<div class="app-container">
    <header class="edit-header">
        <div class="header-left">
            <a href="home.html" class="icon-back">←</a>
            <div class="header-info">
                <h1>Change Team</h1>
            </div>
        </div>

        <div class="header-right">
            <div id="upcomingMatchName" class="match-name">Loading Match...</div>
            <div id="headerCountdown" class="match-timer">00h 00m 00s</div>
        </div>
    </header>

    <div class="sticky-controls">
        <div class="premium-progress">
            <div class="progress-line-container">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="progress-labels">
                <div class="stat-group">
                    <span id="playerCountLabel">0</span><small>/11</small>
                </div>
                <div class="credit-subtext">
                    Credits: <strong id="creditCount">0</strong>/100
                </div>
                <div class="subs-text">
                    Subs: <strong id="subsRemainingLabel">...</strong>
                </div>
            </div>
        </div>

        <div class="view-tabs">
            <button class="toggle-btn" data-mode="myxi">MY XI</button>
            <button class="toggle-btn active" data-mode="playerPool">CHANGE</button>
        </div>

        <div class="search-filter-wrapper">
            <input type="text" id="playerSearch" placeholder="Search player name...">
            
            <div class="role-navigation-wrapper">
                <div class="role-tabs-container">
                    <div class="role-tab active" data-role="ALL">ALL</div>
                    <div class="role-tab" data-role="WK">WK <span class="role-count" id="count-WK"></span></div>
                    <div class="role-tab" data-role="BAT">BAT <span class="role-count" id="count-BAT"></span></div>
                    <div class="role-tab" data-role="AR">AR <span class="role-count" id="count-AR"></span></div>
                    <div class="role-tab" data-role="BOWL">BOWL <span class="role-count" id="count-BOWL"></span></div>
                    <div class="role-slider-bg"></div>
                </div>
            </div>

            <div class="dropdown-filters">
                <button id="matchToggle" class="pill-filter">
                    <span>Matches</span> <i class="fas fa-chevron-down"></i>
                </button>
                <button id="teamToggle" class="pill-filter">
                    <span>Teams</span> <i class="fas fa-chevron-down"></i>
                </button>
                <button id="creditToggle" class="pill-filter">
                    <span>Credits</span> <i class="fas fa-chevron-down"></i>
                </button>
            </div>
        </div>
    </div>

    <main class="content-area">
        <div id="myxi-view" class="view-mode">
            <div id="boosterContainer" class="booster-wrapper hidden">
                <label class="booster-label">
                    <input type="checkbox" id="boosterToggle">
                    <span class="booster-text">🚀 USE 2X MATCH BOOSTER</span>
                </label>
                <div class="booster-hint">Double your total points for this match!</div>
            </div>
            <div id="myXIList" class="player-list"></div>
        </div>

        <div id="playerPool-view" class="view-mode active">
            <div id="playerPoolList" class="player-list"></div>
        </div>
    </main>
</div>

<div class="save-bar">
    <button id="saveTeamBtn" class="save-btn" disabled>SAVE TEAM</button>
</div>

<div id="filterBackdrop" class="filter-backdrop hidden"></div>
<div id="matchMenu" class="dropdown-menu bottom-sheet"></div>
<div id="teamMenu" class="dropdown-menu bottom-sheet"></div>
<div id="creditMenu" class="dropdown-menu bottom-sheet"></div>

<script type="module" src="edit-team.js"></script>
</body>
</html>
