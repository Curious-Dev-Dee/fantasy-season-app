<body class="loading-state">

    <div id="loadingOverlay">
        <div class="cricket-loader-wrap">
            <div class="pitch-line"></div>
            <div class="cricket-ball"></div>
            <div class="bowler-pos">🏏</div>
        </div>
        <div class="loading-text">PREPARING DRAFT...</div>
    </div>

    <div class="app-container">
        <header class="edit-header">
            <div class="header-left">
                <a href="home.html" class="icon-back">←</a>
                <div class="header-info"><h1>Change Team</h1></div>
            </div>
            <div class="header-right">
                <div id="upcomingMatchName" class="match-name">Loading...</div>
                <div id="headerCountdown" class="match-timer">00h 00m 00s</div>
            </div>
        </header>

        <div class="sticky-controls">
            <div class="premium-progress">
                <div class="progress-line-container"><div id="progressFill" class="progress-fill"></div></div>
                <div class="progress-labels">
                    <div class="stat-group"><span id="playerCountLabel">0</span><small>/11</small></div>
                    <div class="credit-subtext">Credits: <strong id="creditCount">0</strong>/100</div>
                    <div class="subs-text">Subs: <strong id="subsRemainingLabel">...</strong></div>
                </div>
            </div>

            <div class="view-tabs">
                <button class="toggle-btn" data-mode="myxi">MY XI</button>
                <button class="toggle-btn active" data-mode="playerPool">CHANGE</button>
            </div>

            <div class="search-filter-wrapper">
                <input type="text" id="playerSearch" placeholder="Search player name...">
                
                <div class="role-navigation-wrapper">
                    <div class="role-tabs-container">
                        <div class="role-tab active" data-role="ALL">ALL</div>
                        <div class="role-tab" data-role="WK">WK <span class="role-count" id="count-WK"></span></div>
                        <div class="role-tab" data-role="BAT">BAT <span class="role-count" id="count-BAT"></span></div>
                        <div class="role-tab" data-role="AR">AR <span class="role-count" id="count-AR"></span></div>
                        <div class="role-tab" data-role="BOWL">BOWL <span class="role-count" id="count-BOWL"></span></div>
                        <div class="role-slider-bg"></div> </div>
                </div>

                <div class="dropdown-filters">
                    <button id="matchToggle" class="pill-filter"><i class="fas fa-calendar-alt"></i> <span>Matches</span></button>
                    <button id="teamToggle" class="pill-filter"><i class="fas fa-shield-alt"></i> <span>Teams</span></button>
                    <button id="creditToggle" class="pill-filter"><i class="fas fa-coins"></i> <span>Credits</span></button>
                </div>
            </div>
        </div>

        <main class="content-area">
            <div id="myxi-view" class="view-mode">
                <div id="myXIList" class="player-list"></div>
            </div>
            <div id="playerPool-view" class="view-mode active">
                <div id="playerPoolList" class="player-list"></div>
            </div>
        </main>
    </div>

    <div class="save-bar">
        <button id="saveTeamBtn" class="save-btn" disabled>SAVE TEAM</button>
    </div>

    <div id="filterBackdrop" class="filter-backdrop hidden"></div>
    <div id="matchMenu" class="dropdown-menu bottom-sheet"><div class="dropdown-header">Filter by Match</div><div class="dropdown-content" id="matchListContent"></div></div>
    <div id="teamMenu" class="dropdown-menu bottom-sheet"><div class="dropdown-header">Filter by Team</div><div class="dropdown-content" id="teamListContent"></div></div>
    <div id="creditMenu" class="dropdown-menu bottom-sheet"><div class="dropdown-header">Filter by Credits</div><div class="dropdown-content" id="creditListContent"></div></div>

    <script type="module" src="edit-team.js"></script>
</body>
