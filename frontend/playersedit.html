<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | Player Management</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #9AE000;
            --bg: #0c1117;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text); padding-bottom: 80px;
        }

        header {
            background: var(--card); padding: 20px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        h1 { margin: 0; font-size: 18px; font-weight: 800; color: var(--primary); text-transform: uppercase; }

        .search-container { padding: 15px; }
        #searchBox {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; color: white; outline: none;
        }

        .player-list { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        .player-item {
            background: var(--card); border-radius: 16px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border);
        }
        .player-item.inactive { opacity: 0.4; filter: grayscale(1); border-style: dashed; }
        
        .p-info strong { display: block; font-size: 15px; }
        .p-info span { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

        .actions { display: flex; gap: 8px; }
        .btn {
            border: none; padding: 8px 12px; border-radius: 8px; font-size: 11px;
            font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .edit-btn { background: rgba(154, 224, 0, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .del-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .fab {
            position: fixed; bottom: 20px; right: 20px; background: var(--primary);
            width: 56px; height: 56px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: #000;
            font-size: 24px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card); width: 100%; border-radius: 24px 24px 0 0;
            padding: 25px; max-height: 90vh; overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 5px; font-weight: 800; }
        input, select {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; color: white; font-size: 14px;
        }

        .save-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .close-form { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loader">
    <div style="text-align:center">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 32px; color: var(--primary)"></i>
        <p style="margin-top:10px; font-size:12px; font-weight:800; color:var(--primary)">SYNCING DATABASE...</p>
    </div>
</div>

<header>
    <h1>Player Manager</h1>
</header>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="🔍 Search name or team...">
</div>

<main class="player-list" id="playerList"></main>

<button class="fab" onclick="openAddForm()"><i class="fas fa-plus"></i></button>

<div class="modal" id="formModal">
    <div class="modal-content">
        <h2 id="formTitle" style="margin-top:0">Player Details</h2>
        <input type="hidden" id="editId">
        
        <div class="form-group">
            <label>NAME</label>
            <input type="text" id="fName">
        </div>
        
        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:1">
                <label>ROLE</label>
                <select id="fRole">
                    <option value="WK">WK</option><option value="BAT">BAT</option><option value="AR">AR</option><option value="BOWL">BOWL</option>
                </select>
            </div>
            <div class="form-group" style="flex:1">
                <label>CREDITS</label>
                <input type="number" id="fCredit" step="0.5">
            </div>
        </div>

        <div class="form-group">
            <label>TEAM</label>
            <select id="fTeam"></select>
        </div>

        <div class="form-group">
            <label>CATEGORY</label>
            <select id="fCategory">
                <option value="none">Capped</option>
                <option value="overseas">Overseas ✈️</option>
                <option value="uncapped">Uncapped 🧢</option>
            </select>
        </div>

        <button class="save-btn" id="saveBtn" onclick="handleSave()">SAVE PLAYER</button>
        <div class="close-form" onclick="closeModal()">CANCEL</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. HARDCODED INIT (Prevents malformed URL errors)
    const adminSupabaseClient = supabase.createClient(
        "https://tuvqgcosbweljslbfgqc.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDY1OTI1OCwiZXhwIjoyMDg2MjM1MjU4fQ.ZqeBiAlM9dem6bn-TM3hDrw1tSb7xSp_rAK6zYYrXkE"
    );

    let playersData = [], teamsData = [], currentTournamentId = null;

    // 2. INITIALIZATION
    async function boot() {
        try {
            const { data: t } = await adminSupabaseClient.from('active_tournament').select('id').maybeSingle();
            if (!t) throw new Error("No active tournament");
            currentTournamentId = t.id;

            const [pRes, tRes] = await Promise.all([
                adminSupabaseClient.from('players').select('*, real_teams(short_code)').eq('tournament_id', currentTournamentId).order('name'),
                adminSupabaseClient.from('real_teams').select('*').order('short_code')
            ]);

            playersData = pRes.data || [];
            teamsData = tRes.data || [];

            document.getElementById('fTeam').innerHTML = teamsData.map(t => `<option value="${t.id}">${t.short_code} - ${t.name}</option>`).join('');
            render(playersData);
            document.getElementById('loader').classList.add('hidden');
        } catch (e) { 
            alert("Error: " + e.message);
        }
    }

    // 3. UI RENDERING
    function render(list) {
        document.getElementById('playerList').innerHTML = list.map(p => `
            <div class="player-item ${!p.is_active ? 'inactive' : ''}">
                <div class="p-info">
                    <strong>${p.name} ${p.category === 'overseas' ? '✈️' : p.category === 'uncapped' ? '🧢' : ''}</strong>
                    <span>${p.role} • ${p.real_teams?.short_code || '??'} • ${p.credit} Cr</span>
                </div>
                <div class="actions">
                    <button class="btn edit-btn" onclick="openEditForm('${p.id}')">EDIT</button>
                    <button class="btn del-btn" onclick="toggleActive('${p.id}', ${p.is_active})">
                        ${p.is_active ? 'DISABLE' : 'ENABLE'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    // 4. FORM ACTIONS
    function openAddForm() {
        document.getElementById('formTitle').innerText = "Add Player";
        document.getElementById('editId').value = "";
        document.getElementById('fName').value = "";
        document.getElementById('fCredit').value = "";
        document.getElementById('formModal').classList.add('show');
    }

    function openEditForm(id) {
        const p = playersData.find(x => x.id === id);
        if(!p) return;
        document.getElementById('formTitle').innerText = "Modify Player";
        document.getElementById('editId').value = p.id;
        document.getElementById('fName').value = p.name;
        document.getElementById('fRole').value = p.role;
        document.getElementById('fCredit').value = p.credit;
        document.getElementById('fTeam').value = p.real_team_id;
        document.getElementById('fCategory').value = p.category;
        document.getElementById('formModal').classList.add('show');
    }

    async function handleSave() {
        const id = document.getElementById('editId').value;
        const btn = document.getElementById('saveBtn');
        const payload = {
            name: document.getElementById('fName').value.trim(),
            role: document.getElementById('fRole').value,
            credit: parseFloat(document.getElementById('fCredit').value),
            real_team_id: document.getElementById('fTeam').value,
            category: document.getElementById('fCategory').value,
            tournament_id: currentTournamentId,
            is_active: true
        };

        if(!payload.name || isNaN(payload.credit)) return alert("Fill Name and Credits!");
        btn.disabled = true;

        const { error } = id 
            ? await adminSupabaseClient.from('players').update(payload).eq('id', id) 
            : await adminSupabaseClient.from('players').insert([payload]);
        
        if(error) { alert(error.message); btn.disabled = false; }
        else location.reload();
    }

    async function toggleActive(id, state) {
        if(!confirm(`Change player status?`)) return;
        const { error } = await adminSupabaseClient.from('players').update({ is_active: !state }).eq('id', id);
        if(error) alert(error.message);
        else location.reload();
    }

    function closeModal() { document.getElementById('formModal').classList.remove('show'); }

    document.getElementById('searchBox').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        render(playersData.filter(p => p.name.toLowerCase().includes(val) || (p.real_teams?.short_code || "").toLowerCase().includes(val)));
    };

    // START
    boot();
</script>
</body>
</html>
