<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPK Player Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: var(--bg-card);;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        h2 { text-align: center; margin-bottom: 20px; color: var(--primary); }

        /* Form Styling */
        .card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: var(--text-faint);; }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #saveBtn { background: var(--primary); color: white; margin-top: 10px; }
        #cancelBtn { background: var(--text-faint);; color: white; margin-top: 8px; }

        /* Player List Styling */
        .search-bar { margin-bottom: 15px; }
        
        .player-item {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }

        .p-info strong { display: block; font-size: 1rem; }
        .p-info span { font-size: 0.8rem; color: var(--text-faint);; }

        .p-actions { display: flex; gap: 8px; }
        .edit-btn { background: #e0f2fe; color: var(--primary); padding: 6px 12px; border-radius: 4px; border: none; font-size: 0.8rem; }
        .del-btn { background: #fee2e2; color: var(--danger); padding: 6px 12px; border-radius: 4px; border: none; font-size: 0.8rem; }

        .hidden { display: none; }
        .loader { text-align: center; padding: 20px; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2 id="tournamentName">Loading IPK...</h2>

    <div class="card">
        <form id="playerForm">
            <input type="hidden" id="playerId">
            
            <div class="form-group">
                <label>Player Name</label>
                <input type="text" id="name" placeholder="Enter name" required>
            </div>

            <div class="form-group">
                <label>Real Team</label>
                <select id="real_team_id" required></select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" required>
                        <option value="WK">WK</option>
                        <option value="BAT">BAT</option>
                        <option value="AR">AR</option>
                        <option value="BOWL">BOWL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Credit</label>
                    <input type="number" id="credit" step="0.5" value="8.0" required>
                </div>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="none">None (Domestic)</option>
                    <option value="overseas">Overseas</option>
                    <option value="uncapped">Uncapped</option>
                </select>
            </div>

            <button type="submit" id="saveBtn" class="btn">Add Player</button>
            <button type="button" id="cancelBtn" class="btn hidden">Cancel Edit</button>
        </form>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="🔍 Search player name..." oninput="filterPlayers()">
    </div>

    <div id="loading" class="loader">Fetching players...</div>
    <div id="playerList"></div>
</div>

<script>
    // --- CONFIGURATION ---
    const SB_URL = "https://tuvqgcosbweljslbfgqc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDY1OTI1OCwiZXhwIjoyMDg2MjM1MjU4fQ.ZqeBiAlM9dem6bn-TM3hDrw1tSb7xSp_rAK6zYYrXkE";
    const db = supabase.createClient(SB_URL, SB_KEY);

    let activeTourneyId = null;
    let allPlayers = [];

    async function init() {
        const { data: tourney } = await db.from('active_tournament').select('*').single();
        activeTourneyId = tourney.id;
        document.getElementById('tournamentName').innerText = tourney.name;

        const { data: teams } = await db.from('real_teams').select('id, name').eq('tournament_id', activeTourneyId).order('name');
        const teamSelect = document.getElementById('real_team_id');
        teams.forEach(t => { teamSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`; });

        fetchPlayers();
    }

    async function fetchPlayers() {
        const { data } = await db.from('players').select(`*, real_teams(short_code)` || '').eq('tournament_id', activeTourneyId).order('name', { ascending: true });
        allPlayers = data;
        renderList(data);
    }

    function renderList(list) {
        const container = document.getElementById('playerList');
        container.innerHTML = list.map(p => `
            <div class="player-item" style="opacity: ${p.is_active ? '1' : '0.5'}">
                <div class="p-info">
                    <strong>${p.name} ${p.is_active ? '' : '(INACTIVE)'}</strong>
                    <span>${p.real_teams?.short_code} | ${p.role} | ${p.credit} Cr</span>
                </div>
                <div class="p-actions">
                    <button class="edit-btn" onclick="prepareEdit('${p.id}')">Edit</button>
                    <button class="del-btn" style="background:var(--text-faint);; color:white" onclick="toggleActive('${p.id}', ${p.is_active})">Toggle</button>
                    <button class="del-btn" onclick="deletePlayer('${p.id}')">Del</button>
                </div>
            </div>
        `).join('');
    }

    // THIS IS THE "TRIGGER SQL" PART
    document.getElementById('playerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('playerId').value;
        
        const playerData = {
            name: document.getElementById('name').value,
            real_team_id: document.getElementById('real_team_id').value,
            role: document.getElementById('role').value,
            credit: parseFloat(document.getElementById('credit').value),
            category: document.getElementById('category').value,
            tournament_id: activeTourneyId
        };

        let res;
        if (id) {
            // "UPDATE public.players SET ... WHERE id = id"
            res = await db.from('players').update(playerData).match({ id: id }).select();
        } else {
            // "INSERT INTO public.players ..."
            res = await db.from('players').insert([playerData]).select();
        }

        if (res.error) alert("Error: " + res.error.message);
        else { resetForm(); fetchPlayers(); }
    });

    // "UPDATE public.players SET is_active = !current WHERE id = id"
    window.toggleActive = async (id, currentStatus) => {
        await db.from('players').update({ is_active: !currentStatus }).eq('id', id);
        fetchPlayers();
    };

    window.deletePlayer = async (id) => {
        if (confirm("Delete permanently?")) {
            await db.from('players').delete().eq('id', id);
            fetchPlayers();
        }
    };

    window.prepareEdit = (id) => {
        const p = allPlayers.find(x => x.id === id);
        document.getElementById('playerId').value = p.id;
        document.getElementById('name').value = p.name;
        document.getElementById('real_team_id').value = p.real_team_id;
        document.getElementById('role').value = p.role;
        document.getElementById('credit').value = p.credit;
        document.getElementById('category').value = p.category;
        document.getElementById('saveBtn').innerText = "Update Player";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    };

    function resetForm() {
        document.getElementById('playerForm').reset();
        document.getElementById('playerId').value = '';
        document.getElementById('saveBtn').innerText = "Add Player";
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    init();
</script>

</body>
</html>
