<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 | Leaderboard</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script type="module" src="auth-guard.js"></script>
  
  <style>
    /* ── BASE & HEADER ── */
    body { margin: 0; font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); }
    .leaderboard-app { max-width: var(--app-max-width); margin: auto; padding: 0 0 100px; }
    
    .leaderboard-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px 10px; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 500; min-height: 56px; }
    .icon-back { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid var(--border-card); color: var(--text-primary); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 14px; flex-shrink: 0; transition: var(--transition); }
    .lb-page-title { font-family: var(--font-display); font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-primary); flex: 1; }

    /* ── TABS ── */
    .xi-toggle { display: flex; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 4px; gap: 4px; margin: 12px 16px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
    .xi-toggle::-webkit-scrollbar { display: none; }
    .xi-tab { flex: 1; min-width: max-content; display: flex; align-items: center; justify-content: center; padding: 9px 14px; border-radius: 9px; border: none; background: transparent; color: rgba(255, 255, 255, 0.38); font-family: var(--font-display); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: var(--transition); }
    .xi-tab.active { background: var(--accent); color: #000; box-shadow: 0 2px 10px var(--accent-glow); }

    /* ── SUMMARY CARD ── */
    .user-summary-card { margin: 0 16px 16px; padding: 14px 20px; border-radius: var(--card-radius-sm); background: var(--bg-card); border: 1px solid var(--border-accent); display: flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-display); font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); min-height: 48px; position: relative; overflow: hidden; }
    .user-summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
    .user-summary-card.unranked { background: rgba(255,255,255,0.02); border-color: var(--border); color: var(--text-faint); }
    .user-summary-card.unranked::before { display: none; }

    /* ── PODIUM ── */
    .podium-section { display: flex; justify-content: space-around; align-items: flex-end; padding: 28px 10px 28px; margin: 0 16px 12px; border-radius: var(--card-radius); background: linear-gradient(160deg, var(--bg-card-alt) 0%, var(--bg-card) 100%); border: 1px solid var(--border-card); position: relative; overflow: hidden; }
    .podium-card { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding: 14px 8px 18px; transition: transform 0.2s var(--ease-out); min-width: 90px; }
    .podium-card.rank-1 { order: 2; transform: translateY(-20px); }
    .podium-card.rank-2 { order: 1; transform: translateY(-6px); }
    .podium-card.rank-3 { order: 3; transform: translateY(0); }
    .podium-avatar { border-radius: 50%; background-size: cover; background-position: center; margin-bottom: 10px; background-color: var(--bg-card-alt); }
    .podium-card.rank-1 .podium-avatar { width: 68px; height: 68px; border: 3px solid #ffd700; box-shadow: 0 0 16px rgba(255, 215, 0, 0.35); }
    .podium-card.rank-2 .podium-avatar { width: 54px; height: 54px; border: 2px solid #c0c0c0; }
    .podium-card.rank-3 .podium-avatar { width: 54px; height: 54px; border: 2px solid #cd7f32; }
    .rank-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 24px; height: 24px; border-radius: 7px; font-family: var(--font-display); font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; color: #000; z-index: 10; border: 2px solid var(--bg-page); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .podium-card.rank-1 .rank-badge { background: #ffd700; } .podium-card.rank-2 .rank-badge { background: #c0c0c0; } .podium-card.rank-3 .rank-badge { background: #cd7f32; }
    .podium-name { font-family: var(--font-body); font-size: 11px; font-weight: 700; color: var(--text-primary); margin-bottom: 5px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .podium-pts { font-family: var(--font-display); font-size: 14px; font-weight: 900; color: var(--text-faint); }
    .podium-pts.has-pts { color: var(--accent); }

    /* ── LIST ── */
    .leaderboard-list { display: flex; flex-direction: column; gap: 6px; padding: 0 16px; }
    .leader-row { display: flex; align-items: center; background: var(--bg-card); padding: 13px 16px; border-radius: var(--card-radius-sm); cursor: pointer; border: 1px solid var(--border); gap: 6px; }
    .leader-row.you { background: var(--accent-dim); border-color: var(--border-accent); }
    .l-rank { font-family: var(--font-display); font-weight: 900; color: var(--text-faint); width: 36px; font-size: 14px; flex-shrink: 0; }
    .leader-row.you .l-rank { color: var(--accent); }
    .l-team { flex: 1; font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--text-primary); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
    .l-pts { font-family: var(--font-display); font-weight: 800; font-size: 13px; color: var(--text-faint); flex-shrink: 0; margin-right: 6px; }
    .l-pts.has-pts { color: var(--accent); }
    .l-arrow { color: var(--text-ghost); font-size: 10px; flex-shrink: 0; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(13,22,37,0.97); backdrop-filter: blur(20px); border-top: 1px solid var(--border-card); display: flex; align-items: center; height: var(--nav-height); z-index: 200; padding: 0 8px; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; text-decoration: none; color: var(--text-faint); font-family: var(--font-display); font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; transition: var(--transition); }
    .nav-item i { font-size: 18px; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active i { filter: drop-shadow(0 0 6px var(--accent-glow)); }

    /* ── SKELETON ── */
    #skeletonScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-page); z-index: 999; padding: 16px; transition: opacity 0.2s ease, visibility 0s 0.2s; visibility: visible; }
    #skeletonScreen.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    .sk-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 2px 16px; }
    .sk-block { background: linear-gradient(90deg, var(--border-card) 25%, var(--border) 50%, var(--border-card) 75%); background-size: 200% 100%; animation: skShimmer 1.4s infinite; display: block; }
    @keyframes skShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>

<body>

<div id="skeletonScreen">
  <div class="sk-header">
    <div class="sk-block" style="width:32px;height:32px;border-radius:8px"></div>
    <div class="sk-block" style="width:120px;height:20px;border-radius:6px"></div>
    <div class="sk-block" style="width:32px;height:32px;border-radius:8px"></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
    <div class="sk-block" style="width:80px;height:110px;border-radius:12px;align-self:flex-end"></div>
    <div class="sk-block" style="width:80px;height:140px;border-radius:12px"></div>
    <div class="sk-block" style="width:80px;height:90px;border-radius:12px;align-self:flex-end"></div>
  </div>
  <div class="sk-block" style="height:60px;border-radius:12px;margin-bottom:10px"></div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="sk-block" style="height:52px;border-radius:10px"></div>
    <div class="sk-block" style="height:52px;border-radius:10px"></div>
    <div class="sk-block" style="height:52px;border-radius:10px"></div>
  </div>
</div>

<div class="leaderboard-app">

    <header class="leaderboard-header">
      <a href="ppl-home.html" class="icon-back" aria-label="Back to home">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h1 class="lb-page-title" id="lbPageTitle">Global Leaders</h1> 
      <div style="width:36px"></div>
    </header>

    <div class="xi-toggle" id="phaseTabsContainer">
      <button class="xi-tab active" data-phase="overall">Overall</button>
      </div>

    <section id="leaderboardSummary" class="user-summary-card">
      Fetching your rank...
    </section>

    <section id="podiumContainer" class="podium-section"></section>
    <main id="leaderboardContainer" class="leaderboard-list"></main>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="ppl-home.html"><i class="fas fa-house"></i><span>Home</span></a>
  <a class="nav-item" href="ppl-fixtures.html"><i class="fas fa-calendar-days"></i><span>Fixtures</span></a>
  <a class="nav-item" href="ppl-scorecard.html"><i class="fas fa-cricket-bat-ball"></i><span>Scores</span></a>
  <a class="nav-item" href="ppl-stats.html"><i class="fas fa-chart-bar"></i><span>Stats</span></a>
  <a class="nav-item active" href="ppl-team-view.html"><i class="fas fa-bolt"></i><span>Fantasy</span></a>
</nav>

<script type="module" src="ppl-fantasy-leaderboard.js"></script>

</body>
</html>
