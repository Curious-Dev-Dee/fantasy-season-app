<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<meta property="og:description" content="Latest IPL 2026 breaking news, transfers and tournament updates from Cricket Experts.">

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<script async src="https://gizokraijaw.net/vignette.min.js" data-zone="10742556"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#9AE000;--gdim:rgba(154,224,0,0.09);--ink:#020617;--card:#0d1625;--bdr:rgba(255,255,255,0.08);--muted:#94a3b8;--FD:'Barlow Condensed',sans-serif;--FB:'DM Sans',sans-serif}
body{background:var(--ink);color:#f0f4f8;font-family:var(--FB);min-height:100vh;padding-bottom:40px}
a{text-decoration:none;color:inherit}
.nav{position:sticky;top:0;z-index:100;background:rgba(2,6,23,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;padding:0 16px;height:50px}
.back{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:600;background:transparent;border:none;cursor:pointer;padding:0;font-family:var(--FB)}
.back:hover{color:#f0f4f8}
.brand{font-family:var(--FD);font-size:16px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin-left:auto}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px}
.ph{margin-bottom:22px}
.ph-cat{display:inline-flex;align-items:center;gap:6px;background:var(--gdim);border:1px solid rgba(154,224,0,.2);border-radius:20px;padding:4px 12px;font-family:var(--FD);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g);margin-bottom:12px}
.ph-title{font-family:var(--FD);font-size:clamp(26px,8vw,42px);font-weight:900;text-transform:uppercase;line-height:1;margin-bottom:8px}
.ph-desc{font-size:14px;color:var(--muted);line-height:1.6}
.ad-slot{background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.06);border-radius:10px;padding:12px;text-align:center;margin:16px 0;min-height:80px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
.grid{display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px;display:flex;gap:14px;cursor:pointer;transition:border-color .2s,transform .15s}
.card:hover{border-color:rgba(154,224,0,.25);transform:translateY(-1px)}
.card-img{width:80px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.04)}
.card-emoji{font-size:26px;flex-shrink:0;margin-top:2px}
.card-body{flex:1;min-width:0}
.card-title{font-family:var(--FD);font-size:17px;font-weight:800;text-transform:uppercase;line-height:1.15;margin-bottom:5px;color:#f0f4f8}
.card-exc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.card-date{font-size:11px;color:var(--muted)}
.match-pill{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:2px 8px;font-family:var(--FD);font-size:10px;font-weight:700;color:#f59e0b}
.card-arrow{font-size:11px;color:var(--g);margin-left:auto}
.sk{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px;height:110px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:56px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:10px}
</style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<nav class="nav">
  <button class="back" onclick="window.location.href='/'">← Home</button>
<a class="brand" href="/">Cricket Experts</a>

</nav>
<div class="wrap">
  <div class="ph">
    <div class="ph-cat">🚨 IPL News</div>
    <h1 class="ph-title">IPL 2026<br>Latest News</h1>
    <p class="ph-desc">Breaking news, transfers and tournament updates as they happen.</p>
  </div>
  <div class="ad-slot">Advertisement</div>
  <div class="grid" id="grid">
    <div class="sk"></div><div class="sk"></div><div class="sk"></div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const sb = createClient(
    "https://tuvqgcosbweljslbfgqc.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo"
  );

  const grid = document.getElementById("grid");

  async function loadIplNews() {
    try {
      const { data, error } = await sb
        .from("articles")
        .select("id,slug,title,excerpt,cover_emoji,cover_image,match_label,created_at")
        .eq("category", "ipl-news")
        .eq("published", true)
        .order("created_at", { ascending: false })
        .limit(30);

      if (error) throw error;

      grid.innerHTML = "";

      if (!data?.length) {
        grid.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🚨</div>
            No articles yet — check back soon!
          </div>`;
        return;
      }

      data.forEach(p => {
        const card = document.createElement("article");
        card.className = "card";
        card.onclick = () => window.location.href = `blog-post.html?slug=${p.slug}`;
        const date = new Date(p.created_at).toLocaleDateString(
          "en-IN",
          { day: "numeric", month: "short", year: "numeric" }
        );

        card.innerHTML = p.cover_image
          ? `
            <img class="card-img" src="${p.cover_image}" alt="${p.title || ""}" loading="lazy"/>
            <div class="card-body">
              <div class="card-title">${p.title || "Untitled"}</div>
              <div class="card-exc">${p.excerpt || ""}</div>
              <div class="card-meta">
                <span class="card-date">${date}</span>
                ${p.match_label ? `<span class="match-pill">🏟️ ${p.match_label}</span>` : ""}
                <span class="card-arrow">Read →</span>
              </div>
            </div>`
          : `
            <div class="card-emoji">${p.cover_emoji || "🚨"}</div>
            <div class="card-body">
              <div class="card-title">${p.title || "Untitled"}</div>
              <div class="card-exc">${p.excerpt || ""}</div>
              <div class="card-meta">
                <span class="card-date">${date}</span>
                ${p.match_label ? `<span class="match-pill">🏟️ ${p.match_label}</span>` : ""}
                <span class="card-arrow">Read →</span>
              </div>
            </div>`;

        grid.appendChild(card);
      });
    } catch (e) {
      console.error("Error loading IPL news:", e);
      grid.innerHTML = `
        <div class="empty">
          Failed to load articles. Try refreshing.
        </div>`;
    }
  }

  loadIplNews();
</script>

<script type="module" src="article-ads.js"></script>

</body>
</html>
