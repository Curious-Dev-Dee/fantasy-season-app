<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player Stats | FantasyCric26</title>
    <link rel="stylesheet" href="stats.css" />
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

<div id="topbar"></div>

<div class="st-page-header">
    <div class="st-page-header-inner">
        <div class="st-page-title">
            <i class="fas fa-chart-bar"></i>
            <div>
                <h1>Analytics Hub</h1>
                <span class="stats-sub">Loading…</span>
            </div>
        </div>
    </div>
</div>

<div class="st-filter-bar">
    <div class="st-filter-inner">
        <div class="st-filter-group">
            <i class="fas fa-search st-filter-icon"></i>
            <input type="text" id="playerSearch" class="st-input" placeholder="Search player…" autocomplete="off" />
        </div>
        <select id="teamFilter" class="st-select">
            <option value="">All Teams</option>
        </select>
        <select id="matchFilter" class="st-select">
            <option value="">All Matches</option>
        </select>
        <select id="roleFilter" class="st-select">
            <option value="">All Roles</option>
            <option value="BAT">🏏 Batsmen</option>
            <option value="BOWL">🎳 Bowlers</option>
            <option value="AR">⚡ All-Rounders</option>
            <option value="WK">🧤 Wicket-Keepers</option>
        </select>
    </div>
</div>

<div id="skeletonScreen" class="st-skeleton-wrap">
    <div class="st-skeleton-section">
        <div class="skeleton skeleton-heading"></div>
        <div class="st-skeleton-chips">
            <div class="skeleton skeleton-chip"></div>
            <div class="skeleton skeleton-chip"></div>
            <div class="skeleton skeleton-chip"></div>
            <div class="skeleton skeleton-chip"></div>
        </div>
    </div>
    <div class="st-skeleton-section">
        <div class="skeleton skeleton-heading"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
    </div>
    <div class="st-skeleton-section">
        <div class="skeleton skeleton-heading"></div>
        <div class="skeleton skeleton-card"></div>
    </div>
</div>

<div class="st-container" id="statsContainer"></div>

<div id="bottomnav"></div>

<script type="module" src="stats.js"></script>
</body>
</html>
