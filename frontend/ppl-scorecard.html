<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 — Advanced Match Center</title>
  
  <!-- Supabase & ChartJS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --accent:        #9AE000;
      --accent-dim:    rgba(154,224,0,0.06);
      --accent-glow:   rgba(154,224,0,0.2);
      --bg-page:       #020617;
      --bg-card:       #0d1625;
      --bg-card-alt:   #111e30;
      --border:        rgba(255,255,255,0.07);
      --border-card:   rgba(255,255,255,0.10);
      --text-primary:  #f0f4f8;
      --text-dim:      #94a3b8;
      --text-faint:    #64748b;
      --red:           #ef4444;
      --orange:        #fb923c;
      --gold:          #f59e0b;
      --font-display:  'Barlow Condensed', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --card-radius:   14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app-wrap {
      width: 100%;
      max-width: 540px;
      padding-bottom: 40px;
    }

    /* ── STICKY TOPBAR & NAV TABS ── */
    .sticky-navbar {
      position: sticky;
      top: 0;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(20px);
      z-index: 1000;
      border-bottom: 1px solid var(--border);
    }
    .topbar {
      display: flex;
      align-items: center;
      padding: 14px 16px 8px;
    }
    .back-btn {
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--accent);
      text-decoration: none;
      margin-right: 14px;
    }
    .topbar h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .live-badge {
      background: rgba(239,68,68,0.15);
      color: var(--red);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: auto;
      border: 1px solid rgba(239,68,68,0.3);
    }

    .nav-tabs {
      display: flex;
      padding: 4px 16px 10px;
      gap: 12px;
    }
    .nav-tab {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px 4px;
      position: relative;
      letter-spacing: 0.5px;
    }
    .nav-tab.active {
      color: var(--accent);
    }
    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 2.5px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── CONTENT WRAPPERS ── */
    .main-view { padding: 14px 16px; }
    .view-panel { display: none; }
    .view-panel.active { display: block; }

    /* ── GENERAL CARDS & BLOCKS ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .hero-card {
      text-align: center;
      background: linear-gradient(180deg, var(--bg-card) 0%, #070e1a 100%);
    }
    .hero-title { font-family: var(--font-display); font-size: 26px; font-weight: 900; }
    .hero-meta { font-size: 12px; color: var(--text-faint); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
    .hero-result { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--accent); margin-top: 10px; }

    /* ── SCORECARD SPECIFIC SUB-TABS ── */
    .inn-switcher {
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.25);
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .inn-sub-tab {
      flex: 1; text-align: center; font-family: var(--font-display); font-size: 13px; font-weight: 700;
      color: var(--text-dim); padding: 8px; border-radius: 7px; cursor: pointer; text-transform: uppercase;
    }
    .inn-sub-tab.active {
      background: var(--bg-card-alt); color: var(--text-primary); border: 1px solid var(--border-card);
    }

    .inn-summary-bar {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .inn-totals { font-family: var(--font-display); font-size: 32px; font-weight: 900; color: var(--accent); line-height: 1; }
    .inn-totals span { font-size: 14px; font-family: var(--font-body); color: var(--text-dim); margin-left: 6px; font-weight: normal; }

    /* ── TABLE STYLING ── */
    .section-title {
      font-family: var(--font-display); font-size: 13px; font-weight: 900; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 8px; display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    
    table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
    th { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    th:not(:first-child), td:not(:first-child) { text-align: right; }
    td { padding: 10px 8px; font-size: 13px; border-bottom: 1px solid var(--border-subtle); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    
    .p-name { font-weight: 700; color: var(--text-primary); }
    .p-dismissal { font-size: 11px; color: var(--text-faint); margin-top: 2px; line-height: 1.3; }
    .t-accent { font-weight: 700; color: var(--accent); }
    .t-bold { font-weight: 700; }
    .muted-row { color: var(--text-dim); font-size: 12px; }

    /* ── FALL OF WICKETS & PARTNERSHIP CHIPS ── */
    .sc-list-box { background: rgba(0,0,0,0.15); border-radius: 10px; padding: 12px; font-size: 13px; color: var(--text-dim); line-height: 1.6; border: 1px solid var(--border-subtle); }
    
    /* ── OVER LOG BADGES ── */
    .balls-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
    .ball-badge {
      min-width: 30px; height: 30px; padding: 0 5px; border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 13px; font-weight: 900; border: 1px solid transparent;
    }
    .ball-badge.c-dot { background: rgba(255,255,255,0.03); color: var(--text-faint); border-color: var(--border); }
    .ball-badge.c-runs { background: rgba(255,255,255,0.06); color: var(--text-primary); }
    .ball-badge.c-four { background: rgba(34,197,94,0.12); color: #22c55e; border-color: rgba(34,197,94,0.25); }
    .ball-badge.c-six  { background: rgba(56,189,248,0.12); color: #38bdf8; border-color: rgba(56,189,248,0.25); }
    .ball-badge.c-wkt  { background: rgba(239,68,68,0.2); color: var(--red); border-color: rgba(239,68,68,0.35); }
    .ball-badge.c-extra { background: rgba(245,158,11,0.1); color: var(--gold); border-color: rgba(245,158,11,0.2); font-size: 11px; }

    /* ── SUMMARY PANEL LAYOUT ── */
    .summary-block-title { font-family: var(--font-display); font-size: 15px; font-weight: 800; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); padding-bottom: 4px;}
    .mom-perf-box { background: var(--accent-dim); border: 1px solid var(--border-accent); border-radius: 10px; padding: 12px; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }
    .top-performers-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .perf-mini-card { background: rgba(0,0,0,0.15); border-radius: 8px; padding: 10px; border: 1px solid var(--border-subtle); }
    .pmc-label { font-size: 10px; text-transform: uppercase; color: var(--text-faint); font-weight: bold; margin-bottom: 2px;}
    .pmc-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .pmc-val { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--accent); margin-top: 1px; }

    /* ── GRAPH STYLING ── */
    .chart-container { position: relative; width: 100%; height: 240px; margin-bottom: 20px; }
    
    .loading { text-align: center; color: var(--text-faint); padding: 50px 0; font-size: 13px; }
  </style>
</head>
<body>

<div class="app-wrap">
  <!-- NAVIGATION COMPONENT -->
  <div class="sticky-navbar">
    <div class="topbar">
      <a class="back-btn" href="javascript:history.back()"><i class="fas fa-chevron-left"></i></a>
      <h2 id="matchTeamsHeader">Match Details</h2>
      <span id="liveDot" class="live-badge" style="display:none">● LIVE Updates</span>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" id="tab-summary" onclick="switchMainTab('summary')">Summary</div>
      <div class="nav-tab" id="tab-scorecard" onclick="switchMainTab('scorecard')">Scorecard</div>
      <div class="nav-tab" id="tab-graphs" onclick="switchMainTab('graphs')">Graphs</div>
    </div>
  </div>

  <div class="main-view" id="mainViewContent">
    <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Analyzing Match Matrix…</div>
  </div>
</div>

<script>
const SB_URL = 'https://tuvqgcosbweljslbfgqc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';
const sb = supabase.createClient(SB_URL, SB_KEY);

const urlMatchId = new URLSearchParams(location.search).get('match');
let mData = null, dList = [], pList = [];
let currentMainTab = 'summary';
let currentInnIdx = 0;
let realtimeChannel = null;

async function init() {
  if (!urlMatchId) {
    document.getElementById('mainViewContent').innerHTML = '<div class="loading">No valid match selected.</div>';
    return;
  }
  await loadCoreData();
  setupRealtimeListener();
}

async function loadCoreData() {
  const { data: match } = await sb.from('ppl_matches')
    .select(`*, team_a:team_a_id(id,name,short_name), team_b:team_b_id(id,name,short_name),
             winner:winner_id(id,name,short_name), mom:mom_player_id(id,name),
             innings:ppl_innings(*)`)
    .eq('id', urlMatchId).single();
  mData = match;

  const { data: dels } = await sb.from('ppl_deliveries')
    .select('*').eq('match_id', urlMatchId)
    .order('innings_id').order('over_number').order('ball_number');
  dList = dels || [];

  const { data: pls } = await sb.from('ppl_players')
    .select('id,name,team_id')
    .in('team_id', [match?.team_a_id, match?.team_b_id].filter(Boolean));
  pList = pls || [];

  if (mData && ['in_progress', 'innings_break'].includes(mData.status)) {
    document.getElementById('liveDot').style.display = 'inline-block';
  } else {
    document.getElementById('liveDot').style.display = 'none';
  }

  renderActiveTab();
}

function pName(id) { return pList.find(p => p.id === id)?.name || 'Manager'; }

function switchMainTab(tab) {
  currentMainTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderActiveTab();
}

function renderActiveTab() {
  if (!mData) return;
  document.getElementById('matchTeamsHeader').textContent = `${mData.team_a?.short_name || 'TBA'} vs ${mData.team_b?.short_name || 'TBA'}`;
  
  const targetElement = document.getElementById('mainViewContent');
  targetElement.innerHTML = '';

  // HERO OVERVIEW CONTAINER
  const hero = document.createElement('div');
  hero.className = 'card hero-card';
  hero.innerHTML = `
    <div class="hero-title">${mData.team_a?.name} vs ${mData.team_b?.name}</div>
    <div class="hero-meta">Day ${mData.day} • Match ${mData.match_number} • PPL Arena</div>
    ${mData.result_description ? `<div class="hero-result">${mData.result_description}</div>` : ''}
  `;
  targetElement.appendChild(hero);

  // VIEW ROUTER
  if (currentMainTab === 'summary') {
    renderSummaryView(targetElement);
  } else if (currentMainTab === 'scorecard') {
    renderScorecardView(targetElement);
  } else if (currentMainTab === 'graphs') {
    renderGraphsView(targetElement);
  }
}

// ═══════════════════════════════════════════════
// 1. SUMMARY VIEW TAB LOGIC
// ═══════════════════════════════════════════════
function renderSummaryView(container) {
  const wrapper = document.createElement('div');
  wrapper.className = 'card';
  
  const inns = (mData.innings || []).sort((a,b) => a.innings_number - b.innings_number);
  
  if (inns.length === 0) {
    wrapper.innerHTML = '<div class="loading">Innings configurations will populate when live actions begin.</div>';
    container.appendChild(wrapper);
    return;
  }

  let htmlOutput = `<div class="summary-block-title">Match Performance Matrix</div>`;

  // Dynamic loop through innings to compute top performers safely
  inns.forEach(inn => {
    const team = inn.batting_team_id === mData.team_a_id ? mData.team_a : mData.team_b;
    const delvs = dList.filter(d => d.innings_id === inn.id);

    // Crunch Batting records
    const batMap = {};
    delvs.forEach(d => {
      if (!d.batter_id) return;
      if (!batMap[d.batter_id]) batMap[d.batter_id] = 0;
      batMap[d.batter_id] += d.runs_off_bat || 0;
    });
    const sortedBatters = Object.entries(batMap).sort((a,b) => b[1] - a[1]).slice(0, 2);

    // Crunch Bowling records
    const bowlMap = {};
    delvs.forEach(d => {
      if (!d.bowler_id) return;
      if (!bowlMap[d.bowler_id]) bowlMap[d.bowler_id] = { wkts: 0, runs: 0, balls: 0 };
      const bObj = bowlMap[d.bowler_id];
      bObj.runs += (d.runs_off_bat || 0) + (d.extras || 0);
      if (d.is_wicket && !['run_out','retired_out'].includes(d.dismissal_type)) bObj.wkts++;
      if (d.is_legal_delivery) bObj.balls++;
    });
    const sortedBowlers = Object.entries(bowlMap).sort((a,b) => {
      if (b[1].wkts !== a[1].wkts) return b[1].wkts - a[1].wkts;
      const econA = a[1].balls > 0 ? (a[1].runs / (a[1].balls / 6)) : 999;
      const econB = b[1].balls > 0 ? (b[1].runs / (b[1].balls / 6)) : 999;
      return econA - econB; // Tie breaker via lower economy
    }).slice(0, 1);

    htmlOutput += `
      <div style="margin-bottom: 16px;">
        <div style="font-size: 12px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; display:flex; justify-content:space-between;">
          <span>${team?.short_name} Innings</span>
          <span style="color:var(--accent)">${inn.total_runs}/${inn.total_wickets} (${inn.total_overs} Ov)</span>
        </div>
        <div class="top-performers-layout">
          <div class="perf-mini-card">
            <div class="pmc-label">Top Batter</div>
            <div class="pmc-name">${sortedBatters[0] ? pName(sortedBatters[0][0]) : '—'}</div>
            <div class="pmc-val">${sortedBatters[0] ? sortedBatters[0][1] + ' Runs' : '—'}</div>
          </div>
          <div class="perf-mini-card">
            <div class="pmc-label">2nd Top Batter</div>
            <div class="pmc-name">${sortedBatters[1] ? pName(sortedBatters[1][0]) : '—'}</div>
            <div class="pmc-val">${sortedBatters[1] ? sortedBatters[1][1] + ' Runs' : '—'}</div>
          </div>
          <div class="perf-mini-card" style="grid-column: span 2;">
            <div class="pmc-label">Impact Bowler</div>
            <div class="pmc-name">${sortedBowlers[0] ? pName(sortedBowlers[0][0]) : '—'}</div>
            <div class="pmc-val">${sortedBowlers[0] ? `${sortedBowlers[0][1].wkts} Wkts (${(sortedBowlers[0][1].runs / (sortedBowlers[0][1].balls / 6 || 1)).toFixed(1)} Eco)` : '—'}</div>
          </div>
        </div>
      </div>
    `;
  });

  // Player of Match Metadata
  if (mData.mom?.name) {
    // Dynamically fetch stats for MOM across whole match
    let momRuns = 0, momWkts = 0;
    dList.forEach(d => {
      if (d.batter_id === mData.mom_player_id) momRuns += d.runs_off_bat || 0;
      if (d.bowler_id === mData.mom_player_id && d.is_wicket && !['run_out','retired_out'].includes(d.dismissal_type)) momWkts++;
    });

    htmlOutput += `
      <div class="summary-block-title" style="margin-top: 20px;">Match Laurels</div>
      <div class="mom-perf-box">
        <div>
          <div style="font-size: 11px; text-transform: uppercase; color: var(--text-faint); font-weight: bold;">Player of the Match</div>
          <div style="font-size: 16px; font-weight: 800; color: #fff;">${mData.mom.name}</div>
        </div>
        <div style="text-align: right; font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--gold);">
          ${momRuns} Runs ${momWkts > 0 ? `| ${momWkts} Wkts` : ''}
        </div>
      </div>
    `;
  }

  wrapper.innerHTML = htmlOutput;
  container.appendChild(wrapper);
}

// ═══════════════════════════════════════════════
// 2. SCORECARD TRACKER TAB LOGIC
// ═══════════════════════════════════════════════
function renderScorecardView(container) {
  const inns = (mData.innings || []).sort((a,b) => a.innings_number - b.innings_number);
  
  if (inns.length === 0) {
    const box = document.createElement('div');
    box.className = 'card loading';
    box.innerHTML = 'Data pipeline initialization pending.';
    container.appendChild(box);
    return;
  }

  // Innings sub navigation switcher
  const switcher = document.createElement('div');
  switcher.className = 'inn-switcher';
  inns.forEach((inn, idx) => {
    const teamShort = inn.batting_team_id === mData.team_a_id ? mData.team_a?.short_name : mData.team_b?.short_name;
    const tabBtn = document.createElement('div');
    tabBtn.className = `inn-sub-tab ${idx === currentInnIdx ? 'active' : ''}`;
    tabBtn.textContent = `${teamShort} ${inn.total_runs}/${inn.total_wickets}`;
    tabBtn.onclick = () => {
      currentInnIdx = idx;
      renderActiveTab();
    };
    switcher.appendChild(tabBtn);
  });
  container.appendChild(switcher);

  const activeInnObj = inns[currentInnIdx];
  const activeDelvs = dList.filter(d => d.innings_id === activeInnObj.id);
  const batTeam = activeInnObj.batting_team_id === mData.team_a_id ? mData.team_a : mData.team_b;
  const bowlTeam = activeInnObj.batting_team_id === mData.team_a_id ? mData.team_b : mData.team_a;

  // Process data for charts/tables concurrently
  const batters = {}, bowlers = {}, fowList = [], partnerships = [];
  let cumulativeRuns = 0, currentWickets = 0;
  
  let currentPartner = { b1: null, b2: null, runs: 0, balls: 0 };

  activeDelvs.forEach((d, idx) => {
    const rOffBat = d.runs_off_bat || 0;
    const ext = d.extras || 0;
    cumulativeRuns += rOffBat + ext;

    // Crunch Batter Row Map
    if (d.batter_id) {
      if (!batters[d.batter_id]) batters[d.batter_id] = { runs: 0, balls: 0, fours: 0, sixes: 0, out: false, desc: 'not out' };
      batters[d.batter_id].runs += rOffBat;
      if (d.is_legal_delivery || d.extra_type === 'no_ball') batters[d.batter_id].balls++;
      if (d.is_four) batters[d.batter_id].fours++;
      if (d.is_six) batters[d.batter_id].sixes++;
    }

    // Partnership calculation logic
    if (d.batter_id && d.non_striker_id) {
      const b1 = d.batter_id, b2 = d.non_striker_id;
      if ((currentPartner.b1 === b1 && currentPartner.b2 === b2) || (currentPartner.b1 === b2 && currentPartner.b2 === b1)) {
        currentPartner.runs += rOffBat + ext;
        if (d.is_legal_delivery || d.extra_type === 'no_ball') currentPartner.balls++;
      } else {
        if (currentPartner.b1) partnerships.push({...currentPartner});
        currentPartner = { b1: b1, b2: b2, runs: rOffBat + ext, balls: (d.is_legal_delivery || d.extra_type === 'no_ball') ? 1 : 0 };
      }
    }

    // Crunch Bowler Row Map
    if (d.bowler_id) {
      if (!bowlers[d.bowler_id]) bowlers[d.bowler_id] = { balls: 0, runs: 0, wkts: 0 };
      bowlers[d.bowler_id].runs += rOffBat + ext;
      if (d.is_legal_delivery) bowlers[d.bowler_id].balls++;
    }

    // Crunch Wicket Meta & Fall of Wickets
    if (d.is_wicket) {
      currentWickets++;
      if (d.dismissed_player_id) {
        if (!batters[d.dismissed_player_id]) batters[d.dismissed_player_id] = { runs: 0, balls: 0, fours: 0, sixes: 0, out: true, desc: '' };
        const b = batters[d.dismissed_player_id];
        b.out = true;
        let mechanism = d.dismissal_type || 'out';
        if (d.fielder_id) mechanism += ` (${pName(d.fielder_id)})`;
        mechanism += ` b ${pName(d.bowler_id)}`;
        b.desc = mechanism;

        // FOW Entry compiler
        fowList.push(`${cumulativeRuns}/${currentWickets} (${pName(d.dismissed_player_id)}, ${d.over_number}.${d.ball_number + 1})`);
      }
      if (d.bowler_id && !['run_out','retired_out'].includes(d.dismissal_type)) {
        bowlers[d.bowler_id].wkts++;
      }
      // Close partnership on wicket fall
      if (currentPartner.b1) {
        partnerships.push({...currentPartner});
        currentPartner = { b1: null, b2: null, runs: 0, balls: 0 };
      }
    }
  });
  // Push remaining partnership if active
  if (currentPartner.b1) partnerships.push({...currentPartner});

  // Calculate extras category metrics
  const wideCount = activeDelvs.filter(d => d.extra_type === 'wide').reduce((s,d) => s + (d.extras||0), 0);
  const nbCount = activeDelvs.filter(d => d.extra_type === 'no_ball').reduce((s,d) => s + (d.extras||0), 0);
  const penaltyCount = activeDelvs.filter(d => d.extra_type === 'penalty').reduce((s,d) => s + (d.extras||0), 0);
  const totalExtras = activeDelvs.reduce((s,d) => s + (d.extras||0), 0);

  const scPanel = document.createElement('div');
  scPanel.className = 'card';

  let scHtml = `
    <div class="inn-summary-bar">
      <div>
        <div class="inn-totals">${activeInnObj.total_runs}/${activeInnObj.total_wickets} <span>(${activeInnObj.total_overs}/${activeInnObj.max_overs} Ov)</span></div>
        <div style="font-size:12px; color:var(--text-faint); font-weight:500; margin-top:3px;">${batTeam?.name}</div>
      </div>
      <div style="text-align:right; font-size:12px; color:var(--text-dim)">
        Extras: <b style="color:var(--gold)">${totalExtras}</b> (Wd ${wideCount}, Nb ${nbCount}, Pen ${penaltyCount})
      </div>
    </div>

    <!-- BATTING CARD -->
    <div class="section-title">Batting Dashboard</div>
    <table>
      <thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
      <tbody>
  `;

  Object.entries(batters).forEach(([id, b]) => {
    const sr = b.balls > 0 ? ((b.runs / b.balls) * 100).toFixed(1) : '0.0';
    scHtml += `
      <tr>
        <td>
          <div class="p-name">${pName(id)}</div>
          <div class="p-dismissal">${b.out ? b.desc : '<span style="color:var(--accent)">not out</span>'}</div>
        </td>
        <td class="t-bold">${b.runs}</td>
        <td>${b.balls}</td>
        <td>${b.fours}</td>
        <td>${b.sixes}</td>
        <td class="text-faint">${sr}</td>
      </tr>
    `;
  });
  
  // DNB Player tracker
  const accountedBatterIds = Object.keys(batters);
  const dnbList = pList.filter(p => p.team_id === activeInnObj.batting_team_id && !accountedBatterIds.includes(p.id));
  if (dnbList.length > 0) {
    scHtml += `<tr class="muted-row"><td colspan="6"><b>DNB:</b> ${dnbList.map(p => p.name).join(', ')}</td></tr>`;
  }

  scHtml += `</tbody></table><!-- BOWLING CARD -->
    <div class="section-title">Bowling Control</div>
    <table>
      <thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Econ</th></tr></thead>
      <tbody>`;

  Object.entries(bowlers).forEach(([id, b]) => {
    const ovStr = `${Math.floor(b.balls/6)}.${b.balls%6}`;
    const eco = b.balls > 0 ? (b.runs / (b.balls / 6)).toFixed(2) : '0.00';
    scHtml += `
      <tr>
        <td class="p-name">${pName(id)}</td>
        <td class="t-bold">${ovStr}</td>
        <td>${b.runs}</td>
        <td class="t-accent" style="color:var(--red); font-size:14px;">${b.wkts}</td>
        <td class="text-faint">${eco}</td>
      </tr>
    `;
  });

  scHtml += `</tbody></table><!-- FALL OF WICKETS -->
    <div class="section-title">Fall of Wickets</div>
    <div class="sc-list-box">${fowList.length > 0 ? fowList.join(' • ') : 'No wickets fell during this innings session.'}</div>

    <!-- PARTNERSHIPS -->
    <div class="section-title">Partnership Logs</div>
    <div class="sc-list-box">
  `;

  if (partnerships.length > 0) {
    partnerships.forEach(p => {
      if (!p.b1 || !p.b2) return;
      scHtml += `<div style="margin-bottom:4px; border-bottom:1px solid rgba(255,255,255,0.02); padding-bottom:4px;"><b>${p.runs} runs</b> <span style="color:var(--text-faint); font-size:11px;">(${p.balls}b)</span> — ${pName(p.b1)} & ${pName(p.b2)}</div>`;
    });
  } else {
    scHtml += `No partnership logs recorded.`;
  }

  // Over-by-Over Matrix blocks
  const overChunks = {};
  activeDelvs.forEach(d => {
    if (!overChunks[d.over_number]) overChunks[d.over_number] = [];
    overChunks[d.over_number].push(d);
  });

  scHtml += `</div><div class="section-title">Ball-By-Ball Feed</div><div style="display:flex; flex-direction:column; gap:10px;">`;

  Object.entries(overChunks).forEach(([ovIdx, balls]) => {
    scHtml += `<div style="display:flex; align-items:center; gap:12px;"><span style="font-family:var(--font-display); font-size:13px; font-weight:700; color:var(--text-faint); min-width:36px;">Ov ${parseInt(ovIdx)+1}</span><div class="balls-wrap">`;
    balls.forEach(d => {
      let bLabel = d.runs_off_bat ?? 0;
      let bClass = 'c-runs';
      if (d.extra_type === 'penalty') { bLabel = '-2'; bClass = 'c-extra'; }
      else if (d.extra_type === 'wide') { bLabel = d.bat_runs > 0 ? `Wd+${d.bat_runs}` : 'Wd'; bClass = 'c-extra'; }
      else if (d.extra_type === 'no_ball') { bLabel = d.bat_runs > 0 ? `Nb+${d.bat_runs}` : 'Nb'; bClass = 'c-extra'; }
      else if (bLabel === 0) bClass = 'c-dot';
      else if (d.is_six) bClass = 'c-six';
      else if (d.is_four) bClass = 'c-four';
      
      if (d.is_wicket) { bLabel += 'W'; bClass = 'c-wkt'; }
      scHtml += `<span class="ball-badge ${bClass}">${bLabel === 0 ? '·' : bLabel}</span>`;
    });
    scHtml += `</div></div>`;
  });

  scHtml += `</div>`;
  scPanel.innerHTML = scHtml;
  container.appendChild(scPanel);
}

// ═══════════════════════════════════════════════
// 3. CHARTS & GRAPHS TAB LOGIC (Manhattan & Worm)
// ═══════════════════════════════════════════════
function renderGraphsView(container) {
  const inns = (mData.innings || []).sort((a,b) => a.innings_number - b.innings_number);
  
  if (inns.length === 0) {
    const box = document.createElement('div');
    box.className = 'card loading';
    box.innerHTML = 'Data visualization charts populate during active game configurations.';
    container.appendChild(box);
    return;
  }

  const graphCard = document.createElement('div');
  graphCard.className = 'card';
  graphCard.innerHTML = `
    <div class="summary-block-title">Manhattan Metric Chart</div>
    <div class="chart-container"><canvas id="manhattanChartCtx"></canvas></div>
    <div class="summary-block-title" style="margin-top:24px;">Match Worm Progression</div>
    <div class="chart-container"><canvas id="wormChartCtx"></canvas></div>
  `;
  container.appendChild(graphCard);

  // MANHATTAN & WORM CHIPS COMPILING PIPELINES
  const maxSideOvers = mData.overs_per_side || 8;
  const labelsList = Array.from({length: maxSideOvers}, (_, i) => `Ov ${i+1}`);
  
  const manhattanData = { inn1: Array(maxSideOvers).fill(0), inn2: Array(maxSideOvers).fill(0) };
  const wormData = { inn1: [0], inn2: [0], inn1Wkts: [null], inn2Wkts: [null] };

  // Innings 1 crunching
  const inn1Dels = dList.filter(d => d.innings_id === inns[0]?.id);
  let runsAccumInn1 = 0;
  for (let o = 0; o < maxSideOvers; o++) {
    const ovDels = inn1Dels.filter(d => d.over_number === o);
    if(ovDels.length === 0 && o >= Math.ceil(parseFloat(inns[0]?.total_overs || 0))) break;
    
    let ovRuns = 0, wktHit = false;
    ovDels.forEach(d => {
      ovRuns += (d.runs_off_bat || 0) + (d.extras || 0);
      if (d.is_wicket) wktHit = true;
    });
    manhattanData.inn1[o] = ovRuns;
    runsAccumInn1 += ovRuns;
    wormData.inn1.push(runsAccumInn1);
    wormData.inn1Wkts.push(wktHit ? runsAccumInn1 : null);
  }

  // Innings 2 crunching
  if (inns[1]) {
    const inn2Dels = dList.filter(d => d.innings_id === inns[1].id);
    let runsAccumInn2 = 0;
    for (let o = 0; o < maxSideOvers; o++) {
      const ovDels = inn2Dels.filter(d => d.over_number === o);
      if(ovDels.length === 0 && o >= Math.ceil(parseFloat(inns[1]?.total_overs || 0))) break;

      let ovRuns = 0, wktHit = false;
      ovDels.forEach(d => {
        ovRuns += (d.runs_off_bat || 0) + (d.extras || 0);
        if (d.is_wicket) wktHit = true;
      });
      manhattanData.inn2[o] = ovRuns;
      runsAccumInn2 += ovRuns;
      wormData.inn2.push(runsAccumInn2);
      wormData.inn2Wkts.push(wktHit ? runsAccumInn2 : null);
    }
  }

  // BUILD MANHATTAN CHART ENGINE
  new Chart(document.getElementById('manhattanChartCtx'), {
    type: 'bar',
    data: {
      labels: labelsList,
      datasets: [
        { label: mData.team_a?.short_name || 'Inn 1', data: manhattanData.inn1, backgroundColor: '#38bdf8', borderRadius: 4 },
        { label: mData.team_b?.short_name || 'Inn 2', data: manhattanData.inn2, backgroundColor: '#9AE000', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#94a3b8', font: { family: 'DM Sans' } } } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b' } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b' } }
      }
    }
  });

  // BUILD WORM PROGRESSION LINE ENGINE
  const wormLabels = Array.from({length: wormData.inn1.length}, (_, i) => i);
  new Chart(document.getElementById('wormChartCtx'), {
    type: 'line',
    data: {
      labels: wormLabels,
      datasets: [
        { label: mData.team_a?.short_name, data: wormData.inn1, borderColor: '#38bdf8', tension: 0.1, pointRadius: 2 },
        { label: `${mData.team_a?.short_name} Wkts`, data: wormData.inn1Wkts, backgroundColor: '#ef4444', pointRadius: 5, pointHoverRadius: 7, showLine: false },
        ...(inns[1] ? [
          { label: mData.team_b?.short_name, data: wormData.inn2, borderColor: '#9AE000', tension: 0.1, pointRadius: 2 },
          { label: `${mData.team_b?.short_name} Wkts`, data: wormData.inn2Wkts, backgroundColor: '#fb923c', pointRadius: 5, pointHoverRadius: 7, showLine: false }
        ] : [])
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { filter: item => !item.text.includes('Wkts'), color: '#94a3b8' } } },
      scales: {
        x: { title: { display: true, text: 'Overs Bowled', color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b' } },
        y: { title: { display: true, text: 'Cumulative Runs', color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b' } }
      }
    }
  });
}

// ═══════════════════════════════════════════════
// SUPABASE REALTIME MULTI-CHANNEL BROADCAST SUBSCRIPTION
// ═══════════════════════════════════════════════
function setupRealtimeListener() {
  if (!mData || !['in_progress', 'innings_break'].includes(mData.status)) return;

  realtimeChannel = sb.channel('ppl-scorecard-broadcast-' + mData.id)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ppl_innings', filter: `match_id=eq.${mData.id}` }, () => loadCoreData())
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ppl_deliveries', filter: `match_id=eq.${mData.id}` }, () => loadCoreData())
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'ppl_matches', filter: `id=eq.${mData.id}` }, () => loadCoreData())
    .subscribe();
}

window.addEventListener("pagehide", () => {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
});

init();
</script>
