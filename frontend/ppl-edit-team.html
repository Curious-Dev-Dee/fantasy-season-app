<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 | Edit Phase XI</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/team-builder.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script type="module" src="auth-guard.js"></script>
</head>

<body class="loading-state">

  <!-- LOADING -->
  <div id="loadingOverlay">
    <div class="tb-spinner"></div>
  </div>

  <div class="app-container">

    <!-- HEADER -->
    <header class="edit-header">
      <div class="header-left">
        <a href="ppl-home.html" class="icon-back" aria-label="Back to home">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div class="header-info">
          <h1 class="header-title" id="phaseTitle">Edit Phase XI</h1>
        </div>
      </div>
      <div class="header-right">
        <div id="upcomingMatchName" class="match-name">Loading Phase...</div>
        <div id="headerCountdown" class="match-timer">--</div>
      </div>
    </header>

    <!-- STICKY DASHBOARD -->
    <div class="sticky-controls">

      <!-- PROGRESS + STATS -->
      <div class="premium-progress">
        <div id="teamDotsRow" class="team-dots-row"></div>
        <div class="progress-labels">
          <div class="dashboard-item">
            <i class="di-icon fas fa-user"></i>
            <span id="playerCountLabel">0</span><span class="di-max">/11</span>
          </div>
          <div class="dashboard-item">
            <i class="di-icon fas fa-plane"></i>
            <span id="overseasCountLabel">0/4</span>
          </div>
          <div class="dashboard-item">
            <i class="di-icon fas fa-coins"></i>
            <span id="creditCount">100</span><span class="di-max"> left</span>
          </div>
          <!-- PPL may not use boosters/subs per phase, but keeping UI intact for theme parity -->
          <div class="dashboard-item" style="opacity: 0.5;">
            <i class="di-icon fas fa-bolt"></i>
            <span id="boosterUsedLabel">--</span>
          </div>
        </div>
      </div>

      <!-- VIEW TABS -->
      <div class="view-tabs">
        <button class="toggle-btn" data-mode="myxi">My XI</button>
        <button class="toggle-btn active" data-mode="playerPool">Edit Squad</button>
      </div>

      <!-- SEARCH + ROLE TABS + FILTER PILLS -->
      <div class="search-filter-wrapper">
        <div class="role-search-row">
            <div class="role-navigation-wrapper">
                <div class="role-tabs-container">
                    <div class="role-tab active" data-role="WK">WK <span id="count-WK">0</span></div>
                    <div class="role-tab" data-role="BAT">BAT <span id="count-BAT">0</span></div>
                    <div class="role-tab" data-role="AR">AR <span id="count-AR">0</span></div>
                    <div class="role-tab" data-role="BOWL">BOWL <span id="count-BOWL">0</span></div>
                    <div class="role-slider-bg"></div>
                </div>
            </div>
            <button class="search-icon-btn" id="searchIconBtn" aria-label="Search players">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <!-- Search overlay -->
        <div class="search-overlay-row hidden" id="searchOverlayRow">
            <input type="text" id="playerSearch" placeholder="Search any player…" autocomplete="off" spellcheck="false">
            <button class="search-close-btn" id="searchCloseBtn">✕</button>
        </div>

        <div class="dropdown-filters">
            <button id="teamToggle"   class="pill-filter">Teams</button>
            <button id="creditToggle" class="pill-filter">Credits</button>
            <button id="typeToggle"   class="pill-filter">Type</button>
        </div>
      </div>

    </div><!-- end .sticky-controls -->

    <!-- MAIN CONTENT -->
    <main class="content-area">
      <div id="myxi-view" class="view-mode">
        <div id="myXIList" class="player-list"></div>
      </div>
      <div id="playerPool-view" class="view-mode active">
        <div id="playerPoolList" class="player-list"></div>
      </div>
    </main>

  </div><!-- end .app-container -->

  <!-- SAVE BAR -->
  <div class="save-bar">
    <div class="save-hint" id="saveHint"></div>
    <div class="save-bar-buttons">
        <button id="previewTeamBtn" class="preview-btn">👁 Preview</button>
        <button id="saveTeamBtn" class="save-btn" disabled>NEXT →</button>
    </div>
  </div>

  <!-- PREVIEW POPUP -->
  <div id="previewOverlay" class="preview-overlay hidden">
      <div class="preview-popup" id="previewPopup">
          <div class="preview-popup-header">
              <span class="preview-popup-title">Phase XI Preview</span>
              <button class="preview-popup-close" id="previewCloseBtn">✕</button>
          </div>
          <div class="preview-field" id="previewField">
              <p class="preview-empty">No players selected yet.</p>
          </div>
      </div>
  </div>

  <!-- TRANSFER SUMMARY SHEET -->
  <div id="transferBackdrop" class="filter-backdrop hidden"></div>
  <div id="transferSheet" class="dropdown-menu bottom-sheet transfer-sheet hidden">
      <div id="transferSheetBody"></div>
  </div>

  <!-- FILTER BACKDROP & MENUS -->
  <div id="filterBackdrop" class="filter-backdrop hidden"></div>
  <div id="teamMenu"   class="dropdown-menu bottom-sheet"></div>
  <div id="creditMenu" class="dropdown-menu bottom-sheet"></div>
  <div id="typeMenu"   class="dropdown-menu bottom-sheet"></div>

  <!-- TOAST & CONFIRM -->
  <div id="toastContainer" class="toast-container"></div>
  <div id="customConfirmOverlay" class="confirm-overlay hidden">
    <div class="confirm-card">
      <h3 id="confirmTitle"  class="confirm-title"></h3>
      <p  id="confirmText"   class="confirm-text"></p>
      <div class="confirm-actions">
        <button id="confirmCancelBtn" class="btn-cancel-confirm">Cancel</button>
        <button id="confirmApplyBtn"  class="btn-apply-confirm">Apply</button>
      </div>
    </div>
  </div>

  <!-- PLAYER PROFILE POPUP -->
  <div id="playerProfileOverlay" class="profile-overlay hidden" onclick="closePlayerProfile(event)">
      <div class="profile-card" id="playerProfileCard">
          <button class="profile-close" onclick="closePlayerProfile()">✕</button>
          <div id="profileContent" class="profile-content">
              <div class="profile-loading"><div class="tb-spinner"></div></div>
          </div>
      </div>
  </div>

  <script type="module" src="ppl-edit-team.js"></script>
</body>
</html>
