<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPL 2026 | Edit Phase XI</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/team-builder.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script type="module" src="auth-guard.js"></script>

  <style>
    .phase-toggle-row { display: flex; gap: 8px; padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); }
    .phase-tab { flex: 1; padding: 10px; border-radius: var(--btn-radius); border: 1px solid var(--border-card); background: rgba(0,0,0,0.2); color: var(--text-faint); font-family: var(--font-display); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; text-align: center; transition: var(--transition); }
    .phase-tab.active { background: var(--accent-dim); border-color: var(--border-accent); color: var(--accent); }
    .phase-tab:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>

<body class="loading-state">

  <!-- LOADING -->
  <div id="loadingOverlay">
    <div class="tb-spinner"></div>
  </div>

  <div class="app-container">

    <!-- HEADER -->
    <header class="edit-header">
      <div class="header-left">
        <a href="ppl-home.html" class="icon-back" aria-label="Back to home"><i class="fas fa-arrow-left"></i></a>
        <div class="header-info">
          <h1 class="header-title">Edit Team</h1>
        </div>
      </div>
      <div class="header-right">
        <div id="upcomingMatchName" class="match-name">Tournament Deadline</div>
        <div id="headerCountdown" class="match-timer">--</div>
      </div>
    </header>

    <!-- STICKY DASHBOARD -->
    <div class="sticky-controls">

      <!-- PHASE TOGGLE -->
      <div class="phase-toggle-row" id="phaseToggleRow">
        <!-- Buttons injected via JS based on open phases -->
      </div>

      <!-- PROGRESS + STATS -->
      <div class="premium-progress" style="padding-top: 10px;">
        <div id="teamDotsRow" class="team-dots-row"></div>
        <div class="progress-labels" style="justify-content: center; gap: 20px;">
          <div class="dashboard-item">
            <i class="di-icon fas fa-users"></i>
            <span id="playerCountLabel">0</span><span class="di-max">/11</span>
          </div>
          <div class="dashboard-item">
            <i class="di-icon fas fa-star" style="color: #fbbf24;"></i>
            <span id="starCountLabel">0</span><span class="di-max">/4</span>
          </div>
          <div class="dashboard-item">
            <i class="di-icon fas fa-coins" style="color: var(--accent);"></i>
            <span id="creditCount">100</span><span class="di-max"> left</span>
          </div>
        </div>
      </div>

      <!-- VIEW TABS -->
      <div class="view-tabs">
        <button class="toggle-btn" data-mode="myxi">My XI</button>
        <button class="toggle-btn active" data-mode="playerPool">Edit Squad</button>
      </div>

<!-- SEARCH + ROLE TABS + FILTER PILLS -->
      <div class="search-filter-wrapper">
        <div class="role-search-row">
            <div class="role-navigation-wrapper">
                <div class="role-tabs-container">
                    <!-- WK removed, BAT is now the default active tab -->
                    <div class="role-tab active" data-role="BAT">BAT <span id="count-BAT">0</span></div>
                    <div class="role-tab" data-role="AR">AR <span id="count-AR">0</span></div>
                    <div class="role-tab" data-role="BOWL">BOWL <span id="count-BOWL">0</span></div>
                    <div class="role-slider-bg"></div>
                </div>
            </div>
            <button class="search-icon-btn" id="searchIconBtn"><i class="fas fa-search"></i></button>
        </div>

        <div class="search-overlay-row hidden" id="searchOverlayRow">
            <input type="text" id="playerSearch" placeholder="Search any player…" autocomplete="off" spellcheck="false">
            <button class="search-close-btn" id="searchCloseBtn">✕</button>
        </div>

        <div class="dropdown-filters">
            <button id="teamToggle"   class="pill-filter">Teams</button>
            <button id="creditToggle" class="pill-filter">Credits</button>
        </div>
      </div>

    </div>

    <!-- MAIN CONTENT -->
    <main class="content-area">
      <div id="myxi-view" class="view-mode">
        <div class="rules-box" style="margin: 10px 16px; background: rgba(154,224,0,0.04); border: 1px solid var(--border-accent); border-radius: 10px; padding: 10px; font-size: 11px; color: var(--text-faint); text-align: center;">
          💡 <strong>PPL Rules:</strong> 11 Players · 100 Credits · Max 4 ⭐ Stars<br>Min 3 BAT · Min 1 AR · Min 3 BOWL
        </div>
        <div id="myXIList" class="player-list"></div>
      </div>
      <div id="playerPool-view" class="view-mode active">
        <div id="playerPoolList" class="player-list"></div>
      </div>
    </main>

  </div>

  <!-- SAVE BAR -->
  <div class="save-bar">
    <div class="save-hint" id="saveHint"></div>
    <div class="save-bar-buttons">
        <button id="previewTeamBtn" class="preview-btn">👁 Preview</button>
        <button id="saveTeamBtn" class="save-btn" disabled>SAVE TEAM</button>
    </div>
  </div>

  <!-- PREVIEW POPUP -->
  <div id="previewOverlay" class="preview-overlay hidden">
      <div class="preview-popup" id="previewPopup">
          <div class="preview-popup-header">
              <span class="preview-popup-title" id="previewTitle">Phase XI Preview</span>
              <button class="preview-popup-close" id="previewCloseBtn">✕</button>
          </div>
          <div class="preview-field" id="previewField">
              <p class="preview-empty">No players selected yet.</p>
          </div>
      </div>
  </div>

  <!-- FILTER BACKDROP & MENUS -->
  <div id="filterBackdrop" class="filter-backdrop hidden"></div>
  <div id="teamMenu"   class="dropdown-menu bottom-sheet"></div>
  <div id="creditMenu" class="dropdown-menu bottom-sheet"></div>

  <!-- TOAST -->
  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="ppl-edit-team.js"></script>
</body>
</html>
