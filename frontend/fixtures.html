<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Match Center · Cricket Experts</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/fixtures.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <script type="module" src="auth-guard.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
  <div class="fixtures-app page-with-nav">

    <!-- HEADER -->
    <header class="fixtures-header">
      <a href="/home" class="icon-back" aria-label="Back to home">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div class="header-title">
        <h1>Match Center</h1>
        <p id="matchCountSummaryText">Loading schedule…</p>
      </div>
    </header>

    <!-- FILTERS
         These IDs must match exactly what fixtures.js queries:
           #statusFilters  — pill buttons injected by renderStatusFilters()
           #teamFilters    — pill buttons injected by renderTeamFilters()
         The old HTML had these inside dropdown wrappers which the
         new JS doesn't use — that mismatch was causing the broken state.
    -->
    <section class="filters-section">

      <div class="filter-group">
        <span class="filter-label">Status</span>
        <div id="statusFilters" class="filter-options"></div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Teams</span>
        <div id="teamFilters" class="filter-options team-filter-scroll"></div>
      </div>

    </section>

    <!-- MATCHES -->
    <main id="matchesContainer" class="matches-container">
      <div class="fixtures-loading">
        <div class="fixtures-spinner"></div>
        <p>Syncing match data…</p>
      </div>
    </main>

  </div>

  <div id="toastContainer" class="toast-container"></div>


  <script type="module" src="fixtures.js"></script>
  <script type="module" src="ad-manager.js"></script>
</body>
</html>
