<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cricket Experts · View Team</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/team-view.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- BUG FIX #1: auth-guard.js now handles session — no more manual getSession() -->
  <script type="module" src="auth-guard.js"></script>
  <!-- Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BMYSEG9XNL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BMYSEG9XNL');
  </script>
</head>

<body class="loading-state">

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay">
    <div class="cricket-loader-wrap">
      <div class="pitch-line"></div>
      <div class="cricket-ball"></div>
      <div class="bowler-pos">🏏</div>
    </div>
    <p class="loading-text">Players getting ready…</p>
  </div>

  <div class="team-view-app">

    <!-- HEADER -->
    <header class="premium-header">
      <!-- BUG FIX #7: /home clean URL instead of home.html -->
<a href="javascript:history.back()" class="icon-back" aria-label="Go Back">
  <i class="fas fa-arrow-left"></i>
</a>

      <div class="header-center">
        <h1 class="main-title" id="viewTitle">View Team</h1>
        <div id="boosterIndicator" class="booster-indicator-view hidden"></div>
        <div id="countdownContainer" class="countdown-text hidden">
          Starts in: <span id="timer">--</span>
        </div>
        <button id="viewHistoryBtn" class="history-trigger">
          <i class="fas fa-history"></i> Match History
        </button>
      </div>

      <!-- BUG FIX #8: replaced inline width:40px div with semantic CSS class -->
      <div class="header-spacer" aria-hidden="true"></div>
        
    </header>

    <!-- XI TOGGLE -->
    <div class="xi-toggle">
      <button class="xi-tab active" id="tabUpcoming" data-tab="current">Upcoming XI</button>
      <button class="xi-tab" id="tabLocked" data-tab="locked">Last Match</button>
    </div>

    <!-- TEAM FIELD -->
    <main class="team-field" id="teamContainer"></main>
    <div id="teamStatus" class="team-status"></div>
<div class="all-time-views-bar" id="allTimeViewBar">
    <span id="allTimeViewCount">👁️ — all time</span>
</div>
    <!-- ── HISTORY OVERLAY ─────────────────────────────── -->
    <div id="historyOverlay" class="overlay hidden">
      <div class="overlay-content">
        <div class="overlay-header">
          <h3 class="overlay-title">Season History</h3>
          <button class="close-btn" id="closeHistory" aria-label="Close history">&times;</button>
        </div>
        <div id="historySummary" class="history-summary">
          <div class="history-summary-card">
            <span class="history-summary-label">Subs Left</span>
            <span class="history-summary-value" id="historySubsRemaining">--</span>
          </div>
          <div class="history-summary-card">
            <span class="history-summary-label">Boosters Left</span>
            <span class="history-summary-value" id="historyBoostersLeft">--</span>
          </div>
        </div>
        <div id="historyList" class="scroll-area"></div>
      </div>
    </div>

    <!-- ── BREAKDOWN OVERLAY ────────────────────────────── -->
    <div id="breakdownOverlay" class="overlay hidden">
      <div class="overlay-content breakdown-view">
        <div class="overlay-header">
          <button class="back-arrow" id="backToHistory" aria-label="Back to history">
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <h3 class="overlay-title" id="breakdownTitle">Match Details</h3>
        </div>
        <!-- BUG FIX #9: margin and display removed from inline style, now uses CSS class -->
        <div id="breakdownBooster" class="booster-indicator-view breakdown-booster-badge hidden"></div>
        <div class="breakdown-body">
          <div id="breakdownTeamContainer" class="team-field smaller-field"></div>
        </div>
        <!-- BUG FIX #9: footer now uses structured children styled via CSS -->
        <footer class="breakdown-footer" id="breakdownFooter"></footer>
      </div>
    </div>

    <!-- ── PLAYER POINT LOG OVERLAY ─────────────────────── -->
    <div id="playerPointLogOverlay" class="overlay overlay-top hidden">
      <div class="overlay-content player-breakdown-popup">
        <div class="overlay-header">
          <h3 class="overlay-title" id="pplPlayerName">Player Points</h3>
          <button class="close-btn" id="closePPL" aria-label="Close">&times;</button>
        </div>
        <div id="pplContent" class="scroll-area"></div>
      </div>
    </div>

  </div><!-- end .team-view-app -->

  <script type="module" src="team-view.js"></script>
  <script type="module" src="ad-manager.js"></script>
</body>
</html>
