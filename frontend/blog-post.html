<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title id="pageTitle">Cricket Experts</title>
<meta name="description" id="pageDesc" content="IPL 2026 cricket articles from Cricket Experts.">
<meta name="robots" content="index,follow">
<meta property="og:type" content="article">
<meta property="og:title" id="ogTitle" content="Cricket Experts">
<meta property="og:description" id="ogDesc" content="">
<meta property="og:image" id="ogImg" content="https://fantasy-season-app.vercel.app/favicon.png">
<meta property="og:url" id="ogUrl" content="https://fantasy-season-app.vercel.app/">

<link rel="canonical" id="canonical" href="https://fantasy-season-app.vercel.app/">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<script async src="https://gizokraijaw.net/vignette.min.js" data-zone="10742556"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#9AE000;--gdim:rgba(154,224,0,0.09);--ink:#020617;--card:#0d1625;--bdr:rgba(255,255,255,0.08);--muted:#94a3b8;--FD:'Barlow Condensed',sans-serif;--FB:'DM Sans',sans-serif}
body{background:var(--ink);color:#f0f4f8;font-family:var(--FB);min-height:100vh}
a{text-decoration:none;color:inherit}
.nav{position:sticky;top:0;z-index:100;background:rgba(2,6,23,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;padding:0 16px;height:50px}
.back{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:600;background:transparent;border:none;cursor:pointer;padding:0;font-family:var(--FB)}
.back:hover{color:#f0f4f8}
.brand{font-family:var(--FD);font-size:16px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin-left:auto}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 60px}
.sk-line{height:14px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:10px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.art-cat{display:inline-flex;align-items:center;gap:6px;background:var(--gdim);border:1px solid rgba(154,224,0,.2);border-radius:20px;padding:4px 12px;font-family:var(--FD);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g);margin-bottom:14px}
.art-title{font-family:var(--FD);font-size:clamp(26px,7vw,40px);font-weight:900;line-height:1.05;text-transform:uppercase;letter-spacing:-0.3px;margin-bottom:12px}
.art-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--bdr)}
.meta-item{font-size:12px;color:var(--muted)}
.match-pill{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:7px;padding:3px 10px;font-family:var(--FD);font-size:11px;font-weight:700;color:#f59e0b}
.cover-img{width:100%;max-height:380px;object-fit:cover;border-radius:12px;display:block;margin-bottom:0}
.cover-cap{font-size:12px;color:#64748b;text-align:center;font-style:italic;padding:8px 12px 16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-top:none;border-radius:0 0 12px 12px;margin-bottom:16px}
.art-body{font-size:15px;line-height:1.85;color:#cbd5e1}
.art-body h2{font-family:var(--FD);font-size:23px;font-weight:800;text-transform:uppercase;color:#f0f4f8;margin:26px 0 9px;letter-spacing:.2px}
.art-body h3{font-family:var(--FD);font-size:18px;font-weight:800;color:var(--g);margin:20px 0 7px;text-transform:uppercase}
.art-body p{margin-bottom:14px}
.art-body strong{color:#f0f4f8;font-weight:700}
.art-body em{font-style:italic;color:#94a3b8}
.art-body ul,.art-body ol{padding-left:20px;margin-bottom:14px}
.art-body li{margin-bottom:5px}
.art-body blockquote{border-left:3px solid var(--g);padding:10px 16px;background:rgba(154,224,0,.04);border-radius:0 8px 8px 0;margin:14px 0;color:#94a3b8;font-style:italic}
.art-body hr{border:none;border-top:1px solid var(--bdr);margin:22px 0}
.art-body img{width:100%;border-radius:10px;margin:10px 0}
.art-body table{width:100%;border-collapse:collapse;font-size:14px;margin:14px 0}
.art-body table th,.art-body table td{padding:9px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
.art-body table thead{background:rgba(154,224,0,.08)}
.ad-slot{background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.06);border-radius:10px;padding:12px;text-align:center;margin:18px 0;min-height:80px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
.back-cat{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);margin-top:28px;transition:border-color .2s;cursor:pointer}
.back-cat:hover{border-color:rgba(255,255,255,.18);color:#f0f4f8}
.err{text-align:center;padding:60px 20px;color:var(--muted)}
.err h2{font-family:var(--FD);font-size:26px;font-weight:900;color:#f0f4f8;text-transform:uppercase;margin-bottom:10px}
.hidden{display:none!important}
</style>
</head>
<body>
<nav class="nav">
  <button class="back" id="backBtn">← <span id="backLbl">Back</span></button>
<a class="brand" href="/">Cricket Experts</a>
</nav>
<div class="wrap">
  <div id="skeleton">
    <div class="sk-line" style="width:28%;margin-bottom:16px"></div>
    <div class="sk-line" style="width:88%;height:30px;margin-bottom:7px"></div>
    <div class="sk-line" style="width:65%;height:30px;margin-bottom:20px"></div>
    <div class="sk-line" style="width:45%;margin-bottom:22px"></div>
    <div class="sk-line"></div><div class="sk-line" style="width:94%"></div>
    <div class="sk-line" style="width:87%"></div><div class="sk-line" style="width:91%"></div>
  </div>
  <div class="hidden" id="artWrap">
    <div class="art-cat" id="artCat"></div>
    <h1 class="art-title" id="artTitle"></h1>
    <div class="art-meta">
      <span class="meta-item" id="artDate"></span>
      <span class="meta-item" id="artAuthor"></span>
      <span class="match-pill hidden" id="artMatch"></span>
    </div>
    <div class="ad-slot">Advertisement</div>
    <div id="artBody" class="art-body"></div>
    <div class="ad-slot">Advertisement</div>
    <a class="back-cat" id="backCat">← More articles</a>
  </div>
  <div class="hidden" id="errWrap">
    <div class="err"><h2>Article Not Found</h2><p>This article may have been removed or the link is incorrect.</p><a href="/" style="color:var(--g);margin-top:16px;display:inline-block">← Back to home</a></div>
  </div>
</div>
<script type="module">
  import DOMPurify from 'https://cdn.jsdelivr.net/npm/dompurify@3.0.6/+esm';


import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const sb = createClient(
  "https://tuvqgcosbweljslbfgqc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo"
);
const CATS = {
  "ipl-news": "IPL News",
  "team-news": "Team News",
  "match-preview": "Match Hub",       // previews + reviews
  "fantasy-preview": "Fantasy Preview",
  "player-spotlight": "Player Spotlight",
};

const PAGES = {
  "ipl-news": "ipl-news.html",
  "team-news": "team-news.html",
  "match-preview": "match-preview.html",
  "fantasy-preview": "fantasy-preview.html",
  "player-spotlight": "player-spotlight.html",
};

const slug = new URLSearchParams(location.search).get("slug");
if (!slug) { showErr(); } else { loadArticle(slug); }

async function loadArticle(slug) {
  try {
    const { data: post, error } = await sb.from("articles").select("*").eq("slug", slug).eq("published", true).maybeSingle();
    document.getElementById("skeleton").style.display = "none";
    if (error || !post) { showErr(); return; }

    // SEO
    const articleUrl = `https://fantasy-season-app.vercel.app/blog-post.html?slug=${slug}`;

document.getElementById("pageTitle").textContent = (post.title || "Article") + " · Cricket Experts";
document.getElementById("pageDesc").content      = post.excerpt || "";
document.getElementById("ogTitle").content       = post.title  || "Cricket Experts";
document.getElementById("ogDesc").content        = post.excerpt || "";
document.getElementById("canonical").href        = articleUrl;
document.getElementById("ogUrl").content         = articleUrl;
if (post.cover_image) document.getElementById("ogImg").content = post.cover_image;


    // Back nav
    const catPage = PAGES[post.category] || "/";
    const catLabel = CATS[post.category] || "Articles";
    document.getElementById("backBtn").onclick = () => window.location.href = catPage;
    document.getElementById("backLbl").textContent = catLabel;
    const bc = document.getElementById("backCat");
    bc.href = catPage;
    bc.textContent = "← More " + catLabel;

    // Populate
    const catEl = document.getElementById("artCat");
    catEl.textContent = (post.cover_emoji ? post.cover_emoji + " " : "") + (CATS[post.category] || post.category || "Article");

    document.getElementById("artTitle").textContent = post.title || "";
    document.getElementById("artDate").textContent  = "📅 " + new Date(post.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});
    document.getElementById("artAuthor").textContent = "✍️ " + (post.author || "Cricket Experts");

    if (post.match_label) {
      const me = document.getElementById("artMatch");
      me.textContent = "🏟️ " + post.match_label;
      me.classList.remove("hidden");
    }

    // Cover image
    const bodyEl = document.getElementById("artBody");
    if (post.cover_image) {
      const img = document.createElement("img");
      img.src = post.cover_image;
      img.alt = post.title || "Cover image";
      img.className = "cover-img";
      img.loading = "lazy";
      bodyEl.appendChild(img);
      if (post.img_caption) {
        const cap = document.createElement("div");
        cap.className = "cover-cap";
        cap.textContent = post.img_caption;
        bodyEl.appendChild(cap);
      }
    }

    // Content — stored as HTML, render directly
    const contentDiv = document.createElement("div");
contentDiv.innerHTML = DOMPurify.sanitize(post.content || "");
    bodyEl.appendChild(contentDiv);

    document.getElementById("artWrap").classList.remove("hidden");

    // View count — fire and forget
    try { sb.from("articles").update({ views: (post.views || 0) + 1 }).eq("id", post.id); } catch(_) {}

  } catch(err) {
    document.getElementById("skeleton").style.display = "none";
    showErr();
    console.error(err);
  }
}

function showErr() {
  document.getElementById("skeleton").style.display = "none";
  document.getElementById("errWrap").classList.remove("hidden");
}
</script>
<script type="module" src="ad-manager.js"></script>
</body>
</html>
