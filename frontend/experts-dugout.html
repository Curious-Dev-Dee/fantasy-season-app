

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0f1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2a40;
--accent:#9AE000;--accent-dim:rgba(154,224,0,0.12);--accent-border:rgba(154,224,0,0.25);
--gold:#f59e0b;--red:#ef4444;--blue:#7cc4ff;--purple:#a78bfa;
--text1:#f1f5f9;--text2:#94a3b8;--text3:#475569;
--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
--ff:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text1);font-family:var(--fb);font-size:14px;min-height:100vh;padding-bottom:20px}
a{color:var(--accent)}
.wrap{max-width:420px;margin:0 auto;padding:0 12px}

/* HEADER */
.hdr{background:rgba(10,15,26,0.98);border-bottom:1px solid var(--border2);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-title{font-family:var(--ff);font-size:22px;font-weight:900;color:var(--accent);text-transform:uppercase;letter-spacing:1px;flex:1}
.hdr-sub{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.hdr-icon{width:36px;height:36px;border-radius:10px;background:var(--accent-dim);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:15px}

/* TEAM SELECTOR */
.sel-wrap{padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
.sel-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.sel{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text1);font-family:var(--fb);font-size:13px;font-weight:600;outline:none;appearance:none;cursor:pointer}
.toggle-row{display:flex;gap:6px;margin-top:8px}
.tgl{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--ff);font-size:11px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
.tgl.on{background:var(--accent);color:#000;border-color:var(--accent)}

/* CONTENT AREA */
.content{padding:12px 16px;display:flex;flex-direction:column;gap:10px}

/* SECTION CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ci-green{background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent)}
.ci-gold{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:var(--gold)}
.ci-blue{background:rgba(124,196,255,0.1);border:1px solid rgba(124,196,255,0.2);color:var(--blue)}
.ci-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red)}
.ci-purple{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);color:var(--purple)}
.card-title{font-family:var(--ff);font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:0.5px}
.card-body{padding:12px 14px}

/* HERO */
.hero{background:var(--bg2);border:1px solid var(--accent-border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.hero-avatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--accent);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:18px;font-weight:900;color:var(--accent);flex-shrink:0}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:var(--ff);font-size:19px;font-weight:900;color:var(--text1);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-rank{font-family:var(--ff);font-size:13px;font-weight:800;color:var(--blue);margin-top:2px}
.hero-badge{display:inline-block;margin-top:4px;font-family:var(--ff);font-size:9px;font-weight:900;padding:2px 8px;border-radius:20px;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);text-transform:uppercase;letter-spacing:0.5px}
.hero-pts{text-align:right}
.hero-pts-val{font-family:var(--ff);font-size:28px;font-weight:900;color:var(--accent);line-height:1}
.hero-pts-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.stat-grid.two{grid-template-columns:repeat(2,1fr)}
.stat-cell{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-val{font-family:var(--ff);font-size:21px;font-weight:900;line-height:1;display:block}
.sv-green{color:var(--accent)}.sv-gold{color:var(--gold)}.sv-blue{color:var(--blue)}.sv-red{color:var(--red)}.sv-purple{color:var(--purple)}.sv-white{color:var(--text1)}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;display:block;line-height:1.3}

/* INSIGHT ROWS */
.insight{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:10px;margin-bottom:6px;border:1px solid transparent}
.insight:last-child{margin-bottom:0}
.insight.pos{background:rgba(154,224,0,0.05);border-color:rgba(154,224,0,0.15)}
.insight.warn{background:rgba(245,158,11,0.05);border-color:rgba(245,158,11,0.18)}
.insight-ico{font-size:17px;flex-shrink:0;margin-top:1px}
.insight-txt{font-size:12px;color:var(--text2);line-height:1.6}
.insight-txt strong{color:var(--text1)}

/* FORM DOTS */
.form-row{display:flex;gap:10px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.form-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.form-dot{width:34px;height:34px;border-radius:50%;border:2px solid transparent;display:flex;align-items:center;justify-content:center}
.fd-hot{background:rgba(154,224,0,0.15);border-color:var(--accent);box-shadow:0 0 8px rgba(154,224,0,0.3)}
.fd-good{background:rgba(154,224,0,0.07);border-color:rgba(154,224,0,0.3)}
.fd-ok{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.3)}
.fd-bad{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3)}
.fd-lbl{font-size:9px;color:var(--text3)}
.fd-emoji{font-size:12px;line-height:1}
.fd-score{font-family:var(--ff);font-size:9px;font-weight:800;color:var(--text3)}
.form-legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.fl-item{font-size:10px;color:var(--text3)}
.form-note{text-align:center;font-size:11px;color:var(--text3);font-style:italic}
.form-note strong{color:var(--text1)}

/* TREND ROW */
.trend-row{display:flex;gap:6px}
.trend-cell{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center}
.trend-label{font-family:var(--ff);font-size:8px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px}
.trend-val{font-family:var(--ff);font-size:17px;font-weight:900;display:block;line-height:1}
.trend-sub{font-size:8px;color:var(--text3);display:block;margin-top:2px}
.trend-up{display:block;font-size:9px;color:var(--accent);margin-top:2px}
.trend-dn{display:block;font-size:9px;color:var(--red);margin-top:2px}

/* CHART CANVAS */
.chart-wrap{position:relative;height:130px;margin-top:10px}
.chart-wrap canvas{width:100%!important;height:100%!important}
.chart-lbl{font-family:var(--ff);font-size:8px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}

/* BEST/WORST */
.bw-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bw-cell{border-radius:10px;padding:12px;text-align:center}
.bw-best{background:rgba(154,224,0,0.05);border:1px solid rgba(154,224,0,0.15)}
.bw-worst{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15)}
.bw-ico{font-size:18px;margin-bottom:5px;display:block}
.bw-val{font-family:var(--ff);font-size:26px;font-weight:900;display:block;line-height:1}
.bw-best .bw-val{color:var(--accent)}.bw-worst .bw-val{color:var(--red)}
.bw-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;display:block}
.bw-delta{font-size:10px;margin-top:4px;display:block;font-weight:600}
.bw-pos{color:var(--accent)}.bw-neg{color:var(--red)}

/* STREAKS */
.streak-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.streak-cell{border-radius:12px;padding:14px;text-align:center}
.sk-hot{background:rgba(154,224,0,0.05);border:1px solid rgba(154,224,0,0.15)}
.sk-cold{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15)}
.sk-ico{font-size:22px;margin-bottom:6px;display:block}
.sk-val{font-family:var(--ff);font-size:30px;font-weight:900;line-height:1;display:block}
.sk-hot .sk-val{color:var(--accent)}.sk-cold .sk-val{color:var(--red)}
.sk-lbl{font-family:var(--ff);font-size:10px;font-weight:800;text-transform:uppercase;margin-top:4px;display:block}
.sk-hot .sk-lbl{color:var(--accent)}.sk-cold .sk-lbl{color:var(--red)}
.sk-sub{font-size:9px;color:var(--text3);margin-top:3px;display:block;line-height:1.4}

/* CAPTAIN */
.cap-wrap{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.cap-circle{width:72px;height:72px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.cap-pct{font-family:var(--ff);font-size:18px;font-weight:900;line-height:1}
.cap-sub{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.cap-info{flex:1}
.cap-label{font-family:var(--ff);font-size:14px;font-weight:900;text-transform:uppercase;margin-bottom:4px}
.cap-desc{font-size:11px;color:var(--text2);line-height:1.5}
.cap-picks{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.cp-title{font-family:var(--ff);font-size:9px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.cp-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cp-row:last-child{border-bottom:none}
.cp-name{font-size:12px;font-weight:700;flex:1}
.cp-times{font-size:10px;color:var(--text3)}
.cp-pts{font-family:var(--ff);font-size:13px;font-weight:900;color:var(--gold)}

/* BOOSTER */
.boost-summary{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;gap:8px}
.bs-stat{text-align:center;min-width:48px}
.boost-tag{font-family:var(--ff);font-size:10px;font-weight:900;color:var(--gold);background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:5px 10px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.3px}
.boost-list{display:flex;flex-direction:column;gap:6px}
.boost-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
.boost-row.best{background:rgba(245,158,11,0.05);border-color:rgba(245,158,11,0.2)}
.boost-ico{font-size:18px;flex-shrink:0}
.boost-info{flex:1;min-width:0}
.boost-name{font-size:12px;font-weight:700;display:block}
.boost-match{font-size:10px;color:var(--text3);display:block;margin-top:1px}
.boost-right{text-align:right}
.boost-pts{font-family:var(--ff);font-size:16px;font-weight:900;color:var(--text2)}
.boost-row.best .boost-pts{color:var(--gold)}
.boost-ptsl{font-size:8px;color:var(--text3);display:block;text-transform:uppercase}
.boost-delta{font-family:var(--ff);font-size:10px;font-weight:800;display:block;margin-top:2px}
.bd-pos{color:var(--accent)}.bd-neg{color:var(--red)}

/* H2H */
.h2h-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.h2h-side{text-align:center}
.h2h-val{font-family:var(--ff);font-size:34px;font-weight:900;line-height:1}
.h2h-win .h2h-val{color:var(--accent)}.h2h-loss .h2h-val{color:var(--text3)}
.h2h-lbl{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase}
.h2h-vs{font-family:var(--ff);font-size:14px;font-weight:900;color:var(--text3);text-align:center;line-height:1.3}
.h2h-bar{height:6px;background:rgba(239,68,68,0.2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.h2h-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 1s}
.h2h-note{text-align:center;font-size:11px;color:var(--text3);font-style:italic}

/* PLAYER LIST */
.player-list{display:flex;flex-direction:column;gap:6px}
.player-card{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.p-rank{font-family:var(--ff);font-size:16px;font-weight:900;color:var(--text3);width:20px;text-align:center;flex-shrink:0}
.p-rank.r1{color:var(--gold)}.p-rank.r2{color:var(--blue)}.p-rank.r3{color:#fb923c}
.p-info{flex:1;min-width:0}
.p-name{font-size:13px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:10px;color:var(--text3);margin-top:1px;display:block}
.p-pts{font-family:var(--ff);font-size:15px;font-weight:900;color:var(--accent);display:block;text-align:right}
.p-pts-lbl{font-size:8px;color:var(--text3);display:block;text-align:right;text-transform:uppercase}

/* ROLE TABS */
.role-tabs{display:flex;gap:5px;margin-bottom:10px}
.role-tab{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--ff);font-size:10px;font-weight:900;cursor:pointer;text-transform:uppercase;text-align:center;transition:.15s}
.role-tab.on{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}

/* DEAD WEIGHT */
.dw-warning{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--red);margin-bottom:8px}
.dw-list{display:flex;flex-direction:column;gap:6px}
.dw-row{display:flex;align-items:flex-start;justify-content:space-between;background:var(--bg3);border:1px solid rgba(239,68,68,0.15);border-radius:10px;padding:9px 11px;gap:8px}
.dw-left{display:flex;align-items:flex-start;gap:8px;min-width:0;flex:1}
.dw-info{display:flex;flex-direction:column}
.dw-name{font-size:13px;font-weight:700}
.dw-meta{font-size:10px;color:var(--text3);margin-top:1px}
.dw-urgency{font-family:var(--ff);font-size:9px;font-weight:800;color:var(--text3);margin-top:3px;text-transform:uppercase}
.dw-pts{font-family:var(--ff);font-size:14px;font-weight:900;color:var(--red);flex-shrink:0}
.dw-clean{text-align:center;padding:16px 0}
.dw-clean-ico{font-size:28px;margin-bottom:6px}
.dw-clean-txt{font-family:var(--ff);font-size:15px;font-weight:900;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
.dw-clean-sub{font-size:11px;color:var(--text3)}

/* ZONE */
.zone-block{border-radius:12px;overflow:hidden;margin-bottom:8px}
.zone-block:last-child{margin-bottom:0}
.zone-strong{background:rgba(154,224,0,0.04);border:1px solid rgba(154,224,0,0.15)}
.zone-weak{background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15)}
.zone-hdr{padding:9px 12px;font-family:var(--ff);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.zone-strong .zone-hdr{color:var(--accent);background:rgba(154,224,0,0.07);border-bottom:1px solid rgba(154,224,0,0.12)}
.zone-weak .zone-hdr{color:var(--red);background:rgba(239,68,68,0.07);border-bottom:1px solid rgba(239,68,68,0.12)}
.zone-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03)}
.zone-item:last-child{border-bottom:none}
.zone-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.zone-title{font-family:var(--ff);font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:0.3px;color:var(--text1);margin-bottom:3px}
.zone-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* MOMENTUM */
.mmt-wrap{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.mmt-circle{width:78px;height:78px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.mmt-grade{font-family:var(--ff);font-size:24px;font-weight:900;line-height:1}
.mmt-total{font-size:10px;font-weight:600;margin-top:2px}
.mmt-info{flex:1}
.mmt-emoji{font-size:20px;margin-bottom:4px}
.mmt-desc{font-family:var(--ff);font-size:14px;font-weight:900;text-transform:uppercase;margin-bottom:3px}
.mmt-sub{font-size:9px;color:var(--text3);line-height:1.5}
.mmt-bars{display:flex;flex-direction:column;gap:9px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.mmt-bar-row{display:flex;align-items:center;gap:8px}
.mmt-bar-label{font-size:10px;color:var(--text3);width:85px;flex-shrink:0}
.mmt-bar-track{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.mmt-bar-fill{height:100%;border-radius:3px}
.mmt-bar-val{font-family:var(--ff);font-size:10px;font-weight:900;color:var(--text2);width:30px;text-align:right;flex-shrink:0}
.mmt-bar-explain{font-size:9px;color:var(--text3);font-style:italic;padding-left:93px;margin-top:-3px;line-height:1.4}

/* COMPARE */
.cmp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cmp-team{font-family:var(--ff);font-size:12px;font-weight:900;text-transform:uppercase;flex:1;text-align:center}
.cmp-vs{font-family:var(--ff);font-size:11px;font-weight:900;color:var(--text3);padding:0 8px;flex-shrink:0}
.cmp-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.cmp-row:last-child{border-bottom:none}
.cmp-val{font-family:var(--ff);font-size:14px;font-weight:900;color:var(--text3);flex:1;text-align:center}
.cmp-val.win{color:var(--accent)}
.cmp-lbl{font-size:10px;color:var(--text3);flex:1;text-align:center;text-transform:uppercase;letter-spacing:0.5px}
.cmp-section{font-family:var(--ff);font-size:9px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:10px 0 4px;border-bottom:1px solid var(--border);margin-bottom:2px;text-align:center}
.cmp-verdict{border:1px solid;border-radius:10px;padding:10px 14px;text-align:center;margin-bottom:12px;display:flex;flex-direction:column;gap:3px}
.cmp-verdict-main{font-family:var(--ff);font-size:16px;font-weight:900}
.cmp-verdict-sub{font-size:10px;color:var(--text3)}

/* SHARE */
.share-card{background:var(--bg3);border:1px solid var(--accent-border);border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
.share-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.share-top{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:10px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}

function loadTeam(id){

function sec(iconColor,iconEmoji,title){
  const el=document.createElement('div');el.className='card';
  el.innerHTML=`<div class="card-hdr"><div class="card-icon ${iconColor}">${iconEmoji}</div><div class="card-title">${title}</div></div><div class="card-body"></div>`;
  return el;
}

function playerCard(p,rank){
  const rc=rank<=3?`r${rank}`:'';
  return `<div class="player-card"><div class="p-rank ${rc}">${rank}</div><div class="p-info"><span class="p-name">${p.name||'Unknown'}</span><span class="p-meta">${p.role} · ${p.matches_played} matches</span></div><div style="text-align:right"><span class="p-pts">${p.pts}</span><span class="p-pts-lbl">pts earned</span></div></div>`;
}

function buildHero(d,totalPlayers){
  const pct=d.rank&&totalPlayers>1?Math.round(((totalPlayers-d.rank)/(totalPlayers-1))*100):null;
  const el=document.createElement('div');el.className='hero';
  el.innerHTML=`<div class="hero-avatar">${d.initials}</div><div class="hero-info"><div class="hero-name">${d.team_name}</div><div class="hero-rank">Rank #${d.rank}</div>${pct!==null?`<span class="hero-badge">Top ${100-pct}% of ${totalPlayers} managers</span>`:''}</div><div class="hero-pts"><div class="hero-pts-val">${d.total_points.toLocaleString()}</div><div class="hero-pts-lbl">Total pts</div></div>`;
  return el;
}

function buildKeyInsights(d,totalPlayers){
  const s=sec('ci-green','&#128161;','Key Insights');
  const body=s.querySelector('.card-body');
  const avg=d.avg_score,last3=d.last3,capRate=d.captain_success_rate,consistency=d.consistency,bestStreak=d.best_streak,boostersRem=d.boosters_remaining,matchCount=d.matches_played,boosterHistory=d.booster_history||[];
  const boostersUsed=boosterHistory.length;
  const boosterPtsTotal=boosterHistory.reduce((a,b)=>a+(b.pts||0),0);
  const boosterAvgDelta=boostersUsed>0&&avg>0?Math.round(boosterPtsTotal/boostersUsed-avg):null;
  const pct=d.rank&&totalPlayers>1?Math.round(((totalPlayers-d.rank)/(totalPlayers-1))*100):null;
  const insights=[];
  if(d.rank===1)insights.push({cls:'pos',ico:'&#128081;',txt:`You are <strong>Rank #1</strong> — the best manager in the tournament right now!`});
  else if(pct!==null&&pct>=70)insights.push({cls:'pos',ico:'&#127942;',txt:`You are in the <strong>Top ${100-pct}%</strong> of all ${totalPlayers} managers — elite territory.`});
  if(d.subs_remaining<0)insights.push({cls:'warn',ico:'&#9888;',txt:`<strong>Sub budget overdrawn</strong> — you have ${Math.abs(d.subs_remaining)} negative subs. Your team is essentially frozen from here.`});
  else if(boostersRem<=1&&boostersUsed>=5)insights.push({cls:'warn',ico:'&#128293;',txt:`<strong>${boostersRem} booster left</strong> after using ${boostersUsed} — your edge from here will be base avg only.`});
  if(avg>0&&last3>0){const delta=Math.round(last3-avg);if(delta>=20)insights.push({cls:'pos',ico:'&#128200;',txt:`On fire — last 3 match avg is <strong>+${delta} pts above</strong> your season average.`});else if(delta<=-20)insights.push({cls:'warn',ico:'&#128201;',txt:`Form has dipped — last 3 avg is <strong>${Math.abs(delta)} pts below</strong> your season average.`});}
  if(capRate>=70)insights.push({cls:'pos',ico:'&#128081;',txt:`Elite captaincy — your captain beat the match average in <strong>${capRate}% of matches</strong>.`});
  else if(capRate>0&&capRate<50)insights.push({cls:'warn',ico:'&#9888;',txt:`Captain picks need work — only <strong>${capRate}% success rate</strong>. You're losing points here.`});
  if(boosterAvgDelta!==null&&boostersUsed>=2){if(boosterAvgDelta>=30)insights.push({cls:'pos',ico:'&#128640;',txt:`Excellent booster timing — on avg your boosters earned <strong>+${boosterAvgDelta} pts above your season avg</strong>.`});else if(boosterAvgDelta<0)insights.push({cls:'warn',ico:'&#9888;',txt:`Boosters underperforming — averaging <strong>${Math.abs(boosterAvgDelta)} pts BELOW</strong> your season avg. Poor timing.`});}
  if(boostersRem>=4&&matchCount>=6&&d.subs_remaining>0)insights.push({cls:'warn',ico:'&#9888;',txt:`You still have <strong>${boostersRem} boosters left</strong> after ${matchCount} matches — leaving massive pts on the table.`});
  if(bestStreak>=4)insights.push({cls:'pos',ico:'&#128293;',txt:`Your best hot streak was <strong>${bestStreak} matches in a row</strong> scoring 250+ pts — incredibly consistent.`});
  if(consistency>=70)insights.push({cls:'pos',ico:'&#127919;',txt:`Rock-solid consistency score of <strong>${consistency}/100</strong> — you show up every single match.`});
  const shown=insights.slice(0,5);
  if(!shown.length){body.innerHTML='<div class="no-data">Play more matches to unlock key insights.</div>';return s;}
  body.innerHTML=shown.map(i=>`<div class="insight ${i.cls}"><span class="insight-ico">${i.ico}</span><span class="insight-txt">${i.txt}</span></div>`).join('');
  return s;
}

function buildStrengthZone(d){
  const s=sec('ci-green','&#128737;','Strong & Weak Zones');
  const body=s.querySelector('.card-body');
  const avg=d.avg_score,last3=d.last3,capRate=d.captain_success_rate,consistency=d.consistency;
  const strengths=[],weaknesses=[];
  if(d.subs_remaining<0){weaknesses.push({ico:'&#128680;',title:'Sub Budget Overdrawn',desc:`${Math.abs(d.subs_remaining)} subs over budget — team is effectively frozen for the rest of the season.`});}
  if(capRate>=70)strengths.push({ico:'&#128081;',title:'Elite Captaincy',desc:`Captain beat avg in ${capRate}% of matches — a huge multiplier.`});
  if(consistency>=70)strengths.push({ico:'&#127919;',title:'Rock Solid',desc:`Consistency ${consistency}/100 — you deliver every match.`});
  if(avg>0&&last3>avg)strengths.push({ico:'&#128293;',title:'Red Hot Form',desc:`Last 3 avg (${last3}) above season avg (${avg}).`});
  if(d.best_streak>=3)strengths.push({ico:'&#9889;',title:'Explosive Scorer',desc:`${d.best_streak} matches in a row above 250 pts.`});
  if(d.worst_match>150&&d.matches_played>=3)strengths.push({ico:'&#128737;',title:'No Bad Days',desc:`Worst match still ${d.worst_match} pts — high floor.`});
  if(d.booster_history&&d.booster_history.length>0&&d.booster_history.some(b=>(b.pts||0)>avg*1.3))strengths.push({ico:'&#128640;',title:'Booster Master',desc:`Best booster scored ${Math.max(...d.booster_history.map(b=>b.pts||0))} pts — well above avg.`});
  if(capRate>0&&capRate<50)weaknesses.push({ico:'&#128078;',title:'Poor Captain Picks',desc:`Only ${capRate}% success rate — captain choice is costing you.`});
  if(consistency>0&&consistency<50)weaknesses.push({ico:'&#128201;',title:'Very Inconsistent',desc:`Score ${consistency}/100 — big swings match to match.`});
  if(avg>0&&last3>0&&last3<avg*0.8)weaknesses.push({ico:'&#10052;',title:'Dropping Form',desc:`Last 3 avg (${last3}) well below season avg (${avg}).`});
  if(d.worst_streak>=3)weaknesses.push({ico:'&#129398;',title:'Cold Spells',desc:`${d.worst_streak} matches in a row at 150 pts or below.`});
  if(d.boosters_remaining>=4&&d.matches_played>5&&d.subs_remaining>0)weaknesses.push({ico:'&#9888;',title:'Underusing Boosters',desc:`${d.boosters_remaining} boosters left after ${d.matches_played} matches.`});
  const topS=strengths.slice(0,3),topW=weaknesses.slice(0,3);
  if(!topS.length&&!topW.length){body.innerHTML='<div class="no-data">Not enough data to analyse zones yet.</div>';return s;}
  const buildItems=list=>list.map(i=>`<div class="zone-item"><span class="zone-ico">${i.ico}</span><div><div class="zone-title">${i.title}</div><div class="zone-desc">${i.desc}</div></div></div>`).join('');
  body.innerHTML=(topS.length?`<div class="zone-block zone-strong"><div class="zone-hdr"><span>&#10003;</span> Strong Zone</div>${buildItems(topS)}</div>`:'')+
    (topW.length?`<div class="zone-block zone-weak" style="${topS.length?'margin-top:8px':''}""><div class="zone-hdr"><span>&#9888;</span> Weak Zone</div>${buildItems(topW)}</div>`:'');
  return s;
}

function buildMomentum(d){
  const s=sec('ci-green','&#9889;','Momentum Score');
  const body=s.querySelector('.card-body');
  const avg=d.avg_score,last3=d.last3,last6=d.last6,consistency=d.consistency,matchCount=d.matches_played;
  if(matchCount<3||!avg){body.innerHTML='<div class="no-data">Play at least 3 matches to see momentum score.</div>';return s;}
  let formScore=20;
  if(last3>0&&last6>0){const tp=((last3-last6)/last6)*100;if(tp>=20)formScore=40;else if(tp>=10)formScore=35;else if(tp>=0)formScore=28;else if(tp>=-10)formScore=15;else formScore=5;}
  const consScore=Math.round((consistency/100)*30);
  let recentScore=15;
  if(last3>0&&avg>0){const p=((last3-avg)/avg)*100;if(p>=20)recentScore=30;else if(p>=10)recentScore=25;else if(p>=0)recentScore=18;else if(p>=-10)recentScore=10;else recentScore=3;}
  const total=Math.min(100,formScore+consScore+recentScore);
  let grade,gradeColor,gradeDesc,gradeEmoji;
  if(total>=80){grade='A+';gradeColor='#9AE000';gradeDesc='Unstoppable right now';gradeEmoji='&#128640;';}
  else if(total>=65){grade='A';gradeColor='#9AE000';gradeDesc='Strong upward momentum';gradeEmoji='&#128200;';}
  else if(total>=50){grade='B';gradeColor='#f59e0b';gradeDesc='Steady — holding your own';gradeEmoji='&#10145;';}
  else if(total>=35){grade='C';gradeColor='#fb923c';gradeDesc='Losing ground recently';gradeEmoji='&#128201;';}
  else{grade='D';gradeColor='#ef4444';gradeDesc='Form has dropped sharply';gradeEmoji='&#129398;';}
  function var_(v){return v==='--accent'?'#9AE000':v;}
  const bar=(label,score,max,explain)=>`<div class="mmt-bar-row"><div class="mmt-bar-label">${label}</div><div class="mmt-bar-track"><div class="mmt-bar-fill" style="width:${Math.round((score/max)*100)}%;background:${gradeColor}"></div></div><div class="mmt-bar-val">${score}/${max}</div></div><div class="mmt-bar-explain">${explain}</div>`;
  body.innerHTML=`<div class="mmt-wrap"><div class="mmt-circle" style="border-color:${gradeColor}"><div class="mmt-grade" style="color:${gradeColor}">${grade}</div><div class="mmt-total" style="color:${gradeColor}">${total}/100</div></div><div class="mmt-info"><div class="mmt-emoji">${gradeEmoji}</div><div class="mmt-desc" style="color:${gradeColor}">${gradeDesc}</div><div class="mmt-sub">Form Trend (40) + Consistency (30) + Recent vs Avg (30)</div></div></div><div class="mmt-bars">${bar('Form Trend',formScore,40,'Last 3 vs last 6 avg trend')}${bar('Consistency',consScore,30,`Consistency score ${consistency}/100`)}${bar('Recent Form',recentScore,30,`Last 3 avg (${last3}) vs season avg (${avg})`)}</div>`;
  return s;
}

function buildForm(d){
  const s=sec('ci-red','&#128293;','Current Form');
  const body=s.querySelector('.card-body');
  const scores=d.last5||[];
  const avg=d.avg_score||0;
  if(!scores.length){body.innerHTML='<div class="no-data">No matches played yet.</div>';return s;}
  const hot=Math.max(avg*1.15,200),good=avg,ok=avg*0.75;
  const dots=scores.map(sc=>{
    let cls='fd-bad',emo='&#10060;';
    if(sc>=hot){cls='fd-hot';emo='&#128293;';}
    else if(sc>=good){cls='fd-good';emo='&#9989;';}
    else if(sc>=ok){cls='fd-ok';emo='&#129001;';}
    return `<div class="form-dot-wrap"><div class="form-dot ${cls}"><span class="fd-emoji">${emo}</span></div><span class="fd-score">${sc}</span></div>`;
  }).join('');
  const recent=scores.slice(0,3);
  const avgRecent=Math.round(recent.reduce((a,b)=>a+b,0)/recent.length);
  const delta=Math.round(avgRecent-avg);
  const trend=delta>=0?`&#128200; Last 3 avg is <strong>+${delta} pts</strong> above season avg — improving!`:`&#128201; Last 3 avg is <strong>${Math.abs(delta)} pts</strong> below season avg — declining.`;
  body.innerHTML=`<div class="form-row">${dots}</div><div class="form-legend"><span class="fl-item">&#128293; &gt;${Math.round(hot)} pts</span><span class="fl-item">&#9989; Above avg (${avg})</span><span class="fl-item">&#129001; Near avg</span><span class="fl-item">&#10060; Below avg</span></div><div class="form-note">${trend} · Newest first</div>`;
  return s;
}

function buildOverview(d){
  const s=sec('ci-green','&#128202;','Season Overview');
  const body=s.querySelector('.card-body');
  const cc=!d.consistency?'sv-white':d.consistency>=70?'sv-green':d.consistency>=50?'sv-gold':'sv-red';
  body.innerHTML=`<div class="stat-grid"><div class="stat-cell"><span class="stat-val sv-white">${d.matches_played}</span><span class="stat-lbl">Matches Played</span></div><div class="stat-cell"><span class="stat-val sv-gold">${d.boosters_remaining}</span><span class="stat-lbl">Boosters Left</span></div><div class="stat-cell"><span class="stat-val sv-blue">${d.subs_remaining<0?'&#9888; '+d.subs_remaining:(d.subs_remaining===999?'&#8734;':d.subs_remaining)}</span><span class="stat-lbl">Subs Left</span></div></div><div class="cons-row"><div class="cons-hdr"><div><div class="cons-lbl">Consistency Score</div><div class="cons-formula">Score variance + captain hit rate + sub efficiency</div></div><span class="cons-val ${cc}">${d.consistency!=null?d.consistency+'/100':'N/A'}</span></div>${d.consistency!=null?`<div class="cons-bar"><div class="cons-fill" style="width:${d.consistency}%"></div></div><div class="cons-grade">${d.consistency>=70?'&#127919; Rock solid — you show up every match.':d.consistency>=50?'&#128202; Average — some big swings.':'&#9888; Very inconsistent — scores vary a lot.'}</div>`:''}</div>`;
  return s;
}

function buildScoreTrends(d){
  const s=sec('ci-green','&#128201;','Score Trends');
  const body=s.querySelector('.card-body');
  const tc=(r,sea)=>r&&sea?(r>=sea?'sv-green':'sv-red'):'';
  const ta=(r,sea)=>{if(!r||!sea)return '';const delta=Math.round(r-sea);const sign=delta>=0?'+':'';return `<span class="${delta>=0?'trend-up':'trend-dn'}">${sign}${delta} vs avg</span>`;};
  body.innerHTML=`<div class="stat-grid two" style="margin-bottom:10px"><div class="stat-cell"><span class="stat-val sv-green">${d.avg_score}</span><span class="stat-lbl">Season Avg / Match</span></div><div class="stat-cell"><span class="stat-val sv-white">${d.total_points.toLocaleString()}</span><span class="stat-lbl">Total Points</span></div></div><div class="trend-row"><div class="trend-cell"><span class="trend-label">Last 3</span><span class="trend-val ${tc(d.last3,d.avg_score)}">${d.last3||'--'}</span><span class="trend-sub">avg pts</span>${ta(d.last3,d.avg_score)}</div><div class="trend-cell"><span class="trend-label">Last 6</span><span class="trend-val ${tc(d.last6,d.avg_score)}">${d.last6||'--'}</span><span class="trend-sub">avg pts</span>${ta(d.last6,d.avg_score)}</div><div class="trend-cell"><span class="trend-label">Last 10</span><span class="trend-val ${tc(d.last10,d.avg_score)}">${d.last10||'--'}</span><span class="trend-sub">avg pts</span>${ta(d.last10,d.avg_score)}</div></div><div style="margin-top:12px"><div class="chart-lbl">Match-by-match scores</div><div class="chart-wrap"><canvas id="scoreChart" role="img" aria-label="Bar chart of match-by-match fantasy scores">Score history shown.</canvas></div></div>`;
  return s;
}

function buildBestWorst(d){
  const s=sec('ci-gold','&#127942;','Best & Worst Match');
  const body=s.querySelector('.card-body');
  const avg=d.avg_score||0;

function buildBoosterROI(d){
  const s=sec('ci-purple','&#128640;','Booster ROI');
  const body=s.querySelector('.card-body');
  const history=d.booster_history||[];
  if(!history.length){body.innerHTML='<div class="no-data">No boosters used yet.</div>';return s;}
  const avg=d.avg_score||0;
  const emoMap={TOTAL_2X:'&#128640;',INDIAN_2X:'&#127988;',OVERSEAS_2X:'&#9992;',UNCAPPED_2X:'&#129510;',CAPTAIN_3X:'&#128081;',MOM_2X:'&#127942;',FREE_11:'&#128084;'};
  const nameMap={TOTAL_2X:'Total 2X',INDIAN_2X:'Indian 2X',OVERSEAS_2X:'Overseas 2X',UNCAPPED_2X:'Uncapped 2X',CAPTAIN_3X:'Captain 3X',MOM_2X:'MOM 2X',FREE_11:'Free 11'};
  const best=[...history].sort((a,b)=>(b.pts||0)-(a.pts||0))[0];
  const totalPts=history.reduce((a,b)=>a+(b.pts||0),0);
  const avgPts=Math.round(totalPts/history.length);
  const avgDelta=avg>0?Math.round(avgPts-avg):null;
  const deltaStr=avgDelta!==null?(avgDelta>=0?`<span style="color:var(--accent)">+${avgDelta} above your avg</span>`:`<span style="color:var(--red)">${avgDelta} below your avg &#9888;</span>`):'';
  const rows=history.map(b=>{
    const isBest=b.match===best.match&&b.booster===best.booster;
    const delta=avg>0?Math.round((b.pts||0)-avg):null;
    const dh=delta!==null?`<span class="boost-delta ${delta>=0?'bd-pos':'bd-neg'}">${delta>=0?'+':''}${delta}</span>`:'';
    return `<div class="boost-row${isBest?' best':''}"><span class="boost-ico">${emoMap[b.booster]||'&#9889;'}</span><div class="boost-info"><span class="boost-name">${nameMap[b.booster]||b.booster}</span><span class="boost-match">Match ${b.match}</span></div><div class="boost-right"><span class="boost-pts">${b.pts||0}</span><span class="boost-ptsl">pts</span>${dh}</div></div>`;
  }).join('');
  body.innerHTML=`<div class="boost-summary"><div class="bs-stat"><span class="stat-val sv-purple">${history.length}</span><span class="stat-lbl">Used</span></div><div class="bs-stat"><span class="stat-val sv-white">${avgPts}</span><span class="stat-lbl">Avg pts</span></div><div style="flex:2;text-align:left;padding-left:8px"><span class="stat-lbl">vs season avg: ${deltaStr}</span></div></div><div class="boost-tag">Best: ${emoMap[best.booster]||'&#9889;'} ${nameMap[best.booster]||best.booster} &#8594; ${best.pts||0} pts in M${best.match}</div><div class="boost-list">${rows}</div><div style="margin-top:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--text2);line-height:1.7"><strong style="color:var(--text1)">From audit:</strong> TOTAL_2X avg 1,109 pts · INDIAN_2X avg 963 pts · CAPTAIN_3X avg 811 pts. These are the boosters that move ranks. Save big ones for high-scoring fixture clusters.</div>`;
  return s;
}

function buildCompare(currentId,currentData){
  const s=sec('ci-purple','&#9878;','Compare With Another Team');
  const body=s.querySelector('.card-body');
  const others=Object.keys(TEAMS).filter(k=>k!==currentId);
  const opts=others.map(k=>`<option value="${k}">${TEAMS[k].team_name} — ${TEAMS[k].total_points.toLocaleString()} pts</option>`).join('');
  body.innerHTML=`<select class="sel" id="compareSelector" style="margin-bottom:10px"><option value="">Pick a team to compare...</option>${opts}</select><div id="compareResult"></div>`;
  setTimeout(()=>{
    document.getElementById('compareSelector')?.addEventListener('change',e=>{
      const cid=e.target.value;
      const result=document.getElementById('compareResult');
      if(!cid){result.innerHTML='';return;}
      const b=TEAMS[cid]||DEFAULT_TEAM;
      const a=currentData;
      const aBoosters=7-(a.boosters_remaining??7);
      const bBoosters=7-(b.boosters_remaining??7);
      const aBoostPts=(a.booster_history||[]).reduce((s,x)=>s+(x.pts||0),0);
      const bBoostPts=(b.booster_history||[]).reduce((s,x)=>s+(x.pts||0),0);
      const aAvgPerBoost=aBoosters>0?Math.round(aBoostPts/aBoosters):'--';
      const bAvgPerBoost=bBoosters>0?Math.round(bBoostPts/bBoosters):'--';
      const allStats=[
        [a.total_points,b.total_points,true],[a.avg_score,b.avg_score,true],
        [a.best_match,b.best_match,true],[a.worst_match,b.worst_match,true],
        [a.consistency,b.consistency,true],[a.captain_success_rate,b.captain_success_rate,true],
        [a.subs_used,b.subs_used,false],[aBoosters,bBoosters,false],
        [aBoostPts,bBoostPts,true]
      ];
      let aWins=0,bWins=0;
      allStats.forEach(([v1,v2,hb])=>{const n1=parseFloat(v1),n2=parseFloat(v2);if(isNaN(n1)||isNaN(n2)||n1===n2)return;if(hb?n1>n2:n1<n2)aWins++;else bWins++;});
      const vc=aWins>bWins?'var(--accent)':bWins>aWins?'var(--red)':'var(--text3)';
      const vt=aWins>bWins?`${a.team_name} leads ${aWins}–${bWins}`:bWins>aWins?`${b.team_name} leads ${bWins}–${aWins}`:`Dead heat — ${aWins}–${bWins}`;
      const row=(lbl,v1,v2,hib=true)=>{const n1=parseFloat(v1),n2=parseFloat(v2);let w1=false,w2=false;if(!isNaN(n1)&&!isNaN(n2)){if(hib){w1=n1>=n2;w2=n2>=n1;}else{w1=n1<=n2;w2=n2<=n1;}}return `<div class="cmp-row"><div class="cmp-val${w1?' win':''}">${v1??'--'}</div><div class="cmp-lbl">${lbl}</div><div class="cmp-val${w2?' win':''}">${v2??'--'}</div></div>`;};
      result.innerHTML=`<div class="cmp-verdict" style="border-color:${vc}"><div class="cmp-verdict-main" style="color:${vc}">${vt}</div><div class="cmp-verdict-sub">across ${allStats.length} stat categories</div></div><div class="cmp-hdr"><div class="cmp-team">${a.team_name}</div><div class="cmp-vs">VS</div><div class="cmp-team">${b.team_name}</div></div><div class="cmp-section">&#128202; Season</div>${row('Total Points',a.total_points.toLocaleString(),b.total_points.toLocaleString())}${row('Avg / Match',a.avg_score,b.avg_score)}${row('Best Match',a.best_match,b.best_match)}${row('Worst Match',a.worst_match,b.worst_match)}${row('Consistency',a.consistency,b.consistency)}<div class="cmp-section">&#128081; Captaincy</div>${row('Captain Success %',a.captain_success_rate,b.captain_success_rate)}<div class="cmp-section">&#8646; Subs</div>${row('Total Subs Used',a.subs_used,b.subs_used,false)}${row('Subs Remaining',a.subs_remaining,b.subs_remaining)}<div class="cmp-section">&#128640; Boosters</div>${row('Boosters Used',aBoosters,bBoosters,false)}${row('Total Booster Pts',aBoostPts,bBoostPts)}${row('Avg Pts/Booster',aAvgPerBoost,bAvgPerBoost)}`;
    });
  },100);
  return s;
}

}

window.shareStats=async()=>{
  const card=document.querySelector('.share-card');if(!card)return;
  const text=card.innerText.replace(/\n+/g,' · ');
  if(navigator.share){try{await navigator.share({title:'My Cricket Experts Stats',text});}catch(_){}}
  else if(navigator.clipboard){await navigator.clipboard.writeText(text);alert('Stats copied to clipboard!');}
};

function drawScoreChart(d){
  const canvas=document.getElementById('scoreChart');if(!canvas)return;
  const history=d.match_history||[];if(!history.length){return;}
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||300;const H=130;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const avg=d.avg_score||0;
  const max=Math.max(...history,1);
  const pL=4,pR=4,pT=14,pB=22;
  const cW=W-pL-pR,cH=H-pT-pB;
  const bW=Math.max(5,Math.floor(cW/history.length)-2);
  const gap=Math.max(1,Math.floor((cW-bW*history.length)/Math.max(history.length-1,1)));
  ctx.clearRect(0,0,W,H);
  if(avg){
    const ay=pT+cH-Math.round((avg/max)*cH);
    ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(154,224,0,0.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(pL,ay);ctx.lineTo(W-pR,ay);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(154,224,0,0.6)';ctx.font='bold 7px sans-serif';ctx.textAlign='right';
    ctx.fillText('avg '+avg,W-pR-2,ay-3);
  }
  history.forEach((val,i)=>{
    const bH=Math.max(3,Math.round((val/max)*cH));
    const x=pL+i*(bW+gap);const y=pT+cH-bH;
    const isHot=val>=avg*1.15;const isAbove=val>=avg;
    ctx.fillStyle=isHot?'#9AE000':isAbove?'rgba(154,224,0,0.55)':'rgba(154,224,0,0.18)';
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,bW,bH,[2,2,0,0]);else ctx.rect(x,y,bW,bH);
    ctx.fill();
    if(history.length<=25){
      ctx.fillStyle='rgba(100,116,139,0.7)';ctx.font='600 6px sans-serif';ctx.textAlign='center';
      ctx.fillText('M'+(i+1),x+bW/2,H-4);
    }
  });
}

function drawRankChart(d,totalPlayers){
  const canvas=document.getElementById('rankChart');if(!canvas)return;
  const journey=(d.rank_journey||[]).sort((a,b)=>a.m-b.m);if(journey.length<2)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||300;const H=110;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const ranks=journey.map(r=>r.r);
  const minR=Math.min(...ranks);const maxR=Math.max(...ranks,totalPlayers>0?totalPlayers:maxR);
  const range=Math.max(maxR-minR,1);
  const pL=30,pR=8,pT=14,pB=22;
  const cW=W-pL-pR,cH=H-pT-pB;
  ctx.clearRect(0,0,W,H);
  [minR,Math.round((minR+maxR)/2),maxR].forEach(r=>{
    const y=pT+Math.round(((r-minR)/range)*cH);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(100,116,139,0.7)';ctx.font='600 7px sans-serif';ctx.textAlign='right';
    ctx.fillText('#'+r,pL-4,y+3);
  });
  ctx.beginPath();
  journey.forEach((pt,i)=>{const x=pL+(i/Math.max(journey.length-1,1))*cW;const y=pT+Math.round(((pt.r-minR)/range)*cH);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle='rgba(154,224,0,0.7)';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  ctx.beginPath();
  journey.forEach((pt,i)=>{const x=pL+(i/Math.max(journey.length-1,1))*cW;const y=pT+Math.round(((pt.r-minR)/range)*cH);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(pL+cW,pT+cH);ctx.lineTo(pL,pT+cH);ctx.closePath();
  const g=ctx.createLinearGradient(0,pT,0,pT+cH);g.addColorStop(0,'rgba(154,224,0,0.12)');g.addColorStop(1,'rgba(154,224,0,0)');
  ctx.fillStyle=g;ctx.fill();
  journey.forEach((pt,i)=>{
    const x=pL+(i/Math.max(journey.length-1,1))*cW;const y=pT+Math.round(((pt.r-minR)/range)*cH);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=pt.r===1?'#f59e0b':'#9AE000';ctx.fill();
    ctx.fillStyle=pt.r===1?'#f59e0b':'rgba(154,224,0,0.9)';
    ctx.font='700 8px sans-serif';ctx.textAlign='center';ctx.fillText('#'+pt.r,x,y-8);
    ctx.fillStyle='rgba(100,116,139,0.7)';ctx.font='600 7px sans-serif';
    ctx.fillText('M'+pt.m,x,H-5);
  });
}
