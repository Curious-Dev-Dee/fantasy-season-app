<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPL 2026 — Fantasy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --accent:        #9AE000;
      --accent-dim:    rgba(154,224,0,0.09);
      --accent-glow:   rgba(154,224,0,0.28);
      --accent-mid:    rgba(154,224,0,0.18);
      --bg-page:       #020617;
      --bg-card:       #0d1625;
      --bg-card-alt:   #111e30;
      --bg-elevated:   #0d1a2d;
      --border-card:   rgba(255,255,255,0.10);
      --border:        rgba(255,255,255,0.07);
      --border-subtle: rgba(255,255,255,0.04);
      --border-accent: rgba(154,224,0,0.20);
      --text-primary:  #f0f4f8;
      --text-dim:      #94a3b8;
      --text-faint:    #64748b;
      --red:           #ef4444;
      --orange:        #fb923c;
      --gold:          #f59e0b;
      --rank-color:    #7cc4ff;
      --star:          #fbbf24;
      --font-display:  'Barlow Condensed', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --card-radius:   16px;
      --btn-radius:    12px;
      --nav-height:    65px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 12px;
      background: rgba(2,6,23,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .icon-back {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-card);
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 14px; flex-shrink: 0;
    }
    .page-title {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 900;
      text-transform: uppercase; flex: 1;
    }
    #user-label { font-size: 12px; color: var(--text-faint); }

    /* ── SECTION ── */
    .section { padding: 14px 16px; max-width: 480px; margin: 0 auto; padding-bottom: 160px; }

    /* ── DAY TABS ── */
    .day-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .day-tab {
      flex: 1; padding: 9px;
      border-radius: var(--btn-radius);
      border: 1px solid var(--border-card);
      background: var(--bg-card);
      color: var(--text-faint);
      font-family: var(--font-display);
      font-size: 13px; font-weight: 800;
      letter-spacing: 0.5px; text-transform: uppercase;
      cursor: pointer; text-align: center;
      transition: all 0.15s;
    }
    .day-tab.active {
      background: var(--accent-dim);
      border-color: var(--border-accent);
      color: var(--accent);
    }

    /* ── INNER TABS ── */
    .tab-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab-btn {
      flex: 1; padding: 8px;
      border-radius: var(--btn-radius);
      border: 1px solid var(--border-card);
      background: var(--bg-card);
      color: var(--text-faint);
      font-family: var(--font-display);
      font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer; text-align: center;
      transition: all 0.15s;
    }
    .tab-btn.active { background: rgba(124,196,255,0.1); border-color: rgba(124,196,255,0.3); color: var(--rank-color); }

    /* ── LOGIN CARD ── */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius);
      padding: 28px 20px; text-align: center; margin-bottom: 16px;
    }
    .login-card h3 { font-family: var(--font-display); font-size: 22px; font-weight: 900; margin-bottom: 6px; }
    .login-card p { color: var(--text-faint); font-size: 13px; margin-bottom: 18px; line-height: 1.6; }
    .login-card input {
      width: 100%; padding: 12px 14px;
      border-radius: var(--btn-radius);
      border: 1px solid var(--border-card);
      background: #060e1e; color: var(--text-primary);
      font-size: 15px; margin-bottom: 10px; outline: none;
      font-family: var(--font-body);
      transition: border-color 0.15s;
    }
    .login-card input:focus { border-color: var(--accent); }

    /* ── BUTTONS ── */
    .btn {
      width: 100%; padding: 12px;
      border-radius: var(--btn-radius);
      border: none; font-size: 14px;
      font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
      font-family: var(--font-display);
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: linear-gradient(135deg, #0284c7, #0369a1); color: #fff; }
    .btn-green    { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; }
    .btn-ghost    { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border-card); }

    /* ── BUDGET BAR ── */
    .budget-bar {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--card-radius);
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex; gap: 12px; align-items: center;
      flex-wrap: wrap;
    }
    .budget-item { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
    .budget-val {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 900; line-height: 1;
    }
    .budget-val.good  { color: var(--accent); }
    .budget-val.warn  { color: var(--orange); }
    .budget-val.over  { color: var(--red); }
    .budget-val.white { color: var(--text-primary); }
    .budget-val.gold  { color: var(--star); }
    .budget-lbl { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .budget-divider { width: 1px; height: 36px; background: var(--border-card); }

    /* ── STATUS PILL ── */
    .status-pill {
      padding: 4px 12px; border-radius: 20px;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
    }
    .s-open   { background: rgba(154,224,0,0.1); color: var(--accent); border: 1px solid var(--border-accent); }
    .s-locked { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }

    /* ── FILTER ROW ── */
    .filter-row {
      display: flex; gap: 6px; margin-bottom: 12px;
      overflow-x: auto; padding-bottom: 2px;
    }
    .filter-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border-card);
      background: var(--bg-card); color: var(--text-faint);
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer; white-space: nowrap;
      font-family: var(--font-display);
      transition: all 0.15s;
    }
    .filter-btn.active { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); color: var(--text-primary); }

    /* ── TEAM SECTION HEADER ── */
    .team-section-hdr {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-faint);
      margin: 14px 0 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .team-section-hdr::before {
      content: ''; width: 3px; height: 12px;
      border-radius: 2px; background: var(--accent);
      flex-shrink: 0;
    }
    .team-section-hdr.grp-b::before { background: var(--rank-color); }

    /* ── PLAYER ROW ── */
    .player-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-card);
      border-radius: 12px; padding: 10px 12px;
      margin-bottom: 7px;
      border: 1px solid var(--border-card);
      cursor: pointer; transition: all 0.15s;
      position: relative;
    }
    .player-row:active { transform: scale(0.98); }
    .player-row.selected  { border-color: rgba(124,196,255,0.4); background: #0a1e35; }
    .player-row.is-captain{ border-color: rgba(245,158,11,0.5) !important; background: #1a1200 !important; }
    .player-row.is-vc     { border-color: rgba(148,163,184,0.4) !important; background: #12171d !important; }
    .player-row.is-star-player { border-left: 3px solid var(--star); }
    .player-row.disabled-row { opacity: 0.4; cursor: not-allowed; }

    .player-check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0; color: var(--text-faint);
      transition: all 0.15s;
    }
    .player-row.selected .player-check,
    .player-row.is-captain .player-check,
    .player-row.is-vc .player-check {
      background: var(--rank-color); border-color: var(--rank-color); color: #000;
    }
    .player-row.is-captain .player-check { background: var(--star); border-color: var(--star); }

    .player-info { flex: 1; min-width: 0; }
    .player-name-row {
      display: flex; align-items: center; gap: 5px;
      font-weight: 600; font-size: 14px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .role-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 4px;
      font-weight: 800; letter-spacing: 0.5px; flex-shrink: 0;
      font-family: var(--font-display);
    }
    .role-AR  { background: rgba(245,158,11,0.15); color: var(--gold); }
    .role-BAT { background: rgba(124,196,255,0.12); color: var(--rank-color); }
    .role-BWL { background: rgba(154,224,0,0.1); color: var(--accent); }
    .role-WK  { background: rgba(216,180,254,0.12); color: #d8b4fe; }
    .star-badge {
      font-size: 9px; color: var(--star);
      font-weight: 800; letter-spacing: 0.5px; flex-shrink: 0;
    }
    .cap-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 800; background: rgba(245,158,11,0.2); color: var(--star); flex-shrink: 0; }
    .vc-badge  { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 800; background: rgba(148,163,184,0.15); color: var(--text-dim); flex-shrink: 0; }
    .player-meta { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .player-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .player-price {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 900;
      color: var(--text-primary);
    }
    .player-price.is-star { color: var(--star); }
    .cap-vc-btns { display: flex; gap: 4px; }
    .cap-btn {
      font-size: 10px; padding: 3px 7px; border-radius: 6px;
      border: 1px solid var(--border-card);
      background: var(--bg-page); color: var(--text-faint);
      cursor: pointer; font-weight: 800;
      font-family: var(--font-display);
      transition: all 0.15s;
    }
    .cap-btn.gold   { border-color: var(--star);     color: var(--star); }
    .cap-btn.silver { border-color: var(--text-dim); color: var(--text-dim); }

    /* ── LOCKED NOTICE ── */
    .locked-notice {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px; padding: 16px 14px;
      font-size: 14px; color: #fca5a5;
      margin-bottom: 14px; text-align: center; line-height: 1.6;
    }

    /* ── MSG ── */
    .msg {
      padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 12px;
      font-family: var(--font-body);
    }
    .msg-success { background: rgba(22,163,74,0.1); color: #4ade80; border: 1px solid rgba(22,163,74,0.25); }
    .msg-error   { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

    /* ── MY TEAM ── */
    .my-team-header {
      background: var(--bg-card);
      border: 1px solid var(--border-accent);
      border-radius: var(--card-radius);
      padding: 18px; margin-bottom: 14px; text-align: center;
    }
    .my-team-pts { font-family: var(--font-display); font-size: 48px; font-weight: 900; color: var(--accent); line-height: 1; }
    .my-team-rank { font-size: 13px; color: var(--text-faint); margin-top: 4px; }

    .my-player-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px; padding: 10px 12px; margin-bottom: 7px;
    }
    .my-player-pts {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 900;
      color: var(--rank-color); min-width: 50px; text-align: right;
    }
    .multiplier { font-size: 10px; color: var(--star); font-weight: 700; }

    /* ── LEADERBOARD ── */
    .lb-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 12px; padding: 12px 14px;
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 12px;
    }
    .lb-rank { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--text-faint); min-width: 32px; text-align: center; }
    .lb-rank.gold   { color: var(--star); }
    .lb-rank.silver { color: var(--text-dim); }
    .lb-rank.bronze { color: #b45309; }
    .lb-info { flex: 1; }
    .lb-name { font-weight: 700; font-size: 15px; }
    .lb-pts  { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--rank-color); }
    .you-tag { font-size: 10px; color: var(--accent); font-weight: 700; margin-left: 6px; }

    /* ── STICKY BOTTOM BAR ── */
    .bottom-bar {
      position: fixed; bottom: var(--nav-height);
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(13,22,37,0.98);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-card);
      padding: 10px 16px; z-index: 50;
    }
    .bar-inner { display: flex; gap: 8px; align-items: center; }
    .bar-inner .btn { flex: 1; padding: 11px; font-size: 13px; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(13,22,37,0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-card);
      display: flex; align-items: center;
      height: var(--nav-height); z-index: 200; padding: 0 8px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px; padding: 10px 6px;
      text-decoration: none; color: var(--text-faint);
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .nav-item i { font-size: 18px; }
    .nav-item.active { color: var(--accent); }

    .loading { text-align: center; color: var(--text-faint); padding: 40px 0; font-size: 13px; }
    .empty { text-align: center; color: var(--text-faint); padding: 32px 16px; font-size: 13px; line-height: 1.7; }
  </style>
</head>
<body>

<header class="app-header">
  <a class="icon-back" href="ppl-home.html"><i class="fas fa-arrow-left"></i></a>
  <h1 class="page-title">⚡ PPL Fantasy</h1>
  <span id="user-label"></span>
</header>

<div class="section">

  <!-- Day Tabs -->
  <div class="day-tabs" id="day-tabs"></div>

  <!-- Auth -->
  <div id="auth-section"></div>

  <!-- Main (shown after login) -->
  <div id="main-content" style="display:none">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab(this,'pick')"><i class="fas fa-users"></i> Pick Team</button>
      <button class="tab-btn" onclick="switchTab(this,'myteam')"><i class="fas fa-user"></i> My Team</button>
      <button class="tab-btn" onclick="switchTab(this,'leaderboard')"><i class="fas fa-trophy"></i> Standings</button>
    </div>
    <div id="tab-content"></div>
  </div>

</div>

<!-- Sticky bottom bar (pick tab only) -->
<div class="bottom-bar" id="sel-bar" style="display:none">
  <div class="bar-inner">
    <button class="btn btn-ghost" onclick="clearSelection()">Clear</button>
    <button class="btn btn-green" id="submit-btn" onclick="submitTeam()">💾 Save Team</button>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item" href="ppl-home.html"><i class="fas fa-house"></i><span>Home</span></a>
  <a class="nav-item" href="ppl-fixtures.html"><i class="fas fa-calendar-days"></i><span>Fixtures</span></a>
  <a class="nav-item" href="ppl-scorecard.html"><i class="fas fa-cricket-bat-ball"></i><span>Scores</span></a>
  <a class="nav-item" href="ppl-stats.html"><i class="fas fa-chart-bar"></i><span>Stats</span></a>
  <a class="nav-item active" href="ppl-fantasy.html"><i class="fas fa-bolt"></i><span>Fantasy</span></a>
</nav>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const SB_URL = 'https://tuvqgcosbweljslbfgqc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';
const sb = supabase.createClient(SB_URL, SB_KEY);

// Fantasy rules
const BUDGET     = 100;
const MAX_STARS  = 4;   // max players with is_star = true (price >= 11)
const TEAM_SIZE  = 11;

// ── STATE ─────────────────────────────────────────────────────────────
let currentUser  = null;  // { id, name }
let activeDay    = 1;
let activeTab    = 'pick';
let days         = [];
let allPlayers   = [];    // ppl_players with team join + fantasy_price + is_star
let matchesForDay = [];
let selected     = new Set();
let captainId    = null;
let vcId         = null;
let existingTeam = null;
let roleFilter   = 'ALL';

// ── BOOT ──────────────────────────────────────────────────────────────
async function init() {
  const [{ data: daysData }, { data: pl }] = await Promise.all([
    sb.from('ppl_fantasy_days').select('*').order('day_number'),
    sb.from('ppl_players').select('id, name, role, fantasy_price, is_star, team_id, ppl_teams(id, name, short_name, group_name)').eq('is_active', true)
  ]);
  days       = daysData || [];
  allPlayers = pl || [];

  renderDayTabs();
  renderAuth();
}

// ── AUTH ──────────────────────────────────────────────────────────────
function renderAuth() {
  const el = document.getElementById('auth-section');
  if (currentUser) {
    document.getElementById('user-label').textContent = currentUser.name;
    el.innerHTML = '';
    document.getElementById('main-content').style.display = 'block';
    loadTab();
    return;
  }
  document.getElementById('main-content').style.display = 'none';
  el.innerHTML = `
    <div class="login-card">
      <h3>⚡ PPL Fantasy</h3>
      <p>Enter your name to join.<br>Pick 11 players within 100 pts budget.</p>
      <input type="text" id="name-input" placeholder="Your name" maxlength="30"
        onkeydown="if(event.key==='Enter') loginUser()">
      <button class="btn btn-primary" onclick="loginUser()">Join →</button>
    </div>`;
  setTimeout(() => document.getElementById('name-input')?.focus(), 100);
}

function loginUser() {
  const name = document.getElementById('name-input')?.value.trim();
  if (!name) return;
  const userId = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  currentUser = { id: userId, name };
  document.getElementById('user-label').textContent = name;
  document.getElementById('auth-section').innerHTML = '';
  document.getElementById('main-content').style.display = 'block';
  loadTab();
}

// ── DAY TABS ──────────────────────────────────────────────────────────
function renderDayTabs() {
  const el = document.getElementById('day-tabs');
  days.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === 0 ? ' active' : '');
    btn.textContent = `Day ${d.day_number}`;
    btn.onclick = () => {
      activeDay = d.day_number;
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      clearSelectionSilent();
      loadTab();
    };
    el.appendChild(btn);
  });
}

function getDayObj() { return days.find(d => d.day_number === activeDay); }

// ── TAB SWITCH ────────────────────────────────────────────────────────
function switchTab(btn, tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sel-bar').style.display = tab === 'pick' ? 'block' : 'none';
  loadTab();
}

async function loadTab() {
  if (!currentUser) return;
  const day = getDayObj();
  if (!day) {
    document.getElementById('tab-content').innerHTML = '<div class="empty">No fantasy days configured yet.</div>';
    return;
  }

  // Matches for this day
  const { data: matches } = await sb.from('ppl_matches')
    .select('team_a_id, team_b_id').eq('day', activeDay).neq('status', 'no_result');
  matchesForDay = matches || [];

  // Existing team for user + day
  const { data: ut } = await sb.from('ppl_user_teams')
    .select('*, ppl_user_team_players(player_id, is_captain, is_vice_captain)')
    .eq('user_id', currentUser.id).eq('day_id', day.id).maybeSingle();
  existingTeam = ut;

  if (existingTeam) {
    selected  = new Set(existingTeam.ppl_user_team_players.map(p => p.player_id));
    captainId = existingTeam.ppl_user_team_players.find(p => p.is_captain)?.player_id || null;
    vcId      = existingTeam.ppl_user_team_players.find(p => p.is_vice_captain)?.player_id || null;
  }

  if (activeTab === 'pick')        renderPickTab(day);
  else if (activeTab === 'myteam') renderMyTeam(day);
  else                             renderLeaderboard(day);
}

// ── BUDGET HELPERS ────────────────────────────────────────────────────
function getSpent() {
  let s = 0;
  selected.forEach(id => {
    const p = allPlayers.find(x => x.id === id);
    if (p) s += parseFloat(p.fantasy_price || 0);
  });
  return Math.round(s * 10) / 10;
}

function getStarCount() {
  let c = 0;
  selected.forEach(id => {
    const p = allPlayers.find(x => x.id === id);
    if (p?.is_star) c++;
  });
  return c;
}

function getRemaining() { return Math.round((BUDGET - getSpent()) * 10) / 10; }

// ── PICK TAB ──────────────────────────────────────────────────────────
function renderPickTab(day) {
  const el       = document.getElementById('tab-content');
  const isLocked = day.is_locked;
  const teamIds  = new Set(matchesForDay.flatMap(m => [m.team_a_id, m.team_b_id].filter(Boolean)));
  const eligible = allPlayers.filter(p => teamIds.size === 0 || teamIds.has(p.team_id));

  document.getElementById('sel-bar').style.display = isLocked ? 'none' : 'block';

  if (isLocked && !existingTeam) {
    el.innerHTML = `<div class="locked-notice">🔒 Team selection is locked for Day ${activeDay}.<br>You didn't submit a team this day.</div>`;
    return;
  }
  if (isLocked) {
    el.innerHTML = `<div class="locked-notice">🔒 Team locked. View your picks in <strong>My Team</strong>.</div>`;
    return;
  }

  const spent    = getSpent();
  const remain   = getRemaining();
  const stars    = getStarCount();
  const remCls   = remain < 0 ? 'over' : remain < 10 ? 'warn' : 'good';
  const starsCls = stars >= MAX_STARS ? 'gold' : 'white';

  let html = '';

  // Budget bar
  html += `
    <div class="budget-bar">
      <div class="budget-item">
        <div class="budget-val white">${selected.size}<span style="font-size:14px;color:var(--text-faint)">/${TEAM_SIZE}</span></div>
        <div class="budget-lbl">Players</div>
      </div>
      <div class="budget-divider"></div>
      <div class="budget-item">
        <div class="budget-val ${remCls}">${remain}</div>
        <div class="budget-lbl">Budget Left</div>
      </div>
      <div class="budget-divider"></div>
      <div class="budget-item">
        <div class="budget-val ${starsCls}">${stars}<span style="font-size:14px;color:var(--text-faint)">/${MAX_STARS}</span></div>
        <div class="budget-lbl">⭐ Stars</div>
      </div>
      <div class="budget-divider"></div>
      <div class="budget-item">
        <div style="display:flex;flex-direction:column;gap:1px;align-items:center">
          ${captainId ? `<div style="font-size:11px;color:var(--star);font-weight:700">C: ${playerShortName(captainId)}</div>` : `<div style="font-size:11px;color:var(--text-faint)">C: —</div>`}
          ${vcId      ? `<div style="font-size:11px;color:var(--text-dim);font-weight:700">VC: ${playerShortName(vcId)}</div>` : `<div style="font-size:11px;color:var(--text-faint)">VC: —</div>`}
        </div>
        <div class="budget-lbl">Captain</div>
      </div>
    </div>`;

  if (existingTeam) html += `<div class="msg msg-success">✅ Team saved — you can update it below</div>`;

  // Rules reminder
  html += `
    <div style="background:rgba(154,224,0,0.05);border:1px solid var(--border-accent);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--text-faint);line-height:1.7">
      💡 <strong style="color:var(--text-dim)">Rules:</strong> Pick exactly 11 players · Budget: 100 pts · Max 4 ⭐ Star players · Must set Captain (2×) & Vice Captain (1.5×)
    </div>`;

  // Role filters
  html += `<div class="filter-row">
    ${['ALL','AR','BAT','BWL','WK'].map(r =>
      `<button class="filter-btn${roleFilter === r ? ' active' : ''}" onclick="setRoleFilter('${r}')">${r === 'ALL' ? 'All' : r}</button>`
    ).join('')}
  </div>`;

  // Group players by team, grouped by group A then B
  const teamMap = {};
  eligible.forEach(p => {
    const key = p.team_id;
    if (!teamMap[key]) teamMap[key] = { name: p.ppl_teams?.name || '?', group: p.ppl_teams?.group_name || 'A', players: [] };
    teamMap[key].players.push(p);
  });

  // Sort teams: Group A first, then B
  const sortedTeams = Object.entries(teamMap).sort(([, a], [, b]) => {
    if (a.group !== b.group) return a.group < b.group ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  let lastGroup = null;
  sortedTeams.forEach(([tid, team]) => {
    const filtered = roleFilter === 'ALL' ? team.players : team.players.filter(p => p.role === roleFilter);
    if (!filtered.length) return;

    if (team.group !== lastGroup) {
      html += `<div class="team-section-hdr${team.group === 'B' ? ' grp-b' : ''}">Group ${team.group}</div>`;
      lastGroup = team.group;
    }
    html += `<div style="font-size:10px;color:var(--text-faint);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin:8px 0 5px;padding-left:2px">${team.name}</div>`;
    filtered.sort((a, b) => b.fantasy_price - a.fantasy_price)
      .forEach(p => { html += playerCard(p); });
  });

  el.innerHTML = html;
}

function playerCard(p) {
  const isSel = selected.has(p.id);
  const isCap = captainId === p.id;
  const isVC  = vcId === p.id;
  const isStar = p.is_star;

  // Can this player be added?
  const remaining = getRemaining();
  const wouldExceedBudget = !isSel && (remaining - parseFloat(p.fantasy_price || 0)) < 0;
  const wouldExceedStars  = !isSel && isStar && getStarCount() >= MAX_STARS;
  const wouldExceedTeam   = !isSel && selected.size >= TEAM_SIZE;
  const isDisabled = wouldExceedBudget || wouldExceedStars || wouldExceedTeam;

  let cls = 'player-row';
  if (isCap) cls += ' is-captain';
  else if (isVC) cls += ' is-vc';
  else if (isSel) cls += ' selected';
  if (isStar) cls += ' is-star-player';
  if (isDisabled && !isSel) cls += ' disabled-row';

  const capBadge  = isCap  ? '<span class="cap-badge">C</span>'  : '';
  const vcBadge   = isVC   ? '<span class="vc-badge">VC</span>' : '';
  const starBadge = isStar ? '<span class="star-badge">⭐</span>' : '';

  const capVcBtns = (isSel || isCap || isVC) ? `
    <div class="cap-vc-btns" onclick="event.stopPropagation()">
      <button class="cap-btn${isCap ? ' gold' : ''}" onclick="setCaptain('${p.id}')">C</button>
      <button class="cap-btn${isVC  ? ' silver' : ''}" onclick="setVC('${p.id}')">VC</button>
    </div>` : '';

  const checkContent = isCap ? 'C' : isVC ? 'V' : (isSel ? '✓' : '+');
  const clickHandler = isDisabled && !isSel ? '' : `onclick="togglePlayer('${p.id}')"`;

  return `
    <div class="${cls}" ${clickHandler} id="prow-${p.id}">
      <div class="player-check">${checkContent}</div>
      <div class="player-info">
        <div class="player-name-row">
          ${p.name}${capBadge}${vcBadge}${starBadge}
          <span class="role-badge role-${p.role || 'BAT'}">${p.role || 'BAT'}</span>
        </div>
        <div class="player-meta">${p.ppl_teams?.short_name || ''}</div>
      </div>
      <div class="player-right">
        <div class="player-price${isStar ? ' is-star' : ''}">${p.fantasy_price}</div>
        ${capVcBtns}
      </div>
    </div>`;
}

function playerShortName(id) {
  const p = allPlayers.find(x => x.id === id);
  if (!p) return '?';
  return p.name.split(' ')[0];
}

function setRoleFilter(r) {
  roleFilter = r;
  renderPickTab(getDayObj());
}

function togglePlayer(id) {
  const p = allPlayers.find(x => x.id === id);
  if (!p) return;

  if (selected.has(id)) {
    selected.delete(id);
    if (captainId === id) captainId = null;
    if (vcId === id) vcId = null;
  } else {
    // Validate
    if (selected.size >= TEAM_SIZE) { showMsg(`You can only pick ${TEAM_SIZE} players`, 'error'); return; }
    if (getRemaining() < parseFloat(p.fantasy_price || 0)) {
      showMsg(`Not enough budget! Need ${p.fantasy_price} pts, have ${getRemaining()}`, 'error'); return;
    }
    if (p.is_star && getStarCount() >= MAX_STARS) {
      showMsg(`Max ${MAX_STARS} star players (⭐) allowed!`, 'error'); return;
    }
    selected.add(id);
  }
  renderPickTab(getDayObj());
}

function setCaptain(id) {
  if (vcId === id) vcId = null;
  captainId = id;
  renderPickTab(getDayObj());
}

function setVC(id) {
  if (captainId === id) captainId = null;
  vcId = id;
  renderPickTab(getDayObj());
}

function clearSelection() {
  clearSelectionSilent();
  renderPickTab(getDayObj());
}

function clearSelectionSilent() {
  selected.clear(); captainId = null; vcId = null; existingTeam = null;
}

async function submitTeam() {
  // Validate
  if (selected.size < TEAM_SIZE) { showMsg(`Select exactly ${TEAM_SIZE} players (have ${selected.size})`, 'error'); return; }
  if (!captainId)  { showMsg('Set your Captain (C)', 'error'); return; }
  if (!vcId)       { showMsg('Set your Vice Captain (VC)', 'error'); return; }
  if (captainId === vcId) { showMsg('Captain and VC must be different players', 'error'); return; }

  const spent = getSpent();
  if (spent > BUDGET) { showMsg(`Over budget! Spent ${spent}/${BUDGET} pts`, 'error'); return; }

  const stars = getStarCount();
  if (stars > MAX_STARS) { showMsg(`Too many star players: ${stars}/${MAX_STARS} allowed`, 'error'); return; }

  const day = getDayObj();
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    const teamPayload = {
      user_id: currentUser.id,
      day_id: day.id,
      user_name: currentUser.name,
      total_budget_used: spent
    };
    let teamId;

    if (existingTeam) {
      await sb.from('ppl_user_teams').update(teamPayload).eq('id', existingTeam.id);
      teamId = existingTeam.id;
      await sb.from('ppl_user_team_players').delete().eq('user_team_id', teamId);
    } else {
      const { data: newTeam } = await sb.from('ppl_user_teams').insert(teamPayload).select().single();
      teamId = newTeam.id;
    }

    const picks = [...selected].map(pid => ({
      user_team_id:    teamId,
      player_id:       pid,
      user_id:         currentUser.id,
      is_captain:      pid === captainId,
      is_vice_captain: pid === vcId
    }));
    await sb.from('ppl_user_team_players').insert(picks);

    showMsg('✅ Team saved!', 'success');
    await loadTab();
  } catch (e) {
    showMsg('Error: ' + e.message, 'error');
  } finally {
    btn.textContent = '💾 Save Team'; btn.disabled = false;
  }
}

// ── MY TEAM TAB ───────────────────────────────────────────────────────
async function renderMyTeam(day) {
  const el = document.getElementById('tab-content');

  if (!existingTeam) {
    el.innerHTML = `<div class="empty">You haven't submitted a team for Day ${activeDay}.<br><br>Switch to <strong>Pick Team</strong> to create one.</div>`;
    return;
  }

  const { data: score } = await sb.from('ppl_fantasy_scores')
    .select('total_points, rank')
    .eq('user_id', currentUser.id).eq('day_id', day.id).maybeSingle();

  // Player points for this day
  const { data: mids } = await sb.from('ppl_matches').select('id').eq('day', activeDay);
  const matchIds = (mids || []).map(m => m.id);
  let pmpMap = {};
  if (matchIds.length) {
    const { data: pmp } = await sb.from('ppl_player_match_points')
      .select('player_id, fantasy_points').in('match_id', matchIds);
    (pmp || []).forEach(r => { pmpMap[r.player_id] = (pmpMap[r.player_id] || 0) + r.fantasy_points; });
  }

  const picks = existingTeam.ppl_user_team_players || [];
  const spent = picks.reduce((s, pick) => {
    const p = allPlayers.find(pl => pl.id === pick.player_id);
    return s + parseFloat(p?.fantasy_price || 0);
  }, 0);

  let html = `
    <div class="my-team-header">
      <div style="font-size:12px;color:var(--text-faint);margin-bottom:4px">Day ${activeDay} — ${currentUser.name}</div>
      <div class="my-team-pts">${score ? score.total_points.toFixed(1) : '—'}</div>
      <div class="my-team-rank">${score ? `Rank #${score.rank}` : 'Points calculated after matches'}</div>
      <div style="font-size:11px;color:var(--text-faint);margin-top:6px">Budget used: <strong style="color:var(--text-dim)">${Math.round(spent * 10) / 10}/${BUDGET}</strong></div>
    </div>`;

  const sorted = [...picks].sort((a, b) => {
    if (a.is_captain) return -1; if (b.is_captain) return 1;
    if (a.is_vice_captain) return -1; if (b.is_vice_captain) return 1;
    const pa = allPlayers.find(pl => pl.id === a.player_id);
    const pb = allPlayers.find(pl => pl.id === b.player_id);
    return (pb?.fantasy_price || 0) - (pa?.fantasy_price || 0);
  });

  html += sorted.map(pick => {
    const p    = allPlayers.find(pl => pl.id === pick.player_id);
    const pts  = pmpMap[pick.player_id] || 0;
    const mult = pick.is_captain ? 2 : pick.is_vice_captain ? 1.5 : 1;
    const fin  = pts * mult;
    const badge = pick.is_captain
      ? '<span class="cap-badge">C</span>'
      : pick.is_vice_captain ? '<span class="vc-badge">VC</span>' : '';
    const starB = p?.is_star ? '<span class="star-badge">⭐</span>' : '';
    return `
      <div class="my-player-row">
        <div class="player-info">
          <div class="player-name-row">${p?.name || '?'}${badge}${starB}
            <span class="role-badge role-${p?.role || 'BAT'}">${p?.role || 'BAT'}</span>
          </div>
          <div class="player-meta">${p?.ppl_teams?.short_name || ''} · ${p?.fantasy_price || 0} pts</div>
        </div>
        <div class="my-player-pts">
          ${fin > 0 ? fin.toFixed(1) : '—'}
          ${mult > 1 ? `<div class="multiplier">×${mult}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  el.innerHTML = html;
}

// ── LEADERBOARD ───────────────────────────────────────────────────────
async function renderLeaderboard(day) {
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="loading">Loading…</div>';

  const { data: scores } = await sb.from('ppl_fantasy_scores')
    .select('*, ppl_user_teams(user_name)')
    .eq('day_id', day.id).order('rank');

  if (!scores || !scores.length) {
    el.innerHTML = `<div class="empty">Leaderboard appears after Day ${activeDay} matches are complete.</div>`;
    return;
  }

  el.innerHTML = scores.map((s, i) => {
    const rankCls  = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${s.rank}`;
    const isMe     = s.ppl_user_teams?.user_name === currentUser.name;
    return `
      <div class="lb-card" style="${isMe ? 'border-color:rgba(154,224,0,0.35);background:#051209' : ''}">
        <div class="lb-rank ${rankCls}">${rankIcon}</div>
        <div class="lb-info">
          <div class="lb-name">${s.ppl_user_teams?.user_name || 'Player'}
            ${isMe ? '<span class="you-tag">← You</span>' : ''}
          </div>
          <div style="font-size:11px;color:var(--text-faint)">Day ${activeDay}</div>
        </div>
        <div class="lb-pts">${s.total_points.toFixed(1)}</div>
      </div>`;
  }).join('');
}

// ── MSG ───────────────────────────────────────────────────────────────
function showMsg(msg, type) {
  const el  = document.getElementById('tab-content');
  const old = el.querySelector('.msg');
  if (old) old.remove();
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.textContent = msg;
  el.prepend(div);
  setTimeout(() => div.remove(), 3500);
}

init();
</script>
</body>
</html>
