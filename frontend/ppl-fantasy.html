<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPL 2026 — Fantasy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --accent:#9AE000;--accent-dim:rgba(154,224,0,0.09);--accent-glow:rgba(154,224,0,0.28);
      --accent-mid:rgba(154,224,0,0.18);--bg-page:#020617;--bg-card:#0d1625;--bg-card-alt:#111e30;
      --border-card:rgba(255,255,255,0.10);--border:rgba(255,255,255,0.07);
      --border-subtle:rgba(255,255,255,0.04);--border-accent:rgba(154,224,0,0.20);
      --text-primary:#f0f4f8;--text-dim:#94a3b8;--text-faint:#64748b;
      --red:#ef4444;--orange:#fb923c;--gold:#f59e0b;--rank-color:#7cc4ff;--star:#fbbf24;
      --phase-a:#9AE000;--phase-b:#7cc4ff;--phase-ko:#fb923c;
      --font-display:'Barlow Condensed',sans-serif;--font-body:'DM Sans',sans-serif;
      --card-radius:16px;--btn-radius:12px;--nav-height:65px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--bg-page);color:var(--text-primary);min-height:100vh}

    /* HEADER */
    .app-header{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;
      background:rgba(2,6,23,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100}
    .icon-back{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);
      border:1px solid var(--border-card);color:var(--text-primary);display:flex;
      align-items:center;justify-content:center;text-decoration:none;font-size:14px;flex-shrink:0}
    .page-title{font-family:var(--font-display);font-size:20px;font-weight:900;text-transform:uppercase;flex:1}
    .user-chip{font-size:11px;color:var(--text-faint);text-align:right;line-height:1.4;
      max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* SECTION */
    .section{padding:14px 16px;max-width:480px;margin:0 auto;padding-bottom:180px}

    /* AUTH WALL */
    .auth-wall{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius);
      padding:32px 20px;text-align:center;margin-top:24px}
    .auth-wall h3{font-family:var(--font-display);font-size:24px;font-weight:900;margin-bottom:8px}
    .auth-wall p{color:var(--text-faint);font-size:13px;margin-bottom:20px;line-height:1.6}
    .btn-auth{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#0284c7,#0369a1);
      color:#fff;border-radius:var(--btn-radius);font-weight:700;text-decoration:none;font-size:14px;
      font-family:var(--font-display);letter-spacing:0.5px;text-transform:uppercase}

    /* PHASE TABS */
    .phase-tabs{display:flex;gap:6px;margin-bottom:14px}
    .phase-tab{flex:1;padding:10px 6px;border-radius:var(--btn-radius);border:1px solid var(--border-card);
      background:var(--bg-card);color:var(--text-faint);font-family:var(--font-display);
      font-size:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;
      cursor:pointer;text-align:center;transition:all 0.15s;line-height:1.3}
    .phase-tab.active-a{background:var(--accent-dim);border-color:var(--border-accent);color:var(--accent)}
    .phase-tab.active-b{background:rgba(124,196,255,0.09);border-color:rgba(124,196,255,0.25);color:var(--phase-b)}
    .phase-tab.active-ko{background:rgba(251,146,60,0.09);border-color:rgba(251,146,60,0.25);color:var(--phase-ko)}
    .phase-tab.locked-tab{opacity:0.5}
    .phase-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
    .dot-a{background:var(--accent)}.dot-b{background:var(--phase-b)}.dot-ko{background:var(--phase-ko)}

    /* INNER TABS */
    .tab-row{display:flex;gap:6px;margin-bottom:14px}
    .tab-btn{flex:1;padding:8px;border-radius:var(--btn-radius);border:1px solid var(--border-card);
      background:var(--bg-card);color:var(--text-faint);font-family:var(--font-display);
      font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;
      cursor:pointer;text-align:center;transition:all 0.15s}
    .tab-btn.active{background:rgba(124,196,255,0.1);border-color:rgba(124,196,255,0.3);color:var(--rank-color)}

    /* PHASE BANNER */
    .phase-banner{border-radius:12px;padding:10px 14px;margin-bottom:12px;
      display:flex;justify-content:space-between;align-items:center;font-size:12px}
    .phase-banner.open-a{background:var(--accent-dim);border:1px solid var(--border-accent);color:var(--accent)}
    .phase-banner.open-b{background:rgba(124,196,255,0.08);border:1px solid rgba(124,196,255,0.25);color:var(--phase-b)}
    .phase-banner.open-ko{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:var(--phase-ko)}
    .phase-banner.locked{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}

    /* BUDGET BAR */
    .budget-bar{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius);
      padding:11px 14px;margin-bottom:12px;display:flex;align-items:center}
    .budget-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
    .budget-val{font-family:var(--font-display);font-size:19px;font-weight:900;line-height:1}
    .budget-val.good{color:var(--accent)}.budget-val.warn{color:var(--orange)}.budget-val.over{color:var(--red)}
    .budget-val.white{color:var(--text-primary)}.budget-val.gold{color:var(--star)}
    .budget-lbl{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;font-weight:600}
    .budget-div{width:1px;height:32px;background:var(--border-card)}

    /* RULES BOX */
    .rules-box{background:rgba(154,224,0,0.04);border:1px solid var(--border-accent);
      border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;
      color:var(--text-faint);line-height:1.8}

    /* FILTER */
    .filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
    .filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border-card);
      background:var(--bg-card);color:var(--text-faint);font-size:11px;font-weight:700;
      text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;white-space:nowrap;
      font-family:var(--font-display);transition:all 0.15s;flex-shrink:0}
    .filter-btn.active{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);color:var(--text-primary)}

    /* TEAM HEADER */
    .team-hdr{font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:2px;
      text-transform:uppercase;color:var(--text-faint);margin:14px 0 6px;
      display:flex;align-items:center;gap:8px}
    .team-hdr::before{content:'';width:3px;height:12px;border-radius:2px;flex-shrink:0}
    .team-hdr.grp-a::before{background:var(--accent)}
    .team-hdr.grp-b::before{background:var(--phase-b)}
    .team-hdr.grp-ko::before{background:var(--phase-ko)}
    .team-name-sub{font-size:10px;color:var(--text-faint);font-weight:600;letter-spacing:1px;
      text-transform:uppercase;margin:6px 0 5px;padding-left:2px}

    /* PLAYER ROW */
    .player-row{display:flex;align-items:center;gap:10px;background:var(--bg-card);
      border-radius:12px;padding:10px 12px;margin-bottom:7px;border:1px solid var(--border-card);
      cursor:pointer;transition:all 0.15s;position:relative}
    .player-row:active{transform:scale(0.98)}
    .player-row.selected{border-color:rgba(124,196,255,0.4);background:#0a1e35}
    .player-row.is-captain{border-color:rgba(245,158,11,0.5)!important;background:#1a1200!important}
    .player-row.is-vc{border-color:rgba(148,163,184,0.4)!important;background:#12171d!important}
    .player-row.star-player{border-left:3px solid var(--star)}
    .player-row.faded{opacity:0.35;cursor:not-allowed}

    .p-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-card);
      display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all 0.15s}
    .player-row.selected .p-check{background:var(--rank-color);border-color:var(--rank-color);color:#000}
    .player-row.is-captain .p-check{background:var(--star);border-color:var(--star);color:#000}
    .player-row.is-vc .p-check{background:var(--text-dim);border-color:var(--text-dim);color:#000}

    .p-info{flex:1;min-width:0}
    .p-name{display:flex;align-items:center;gap:5px;font-weight:600;font-size:14px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .role-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:800;
      letter-spacing:0.5px;flex-shrink:0;font-family:var(--font-display)}
    .role-AR{background:rgba(245,158,11,0.15);color:var(--gold)}
    .role-BAT{background:rgba(124,196,255,0.12);color:var(--rank-color)}
    .role-BOWL{background:rgba(154,224,0,0.1);color:var(--accent)}
    .star-icon{font-size:9px;color:var(--star);flex-shrink:0}
    .cap-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:800;
      background:rgba(245,158,11,0.2);color:var(--star);flex-shrink:0}
    .vc-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:800;
      background:rgba(148,163,184,0.15);color:var(--text-dim);flex-shrink:0}
    .p-meta{font-size:11px;color:var(--text-faint);margin-top:2px}

    .p-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
    .p-price{font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--text-primary)}
    .p-price.is-star{color:var(--star)}
    .cv-btns{display:flex;gap:4px}
    .cv-btn{font-size:10px;padding:3px 7px;border-radius:6px;border:1px solid var(--border-card);
      background:var(--bg-page);color:var(--text-faint);cursor:pointer;font-weight:800;
      font-family:var(--font-display);transition:all 0.15s}
    .cv-btn.active-gold{border-color:var(--star);color:var(--star);background:rgba(245,158,11,0.1)}
    .cv-btn.active-silver{border-color:var(--text-dim);color:var(--text-dim);background:rgba(148,163,184,0.1)}

    /* MY TEAM */
    .my-team-hdr{background:var(--bg-card);border:1px solid var(--border-accent);
      border-radius:var(--card-radius);padding:18px;margin-bottom:14px;text-align:center}
    .my-pts{font-family:var(--font-display);font-size:52px;font-weight:900;line-height:1}
    .pts-a{color:var(--accent)}.pts-b{color:var(--phase-b)}.pts-ko{color:var(--phase-ko)}
    .my-rank{font-size:13px;color:var(--text-faint);margin-top:4px}
    .my-player-row{display:flex;align-items:center;gap:10px;background:var(--bg-card);
      border:1px solid var(--border-card);border-radius:12px;padding:10px 12px;margin-bottom:7px}
    .my-pts-cell{font-family:var(--font-display);font-size:18px;font-weight:900;
      color:var(--rank-color);min-width:50px;text-align:right}
    .mult{font-size:10px;color:var(--star);font-weight:700}

    /* LEADERBOARD */
    .lb-tabs{display:flex;gap:8px;margin-bottom:12px}
    .lb-tab{flex:1;padding:8px;border-radius:var(--btn-radius);border:1px solid var(--border-card);
      background:var(--bg-card);color:var(--text-faint);font-family:var(--font-display);
      font-size:11px;font-weight:800;text-transform:uppercase;cursor:pointer;text-align:center;transition:all 0.15s}
    .lb-tab.active{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3);color:var(--star)}
    .lb-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:12px;
      padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
    .lb-card.me{border-color:rgba(154,224,0,0.35);background:#051209}
    .lb-rank{font-family:var(--font-display);font-size:18px;font-weight:900;color:var(--text-faint);
      min-width:32px;text-align:center}
    .lb-rank.gold{color:var(--star)}.lb-rank.silver{color:var(--text-dim)}.lb-rank.bronze{color:#b45309}
    .lb-info{flex:1}
    .lb-name{font-weight:700;font-size:14px}
    .lb-sub{font-size:11px;color:var(--text-faint);margin-top:2px}
    .lb-pts{font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--rank-color)}
    .you-tag{font-size:10px;color:var(--accent);font-weight:700;margin-left:5px}

    /* POINTS INFO CARD */
    .pts-info{background:var(--bg-card);border:1px solid var(--border-card);border-radius:var(--card-radius);
      padding:14px;margin-bottom:14px}
    .pts-info-title{font-family:var(--font-display);font-size:13px;font-weight:900;
      text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:10px}
    .pts-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .pts-row{display:flex;justify-content:space-between;align-items:center;
      font-size:11px;padding:4px 0;border-bottom:1px solid var(--border-subtle)}
    .pts-row:last-child{border-bottom:none}
    .pts-val{font-family:var(--font-display);font-size:13px;font-weight:800}
    .pts-val.pos{color:var(--accent)}.pts-val.neg{color:var(--red)}

    /* BOTTOM BAR */
    .bottom-bar{position:fixed;bottom:var(--nav-height);left:50%;transform:translateX(-50%);
      width:100%;max-width:480px;background:rgba(13,22,37,0.98);backdrop-filter:blur(20px);
      border-top:1px solid var(--border-card);padding:10px 16px;z-index:50;display:none}
    .bar-inner{display:flex;gap:8px;align-items:center}
    .btn{flex:1;padding:11px;border-radius:var(--btn-radius);border:none;font-size:13px;
      font-weight:700;cursor:pointer;font-family:var(--font-display);
      letter-spacing:0.5px;text-transform:uppercase;transition:opacity 0.15s}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    .btn-ghost{background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border-card)}
    .btn-green{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:480px;background:rgba(13,22,37,0.97);backdrop-filter:blur(20px);
      border-top:1px solid var(--border-card);display:flex;align-items:center;
      height:var(--nav-height);z-index:200;padding:0 8px}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;
      text-decoration:none;color:var(--text-faint);font-family:var(--font-display);
      font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
    .nav-item i{font-size:18px}
    .nav-item.active{color:var(--accent)}
    .nav-item.active i{filter:drop-shadow(0 0 6px var(--accent-glow))}

    .msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px}
    .msg-ok{background:rgba(22,163,74,0.1);color:#4ade80;border:1px solid rgba(22,163,74,0.25)}
    .msg-err{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.25)}
    .loading{text-align:center;color:var(--text-faint);padding:40px 0;font-size:13px}
    .empty{text-align:center;color:var(--text-faint);padding:32px 16px;font-size:13px;line-height:1.7}

    /* KNOCKOUT LOCKED */
    .ko-locked-card{background:rgba(251,146,60,0.06);border:1px solid rgba(251,146,60,0.2);
      border-radius:var(--card-radius);padding:24px 16px;text-align:center;margin-top:8px}
    .ko-locked-card h3{font-family:var(--font-display);font-size:22px;font-weight:900;
      color:var(--phase-ko);margin-bottom:8px}
    .ko-locked-card p{font-size:13px;color:var(--text-faint);line-height:1.7}

    /* OVERALL SUMMARY */
    .overall-summary{background:var(--bg-card);border:1px solid var(--border-accent);
      border-radius:var(--card-radius);padding:16px;margin-bottom:14px}
    .overall-total{font-family:var(--font-display);font-size:42px;font-weight:900;
      color:var(--accent);line-height:1;text-align:center}
    .overall-sub{text-align:center;font-size:12px;color:var(--text-faint);margin-top:4px;margin-bottom:12px}
    .phase-breakdown{display:flex;gap:6px}
    .phase-pt{flex:1;text-align:center;padding:8px;border-radius:10px;background:var(--bg-page)}
    .phase-pt-val{font-family:var(--font-display);font-size:20px;font-weight:900}
    .phase-pt-lbl{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  </style>
</head>
<body>

<header class="app-header">
  <a class="icon-back" href="ppl-home.html"><i class="fas fa-arrow-left"></i></a>
  <h1 class="page-title">⚡ PPL Fantasy</h1>
  <div class="user-chip" id="user-chip">Loading…</div>
</header>

<div class="section">
  <div id="auth-wall"></div>
  <div id="app" style="display:none">
    <!-- Phase Tabs -->
    <div class="phase-tabs" id="phase-tabs">
      <button class="phase-tab active-a" onclick="switchPhase('group_a',this)">
        <span class="phase-dot dot-a"></span>Group A
      </button>
      <button class="phase-tab" onclick="switchPhase('group_b',this)">
        <span class="phase-dot dot-b"></span>Group B
      </button>
      <button class="phase-tab" onclick="switchPhase('knockout',this)">
        <span class="phase-dot dot-ko"></span>Knockout
      </button>
    </div>
    <!-- Inner Tabs -->
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchInnerTab(this,'pick')"><i class="fas fa-users"></i> Pick XI</button>
      <button class="tab-btn" onclick="switchInnerTab(this,'myteam')"><i class="fas fa-user"></i> My Team</button>
      <button class="tab-btn" onclick="switchInnerTab(this,'standings')"><i class="fas fa-trophy"></i> Standings</button>
    </div>
    <div id="tab-content"></div>
  </div>
</div>

<!-- Sticky bottom bar -->
<div class="bottom-bar" id="sel-bar">
  <div class="bar-inner">
    <button class="btn btn-ghost" onclick="clearSel()">Clear</button>
    <button class="btn btn-green" id="submit-btn" onclick="submitTeam()">💾 Save Team</button>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="ppl-home.html"><i class="fas fa-house"></i><span>Home</span></a>
  <a class="nav-item" href="ppl-fixtures.html"><i class="fas fa-calendar-days"></i><span>Fixtures</span></a>
  <a class="nav-item" href="ppl-scorecard.html"><i class="fas fa-cricket-bat-ball"></i><span>Scores</span></a>
  <a class="nav-item" href="ppl-stats.html"><i class="fas fa-chart-bar"></i><span>Stats</span></a>
  <a class="nav-item active" href="ppl-fantasy.html"><i class="fas fa-bolt"></i><span>Fantasy</span></a>
</nav>

<script>

const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';

// ─── FANTASY POINTS SYSTEM ────────────────────────────────────────────────
const PTS = {

  four_bonus: 1,
  six_bonus: 2,
  duck: -5,
  // SR = runs - balls (calculated inline)

let activePhase = 'group_a';
let activeInnerTab = 'pick';

// Per-phase pick state
let pickState = {
  group_a:  { selected: new Set(), captainId: null, vcId: null, existingTeam: null },
  group_b:  { selected: new Set(), captainId: null, vcId: null, existingTeam: null },
  knockout: { selected: new Set(), captainId: null, vcId: null, existingTeam: null }
};
let roleFilter = 'ALL';

// ─── HELPERS ──────────────────────────────────────────────────────────────
function ps() { return pickState[activePhase]; }
function ph() { return phases[activePhase]; }

function phaseColor(phase) {
  return phase === 'group_a' ? 'var(--accent)' : phase === 'group_b' ? 'var(--phase-b)' : 'var(--phase-ko)';
}
function phaseLabel(phase) {
  return phase === 'group_a' ? 'Group A' : phase === 'group_b' ? 'Group B' : 'Knockout';
}
function phaseTabClass(phase) {
  return phase === 'group_a' ? 'active-a' : phase === 'group_b' ? 'active-b' : 'active-ko';
}
function ptsColorClass(phase) {
  return phase === 'group_a' ? 'pts-a' : phase === 'group_b' ? 'pts-b' : 'pts-ko';
}

// Budget helpers for active phase
function spent() {
  let s = 0;
  ps().selected.forEach(id => {
    const p = allPlayers.find(x => x.id === id);
    if (p) s += parseFloat(p.fantasy_price || 0);
  });
  return Math.round(s * 10) / 10;
}
function remaining() {
  const budget = parseFloat(ph()?.total_credits || 100);
  return Math.round((budget - spent()) * 10) / 10;
}
function starCount() {
  let c = 0;
  ps().selected.forEach(id => {
    const p = allPlayers.find(x => x.id === id);
    if (p?.is_star) c++;
  });
  return c;
}
function roleCount(role) {
  let c = 0;
  ps().selected.forEach(id => {
    const p = allPlayers.find(x => x.id === id);
    if (p?.role === role) c++;
  });
  return c;
}

// ─── BOOT ─────────────────────────────────────────────────────────────────
async function boot() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    document.getElementById('auth-wall').innerHTML = `
      <div class="auth-wall">
        <h3>⚡ PPL Fantasy</h3>
        <p>Sign in to pick your fantasy teams for PPL 2026.<br>
           Pick teams for Group A, Group B & Knockout phases!</p>
        <a class="btn-auth" href="index.html">Sign In →</a>
      </div>`;
    document.getElementById('user-chip').textContent = 'Not signed in';
    return;
  }

  const { data: profile } = await sb.from('user_profiles')
    .select('user_id,full_name,team_name,is_ppl_admin')
    .eq('user_id', session.user.id).single();
  ME = {
    id: session.user.id,
    full_name: profile?.full_name || session.user.email,
    team_name: profile?.team_name || '',
    is_admin: profile?.is_ppl_admin || false
  };
  document.getElementById('user-chip').textContent = ME.team_name || ME.full_name;

  // Load all data in parallel
  const [{ data: phasesData }, { data: pl }] = await Promise.all([
    sb.from('ppl_fantasy_days').select('*').order('created_at'),
    sb.from('ppl_players')
      .select('id,name,role,fantasy_price,is_star,fantasy_group,team_id,ppl_teams(id,name,short_name,group_name)')
      .eq('is_active', true)
  ]);

  // Map phases by phase key
  (phasesData || []).forEach(p => { phases[p.phase] = p; });
  allPlayers = pl || [];

  // Load existing teams for all phases
  await loadAllExistingTeams();

  document.getElementById('app').style.display = 'block';
  renderContent();
}

async function loadAllExistingTeams() {
  const phaseIds = Object.values(phases).map(p => p.id);
  if (!phaseIds.length) return;

  const { data: teams } = await sb.from('ppl_user_teams')
    .select('*,ppl_user_team_players(player_id,is_captain,is_vice_captain,fantasy_points)')
    .eq('user_id', ME.id)
    .in('phase_id', phaseIds);

  if (!teams) return;
  teams.forEach(team => {
    const phase = team.phase;
    if (!phase || !pickState[phase]) return;
    pickState[phase].existingTeam = team;
    pickState[phase].selected = new Set(team.ppl_user_team_players.map(p => p.player_id));
    pickState[phase].captainId = team.captain_player_id;
    pickState[phase].vcId = team.vice_captain_player_id;
  });
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────
function switchPhase(phase, btn) {
  activePhase = phase;
  roleFilter = 'ALL';
  document.querySelectorAll('.phase-tab').forEach(t => {
    t.classList.remove('active-a','active-b','active-ko');
  });
  btn.classList.add(phaseTabClass(phase));
  renderContent();
}

function switchInnerTab(btn, tab) {
  activeInnerTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

function renderContent() {
  const phase = ph();
  const showBar = activeInnerTab === 'pick' && phase && !phase.is_locked;
  document.getElementById('sel-bar').style.display = showBar ? 'block' : 'none';

  if (activeInnerTab === 'pick')          renderPick();
  else if (activeInnerTab === 'myteam')   renderMyTeam();
  else                                     renderStandings();
}

// ─── PICK TAB ─────────────────────────────────────────────────────────────
function renderPick() {
  const el = document.getElementById('tab-content');
  const phase = ph();
  if (!phase) { el.innerHTML = '<div class="empty">Phase not configured.</div>'; return; }

  // Knockout locked until admin unlocks
  if (activePhase === 'knockout' && phase.is_locked && !ps().existingTeam) {
    el.innerHTML = `<div class="ko-locked-card">
      <h3>🏆 Knockout Phase Locked</h3>
      <p>Group stage is still in progress.<br>Once the top 2 from each group qualify,<br>you can pick your Knockout XI here.</p>
    </div>`; return;
  }

  if (phase.is_locked && !ps().existingTeam) {
    el.innerHTML = `<div class="phase-banner locked">🔒 ${phaseLabel(activePhase)} is locked. You didn't submit a team.</div>`; return;
  }
  if (phase.is_locked) {
    el.innerHTML = `<div class="phase-banner locked">🔒 Locked. See your picks in <strong>My Team</strong>.</div>`; return;
  }

  const BUDGET   = parseFloat(phase.total_credits || 100);
  const MAX_STARS = parseInt(phase.max_star_players || 4);
  const TEAM_SIZE = parseInt(phase.team_size || 11);
  const MIN_BAT  = parseInt(phase.min_batters || 3);
  const MIN_BOWL = parseInt(phase.min_bowlers || 3);
  const MIN_AR   = parseInt(phase.min_allrounders || 1);

  const rem = remaining();
  const stars = starCount();
  const selSize = ps().selected.size;
  const remCls = rem < 0 ? 'over' : rem < 10 ? 'warn' : 'good';
  const starsCls = stars >= MAX_STARS ? 'gold' : 'white';
  const capName = ps().captainId ? (allPlayers.find(p => p.id === ps().captainId)?.name.split(' ')[0] || '—') : '—';
  const vcName  = ps().vcId      ? (allPlayers.find(p => p.id === ps().vcId)?.name.split(' ')[0] || '—')      : '—';

  const bannerClass = `open-${activePhase === 'group_a' ? 'a' : activePhase === 'group_b' ? 'b' : 'ko'}`;

  let html = '';

  // Banner
  html += `<div class="phase-banner ${bannerClass}">
    <span>🟢 ${phaseLabel(activePhase)} — Open</span>
    ${phase.lock_deadline ? `<span style="font-size:11px;opacity:0.8">Locks: ${new Date(phase.lock_deadline).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>` : ''}
  </div>`;

  // Budget bar (Now Sticky and tracking all role requirements)
  html += `<div class="budget-bar" style="position: sticky; top: 63px; z-index: 90; margin: 0 -16px 12px; padding: 12px 16px; border-radius: 0; border-left: none; border-right: none; background: rgba(2,6,23,0.95); backdrop-filter: blur(15px); box-shadow: 0 4px 20px rgba(0,0,0,0.4);">
    <div class="budget-item">
      <div class="budget-val ${remCls}">${rem}</div>
      <div class="budget-lbl">Credits</div>
    </div>
    <div class="budget-div"></div>
    <div class="budget-item">
      <div class="budget-val ${roleCount('BAT') < MIN_BAT ? 'warn' : 'good'}">${roleCount('BAT')}</div>
      <div class="budget-lbl">BAT (${MIN_BAT}+)</div>
    </div>
    <div class="budget-div"></div>
    <div class="budget-item">
      <div class="budget-val ${roleCount('AR') < MIN_AR ? 'warn' : 'good'}">${roleCount('AR')}</div>
      <div class="budget-lbl">AR (${MIN_AR}+)</div>
    </div>
    <div class="budget-div"></div>
    <div class="budget-item">
      <div class="budget-val ${roleCount('BOWL') < MIN_BOWL ? 'warn' : 'good'}">${roleCount('BOWL')}</div>
      <div class="budget-lbl">BWL (${MIN_BOWL}+)</div>
    </div>
    <div class="budget-div"></div>
    <div class="budget-item">
      <div class="budget-val ${starsCls}">${stars}<span style="font-size:11px;color:var(--text-faint)">/${MAX_STARS}</span></div>
      <div class="budget-lbl">⭐ Star</div>
    </div>
  </div>`;

  if (ps().existingTeam) html += `<div class="msg msg-ok">✅ Team saved — update below if needed</div>`;

  // Rules
  html += `<div class="rules-box">
    💡 <strong style="color:var(--text-dim)">Rules:</strong>
    ${TEAM_SIZE} players · ${BUDGET} credits · Max ${MAX_STARS} ⭐ Stars · 
    Min ${MIN_BAT} BAT · Min ${MIN_AR} AR · Min ${MIN_BOWL} BOWL · Set C (2×) & VC (1.5×)
  </div>`;

  // Filter
  html += `<div class="filter-row">
    ${['ALL','BAT','AR','BOWL'].map(r =>
      `<button class="filter-btn${roleFilter===r?' active':''}" onclick="setFilter('${r}')">${r === 'ALL' ? 'All Roles' : r}</button>`
    ).join('')}
  </div>`;

  // Get players for this phase
  let phasePlayers = [];
  if (activePhase === 'group_a') {
    phasePlayers = allPlayers.filter(p => p.fantasy_group === 'A' || p.ppl_teams?.group_name === 'A');
  } else if (activePhase === 'group_b') {
    phasePlayers = allPlayers.filter(p => p.fantasy_group === 'B' || p.ppl_teams?.group_name === 'B');
  } else {
    // Knockout — all active players (admin should have deactivated non-qualifiers)
    phasePlayers = allPlayers;
  }

  // Group by team
  const teamMap = {};
  phasePlayers.forEach(p => {
    if (!teamMap[p.team_id]) {
      teamMap[p.team_id] = {
        name: p.ppl_teams?.name || '?',
        short: p.ppl_teams?.short_name || '?',
        group: p.ppl_teams?.group_name || activePhase,
        players: []
      };
    }
    teamMap[p.team_id].players.push(p);
  });

  const sorted = Object.entries(teamMap).sort(([,a],[,b]) => a.name.localeCompare(b.name));
  const grpClass = activePhase === 'group_a' ? 'grp-a' : activePhase === 'group_b' ? 'grp-b' : 'grp-ko';

  sorted.forEach(([, team]) => {
    const filtered = roleFilter === 'ALL' ? team.players : team.players.filter(p => p.role === roleFilter);
    if (!filtered.length) return;
    html += `<div class="team-hdr ${grpClass}">${team.name}</div>`;
    filtered.sort((a,b) => b.fantasy_price - a.fantasy_price).forEach(p => {
      html += buildPlayerCard(p, BUDGET, MAX_STARS, TEAM_SIZE);
    });
  });

  if (!sorted.length) {
    html += `<div class="empty">No players found for this phase.<br>Admin needs to assign players to teams.</div>`;
  }

  el.innerHTML = html;
}

function buildPlayerCard(p, BUDGET, MAX_STARS, TEAM_SIZE) {
  const isSel = ps().selected.has(p.id);
  const isCap = ps().captainId === p.id;
  const isVC  = ps().vcId === p.id;
  const rem = remaining();

  const cantBudget = !isSel && rem < parseFloat(p.fantasy_price || 0);
  const cantStars  = !isSel && p.is_star && starCount() >= MAX_STARS;
  const cantSize   = !isSel && ps().selected.size >= TEAM_SIZE;
  const faded = (cantBudget || cantStars || cantSize) ? ' faded' : '';

  let cls = 'player-row';
  if (isCap) cls += ' is-captain';
  else if (isVC) cls += ' is-vc';
  else if (isSel) cls += ' selected';
  if (p.is_star) cls += ' star-player';
  cls += faded;

  const clickable = !(faded && !isSel);
  const checkTxt = isCap ? 'C' : isVC ? 'V' : isSel ? '✓' : '+';

  const cvBtns = (isSel || isCap || isVC) ? `
    <div class="cv-btns" onclick="event.stopPropagation()">
      <button class="cv-btn${isCap?' active-gold':''}" onclick="setCap('${p.id}')">C</button>
      <button class="cv-btn${isVC?' active-silver':''}" onclick="setVC('${p.id}')">VC</button>
    </div>` : '';

  return `<div class="${cls}" ${clickable ? `onclick="togglePlayer('${p.id}')"` : ''} id="pr-${p.id}">
    <div class="p-check">${checkTxt}</div>
    <div class="p-info">
      <div class="p-name">${p.name}
        ${isCap ? '<span class="cap-badge">C</span>' : isVC ? '<span class="vc-badge">VC</span>' : ''}
        ${p.is_star ? '<span class="star-icon">⭐</span>' : ''}
        <span class="role-badge role-${p.role}">${p.role}</span>
      </div>
      <div class="p-meta">${p.ppl_teams?.short_name || ''}</div>
    </div>
    <div class="p-right">
      <div class="p-price${p.is_star?' is-star':''}">${p.fantasy_price}</div>
      ${cvBtns}
    </div>
  </div>`;
}

function setFilter(r) { roleFilter = r; renderPick(); }

function togglePlayer(id) {
  const phase = ph();
  const TEAM_SIZE = parseInt(phase?.team_size || 11);
  const MAX_STARS = parseInt(phase?.max_star_players || 4);
  const BUDGET    = parseFloat(phase?.total_credits || 100);

  const p = allPlayers.find(x => x.id === id);
  if (!p) return;

  if (ps().selected.has(id)) {
    ps().selected.delete(id);
    if (ps().captainId === id) ps().captainId = null;
    if (ps().vcId === id) ps().vcId = null;
  } else {
    if (ps().selected.size >= TEAM_SIZE) { showMsg(`Max ${TEAM_SIZE} players`,'err'); return; }
    if (remaining() < parseFloat(p.fantasy_price || 0)) { showMsg(`Not enough credits`,'err'); return; }
    if (p.is_star && starCount() >= MAX_STARS) { showMsg(`Max ${MAX_STARS} ⭐ stars allowed`,'err'); return; }
    ps().selected.add(id);
  }
  renderPick();
}

function setCap(id) {
  if (ps().vcId === id) ps().vcId = null;
  ps().captainId = id;
  if (!ps().selected.has(id)) ps().selected.add(id);
  renderPick();
}
function setVC(id) {
  if (ps().captainId === id) ps().captainId = null;
  ps().vcId = id;
  if (!ps().selected.has(id)) ps().selected.add(id);
  renderPick();
}
function clearSel() {
  pickState[activePhase] = { selected: new Set(), captainId: null, vcId: null, existingTeam: null };
  renderPick();
}

async function submitTeam() {
  const phase = ph();
  const TEAM_SIZE = parseInt(phase?.team_size || 11);
  const MAX_STARS = parseInt(phase?.max_star_players || 4);
  const BUDGET    = parseFloat(phase?.total_credits || 100);
  const MIN_BAT   = parseInt(phase?.min_batters || 3);
  const MIN_BOWL  = parseInt(phase?.min_bowlers || 3);
  const MIN_AR    = parseInt(phase?.min_allrounders || 1);

  const state = ps();

  if (state.selected.size !== TEAM_SIZE) { showMsg(`Pick exactly ${TEAM_SIZE} players (have ${state.selected.size})`,'err'); return; }
  if (!state.captainId) { showMsg('Set your Captain (C)','err'); return; }
  if (!state.vcId)      { showMsg('Set your Vice Captain (VC)','err'); return; }
  if (state.captainId === state.vcId) { showMsg('C and VC must be different','err'); return; }
  if (spent() > BUDGET) { showMsg(`Over budget! ${spent()}/${BUDGET}`,'err'); return; }
  if (starCount() > MAX_STARS) { showMsg(`Too many ⭐ stars`,'err'); return; }
  if (roleCount('BAT') < MIN_BAT) { showMsg(`Need at least ${MIN_BAT} Batters (have ${roleCount('BAT')})`,'err'); return; }
  if (roleCount('BOWL') < MIN_BOWL) { showMsg(`Need at least ${MIN_BOWL} Bowlers (have ${roleCount('BOWL')})`,'err'); return; }
  if (roleCount('AR') < MIN_AR) { showMsg(`Need at least ${MIN_AR} All-rounder`,'err'); return; }

  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    let teamId;
    const teamPayload = {
      user_id: ME.id,
      phase_id: phase.id,
      phase: activePhase,
      user_name: ME.team_name || ME.full_name,
      captain_player_id: state.captainId,
      vice_captain_player_id: state.vcId,
      total_credits_used: spent(),
      total_budget_used: spent(),
      is_locked: false
    };

    if (state.existingTeam) {
      await sb.from('ppl_user_teams').update(teamPayload).eq('id', state.existingTeam.id);
      teamId = state.existingTeam.id;
      await sb.from('ppl_user_team_players').delete().eq('user_team_id', teamId);
    } else {
      const { data: nt, error: te } = await sb.from('ppl_user_teams').insert(teamPayload).select().single();
      if (te) throw te;
      teamId = nt.id;
    }

    const picks = [...state.selected].map(pid => ({
      user_team_id: teamId,
      player_id: pid,
      user_id: ME.id,
      is_captain: pid === state.captainId,
      is_vice_captain: pid === state.vcId
    }));
    const { error: pe } = await sb.from('ppl_user_team_players').insert(picks);
    if (pe) throw pe;

    showMsg(`✅ ${phaseLabel(activePhase)} team saved!`, 'ok');
    await loadAllExistingTeams();
    renderContent();
  } catch(e) {
    showMsg('Error: ' + (e.message || JSON.stringify(e)), 'err');
  } finally {
    btn.textContent = '💾 Save Team'; btn.disabled = false;
  }
}

// ─── MY TEAM TAB ──────────────────────────────────────────────────────────
async function renderMyTeam() {
  const el = document.getElementById('tab-content');
  const state = ps();

  // Overall summary at top
  const { data: scores } = await sb.from('ppl_fantasy_scores')
    .select('phase_points, phase_id, ppl_fantasy_days(phase)')
    .eq('user_id', ME.id);

  let totalPts = 0, gaPts = 0, gbPts = 0, koPts = 0;
  (scores || []).forEach(s => {
    const ph = s.ppl_fantasy_days?.phase;
    const pts = parseFloat(s.phase_points || 0);
    totalPts += pts;
    if (ph === 'group_a') gaPts = pts;
    else if (ph === 'group_b') gbPts = pts;
    else if (ph === 'knockout') koPts = pts;
  });

  let html = `<div class="overall-summary">
    <div class="overall-total">${totalPts.toFixed(1)}</div>
    <div class="overall-sub">Total Fantasy Points</div>
    <div class="phase-breakdown">
      <div class="phase-pt">
        <div class="phase-pt-val" style="color:var(--accent)">${gaPts.toFixed(1)}</div>
        <div class="phase-pt-lbl">Group A</div>
      </div>
      <div class="phase-pt">
        <div class="phase-pt-val" style="color:var(--phase-b)">${gbPts.toFixed(1)}</div>
        <div class="phase-pt-lbl">Group B</div>
      </div>
      <div class="phase-pt">
        <div class="phase-pt-val" style="color:var(--phase-ko)">${koPts.toFixed(1)}</div>
        <div class="phase-pt-lbl">Knockout</div>
      </div>
    </div>
  </div>`;

  if (!state.existingTeam) {
    html += `<div class="empty">No ${phaseLabel(activePhase)} team submitted yet.<br>Go to <strong>Pick XI</strong> to create one.</div>`;
    el.innerHTML = html;
    return;
  }

  const phase = ph();
  const picks = state.existingTeam.ppl_user_team_players || [];
  const phaseScore = (scores || []).find(s => s.phase_id === phase?.id);
  const phasePts = parseFloat(phaseScore?.phase_points || state.existingTeam.total_points || 0);
  const budgetUsed = picks.reduce((s, pick) => {
    const p = allPlayers.find(pl => pl.id === pick.player_id);
    return s + parseFloat(p?.fantasy_price || 0);
  }, 0);

  const ptsCls = ptsColorClass(activePhase);

  html += `<div class="my-team-hdr">
    <div style="font-size:11px;color:var(--text-faint);margin-bottom:4px">${phaseLabel(activePhase)} · ${ME.team_name || ME.full_name}</div>
    <div class="my-pts ${ptsCls}">${phasePts.toFixed(1)}</div>
    <div class="my-rank">${phaseScore ? `Phase Rank will update after matches` : 'Points update as matches complete'}</div>
    <div style="font-size:11px;color:var(--text-faint);margin-top:6px">Credits used: <strong style="color:var(--text-dim)">${Math.round(budgetUsed*10)/10}/${phase?.total_credits||100}</strong></div>
  </div>`;

  // Sort: cap first, vc second, then by price
  const sortedPicks = [...picks].sort((a,b) => {
    if (a.player_id === state.existingTeam.captain_player_id) return -1;
    if (b.player_id === state.existingTeam.captain_player_id) return 1;
    if (a.player_id === state.existingTeam.vice_captain_player_id) return -1;
    if (b.player_id === state.existingTeam.vice_captain_player_id) return 1;
    const pa = allPlayers.find(pl => pl.id === a.player_id);
    const pb = allPlayers.find(pl => pl.id === b.player_id);
    return (pb?.fantasy_price||0) - (pa?.fantasy_price||0);
  });

  html += sortedPicks.map(pick => {
    const p     = allPlayers.find(pl => pl.id === pick.player_id);
    const isCap = pick.player_id === state.existingTeam.captain_player_id;
    const isVC  = pick.player_id === state.existingTeam.vice_captain_player_id;
    const mult  = isCap ? 2 : isVC ? 1.5 : 1;
    const raw   = parseFloat(pick.fantasy_points || 0);
    const fin   = raw * mult;
    const badge = isCap ? '<span class="cap-badge">C</span>' : isVC ? '<span class="vc-badge">VC</span>' : '';
    const starB = p?.is_star ? '<span class="star-icon">⭐</span>' : '';
    return `<div class="my-player-row">
      <div class="p-info">
        <div class="p-name">${p?.name||'?'}${badge}${starB}
          <span class="role-badge role-${p?.role||'BAT'}">${p?.role||'BAT'}</span>
        </div>
        <div class="p-meta">${p?.ppl_teams?.short_name||''} · ${p?.fantasy_price||0} cr</div>
      </div>
      <div class="my-pts-cell">
        ${raw > 0 ? fin.toFixed(1) : '—'}
        ${mult > 1 ? `<div class="mult">×${mult}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // Points system reference
  html += `<div class="pts-info" style="margin-top:16px">
    <div class="pts-info-title">📊 Points System</div>
    <div class="pts-grid">
      <div>
        <div class="pts-row"><span>Per Run</span><span class="pts-val pos">+1</span></div>
        <div class="pts-row"><span>SR (Runs−Balls)</span><span class="pts-val pos">±</span></div>
        <div class="pts-row"><span>Per Four</span><span class="pts-val pos">+1</span></div>
        <div class="pts-row"><span>Per Six</span><span class="pts-val pos">+2</span></div>
        <div class="pts-row"><span>Duck</span><span class="pts-val neg">−5</span></div>
        <div class="pts-row"><span>Catch/Stump/RO</span><span class="pts-val pos">+8</span></div>
        <div class="pts-row"><span>MOM</span><span class="pts-val pos">+25</span></div>
      </div>
      <div>
        <div class="pts-row"><span>Per Wicket</span><span class="pts-val pos">+30</span></div>
        <div class="pts-row"><span>Maiden</span><span class="pts-val pos">+30</span></div>
        <div class="pts-row"><span>Eco ≤10</span><span class="pts-val pos">+10</span></div>
        <div class="pts-row"><span>Eco ≥15</span><span class="pts-val neg">−5</span></div>
        <div class="pts-row"><span>Eco ≥20</span><span class="pts-val neg">−10</span></div>
        <div class="pts-row"><span>2/3/4/5+ wkts</span><span class="pts-val pos">+10/15/20/25</span></div>
        <div class="pts-row"><span>Captain / VC</span><span class="pts-val pos">2× / 1.5×</span></div>
      </div>
    </div>
  </div>`;

  el.innerHTML = html;
}

// ─── STANDINGS TAB ────────────────────────────────────────────────────────
async function renderStandings() {
  const el = document.getElementById('tab-content');
  const phase = ph();

  el.innerHTML = `
    <div class="lb-tabs">
      <button class="lb-tab${activeLbTab==='overall'?' active':''}" onclick="switchLbTab('overall',this)">🏆 Overall</button>
      <button class="lb-tab${activeLbTab==='phase'?' active':''}" onclick="switchLbTab('phase',this)">${phaseLabel(activePhase)}</button>
    </div>
    <div id="lb-body"><div class="loading">Loading standings…</div></div>`;

  loadLbBody(phase);
}

function switchLbTab(tab, btn) {
  activeLbTab = tab;
  document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadLbBody(ph());
}

async function loadLbBody(phase) {
  const el = document.getElementById('lb-body');
  if (!el) return;

  if (activeLbTab === 'overall') {
    const { data: rows } = await sb.from('ppl_overall_leaderboard').select('*').order('overall_rank');
    if (!rows?.length) {
      el.innerHTML = `<div class="empty">Overall leaderboard appears after matches complete.</div>`; return;
    }
    el.innerHTML = rows.map((r, i) => {
      const isMe = r.user_id === ME.id;
      const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const icon = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${r.overall_rank}`;
      return `<div class="lb-card${isMe?' me':''}">
        <div class="lb-rank ${rankCls}">${icon}</div>
        <div class="lb-info">
          <div class="lb-name">${r.team_name||r.full_name||'Player'}${isMe?'<span class="you-tag">← You</span>':''}</div>
          <div class="lb-sub">
            <span style="color:var(--accent)">A: ${parseFloat(r.group_a_points||0).toFixed(1)}</span> &nbsp;
            <span style="color:var(--phase-b)">B: ${parseFloat(r.group_b_points||0).toFixed(1)}</span> &nbsp;
            <span style="color:var(--phase-ko)">KO: ${parseFloat(r.knockout_points||0).toFixed(1)}</span>
          </div>
        </div>
        <div class="lb-pts">${parseFloat(r.total_points||0).toFixed(1)}</div>
      </div>`;
    }).join('');

  } else {
    // Phase-specific leaderboard
    if (!phase) { el.innerHTML = '<div class="empty">Phase not found.</div>'; return; }
    const { data: rows } = await sb.from('ppl_fantasy_scores')
      .select('user_id, phase_points, rank_for_phase, ppl_user_teams!inner(user_name)')
      .eq('phase_id', phase.id)
      .order('phase_points', { ascending: false });

    if (!rows?.length) {
      el.innerHTML = `<div class="empty">${phaseLabel(activePhase)} leaderboard appears after matches complete.</div>`; return;
    }
    el.innerHTML = rows.map((r, i) => {
      const isMe = r.user_id === ME.id;
      const name = r.ppl_user_teams?.user_name || 'Player';
      const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const icon = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
      return `<div class="lb-card${isMe?' me':''}">
        <div class="lb-rank ${rankCls}">${icon}</div>
        <div class="lb-info">
          <div class="lb-name">${name}${isMe?'<span class="you-tag">← You</span>':''}</div>
          <div class="lb-sub">${phaseLabel(activePhase)}</div>
        </div>
        <div class="lb-pts">${parseFloat(r.phase_points||0).toFixed(1)}</div>
      </div>`;
    }).join('');
  }
}

// ─── MSG ──────────────────────────────────────────────────────────────────
function showMsg(msg, type) {
  const el = document.getElementById('tab-content');
  const old = el?.querySelector('.msg'); if (old) old.remove();
  const div = document.createElement('div');
  div.className = `msg msg-${type==='err'?'err':'ok'}`;
  div.textContent = msg;
  el?.prepend(div);
  setTimeout(() => div.remove(), 4000);
}

boot();
</script>
