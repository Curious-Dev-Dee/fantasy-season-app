<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPL 2026 — Fantasy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding-bottom: 120px; }
    .topbar { display: flex; align-items: center; gap: 12px; background: #1e293b;
      padding: 14px 16px; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 10; }
    .back-btn { font-size: 1.2rem; color: #38bdf8; text-decoration: none; }
    .topbar h2 { font-size: 1.1rem; font-weight: 700; flex: 1; }
    .section { padding: 16px; max-width: 480px; margin: 0 auto; }

    /* Day Tabs */
    .day-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .day-tab { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.85rem; cursor: pointer; text-align: center; }
    .day-tab.active { background: #0284c7; color: white; border-color: #0284c7; }

    /* Inner Tabs */
    .tab-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab-btn { flex: 1; padding: 7px; border-radius: 8px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.82rem; cursor: pointer; text-align: center; }
    .tab-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; }

    /* Deadline bar */
    .deadline-bar { background: #1e293b; border-radius: 8px; padding: 10px 14px;
      margin-bottom: 14px; font-size: 0.82rem; display: flex; justify-content: space-between; align-items: center; }
    .status-open   { color: #4ade80; font-weight: 700; }
    .status-locked { color: #f87171; font-weight: 700; }

    /* Login prompt */
    .login-card { background: #1e293b; border-radius: 12px; padding: 24px 16px; text-align: center; margin-bottom: 16px; }
    .login-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 14px; }
    .login-card input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155;
      background: #0f172a; color: #f1f5f9; font-size: 0.9rem; margin-bottom: 10px; }
    .btn { width: 100%; padding: 11px; border-radius: 8px; border: none; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #0284c7; color: white; }
    .btn-primary:hover { background: #0369a1; }
    .btn-purple { background: #7c3aed; color: white; }
    .btn-purple:hover { background: #6d28d9; }
    .btn-green  { background: #16a34a; color: white; }
    .btn-green:hover { background: #15803d; }
    .btn-ghost  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

    /* Player selection */
    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
    .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.78rem; cursor: pointer; white-space: nowrap; }
    .filter-btn.active { background: #334155; color: #f1f5f9; }

    .player-row { display: flex; align-items: center; gap: 10px; background: #1e293b;
      border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
      border: 1px solid #334155; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .player-row.selected    { border-color: #0284c7; background: #0c2a40; }
    .player-row.is-captain  { border-color: #fbbf24 !important; background: #1c1500 !important; }
    .player-row.is-vc       { border-color: #94a3b8 !important; background: #14181d !important; }

    .player-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #334155;
      display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }
    .player-row.selected .player-check,
    .player-row.is-captain .player-check,
    .player-row.is-vc .player-check { background: #0284c7; border-color: #0284c7; color: white; }

    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-meta { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
    .player-role { font-size: 0.7rem; padding: 1px 6px; border-radius: 4px; margin-left: 4px;
      font-weight: 600; }
    .role-BAT { background: #1c3a5e; color: #93c5fd; }
    .role-BWL { background: #1a2e1a; color: #86efac; }
    .role-AR  { background: #3b2a00; color: #fde68a; }
    .role-WK  { background: #2e1a3b; color: #d8b4fe; }

    .cap-badge { font-size: 0.65rem; padding: 1px 5px; border-radius: 4px;
      background: #78350f; color: #fde68a; font-weight: 700; margin-left: 4px; }
    .vc-badge  { font-size: 0.65rem; padding: 1px 5px; border-radius: 4px;
      background: #1e3a5f; color: #93c5fd; font-weight: 700; margin-left: 4px; }

    .player-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .cap-vc-btns  { display: flex; gap: 4px; }
    .cap-btn { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #334155;
      background: #0f172a; color: #94a3b8; cursor: pointer; }
    .cap-btn.gold { border-color: #fbbf24; color: #fbbf24; }
    .cap-btn.silver { border-color: #94a3b8; color: #94a3b8; }

    /* Sticky bottom bar */
    .selection-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b;
      border-top: 1px solid #334155; padding: 12px 16px; z-index: 20; }
    .sel-inner { max-width: 480px; margin: 0 auto; }
    .sel-count { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px;
      display: flex; justify-content: space-between; }
    .sel-count span { color: #38bdf8; font-weight: 700; }
    .sel-btns { display: flex; gap: 8px; }
    .sel-btns .btn { flex: 1; padding: 10px; font-size: 0.85rem; }

    /* Leaderboard */
    .lb-card { background: #1e293b; border-radius: 10px; padding: 12px 14px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
      border: 1px solid #334155; }
    .lb-rank { font-size: 1rem; font-weight: 800; color: #64748b; min-width: 28px; text-align: center; }
    .lb-rank.gold   { color: #fbbf24; }
    .lb-rank.silver { color: #94a3b8; }
    .lb-rank.bronze { color: #b45309; }
    .lb-info { flex: 1; }
    .lb-name  { font-weight: 600; font-size: 0.92rem; }
    .lb-team  { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .lb-pts   { font-size: 1.1rem; font-weight: 800; color: #38bdf8; }
    .lb-badge { font-size: 0.72rem; color: #4ade80; margin-left: 6px; }

    /* My team view */
    .my-team-header { background: #1e293b; border-radius: 10px; padding: 14px;
      margin-bottom: 14px; text-align: center; border: 1px solid #334155; }
    .my-team-pts { font-size: 1.6rem; font-weight: 800; color: #38bdf8; }
    .my-team-rank { font-size: 0.82rem; color: #94a3b8; margin-top: 4px; }
    .my-player-row { display: flex; align-items: center; gap: 10px; background: #1e293b;
      border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid #334155; }
    .my-player-pts { font-size: 0.88rem; font-weight: 700; color: #38bdf8; min-width: 44px; text-align: right; }
    .multiplier { font-size: 0.7rem; color: #fbbf24; }

    .loading { text-align: center; color: #64748b; padding: 40px 0; }
    .empty   { text-align: center; color: #64748b; padding: 30px; font-size: 0.88rem; line-height: 1.6; }
    .msg     { padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 12px; }
    .msg-success { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
    .msg-error   { background: #3b0a0a; color: #f87171; border: 1px solid #991b1b; }

    .locked-notice { background: #3b1a00; border: 1px solid #c2410c; border-radius: 8px;
      padding: 12px 14px; font-size: 0.85rem; color: #fdba74; margin-bottom: 14px; text-align: center; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="ppl-home.html">←</a>
  <h2>⚡ PPL Fantasy</h2>
  <span id="user-label" style="font-size:0.78rem;color:#64748b"></span>
</div>

<div class="section">
  <!-- Day Tabs -->
  <div class="day-tabs" id="day-tabs"></div>

  <!-- Auth -->
  <div id="auth-section"></div>

  <!-- Main content (shown after login) -->
  <div id="main-content" style="display:none">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab(this,'pick')">📝 Pick Team</button>
      <button class="tab-btn" onclick="switchTab(this,'myteam')">👤 My Team</button>
      <button class="tab-btn" onclick="switchTab(this,'leaderboard')">🏆 Leaderboard</button>
    </div>
    <div id="tab-content"></div>
  </div>
</div>

<!-- Sticky selection bar (only shown on Pick tab) -->
<div class="selection-bar" id="sel-bar" style="display:none">
  <div class="sel-inner">
    <div class="sel-count">
      <span id="sel-text">0 / 11 selected</span>
      <span id="cap-text">Captain & VC not set</span>
    </div>
    <div class="sel-btns">
      <button class="btn btn-ghost" onclick="clearSelection()">Clear</button>
      <button class="btn btn-green" id="submit-btn" onclick="submitTeam()">Save Team</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tuvqgcosbweljslbfgqc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ──────────────────────────────────────────
let currentUser = null;       // { id, name } stored in memory
let activeDay   = 1;
let activeTab   = 'pick';
let days        = [];         // ppl_fantasy_days rows
let allPlayers  = [];         // ppl_players with team join
let matchesForDay = [];
let selected    = new Set();  // player IDs picked
let captainId   = null;
let vcId        = null;
let existingTeam = null;      // ppl_user_teams row if already submitted
let roleFilter  = 'ALL';

// ── Boot ──────────────────────────────────────────
async function init() {
  const { data: daysData } = await sb.from('ppl_fantasy_days')
    .select('*').order('day_number');
  days = daysData || [];

  const { data: pl } = await sb.from('ppl_players')
    .select('id,name,role,team_id,ppl_teams(id,name,short_name,group_name)');
  allPlayers = pl || [];

  renderDayTabs();
  renderAuth();
}

// ── Auth (name-based, no password) ───────────────
function renderAuth() {
  const el = document.getElementById('auth-section');
  if (currentUser) {
    document.getElementById('user-label').textContent = currentUser.name;
    el.innerHTML = '';
    document.getElementById('main-content').style.display = 'block';
    loadTab();
    return;
  }
  document.getElementById('main-content').style.display = 'none';
  el.innerHTML = `
    <div class="login-card">
      <p>Enter your name to join PPL Fantasy</p>
      <input type="text" id="name-input" placeholder="Your name" maxlength="30"
        onkeydown="if(event.key==='Enter') loginUser()">
      <button class="btn btn-primary" onclick="loginUser()">Join Fantasy</button>
    </div>`;
  setTimeout(() => document.getElementById('name-input')?.focus(), 100);
}

async function loginUser() {
  const name = document.getElementById('name-input')?.value.trim();
  if (!name) return;

  // Use name as unique key — upsert into a simple users table or just use name as ID
  // We store user as { id: name_slug, name } in memory
  const userId = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  currentUser = { id: userId, name };
  document.getElementById('user-label').textContent = name;
  document.getElementById('auth-section').innerHTML = '';
  document.getElementById('main-content').style.display = 'block';
  loadTab();
}

// ── Day Tabs ──────────────────────────────────────
function renderDayTabs() {
  const el = document.getElementById('day-tabs');
  days.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === 0 ? ' active' : '');
    btn.textContent = `Day ${d.day_number}`;
    btn.onclick = () => {
      activeDay = d.day_number;
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      clearSelection();
      loadTab();
    };
    el.appendChild(btn);
  });
}

function getDayObj() { return days.find(d => d.day_number === activeDay); }

// ── Tab Switch ────────────────────────────────────
function switchTab(btn, tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sel-bar').style.display = tab === 'pick' ? 'block' : 'none';
  loadTab();
}

async function loadTab() {
  if (!currentUser) return;
  const day = getDayObj();
  if (!day) { document.getElementById('tab-content').innerHTML = '<div class="empty">No fantasy days configured yet.</div>'; return; }

  // Fetch matches for this day
  const { data: matches } = await sb.from('ppl_matches')
    .select('team_a_id,team_b_id').eq('day', activeDay);
  matchesForDay = matches || [];

  // Get existing team for this user+day
  const { data: ut } = await sb.from('ppl_user_teams')
    .select('*, ppl_user_team_players(player_id, is_captain, is_vice_captain)')
    .eq('user_id', currentUser.id)
    .eq('day_id', day.id)
    .maybeSingle();
  existingTeam = ut;

  if (existingTeam) {
    // Pre-fill selection
    selected = new Set(existingTeam.ppl_user_team_players.map(p => p.player_id));
    captainId = existingTeam.ppl_user_team_players.find(p => p.is_captain)?.player_id || null;
    vcId      = existingTeam.ppl_user_team_players.find(p => p.is_vice_captain)?.player_id || null;
  }

  if (activeTab === 'pick')        renderPickTab(day);
  else if (activeTab === 'myteam') renderMyTeam(day);
  else                             renderLeaderboard(day);
}

// ── PICK TAB ──────────────────────────────────────
function renderPickTab(day) {
  const el = document.getElementById('tab-content');
  const isLocked = day.is_locked;
  const teamIds = new Set(matchesForDay.flatMap(m => [m.team_a_id, m.team_b_id]));
  const eligiblePlayers = allPlayers.filter(p => teamIds.has(p.team_id));

  document.getElementById('sel-bar').style.display = isLocked ? 'none' : 'block';

  let html = `
    <div class="deadline-bar">
      <span>Day ${activeDay} Fantasy</span>
      <span class="${isLocked ? 'status-locked' : 'status-open'}">
        ${isLocked ? '🔒 LOCKED' : '🟢 OPEN'}
      </span>
    </div>`;

  if (isLocked && !existingTeam) {
    html += `<div class="locked-notice">⏰ Team selection is locked for Day ${activeDay}.<br>You didn't submit a team this day.</div>`;
    el.innerHTML = html;
    return;
  }

  if (isLocked && existingTeam) {
    html += `<div class="locked-notice">🔒 Team locked. View your picks in <strong>My Team</strong>.</div>`;
    el.innerHTML = html;
    return;
  }

  if (existingTeam) {
    html += `<div class="msg msg-success">✅ Team already saved — you can update it below</div>`;
  }

  // Role filters
  const roles = ['ALL','BAT','BWL','AR','WK'];
  html += `<div class="filter-row">
    ${roles.map(r => `<button class="filter-btn${roleFilter===r?' active':''}"
      onclick="setRoleFilter('${r}')">${r}</button>`).join('')}
  </div>`;

  // Group players by team
  const byTeam = {};
  eligiblePlayers.forEach(p => {
    const tname = p.ppl_teams?.name || 'Unknown';
    if (!byTeam[tname]) byTeam[tname] = [];
    byTeam[tname].push(p);
  });

  html += Object.entries(byTeam).map(([team, players]) => {
    const filtered = roleFilter === 'ALL' ? players : players.filter(p => p.role === roleFilter);
    if (!filtered.length) return '';
    return `
      <div style="font-size:0.75rem;color:#64748b;margin:12px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:1px">${team}</div>
      ${filtered.map(p => playerCard(p)).join('')}`;
  }).join('');

  el.innerHTML = html;
  updateSelBar();
}

function playerCard(p) {
  const isSel = selected.has(p.id);
  const isCap = captainId === p.id;
  const isVC  = vcId === p.id;
  let cls = 'player-row';
  if (isCap) cls += ' is-captain';
  else if (isVC) cls += ' is-vc';
  else if (isSel) cls += ' selected';

  const roleCls = `role-${p.role||'BAT'}`;
  const badge = isCap ? '<span class="cap-badge">C</span>' : isVC ? '<span class="vc-badge">VC</span>' : '';

  return `
    <div class="${cls}" id="prow-${p.id}" onclick="togglePlayer('${p.id}')">
      <div class="player-check">${isSel||isCap||isVC ? '✓' : ''}</div>
      <div class="player-info">
        <div class="player-name">${p.name}${badge}
          <span class="player-role ${roleCls}">${p.role||'BAT'}</span>
        </div>
        <div class="player-meta">${p.ppl_teams?.short_name||''}</div>
      </div>
      ${isSel||isCap||isVC ? `
        <div class="player-right">
          <div class="cap-vc-btns" onclick="event.stopPropagation()">
            <button class="cap-btn${isCap?' gold':''}" onclick="setCaptain('${p.id}')">C</button>
            <button class="cap-btn${isVC?' silver':''}" onclick="setVC('${p.id}')">VC</button>
          </div>
        </div>` : ''}
    </div>`;
}

function setRoleFilter(r) {
  roleFilter = r;
  const day = getDayObj();
  renderPickTab(day);
}

function togglePlayer(id) {
  if (selected.has(id)) {
    selected.delete(id);
    if (captainId === id) captainId = null;
    if (vcId === id) vcId = null;
  } else {
    if (selected.size >= 11) {
      showMsg('You can only pick 11 players', 'error'); return;
    }
    selected.add(id);
  }
  const day = getDayObj();
  renderPickTab(day);
}

function setCaptain(id) {
  if (vcId === id) vcId = null;
  captainId = id;
  const day = getDayObj();
  renderPickTab(day);
}

function setVC(id) {
  if (captainId === id) captainId = null;
  vcId = id;
  const day = getDayObj();
  renderPickTab(day);
}

function clearSelection() {
  selected.clear(); captainId = null; vcId = null;
  updateSelBar();
}

function updateSelBar() {
  document.getElementById('sel-text').textContent = `${selected.size} / 11 selected`;
  const capName  = captainId ? allPlayers.find(p=>p.id===captainId)?.name : null;
  const vcName   = vcId      ? allPlayers.find(p=>p.id===vcId)?.name      : null;
  document.getElementById('cap-text').textContent =
    capName && vcName ? `C: ${capName} · VC: ${vcName}` :
    capName ? `C: ${capName} · VC: not set` :
    'Captain & VC not set';
}

async function submitTeam() {
  if (selected.size < 11) { showMsg('Select exactly 11 players', 'error'); return; }
  if (!captainId)  { showMsg('Set your Captain', 'error'); return; }
  if (!vcId)       { showMsg('Set your Vice Captain', 'error'); return; }
  if (captainId === vcId) { showMsg('Captain and VC must be different', 'error'); return; }

  const day = getDayObj();
  document.getElementById('submit-btn').textContent = 'Saving…';
  document.getElementById('submit-btn').disabled = true;

  try {
    // Upsert user team
    const teamPayload = { user_id: currentUser.id, day_id: day.id, user_name: currentUser.name };

    let teamId;
    if (existingTeam) {
      // Update
      await sb.from('ppl_user_teams').update(teamPayload).eq('id', existingTeam.id);
      teamId = existingTeam.id;
      // Delete old picks
      await sb.from('ppl_user_team_players').delete().eq('user_team_id', teamId);
    } else {
      const { data: newTeam } = await sb.from('ppl_user_teams').insert(teamPayload).select().single();
      teamId = newTeam.id;
    }

    // Insert player picks
    const picks = [...selected].map(pid => ({
      user_team_id:    teamId,
      player_id:       pid,
      user_id:         currentUser.id,
      is_captain:      pid === captainId,
      is_vice_captain: pid === vcId
    }));
    await sb.from('ppl_user_team_players').insert(picks);

    showMsg('✅ Team saved successfully!', 'success');
    await loadTab();
  } catch(e) {
    showMsg('Error saving team: ' + e.message, 'error');
  } finally {
    document.getElementById('submit-btn').textContent = 'Save Team';
    document.getElementById('submit-btn').disabled = false;
  }
}

// ── MY TEAM TAB ───────────────────────────────────
async function renderMyTeam(day) {
  const el = document.getElementById('tab-content');

  if (!existingTeam) {
    el.innerHTML = `<div class="empty">
      You haven't submitted a team for Day ${activeDay} yet.<br><br>
      Go to <strong>Pick Team</strong> to create one.
    </div>`;
    return;
  }

  // Get fantasy scores for this user + day
  const { data: score } = await sb.from('ppl_fantasy_scores')
    .select('total_points, rank')
    .eq('user_id', currentUser.id)
    .eq('day_id', day.id)
    .maybeSingle();

  // Get player points for this day's matches
  const { data: matchIds } = await sb.from('ppl_matches')
    .select('id').eq('day', activeDay);
  const mids = (matchIds||[]).map(m=>m.id);

  let pmpMap = {};
  if (mids.length) {
    const { data: pmp } = await sb.from('ppl_player_match_points')
      .select('player_id, fantasy_points').in('match_id', mids);
    (pmp||[]).forEach(r => {
      pmpMap[r.player_id] = (pmpMap[r.player_id]||0) + r.fantasy_points;
    });
  }

  const picks = existingTeam.ppl_user_team_players || [];
  const captain = picks.find(p => p.is_captain)?.player_id;
  const vc      = picks.find(p => p.is_vice_captain)?.player_id;

  let html = `
    <div class="my-team-header">
      <div style="font-size:0.8rem;color:#64748b;margin-bottom:4px">Day ${activeDay} — ${currentUser.name}</div>
      <div class="my-team-pts">${score ? score.total_points.toFixed(1) : '—'} pts</div>
      <div class="my-team-rank">${score ? `Rank #${score.rank}` : 'Points calculated after matches'}</div>
    </div>`;

  // Sort: captain first, then vc, then rest
  const sorted = [...picks].sort((a,b) => {
    if (a.is_captain) return -1;
    if (b.is_captain) return 1;
    if (a.is_vice_captain) return -1;
    if (b.is_vice_captain) return 1;
    return 0;
  });

  html += sorted.map(pick => {
    const p = allPlayers.find(pl => pl.id === pick.player_id);
    const pts = pmpMap[pick.player_id] || 0;
    const mult = pick.is_captain ? 2 : pick.is_vice_captain ? 1.5 : 1;
    const final = pts * mult;
    const badge = pick.is_captain ? '<span class="cap-badge">C</span>' : pick.is_vice_captain ? '<span class="vc-badge">VC</span>' : '';
    const roleCls = `role-${p?.role||'BAT'}`;
    return `
      <div class="my-player-row">
        <div class="player-info">
          <div class="player-name">${p?.name||'?'}${badge}
            <span class="player-role ${roleCls}">${p?.role||'BAT'}</span>
          </div>
          <div class="player-meta">${p?.ppl_teams?.short_name||''}</div>
        </div>
        <div class="my-player-pts">
          ${final > 0 ? final.toFixed(1) : '—'}
          ${mult > 1 ? `<div class="multiplier">×${mult}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  el.innerHTML = html;
}

// ── LEADERBOARD TAB ───────────────────────────────
async function renderLeaderboard(day) {
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="loading">Loading leaderboard…</div>';

  const { data: scores } = await sb.from('ppl_fantasy_scores')
    .select('*, ppl_user_teams(user_name)')
    .eq('day_id', day.id)
    .order('rank');

  if (!scores || !scores.length) {
    el.innerHTML = `<div class="empty">Leaderboard will appear after Day ${activeDay} matches are complete.</div>`;
    return;
  }

  el.innerHTML = scores.map((s, i) => {
    const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const rankIcon = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${s.rank}`;
    const isMe = s.ppl_user_teams?.user_name === currentUser.name;
    return `
      <div class="lb-card" style="${isMe?'border-color:#0284c7;background:#0c2a40':''}">
        <div class="lb-rank ${rankCls}">${rankIcon}</div>
        <div class="lb-info">
          <div class="lb-name">${s.ppl_user_teams?.user_name||'Player'}
            ${isMe ? '<span class="lb-badge">← You</span>' : ''}
          </div>
          <div class="lb-team">Day ${activeDay} · ${s.total_points.toFixed(1)} pts</div>
        </div>
        <div class="lb-pts">${s.total_points.toFixed(1)}</div>
      </div>`;
  }).join('');
}

// ── Helpers ───────────────────────────────────────
function showMsg(msg, type) {
  const el = document.getElementById('tab-content');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.textContent = msg;
  el.prepend(div);
  setTimeout(() => div.remove(), 3500);
}

init();
</script>
