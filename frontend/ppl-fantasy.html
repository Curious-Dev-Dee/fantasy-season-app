<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PPL 2026 | Fantasy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">

  <!-- Core Platform Theme & Tokens -->
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="css/bottom-nav.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="theme-color" content="#9AE000">

  <!-- Core Scripts -->
  <script type="module" src="auth-guard.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- PPL Fantasy Specific UI Styles -->
  <style>
    .section { padding: 14px 16px; max-width: var(--app-max-width); margin: 0 auto; padding-bottom: 180px; }

    /* AUTH WALL */
    .auth-wall { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: var(--card-radius); padding: 32px 20px; text-align: center; margin-top: 24px; }
    .auth-wall h3 { font-family: var(--font-display); font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    .auth-wall p { color: var(--text-faint); font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
    .btn-auth { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #0284c7, #0369a1); color: #fff; border-radius: var(--btn-radius); font-weight: 700; text-decoration: none; font-size: 14px; font-family: var(--font-display); letter-spacing: 0.5px; text-transform: uppercase; }

    /* PHASE TABS */
    .phase-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .phase-tab { flex: 1; padding: 10px 6px; border-radius: var(--btn-radius); border: 1px solid var(--border-card); background: var(--bg-card); color: var(--text-faint); font-family: var(--font-display); font-size: 12px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; text-align: center; transition: var(--transition); line-height: 1.3; }
    .phase-tab.active-a { background: var(--accent-dim); border-color: var(--border-accent); color: var(--accent); }
    .phase-tab.active-b { background: rgba(124,196,255,0.09); border-color: rgba(124,196,255,0.25); color: var(--rank-color); }
    .phase-tab.active-ko { background: rgba(251,146,60,0.09); border-color: rgba(251,146,60,0.25); color: var(--orange); }
    .phase-tab.locked-tab { opacity: 0.5; }
    .phase-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot-a { background: var(--accent); } .dot-b { background: var(--rank-color); } .dot-ko { background: var(--orange); }

    /* INNER TABS */
    .tab-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .tab-btn { flex: 1; padding: 8px; border-radius: var(--btn-radius); border: 1px solid var(--border-card); background: var(--bg-card); color: var(--text-faint); font-family: var(--font-display); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; text-align: center; transition: var(--transition); }
    .tab-btn.active { background: rgba(124,196,255,0.1); border-color: rgba(124,196,255,0.3); color: var(--rank-color); }

    /* PHASE BANNER */
    .phase-banner { border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .phase-banner.open-a { background: var(--accent-dim); border: 1px solid var(--border-accent); color: var(--accent); }
    .phase-banner.open-b { background: rgba(124,196,255,0.08); border: 1px solid rgba(124,196,255,0.25); color: var(--rank-color); }
    .phase-banner.open-ko { background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.25); color: var(--orange); }
    .phase-banner.locked { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }

    /* BUDGET BAR */
    .budget-bar { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: var(--card-radius); padding: 11px 14px; margin-bottom: 12px; display: flex; align-items: center; }
    .budget-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .budget-val { font-family: var(--font-display); font-size: 19px; font-weight: 900; line-height: 1; }
    .budget-val.good { color: var(--accent); } .budget-val.warn { color: var(--orange); } .budget-val.over { color: var(--red); }
    .budget-val.white { color: var(--text-primary); } .budget-val.gold { color: #fbbf24; }
    .budget-lbl { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .budget-div { width: 1px; height: 32px; background: var(--border-card); }

    /* RULES BOX & FILTERS */
    .rules-box { background: rgba(154,224,0,0.04); border: 1px solid var(--border-accent); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; font-size: 11px; color: var(--text-faint); line-height: 1.8; }
    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
    .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border-card); background: var(--bg-card); color: var(--text-faint); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; white-space: nowrap; font-family: var(--font-display); transition: var(--transition); flex-shrink: 0; }
    .filter-btn.active { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); color: var(--text-primary); }

    /* TEAM HEADER & PLAYER ROW */
    .team-hdr { font-family: var(--font-display); font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); margin: 14px 0 6px; display: flex; align-items: center; gap: 8px; }
    .team-hdr::before { content: ''; width: 3px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .team-hdr.grp-a::before { background: var(--accent); } .team-hdr.grp-b::before { background: var(--rank-color); } .team-hdr.grp-ko::before { background: var(--orange); }
    
    .player-row { display: flex; align-items: center; gap: 10px; background: var(--bg-card); border-radius: 12px; padding: 10px 12px; margin-bottom: 7px; border: 1px solid var(--border-card); cursor: pointer; transition: var(--transition); position: relative; }
    .player-row:active { transform: scale(0.98); }
    .player-row.selected { border-color: rgba(124,196,255,0.4); background: #0a1e35; }
    .player-row.is-captain { border-color: rgba(245,158,11,0.5)!important; background: #1a1200!important; }
    .player-row.is-vc { border-color: rgba(148,163,184,0.4)!important; background: #12171d!important; }
    .player-row.star-player { border-left: 3px solid #fbbf24; }
    .player-row.faded { opacity: 0.35; cursor: not-allowed; }

    .p-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border-card); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; transition: var(--transition); }
    .player-row.selected .p-check { background: var(--rank-color); border-color: var(--rank-color); color: #000; }
    .player-row.is-captain .p-check { background: #fbbf24; border-color: #fbbf24; color: #000; }
    .player-row.is-vc .p-check { background: var(--text-dim); border-color: var(--text-dim); color: #000; }

    .p-info { flex: 1; min-width: 0; }
    .p-name { display: flex; align-items: center; gap: 5px; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .role-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 800; letter-spacing: 0.5px; flex-shrink: 0; font-family: var(--font-display); }
    .role-AR { background: rgba(245,158,11,0.15); color: var(--gold); }
    .role-BAT { background: rgba(124,196,255,0.12); color: var(--rank-color); }
    .role-BOWL { background: rgba(154,224,0,0.1); color: var(--accent); }
    .star-icon { font-size: 9px; color: #fbbf24; flex-shrink: 0; }
    .cap-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 800; background: rgba(245,158,11,0.2); color: #fbbf24; flex-shrink: 0; }
    .vc-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 800; background: rgba(148,163,184,0.15); color: var(--text-dim); flex-shrink: 0; }
    .p-meta { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .p-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .p-price { font-family: var(--font-display); font-size: 16px; font-weight: 900; color: var(--text-primary); }
    .p-price.is-star { color: #fbbf24; }
    .cv-btns { display: flex; gap: 4px; }
    .cv-btn { font-size: 10px; padding: 3px 7px; border-radius: 6px; border: 1px solid var(--border-card); background: var(--bg-page); color: var(--text-faint); cursor: pointer; font-weight: 800; font-family: var(--font-display); transition: var(--transition); }
    .cv-btn.active-gold { border-color: #fbbf24; color: #fbbf24; background: rgba(245,158,11,0.1); }
    .cv-btn.active-silver { border-color: var(--text-dim); color: var(--text-dim); background: rgba(148,163,184,0.1); }

    /* MY TEAM TAB & LEADERBOARD MISC */
    .my-team-hdr { background: var(--bg-card); border: 1px solid var(--border-accent); border-radius: var(--card-radius); padding: 18px; margin-bottom: 14px; text-align: center; }
    .my-pts { font-family: var(--font-display); font-size: 52px; font-weight: 900; line-height: 1; }
    .pts-a { color: var(--accent); } .pts-b { color: var(--rank-color); } .pts-ko { color: var(--orange); }
    .my-rank { font-size: 13px; color: var(--text-faint); margin-top: 4px; }
    .my-player-row { display: flex; align-items: center; gap: 10px; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; padding: 10px 12px; margin-bottom: 7px; }
    .my-pts-cell { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--rank-color); min-width: 50px; text-align: right; }
    .mult { font-size: 10px; color: #fbbf24; font-weight: 700; }

    /* BOTTOM ACTIONS BAR */
    .bottom-bar { position: fixed; bottom: var(--nav-height); left: 50%; transform: translateX(-50%); width: 100%; max-width: var(--app-max-width); background: rgba(13,22,37,0.98); backdrop-filter: blur(20px); border-top: 1px solid var(--border-card); padding: 10px 16px; z-index: 50; display: none; }
    .bar-inner { display: flex; gap: 8px; align-items: center; }
    .btn-ghost { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border-card); flex: 1; padding: 11px; border-radius: var(--btn-radius); font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font-display); text-transform: uppercase; }
    .btn-green { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; flex: 1; padding: 11px; border-radius: var(--btn-radius); font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: var(--font-display); text-transform: uppercase; }

    .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; }
    .msg-ok { background: rgba(22,163,74,0.1); color: #4ade80; border: 1px solid rgba(22,163,74,0.25); }
    .msg-err { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .empty { text-align: center; color: var(--text-faint); padding: 32px 16px; font-size: 13px; line-height: 1.7; }
  </style>
</head>

<body>
<div class="app-container">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <a class="header-more-btn" href="ppl-home.html"><i class="fas fa-arrow-left"></i></a>
      <h1 class="page-title" style="margin: 0; font-family: var(--font-display); font-size: 20px; font-weight: 900; text-transform: uppercase; color: var(--text-primary);">⚡ PPL Fantasy</h1>
    </div>
    <div class="header-right-group">
      <div class="user-chip" id="user-chip" style="font-size: 11px; color: var(--text-faint); text-align: right; line-height: 1.4; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Loading…</div>
    </div>
  </header>

  <div class="section">
    <div id="auth-wall"></div>
    <div id="app" style="display:none">
      
      <!-- Phase Tabs -->
      <div class="phase-tabs" id="phase-tabs">
        <button class="phase-tab active-a" id="tab-group-a">
          <span class="phase-dot dot-a"></span>Group A
        </button>
        <button class="phase-tab" id="tab-group-b">
          <span class="phase-dot dot-b"></span>Group B
        </button>
        <button class="phase-tab" id="tab-knockout">
          <span class="phase-dot dot-ko"></span>Knockout
        </button>
      </div>

      <!-- Inner Tabs -->
      <div class="tab-row">
        <button class="tab-btn active" id="inner-tab-pick"><i class="fas fa-users"></i> Pick XI</button>
        <button class="tab-btn" id="inner-tab-myteam"><i class="fas fa-user"></i> My Team</button>
        <button class="tab-btn" id="inner-tab-standings"><i class="fas fa-trophy"></i> Standings</button>
      </div>

      <div id="tab-content"></div>
    </div>
  </div>

</div>

<!-- Sticky bottom bar -->
<div class="bottom-bar" id="sel-bar">
  <div class="bar-inner">
    <button class="btn-ghost" id="clearBtn">Clear</button>
    <button class="btn-green" id="submit-btn">💾 Save Team</button>
  </div>
</div>

<!-- BOTTOM NAV (PPL CONTEXT) -->
<nav class="bottom-nav">
  <a href="ppl-home.html"><i class="fas fa-house"></i><span>Home</span></a>
  <a href="ppl-fixtures.html"><i class="fas fa-calendar-days"></i><span>Fixtures</span></a>
  <a href="ppl-live.html"><i class="fas fa-circle-dot"></i><span>Live</span></a>
  <a href="ppl-stats.html"><i class="fas fa-chart-bar"></i><span>Stats</span></a>
  <a href="ppl-fantasy.html" class="active"><i class="fas fa-bolt"></i><span>Fantasy</span></a>
</nav>

<!-- CHAT FAB (GLOBAL BANTER) -->
<button id="chatFab" class="chat-fab" aria-label="Open chat">
  <i class="fas fa-comment-dots"></i>
</button>

<!-- JS INITIATOR -->
<script type="module" src="ppl-fantasy.js"></script>

</body>
</html>
