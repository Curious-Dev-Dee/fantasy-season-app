<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPL 2026 — Premier Premier League</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
    .header { background: #1e293b; padding: 16px; text-align: center; border-bottom: 2px solid #0ea5e9; }
    .header h1 { font-size: 1.5rem; color: #38bdf8; font-weight: 800; }
    .header p  { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
    .section { padding: 16px; max-width: 480px; margin: 0 auto; }
    .live-card { background: #1e293b; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
      border-left: 4px solid #ef4444; }
    .live-badge { font-size: 0.7rem; font-weight: 700; color: #ef4444; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 4px; }
    .live-match { font-size: 1rem; font-weight: 700; }
    .live-score { font-size: 1.3rem; font-weight: 800; color: #38bdf8; margin-top: 4px; }
    .live-meta  { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
    .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    .nav-card { background: #1e293b; border-radius: 12px; padding: 20px 16px;
      text-decoration: none; color: #f1f5f9; display: flex; flex-direction: column;
      align-items: center; gap: 8px; font-weight: 600; font-size: 0.95rem;
      transition: background 0.2s; border: 1px solid #334155; }
    .nav-card:active { background: #0f172a; }
    .nav-card .icon { font-size: 1.8rem; }
    .nav-card.full { grid-column: span 2; }
    .day-tabs { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; }
    .day-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
    .day-tab.active { background: #0284c7; color: white; border-color: #0284c7; }
    .match-card { background: #1e293b; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 10px; border: 1px solid #334155; cursor: pointer; }
    .match-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .match-num  { font-size: 0.75rem; color: #64748b; }
    .status-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .status-upcoming   { background: #1e3a5f; color: #60a5fa; }
    .status-in_progress { background: #3b1a1a; color: #f87171; }
    .status-completed  { background: #14532d; color: #86efac; }
    .match-teams { font-size: 0.95rem; font-weight: 600; text-align: center; }
    .match-result { font-size: 0.82rem; color: #94a3b8; text-align: center; margin-top: 4px; }
    .match-score { font-size: 0.85rem; color: #38bdf8; text-align: center; margin-top: 3px; font-weight: 600; }
    .loading { text-align: center; color: #64748b; padding: 40px 0; }
    .section-title { font-size: 1rem; font-weight: 700; color: #94a3b8; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🏏 PPL 2026</h1>
  <p>Premier Premier League — 3-Day Tournament</p>
</div>

<div class="section">
  <div id="live-section"></div>

  <div class="section-title" style="margin-top:8px">Quick Nav</div>
  <div class="nav-grid">
    <a class="nav-card" href="ppl-fixtures.html">
      <span class="icon">📅</span><span>Fixtures</span>
    </a>
    <a class="nav-card" href="ppl-points-table.html">
      <span class="icon">🏆</span><span>Points Table</span>
    </a>
    <a class="nav-card" href="ppl-stats.html">
      <span class="icon">📊</span><span>Stats</span>
    </a>
    <a class="nav-card" href="ppl-fantasy.html">
      <span class="icon">⚡</span><span>Fantasy</span>
    </a>
    <a class="nav-card full" href="ppl-scorecard.html">
      <span class="icon">📋</span><span>Scorecards</span>
    </a>
  </div>

  <div class="section-title" style="margin-top:24px">Today's Matches</div>
  <div class="day-tabs" id="day-tabs"></div>
  <div id="matches-list"><div class="loading">Loading matches…</div></div>
</div>

<script>
const SUPABASE_URL = 'https://tuvqgcosbweljslbfgqc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allMatches = [], activeDay = 1;

async function init() {
  const { data: matches } = await sb.from('ppl_matches')
    .select('*, team_a:team_a_id(id,name,short_name), team_b:team_b_id(id,name,short_name), innings:ppl_innings(*)')
    .order('match_number');
  allMatches = matches || [];

  renderLive();
  renderDayTabs();
  renderMatches(activeDay);

  // Realtime: refresh live match every 15s
  setInterval(renderLive, 15000);
}

function renderLive() {
  const live = allMatches.find(m => m.status === 'in_progress');
  const el = document.getElementById('live-section');
  if (!live) { el.innerHTML = ''; return; }
  const inn = live.innings || [];
  const latest = inn.sort((a,b) => b.innings_number - a.innings_number)[0];
  const scoreStr = latest ? `${latest.total_runs}/${latest.total_wickets} (${latest.total_overs} ov)` : 'Starting…';
  const ta = live.team_a?.short_name || 'TBA';
  const tb = live.team_b?.short_name || 'TBA';
  el.innerHTML = `
    <div class="live-card" onclick="location.href='ppl-scorecard.html?match=${live.id}'">
      <div class="live-badge">🔴 LIVE</div>
      <div class="live-match">${live.team_a?.name} vs ${live.team_b?.name}</div>
      <div class="live-score">${scoreStr}</div>
      <div class="live-meta">Day ${live.day} · Match ${live.match_number} · Tap for scorecard</div>
    </div>`;
}

function renderDayTabs() {
  const tabs = document.getElementById('day-tabs');
  [1,2,3].forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d === activeDay ? ' active' : '');
    btn.textContent = `Day ${d}`;
    btn.onclick = () => { activeDay = d; document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderMatches(d); };
    tabs.appendChild(btn);
  });
}

function renderMatches(day) {
  const list = document.getElementById('matches-list');
  const matches = allMatches.filter(m => m.day === day);
  if (!matches.length) { list.innerHTML = '<div class="loading">No matches this day</div>'; return; }
  list.innerHTML = matches.map(m => {
    const ta = m.team_a?.name || 'TBA';
    const tb = m.team_b?.name || 'TBA';
    const inn = (m.innings || []).sort((a,b) => a.innings_number - b.innings_number);
    let scoreHTML = '';
    if (inn.length >= 1) scoreHTML += `<div class="match-score">${m.team_a?.short_name||'T1'}: ${inn.find(i=>i.batting_team_id===m.team_a_id)?.total_runs||0}/${inn.find(i=>i.batting_team_id===m.team_a_id)?.total_wickets||0}</div>`;
    if (inn.length >= 2) scoreHTML += `<div class="match-score">${m.team_b?.short_name||'T2'}: ${inn.find(i=>i.batting_team_id===m.team_b_id)?.total_runs||0}/${inn.find(i=>i.batting_team_id===m.team_b_id)?.total_wickets||0}</div>`;
    const statusClass = `status-${m.status}`;
    const statusLabel = m.status === 'in_progress' ? '🔴 LIVE' : m.status === 'completed' ? '✅ Done' : '🕐 Soon';
    return `
      <div class="match-card" onclick="location.href='ppl-scorecard.html?match=${m.id}'">
        <div class="match-head">
          <span class="match-num">M${m.match_number} · ${m.group_name || ''}</span>
          <span class="status-badge ${statusClass}">${statusLabel}</span>
        </div>
        <div class="match-teams">${ta} vs ${tb}</div>
        ${scoreHTML}
        ${m.result_description ? `<div class="match-result">${m.result_description}</div>` : ''}
      </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
