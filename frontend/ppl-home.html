<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPL 2026 — Home</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --accent:       #9AE000;
      --accent-dim:   rgba(154,224,0,0.09);
      --accent-glow:  rgba(154,224,0,0.28);
      --bg-page:      #020617;
      --bg-card:      #0d1625;
      --bg-card-alt:  #111e30;
      --border-card:  rgba(255,255,255,0.10);
      --border:       rgba(255,255,255,0.07);
      --border-subtle:rgba(255,255,255,0.04);
      --border-accent:rgba(154,224,0,0.20);
      --text-primary: #f0f4f8;
      --text-dim:     #94a3b8;
      --text-faint:   #64748b;
      --red:          #ef4444;
      --orange:       #fb923c;
      --gold:         #f59e0b;
      --rank-color:   #7cc4ff;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --card-radius:  16px;
      --btn-radius:   12px;
      --nav-height:   65px;
      --transition:   all 250ms cubic-bezier(0.4,0,0.2,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .app-wrap { width: 100%; max-width: 480px; padding: 0 0 calc(var(--nav-height) + 24px); }

    /* ── HEADER ── */
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; background: rgba(2,6,23,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-badge { font-family: var(--font-display); font-size: 10px; font-weight: 800; letter-spacing: 1px; background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); padding: 3px 8px; border-radius: 6px; text-transform: uppercase; }
    
    /* TOURNAMENT TOGGLE SWITCH */
    .tourney-toggle { display: flex; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-card); border-radius: 20px; padding: 3px; gap: 2px; }
    .tt-btn { font-family: var(--font-display); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 14px; border-radius: 16px; color: var(--text-faint); text-decoration: none; transition: all 0.2s; }
    .tt-btn.active { background: var(--bg-card); color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 1px solid var(--border-subtle); }
    .tt-btn:not(.active):hover { color: var(--text-dim); }

    /* ── COMMON CARD STYLES ── */
    .section-wrap { padding: 0 16px; margin-top: 20px; }
    .card-title { font-family: var(--font-display); font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .card-title i { color: var(--accent); }
    .dashboard-card { background: linear-gradient(145deg, var(--bg-card-alt) 0%, var(--bg-card) 100%); border: 1px solid var(--border-card); border-radius: var(--card-radius); padding: 16px; position: relative; overflow: hidden; margin-bottom: 12px; }
    
    /* ── USER FANTASY CARD ── */
    .user-card { border-color: var(--border-accent); }
    .user-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), transparent); }
    .user-greeting { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
    .user-name { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-stats-row { display: flex; gap: 10px; }
    .user-stat-box { flex: 1; background: rgba(0,0,0,0.25); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 12px 10px; text-align: center; }
    .us-val { font-family: var(--font-display); font-size: 24px; font-weight: 900; color: var(--accent); line-height: 1; }
    .us-lbl { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-weight: 600; }
    .auth-prompt { display: flex; align-items: center; justify-content: space-between; background: rgba(124,196,255,0.1); border: 1px solid rgba(124,196,255,0.2); padding: 14px; border-radius: 12px; text-decoration: none; color: var(--text-primary); }
    .auth-prompt-text { font-size: 13px; font-weight: 600; }

    /* ── MATCH CARD ── */
    .match-card { cursor: pointer; transition: var(--transition); border-color: rgba(124,196,255,0.2); }
    .match-card:active { transform: scale(0.98); }
    .match-card.is-live { border-color: rgba(239,68,68,0.4); background: linear-gradient(145deg, #1a0a0a, var(--bg-card)); }
    .match-badge { font-family: var(--font-display); font-size: 10px; font-weight: 800; letter-spacing: 1px; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; display: inline-block; margin-bottom: 12px; }
    .badge-upcoming { background: rgba(124,196,255,0.15); color: var(--rank-color); border: 1px solid rgba(124,196,255,0.3); }
    .badge-live { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); animation: livePulse 1.5s infinite; }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .match-teams { font-family: var(--font-display); font-size: 26px; font-weight: 900; line-height: 1; text-align: center; margin-bottom: 6px; }
    .match-meta { font-size: 12px; color: var(--text-faint); text-align: center; margin-bottom: 12px; }
    .match-score { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--red); text-align: center; margin-bottom: 12px; }

    /* ── POINTS TABLE GLIMPSE ── */
    .pt-glimpse { display: flex; flex-direction: column; gap: 12px; }
    .pt-group { background: rgba(0,0,0,0.2); border: 1px solid var(--border-subtle); border-radius: 10px; overflow: hidden; }
    .pt-hdr { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border-subtle); padding: 6px 12px; font-family: var(--font-display); font-size: 10px; font-weight: 800; color: var(--text-dim); display: flex; justify-content: space-between; }
    .pt-row { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border-subtle); font-size: 13px; align-items: center; }
    .pt-row:last-child { border-bottom: none; }
    .pt-team { font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .pt-pts { font-family: var(--font-display); font-size: 15px; font-weight: 800; color: var(--accent); }

    /* ── STATS GRID ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-mini-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 12px; text-align: center; }
    .sm-icon { font-size: 16px; color: var(--text-dim); margin-bottom: 6px; }
    .sm-role { font-family: var(--font-display); font-size: 10px; font-weight: 800; letter-spacing: 1px; color: var(--text-faint); text-transform: uppercase; margin-bottom: 4px; }
    .sm-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .sm-val { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--rank-color); }
    .stat-mini-card.mvp { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.05); }
    .stat-mini-card.mvp .sm-val { color: var(--star); }
    .stat-mini-card.mvp .sm-icon { color: var(--star); }

    /* ── LEADERBOARD GLIMPSE ── */
    .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { font-family: var(--font-display); font-size: 18px; font-weight: 900; width: 24px; text-align: center; }
    .r-1 { color: var(--star); } .r-2 { color: var(--text-dim); } .r-3 { color: #d97706; }
    .lb-name { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-pts { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--accent); }

    /* ── BUTTONS ── */
    .btn-view-all { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: var(--btn-radius); color: var(--text-faint); font-family: var(--font-display); font-size: 12px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; text-decoration: none; margin-top: 12px; transition: var(--transition); }
    .btn-view-all:hover { background: var(--accent-dim); border-color: var(--border-accent); color: var(--accent); }

    /* ── FOOTER ── */
    .ppl-footer { text-align: center; padding: 30px 16px 20px; border-top: 1px solid var(--border); margin-top: 20px; }
    .footer-logo { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .footer-sub { font-size: 11px; color: var(--text-faint); }
    .footer-sub span { color: var(--accent); font-weight: 600; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(13,22,37,0.97); backdrop-filter: blur(20px); border-top: 1px solid var(--border-card); display: flex; align-items: center; height: var(--nav-height); z-index: 200; padding: 0 8px; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; text-decoration: none; color: var(--text-faint); font-family: var(--font-display); font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; transition: var(--transition); }
    .nav-item i { font-size: 18px; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active i { filter: drop-shadow(0 0 6px var(--accent-glow)); }

    .loading-state { text-align: center; padding: 40px 0; color: var(--text-faint); font-size: 13px; }
  </style>
</head>
<body>

<div class="app-wrap">
  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <div class="tourney-toggle">
        <a href="home.html" class="tt-btn">IPL 2026</a>
        <a href="ppl-home.html" class="tt-btn active">PPL 2026</a>
      </div>
    </div>
    <div class="header-badge">Community</div>
  </header>

  <div id="dashboard-content">
    <div class="loading-state"><i class="fas fa-circle-notch fa-spin"></i> Loading Dashboard...</div>
  </div>

  <!-- FOOTER -->
  <footer class="ppl-footer">
    <div class="footer-logo">PPL 2026</div>
    <div class="footer-sub">Official Digital Partner <span>CricExp.in</span></div>
  </footer>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item active" href="ppl-home.html"><i class="fas fa-house"></i><span>Home</span></a>
  <a class="nav-item" href="ppl-fixtures.html"><i class="fas fa-calendar-days"></i><span>Fixtures</span></a>
  <a class="nav-item" href="ppl-scorecard.html"><i class="fas fa-cricket-bat-ball"></i><span>Scores</span></a>
  <a class="nav-item" href="ppl-stats.html"><i class="fas fa-chart-bar"></i><span>Stats</span></a>
  <a class="nav-item" href="ppl-fantasy.html"><i class="fas fa-bolt"></i><span>Fantasy</span></a>
</nav>

<script>
const SB_URL = 'https://tuvqgcosbweljslbfgqc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dnFnY29zYndlbGpzbGJmZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTkyNTgsImV4cCI6MjA4NjIzNTI1OH0._doWGRcUdRamCyd4i9YJd8vwZEGtfX5hwsAHtb1zKZo';
const sb = supabase.createClient(SB_URL, SB_KEY);

async function initDashboard() {
  const contentEl = document.getElementById('dashboard-content');
  
  try {
    // 1. Get Auth Session
    const { data: { session } } = await sb.auth.getSession();
    
    // 2. Fetch Dashboard Data in Parallel
    const [
      { data: matches },
      { data: ptsTable },
      { data: stats },
      { data: leaderboard }
    ] = await Promise.all([
      sb.from('ppl_matches').select('*, team_a:team_a_id(short_name), team_b:team_b_id(short_name), innings:ppl_innings(*)').eq('is_super_over', false).order('match_number'),
      sb.from('ppl_points_table').select('*, team:team_id(short_name, group_name)').order('points', {ascending: false}).order('nrr', {ascending: false}),
      sb.from('ppl_player_stats').select('*, player:player_id(name)'),
      sb.from('ppl_overall_leaderboard').select('*').order('overall_rank', {ascending: true}).limit(3)
    ]);

    // ── PROCESS USER DATA ──
    let userCardHtml = '';
    if (session) {
      const { data: myLb } = await sb.from('ppl_overall_leaderboard').select('*').eq('user_id', session.user.id).maybeSingle();
      const myRank = myLb?.overall_rank ? `#${myLb.overall_rank}` : '--';
      const myScore = myLb?.total_points ? parseFloat(myLb.total_points).toFixed(1) : '0';
      const myName = myLb?.team_name || myLb?.full_name || 'Manager';
      
      userCardHtml = `
        <div class="dashboard-card user-card">
          <div class="user-greeting">Welcome back,</div>
          <div class="user-name">${myName}</div>
          <div class="user-stats-row">
            <div class="user-stat-box">
              <div class="us-val">${myScore}</div>
              <div class="us-lbl">Total Points</div>
            </div>
            <div class="user-stat-box" style="border-color:rgba(154,224,0,0.3); background:rgba(154,224,0,0.05)">
              <div class="us-val" style="color:var(--accent)">${myRank}</div>
              <div class="us-lbl" style="color:var(--accent)">Global Rank</div>
            </div>
          </div>
        </div>`;
    } else {
      userCardHtml = `
        <div class="section-wrap" style="margin-top:10px">
          <a href="index.html" class="auth-prompt">
            <div class="auth-prompt-text">Sign in to play PPL Fantasy</div>
            <i class="fas fa-chevron-right"></i>
          </a>
        </div>`;
    }

    // ── PROCESS MATCH DATA ──
    const liveMatch = (matches || []).find(m => m.status === 'in_progress');
    const nextMatch = (matches || []).find(m => m.status === 'upcoming');
    const displayMatch = liveMatch || nextMatch || (matches || [])[(matches?.length || 1) - 1]; // Fallback to last
    
    let matchCardHtml = '';
    if (displayMatch) {
      const isLive = displayMatch.status === 'in_progress';
      const badgeHtml = isLive ? `<span class="match-badge badge-live">● LIVE NOW</span>` : `<span class="match-badge badge-upcoming">NEXT MATCH</span>`;
      const ta = displayMatch.team_a?.short_name || 'TBA';
      const tb = displayMatch.team_b?.short_name || 'TBA';
      const link = isLive ? `ppl-live.html` : `ppl-scorecard.html?match=${displayMatch.id}`;
      
      let scoreHtml = '';
      if (isLive && displayMatch.innings) {
        const inns = displayMatch.innings.sort((a,b)=>a.innings_number-b.innings_number);
        scoreHtml = `<div class="match-score">${inns.map(i => `${i.total_runs}/${i.total_wickets}`).join(' vs ')}</div>`;
      }

      matchCardHtml = `
        <div class="dashboard-card match-card ${isLive ? 'is-live' : ''}" onclick="location.href='${link}'">
          ${badgeHtml}
          <div class="match-teams">${ta} vs ${tb}</div>
          ${scoreHtml}
          <div class="match-meta">Match ${displayMatch.match_number} · Day ${displayMatch.day}</div>
          <a href="${link}" class="btn-view-all" style="margin-top:0">View Match Center <i class="fas fa-arrow-right" style="font-size:10px"></i></a>
        </div>`;
    }

    // ── PROCESS POINTS TABLE ──
    const grpA = (ptsTable || []).filter(r => r.team?.group_name === 'A' || r.group_name === 'A').slice(0, 2);
    const grpB = (ptsTable || []).filter(r => r.team?.group_name === 'B' || r.group_name === 'B').slice(0, 2);
    
    const buildPtGroup = (name, rows) => {
      if (!rows.length) return '';
      return `
        <div class="pt-group">
          <div class="pt-hdr"><span>Group ${name} (Top 2)</span><span>Pts</span></div>
          ${rows.map((r, i) => `
            <div class="pt-row">
              <div class="pt-team"><span style="color:var(--text-faint);font-size:10px">${i+1}</span> ${r.team?.short_name || '?'}</div>
              <div class="pt-pts">${r.points || 0}</div>
            </div>
          `).join('')}
        </div>`;
    };

    // ── PROCESS STATS ──
    const sList = stats || [];
    let topBat = { runs: -1 }, topBowl = { wkts: -1 }, topField = { c: -1 }, topMvp = { pts: -1 };
    
    sList.forEach(s => {
      const name = s.player?.name || 'Unknown';
      const runs = s.total_runs || 0;
      const wkts = s.wickets || 0;
      const fld = (s.catches||0) + (s.stumpings||0) + (s.run_outs||0);
      const pts = s.fantasy_points_total || 0;
      
      if (runs > topBat.runs) topBat = { name, val: runs, runs };
      if (wkts > topBowl.wkts) topBowl = { name, val: wkts, wkts };
      if (fld > topField.c) topField = { name, val: fld, c: fld };
      if (pts > topMvp.pts) topMvp = { name, val: pts, pts };
    });

    // ── PROCESS LEADERBOARD ──
    const lbRows = (leaderboard || []).map((r, i) => {
      const icon = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
      return `
        <div class="lb-row">
          <div class="lb-rank r-${i+1}">${icon}</div>
          <div class="lb-name">${r.team_name || r.full_name || 'Manager'}</div>
          <div class="lb-pts">${parseFloat(r.total_points||0).toFixed(1)}</div>
        </div>`;
    }).join('');


    // ── ASSEMBLE HTML ──
    contentEl.innerHTML = `
      ${session ? `<div class="section-wrap">${userCardHtml}</div>` : userCardHtml}

      <div class="section-wrap">
        <div class="card-title"><i class="fas fa-broadcast-tower"></i> Match Center</div>
        ${matchCardHtml}
      </div>

      <div class="section-wrap">
        <div class="card-title"><i class="fas fa-table"></i> Standings Preview</div>
        <div class="dashboard-card" style="padding:12px">
          <div class="pt-glimpse">
            ${buildPtGroup('A', grpA)}
            ${buildPtGroup('B', grpB)}
          </div>
          <a href="ppl-points-table.html" class="btn-view-all">Full Points Table <i class="fas fa-chevron-right" style="font-size:10px"></i></a>
        </div>
      </div>

      <div class="section-wrap">
        <div class="card-title"><i class="fas fa-fire"></i> Top Performers</div>
        <div class="stats-grid">
          <div class="stat-mini-card">
            <div class="sm-icon"><i class="fas fa-baseball-bat-ball"></i></div>
            <div class="sm-role">Top Batter</div>
            <div class="sm-name">${topBat.name || '--'}</div>
            <div class="sm-val">${topBat.runs >= 0 ? topBat.val : '-'}</div>
          </div>
          <div class="stat-mini-card">
            <div class="sm-icon"><i class="fas fa-bowling-ball"></i></div>
            <div class="sm-role">Top Bowler</div>
            <div class="sm-name">${topBowl.name || '--'}</div>
            <div class="sm-val">${topBowl.wkts >= 0 ? topBowl.val : '-'}</div>
          </div>
          <div class="stat-mini-card">
            <div class="sm-icon"><i class="fas fa-hand-paper"></i></div>
            <div class="sm-role">Top Fielder</div>
            <div class="sm-name">${topField.name || '--'}</div>
            <div class="sm-val">${topField.c >= 0 ? topField.val : '-'}</div>
          </div>
          <div class="stat-mini-card mvp">
            <div class="sm-icon"><i class="fas fa-bolt"></i></div>
            <div class="sm-role" style="color:var(--star)">Fantasy MVP</div>
            <div class="sm-name">${topMvp.name || '--'}</div>
            <div class="sm-val">${topMvp.pts >= 0 ? topMvp.val : '-'}</div>
          </div>
        </div>
        <a href="ppl-stats.html" class="btn-view-all" style="margin-top:8px">View All Stats <i class="fas fa-chevron-right" style="font-size:10px"></i></a>
      </div>

      <div class="section-wrap">
        <div class="card-title"><i class="fas fa-ranking-star"></i> Global Leaders</div>
        <div class="dashboard-card" style="padding:10px 16px 16px">
          ${lbRows || '<div style="text-align:center;padding:20px;color:var(--text-faint);font-size:12px">Rankings available soon</div>'}
          <a href="ppl-fantasy-leaderboard.html" class="btn-view-all">Full Leaderboard <i class="fas fa-chevron-right" style="font-size:10px"></i></a>
        </div>
      </div>
    `;

  } catch (error) {
    console.error("Dashboard Load Error:", error);
    contentEl.innerHTML = `<div class="loading-state" style="color:var(--red)">Failed to load dashboard. Please refresh.</div>`;
  }
}

initDashboard();
</script>
</body>
</html>
