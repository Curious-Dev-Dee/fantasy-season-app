<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rankings · Cricket Experts</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/bottom-nav.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/leaderboard.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- BUG FIX #1: auth-guard handles session — no more direct getSession() -->
  <script type="module" src="auth-guard.js"></script>
</head>

<body>

  <div class="leaderboard-app page-with-nav">

    <!-- HEADER -->
    <header class="leaderboard-header">
      <!-- BUG FIX #9: /home clean URL -->
      <a href="/home" class="icon-back" aria-label="Back to home">
        <i class="fas fa-arrow-left"></i>
      </a>
<h1 class="lb-page-title" id="lbPageTitle">Leaderboard</h1> 
     <div class="header-icon" aria-hidden="true">
        <i class="fas fa-trophy"></i>
      </div>
    </header>

    <!-- PODIUM -->
    <section id="podiumContainer" class="podium-section"></section>

        <!-- SEASON PRIZES STRIP -->
<div class="lb-prizes-strip">
  <div class="lb-prizes-header">
    <span class="lb-prizes-title">🎁 Season Prizes</span>
    <span class="lb-prizes-sub">End of tournament</span>
  </div>
  <div class="lb-prize-row">
    <div class="lb-prize-info">
      <span class="lb-prize-what">👕 Premium T-Shirt</span>
      <span class="lb-prize-by">by <strong>All That Trend</strong></span>
    </div>
    <span class="lb-prize-medal">🥇</span>
  </div>
  <div class="lb-prize-row">
    <div class="lb-prize-info">
      <span class="lb-prize-what">🧢 Premium Sports Cap</span>
      <span class="lb-prize-by">by <strong>Friends Fancy Store</strong></span>
    </div>
    <span class="lb-prize-medal">🥈</span>
  </div>
</div>

    <!-- USER RANK SUMMARY -->
    <section id="leaderboardSummary" class="user-summary-card">
      <span class="summary-spinner"></span>
      Checking your rank…
    </section>



    <!-- LEADERBOARD LIST -->
    <main id="leaderboardContainer" class="leaderboard-list"></main>

  </div>

  <!-- BOTTOM NAV — BUG FIX #9: /home clean URL -->
  <nav class="bottom-nav">
    <a href="/home"><i class="fas fa-house"></i><span>Home</span></a>
    <a href="fixtures.html"><i class="fas fa-calendar-check"></i><span>Fixtures</span></a>
    <a href="prediction.html"><i class="fas fa-bolt"></i><span>Fun</span></a>
    <a href="more.html"><i class="fas fa-bars"></i><span>More</span></a>
  </nav>

  <!-- CHAT FAB -->
  <button id="chatFab" class="chat-fab" aria-label="Open chat">
    <i class="fas fa-comment-dots"></i>
    <span id="unreadBadge" class="unread-badge hidden" aria-label="Unread messages"></span>
  </button>

  <!-- CHAT BACKDROP -->
  <div id="chatBackdrop" class="chat-backdrop hidden"></div>

  <!-- CHAT PANEL -->
  <div id="chatPanel" class="chat-panel" role="dialog" aria-label="Chat">
    <div class="chat-header">
      <h3 id="chatTitle" class="chat-title">Global Banter</h3>
      <button id="closeChatBtn" class="close-chat" aria-label="Close chat">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <form id="chatForm" class="chat-input-area">
      <input type="text" id="chatInput"
             placeholder="Say something…"
             autocomplete="off"
             maxlength="150"
             required>
      <button type="submit" id="sendChatBtn" aria-label="Send">
        <i class="fas fa-paper-plane"></i>
      </button>
    </form>
  </div>

  <!-- TOAST -->
  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="leaderboard.js"></script>
</body>
</html>
