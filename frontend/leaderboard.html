<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rankings · Cricket Experts</title>

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/leaderboard.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- BUG FIX #1: auth-guard handles session — no more direct getSession() -->
  <script type="module" src="auth-guard.js"></script>
  <!-- Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BMYSEG9XNL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BMYSEG9XNL');
  </script>
</head>

<body>

  <div class="leaderboard-app page-with-nav">

    <!-- HEADER -->
    <header class="leaderboard-header">
      <!-- BUG FIX #9: /home clean URL -->
      <a href="/home" class="icon-back" aria-label="Back to home">
        <i class="fas fa-arrow-left"></i>
      </a>
<h1 class="lb-page-title" id="lbPageTitle">Leaderboard</h1> 
     <a href="prizes.html" class="header-icon" aria-label="View Prizes">
  <i class="fas fa-trophy"></i>
</a>

    </header>

    <!-- PODIUM -->
    <section id="podiumContainer" class="podium-section"></section>



    <!-- USER RANK SUMMARY -->
    <section id="leaderboardSummary" class="user-summary-card">
      <span class="summary-spinner"></span>
      Checking your rank…
    </section>



    <!-- LEADERBOARD LIST -->
    <main id="leaderboardContainer" class="leaderboard-list"></main>

  </div>



  <!-- CHAT FAB -->
  <button id="chatFab" class="chat-fab" aria-label="Open chat">
    <i class="fas fa-comment-dots"></i>
    <span id="unreadBadge" class="unread-badge hidden" aria-label="Unread messages"></span>
  </button>

  <!-- CHAT BACKDROP -->
  <div id="chatBackdrop" class="chat-backdrop hidden"></div>

  <!-- CHAT PANEL -->
  <div id="chatPanel" class="chat-panel" role="dialog" aria-label="Chat">
    <div class="chat-header">
      <h3 id="chatTitle" class="chat-title">Global Banter</h3>
      <button id="closeChatBtn" class="close-chat" aria-label="Close chat">
        <i class="fas fa-times"></i>
      </button>
    </div>
<div class="chat-push-banner" id="chatPushBanner"></div>
    <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-input-area">
      <input type="text" id="chatInput"
             placeholder="Say something…"
             autocomplete="off"
             maxlength="150"
             required>
      <button type="submit" id="sendChatBtn" aria-label="Send">
        <i class="fas fa-paper-plane"></i>
      </button>
    </form>
  </div>

  <!-- TOAST -->
  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="leaderboard.js"></script>
  <script src="transitions.js"></script>
</body>
<script type="module" src="ad-manager.js"></script>
</html>
