<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard | Cricket Experts</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/leaderboard.css?v=1.0" />
  <link rel="stylesheet" href="css/bottom-nav.css?v=1.0" />
</head>
<body>

<div class="leaderboard-app page-with-nav">
  <header class="leaderboard-header">
    <button class="back-btn" onclick="window.location.href='home.html'"><i class="fas fa-chevron-left"></i></button>
    <h1>Rankings</h1>
    <div class="header-icon"><i class="fas fa-medal"></i></div>
  </header>

  <section class="podium-section" id="podiumContainer">
      </section>

  <section class="user-summary-card" id="leaderboardSummary">
    <div class="spinner-small"></div> Checking your rank...
  </section>

  <main id="leaderboardContainer" class="leaderboard-list">
    </main>
</div>


<button id="chatFab" class="chat-fab">
    <i class="fas fa-comment-dots"></i>
    <span id="unreadBadge" class="unread-badge hidden"></span>
</button>

<div id="chatBackdrop" class="chat-backdrop hidden"></div>
<div id="chatPanel" class="chat-panel bottom-sheet">
    <div class="chat-header">
        <h3 id="chatTitle">Global Banter</h3>
        <button id="closeChatBtn" class="close-chat"><i class="fas fa-times"></i></button>
    </div>
    
    <div id="chatMessages" class="chat-messages">
        <div class="spinner-small" style="margin: auto;"></div>
    </div>
    
    <form id="chatForm" class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Send a message..." autocomplete="off" maxlength="150" required>
        <button type="submit" id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
    </form>
</div>

<script type="module" src="leaderboard.js?v=1.0"></script>
</body>
</html>
